        </div>
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════
   REPORTS PAGE
══════════════════════════════════════════ */
function Reports(){
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const {findings:allFindings}=useContext(FindingsCtx);
  const {engagements}=useContext(EngCtx);
  const [yearFilter,setYearFilter]=useState(2026);
  const [generating,setGenerating]=useState(null);
  const [toast,setToast]=useState(null);
  const showMsg=(msg,c="#10B981")=>{setToast({msg,c});setTimeout(()=>setToast(null),3000);};

  // التقارير = المهام المعتمدة نهائياً فقط
  var approvedEngs=engagements.filter(function(e){return e.finalApprovalStatus==="final_approved";});
  // صلاحيات
  if(!isMgr)approvedEngs=approvedEngs.filter(function(e){return auth&&auth.canAccessEng&&auth.canAccessEng(e.id);});

  // فلترة السنة
  const reports=approvedEngs.filter(function(e){
    if(!e.start&&!e.end)return true;
    var s=e.start?new Date(e.start.split("-")[0],+e.start.split("-")[1]-1,+e.start.split("-")[2]):null;
    var en=e.end?new Date(e.end.split("-")[0],+e.end.split("-")[1]-1,+e.end.split("-")[2]):null;
    var ys=new Date(yearFilter,0,1);var ye=new Date(yearFilter,11,31);
    if(s&&en)return s<=ye&&en>=ys;
    if(s)return s.getFullYear()===yearFilter;
    if(en)return en.getFullYear()===yearFilter;
    return true;
  });

  const findingsForEng=e=>allFindings.filter(f=>f.audit===e.id);

  const handleDownload=(e)=>{
    setGenerating(e.id);
    const fs=findingsForEng(e);
    setTimeout(()=>{
      const ok=window.downloadDocx(e,fs);
      if(ok) showMsg('تم تحميل تقرير "'+e.title+'" بنجاح ✓');
      setGenerating(null);
    },80);
  };

  function fmtD(d){if(!d)return"";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.c,color:"white",padding:"10px 22px",borderRadius:10,fontSize:14,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>{toast.msg}</div>}

      {/* Stats bar */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {[{l:"التقارير الصادرة",v:reports.length,c:"#10B981"},{l:"إجمالي الملاحظات",v:reports.reduce((a,e)=>a+findingsForEng(e).length,0),c:"#EF4444"},{l:"السنة",v:yearFilter,c:NAVY}].map(({l,v,c})=>(
          <div key={l} style={{background:"white",borderRadius:10,padding:"14px 16px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.08)",borderTop:"3px solid "+c}}>
            <div style={{fontSize:24,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:12,color:"#6B7280",marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Year filter */}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:6,background:NAVY,borderRadius:9,padding:"4px 8px"}}>
          <button onClick={()=>setYearFilter(y=>y-1)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:5,color:"white",width:24,height:24,cursor:"pointer",fontSize:14}}>›</button>
          <span style={{fontSize:13,fontWeight:700,color:GOLD,minWidth:42,textAlign:"center"}}>{yearFilter}</span>
          <button onClick={()=>setYearFilter(y=>y+1)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:5,color:"white",width:24,height:24,cursor:"pointer",fontSize:14}}>‹</button>
        </div>
        <span style={{fontSize:12,color:"#94A3B8"}}>التقارير تصدر تلقائياً بعد اعتماد مدير المراجعة للمهمة</span>
      </div>

      {/* Report cards */}
      {reports.length===0?(
        <div style={{background:"white",borderRadius:12,padding:"40px",textAlign:"center",color:"#94A3B8",border:"1px solid #E9EEF4"}}>
          <i className="ti ti-file-off" style={{fontSize:36,display:"block",marginBottom:10}}/>
          <div style={{fontSize:13,fontWeight:600}}>لا توجد تقارير صادرة لسنة {yearFilter}</div>
          <div style={{fontSize:11,marginTop:4}}>يصدر التقرير تلقائياً عند اعتماد مدير المراجعة للمهمة</div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
          {reports.map(e=>{
            const rFindings=findingsForEng(e);
            const byRisk={"حرج":0,"مرتفع":0,"متوسط":0,"منخفض":0};
            rFindings.forEach(f=>{if(byRisk[f.risk]!==undefined)byRisk[f.risk]++;});
            const isGen=generating===e.id;
            return(
              <div key={e.id} className="chov" style={{background:"white",borderRadius:14,boxShadow:"0 1px 6px rgba(0,0,0,0.08)",border:"1px solid transparent",transition:"all 0.2s",overflow:"hidden"}}>
                <div style={{background:"#2D6A4F",padding:"14px 18px"}}>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.65)",marginBottom:4}}>{e.id} · {e.dept||"تقرير مراجعة"}</div>
                  <div style={{fontSize:15,fontWeight:700,color:"white",lineHeight:1.4}}>تقرير {e.title}</div>
                  <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{background:"#DCFCE7",color:"#166534",fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:20}}>صادر</span>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>اعتُمد: {e.finalApprovedAt||""}</span>
                  </div>
                </div>
                <div style={{padding:"14px 18px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                    <div style={{background:"#F8FAFC",borderRadius:8,padding:"8px 10px"}}>
                      <div style={{fontSize:10,color:"#94A3B8"}}>قائد المراجعة</div>
                      <div style={{fontSize:12,fontWeight:600,color:NAVY}}>{e.lead||"—"}</div>
                    </div>
                    <div style={{background:"#F8FAFC",borderRadius:8,padding:"8px 10px"}}>
                      <div style={{fontSize:10,color:"#94A3B8"}}>اعتمده</div>
                      <div style={{fontSize:12,fontWeight:600,color:NAVY}}>{e.finalApprovedBy||"—"}</div>
                    </div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:NAVY,marginBottom:10}}>
                    الملاحظات <span style={{background:NAVY+"15",color:NAVY,padding:"1px 8px",borderRadius:10,fontSize:12}}>{rFindings.length}</span>
                  </div>
                  {rFindings.length===0?(
                    <div style={{fontSize:12,color:"#16A34A",padding:"8px 10px",background:"#F0FDF4",borderRadius:8,border:"1px solid #BBF7D0"}}>✓ لا توجد ملاحظات — جميع نتائج الاختبار مرضية</div>
                  ):(
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {Object.entries(byRisk).filter(([,v])=>v>0).map(([k,v])=>(
                        <span key={k} style={{background:({حرج:"#FFCDD2",مرتفع:"#FFEBEE",متوسط:"#FFF3E0",منخفض:"#E8F5E9"})[k],color:({حرج:"#C62828",مرتفع:"#B71C1C",متوسط:"#E65100",منخفض:"#1B5E20"})[k],padding:"2px 10px",borderRadius:20,fontSize:12,fontWeight:600}}>{k}: {v}</span>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{padding:"12px 18px",borderTop:"1px solid #F3F4F6",display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>handleDownload(e)} disabled={isGen}
                    style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 16px",background:isGen?"#9CA3AF":"#2D6A4F",color:"white",border:"none",borderRadius:8,fontSize:13,cursor:isGen?"not-allowed":"pointer",fontWeight:600}}>
                    {isGen?(<><i className="ti ti-loader-2" style={{animation:"spin 1s linear infinite",fontSize:15}}/>جارٍ التوليد...</>):(<><i className="ti ti-file-word" style={{fontSize:15}}/>تحميل التقرير (.docx)</>)}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}


function Settings(){
  const [saved,setSaved]=useState(false);
  const auth=useContext(AuthCtx);
  const {engagements}=useContext(EngCtx);
  const isMgr=auth&&auth.isManager;
  const [selUser,setSelUser]=useState(null);
  const [memberModal,setMemberModal]=useState(false);
  const [editMember,setEditMember]=useState(null); // null=add, obj=edit
  const [memberForm,setMemberForm]=useState({name:"",role:"team",pin:"",color:"#3B82F6"});

  const teamUsers=auth&&auth.users?auth.users.filter(function(u){return u.role==="team";}):[];

  const openAddMember=function(){
    setEditMember(null);
    setMemberForm({name:"",role:"team",pin:"",color:"#3B82F6"});
    setMemberModal(true);
  };
  const openEditMember=function(u){
    setEditMember(u);
    setMemberForm({name:u.name,role:u.role,pin:u.pin||"",color:u.color||"#3B82F6"});
    setMemberModal(true);
  };
  const saveMember=function(){
    if(!memberForm.name.trim()){alert("يجب إدخال الاسم");return;}
    if(editMember){
      auth.updateUser&&auth.updateUser(editMember.id,memberForm);
      setMemberModal(false);setEditMember(null);
    } else {
      if(!memberForm.pin||!memberForm.pin.trim()){alert("يجب إدخال كلمة مرور مبدئية للمستخدم الجديد");return;}
      var newId="u"+Date.now();
      var initials=memberForm.name.trim().charAt(0);
      var nm=memberForm.name.trim();var pn=memberForm.pin;
      var p=auth.addUser&&auth.addUser({id:newId,name:nm,role:memberForm.role,pin:pn,color:memberForm.color,initials:initials,assignments:[]});
      // ننتظر تأكيد السيرفر فعلياً قبل الإغلاق وعرض النجاح
      if(p&&p.then){
        p.then(function(ok){
          if(ok){
            alert("تمت إضافة المستخدم \""+nm+"\".\nكلمة المرور المبدئية: "+pn+"\nسيظهر اسمه في شاشة الدخول، وسيُطلب منه تغيير كلمة المرور عند أول دخول.");
            setMemberModal(false);setEditMember(null);
          }
          // لو فشل، addUser عرضت رسالة الخطأ بنفسها، ونُبقي النافذة مفتوحة
        });
      } else {
        setMemberModal(false);setEditMember(null);
      }
    }
  };
  const deleteMember=function(u){
    if(!confirm("حذف "+u.name+" من فريق المراجعة؟"))return;
    auth.removeUser&&auth.removeUser(u.id);
    if(selUser&&selUser.id===u.id)setSelUser(null);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Member modal */}
      <Modal open={memberModal} onClose={function(){setMemberModal(false);setEditMember(null);}} title={editMember?"تعديل بيانات العضو":"إضافة عضو جديد"}>
        <FR label="الاسم الكامل *"><input style={INP} value={memberForm.name} onChange={function(ev){setMemberForm(function(p){return Object.assign({},p,{name:ev.target.value});});}} placeholder="اسم العضو"/></FR>
        <FR label="الدور">
          <select style={INP} value={memberForm.role} onChange={function(ev){setMemberForm(function(p){return Object.assign({},p,{role:ev.target.value});});}}>
            <option value="team">فريق المراجعة</option>
            <option value="manager">مدير المراجعة</option>
          </select>
        </FR>
        <FR label={editMember?"كلمة المرور (تُدار من المستخدم)":"كلمة المرور المبدئية *"}>
          {editMember?(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{flex:1,padding:"8px 12px",background:"#F8FAFC",borderRadius:8,fontSize:12,color:"#94A3B8",border:"1px solid #E9EEF4"}}>•••••• (يغيّرها المستخدم بنفسه)</div>
              <button onClick={function(){
                var np=prompt("كلمة مرور مبدئية جديدة للمستخدم "+editMember.name+":","0000");
                if(np){auth.resetPassword&&auth.resetPassword(editMember.id,np).then(function(){alert("تمت إعادة التعيين. كلمة المرور المبدئية: "+np+"\nسيُطلب من المستخدم تغييرها عند الدخول.");});}
              }} style={{background:"#FEF3C7",border:"1px solid #FDE047",borderRadius:8,padding:"8px 12px",fontSize:11,cursor:"pointer",color:"#92400E",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                <i className="ti ti-key" style={{marginLeft:4}}/>إعادة تعيين
              </button>
            </div>
          ):(
            <input style={INP} value={memberForm.pin} onChange={function(ev){setMemberForm(function(p){return Object.assign({},p,{pin:ev.target.value});});}} placeholder="كلمة مرور مبدئية (يغيّرها المستخدم لاحقاً)"/>
          )}
        </FR>
        <FR label="لون الأفاتار">
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["#C8A84B","#3B82F6","#10B981","#8B5CF6","#EF4444","#F59E0B","#06B6D4","#EC4899"].map(function(col){return(
              <div key={col} onClick={function(){setMemberForm(function(p){return Object.assign({},p,{color:col});});}}
                style={{width:28,height:28,borderRadius:"50%",background:col,cursor:"pointer",border:memberForm.color===col?"3px solid #1E293B":"3px solid transparent"}}/>
            );})}
          </div>
        </FR>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <Btn v="secondary" onClick={function(){setMemberModal(false);setEditMember(null);}}>إلغاء</Btn>
          <Btn v="gold" onClick={saveMember}><i className="ti ti-check"/>{editMember?"حفظ التعديلات":"إضافة العضو"}</Btn>
        </div>
      </Modal>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card title="معلومات المنظمة">
        {[{l:"اسم الجهة",v:"وزارة المالية - المراجعة الداخلية"},{l:"الإطار المرجعي",v:"معايير IIA الدولية"},{l:"السنة المالية",v:"2024 (يناير - ديسمبر)"},{l:"العملة",v:"ريال سعودي (SAR)"}].map(function({l,v}){return(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderBottom:"1px solid #F3F4F6"}}><span style={{fontSize:13,color:"#6B7280"}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{v}</span></div>
        );})}
        <button onClick={function(){setSaved(true);setTimeout(function(){setSaved(false);},2200);}} style={{marginTop:14,padding:"8px 20px",background:saved?"#10B981":NAVY,color:"white",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600,transition:"background 0.3s"}}>
          {saved?"✓ تم الحفظ":"حفظ التغييرات"}
        </button>
      </Card>
      <Card title="تصنيف المخاطر">
        {[{r:"حرج",c:"#991B1B",d:"يؤثر على استمرارية المنظمة"},{r:"مرتفع",c:"#EF4444",d:"تأثير كبير على الأهداف الاستراتيجية"},{r:"متوسط",c:"#F59E0B",d:"تأثير محدود ويمكن التحكم فيه"},{r:"منخفض",c:"#10B981",d:"مخاطر ضئيلة أو مقبولة"}].map(function({r,c,d}){return(
          <div key={r} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 0",borderBottom:"1px solid #F3F4F6"}}>
            <div style={{width:13,height:13,borderRadius:"50%",background:c,marginTop:2,flexShrink:0}}/>
            <div><div style={{fontSize:13,fontWeight:700,color:"#374151"}}>{r}</div><div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{d}</div></div>
          </div>
        );})}
      </Card>

      {/* فريق المراجعة */}
      <Card title="فريق المراجعة" sty={{gridColumn:"1/-1"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          {isMgr&&<div style={{fontSize:12,color:"#9CA3AF"}}><i className="ti ti-info-circle" style={{marginLeft:4}}/>اضغط على الاسم لإدارة مهامه · استخدم الأزرار للتعديل أو الحذف</div>}
          {isMgr&&<Btn v="gold" onClick={openAddMember}><i className="ti ti-plus"/>إضافة عضو</Btn>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {teamUsers.map(function(u){
            const isSelected=selUser&&selUser.id===u.id;
            const assignedCount=(u.assignments||[]).length;
            return(
              <div key={u.id} style={{background:isSelected?NAVY+"10":"#F9FAFB",borderRadius:10,padding:"16px",textAlign:"center",border:"2px solid "+(isSelected?NAVY:"transparent"),transition:"all 0.2s",position:"relative"}}>
                {/* أزرار التعديل والحذف */}
                {isMgr&&<div style={{position:"absolute",top:8,left:8,display:"flex",gap:4}}>
                  <button onClick={function(ev){ev.stopPropagation();openEditMember(u);}} style={{background:"#EFF6FF",border:"none",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"3px 5px"}}><i className="ti ti-edit" style={{fontSize:11}}/></button>
                  <button onClick={function(ev){ev.stopPropagation();deleteMember(u);}} style={{background:"#FEF2F2",border:"none",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"3px 5px"}}><i className="ti ti-trash" style={{fontSize:11}}/></button>
                </div>}
                <div onClick={function(){if(isMgr)setSelUser(isSelected?null:u);}} style={{cursor:isMgr?"pointer":"default"}}>
                  <div style={{width:46,height:46,borderRadius:"50%",background:u.color+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:u.color,margin:"0 auto 10px"}}>{u.initials||u.name.charAt(0)}</div>
                  <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>{u.name}</div>
                  <div style={{fontSize:12,color:"#9CA3AF",marginTop:3}}>{u.role==="manager"?"مدير المراجعة":"فريق المراجعة"}</div>
                  <div style={{marginTop:8,display:"inline-block",padding:"3px 10px",borderRadius:20,background:u.color+"20",color:u.color,fontSize:11,fontWeight:600}}>{assignedCount} {assignedCount===1?"مهمة":"مهام"}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* لوحة إدارة مهام العضو المحدد */}
        {isMgr&&selUser&&(
          <div style={{marginTop:20,borderTop:"2px solid #F3F4F6",paddingTop:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:36,height:36,borderRadius:9,background:selUser.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,color:"white"}}>{selUser.initials}</div>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:NAVY}}>مهام {selUser.name}</div>
                <div style={{fontSize:12,color:"#9CA3AF"}}>{(selUser.assignments||[]).length} مهمة مُعيَّنة من أصل {engagements.length}</div>
              </div>
              <button onClick={function(){setSelUser(null);}} style={{marginRight:"auto",background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:18}}>×</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {engagements.map(function(eng){
                const assigned=(selUser.assignments||[]).indexOf(eng.id)>=0;
                return(
                  <div key={eng.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,background:assigned?"#F0FDF4":"#F9FAFB",border:"1px solid "+(assigned?"#86EFAC":"#E5E7EB")}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#374151"}}>{eng.title}</div>
                      <div style={{display:"flex",gap:8,marginTop:3}}>
                        <span style={{fontSize:11,color:"#9CA3AF",fontFamily:"monospace"}}>{eng.id}</span>
                        <SBadge status={eng.status}/>
                      </div>
                    </div>
                    <button
                      onClick={function(){
                        if(assigned){auth.unassignEng(selUser.id,eng.id);}
                        else{auth.assignEng(selUser.id,eng.id);}
                        // تحديث selUser محلياً
                        setSelUser(function(prev){
                          var newAssignments=assigned
                            ?(prev.assignments||[]).filter(function(a){return a!==eng.id;})
                            :(prev.assignments||[]).concat([eng.id]);
                          return Object.assign({},prev,{assignments:newAssignments});
                        });
                      }}
                      style={{padding:"6px 16px",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",background:assigned?"#EF4444":"#10B981",color:"white",minWidth:80}}>
                      {assigned?"إزالة":"تعيين"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Card>
    </div>
    </div>
  );
}

function Notifications(){
  const {notifications,markRead,markAllRead,unreadCount,isRead,navigate}=useContext(NotifCtx);
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const myId=auth&&auth.currentUser?auth.currentUser.id:"";
  // حساب الرسالة الصحيحة لكل مستخدم
  const getMsg=function(n){
    if(n.assignedTo){
      return n.assignedTo===myId?(n.messageForAssigned||n.message):(n.messageForOthers||n.message);
    }
    return n.message;
  };

  // التنبيهات مفلترة مسبقاً في notifAPI (بدون تنبيهات المستخدم نفسه)
  const myNotifs=notifications;

  const typeIco=function(t){
    if(t==="add")   return{icon:"ti-plus",    bg:"#ECFDF5",color:"#10B981"};
    if(t==="edit")  return{icon:"ti-edit",    bg:"#EFF6FF",color:"#3B82F6"};
    if(t==="delete")return{icon:"ti-trash",   bg:"#FEF2F2",color:"#EF4444"};
    if(t==="assign")return{icon:"ti-user-plus",bg:"#F5F3FF",color:"#8B5CF6"};
    return{icon:"ti-bell",bg:"#F3F4F6",color:"#6B7280"};
  };
  const entityLabel=function(e){
    if(e==="engagement") return"مهمة مراجعة";
    if(e==="finding")    return"ملاحظة";
    if(e==="workpaper")  return"ورقة عمل";
    return e;
  };
  const fmtTime=function(iso){
    const d=new Date(iso);
    const now=new Date();
    const diff=Math.floor((now-d)/1000);
    if(diff<60)return"الآن";
    if(diff<3600)return Math.floor(diff/60)+" دقيقة";
    if(diff<86400)return Math.floor(diff/3600)+" ساعة";
    const m=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
    return d.getDate()+" "+m[d.getMonth()]+" — "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"white",borderRadius:10,padding:"12px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:NAVY,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <i className="ti ti-bell" style={{fontSize:18,color:"white"}}/>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:NAVY}}>التنبيهات</div>
            <div style={{fontSize:12,color:"#9CA3AF"}}>{myNotifs.filter(function(n){return!isRead(n);}).length} غير مقروء من أصل {myNotifs.length}</div>
          </div>
        </div>
        {unreadCount>0&&(
          <button onClick={markAllRead}
            style={{padding:"6px 14px",background:"#F3F4F6",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",color:"#374151",fontWeight:600}}>
            <i className="ti ti-checks" style={{marginLeft:5}}/>تحديد الكل كمقروء
          </button>
        )}
      </div>

      {/* List */}
      {myNotifs.length===0?(
        <div style={{background:"white",borderRadius:12,padding:"60px 20px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <i className="ti ti-bell-off" style={{fontSize:48,color:"#E5E7EB",display:"block",marginBottom:12}}/>
          <div style={{fontSize:15,fontWeight:600,color:"#9CA3AF"}}>لا توجد تنبيهات</div>
          <div style={{fontSize:13,color:"#D1D5DB",marginTop:4}}>ستظهر هنا أي تغييرات على المهام المعيّنة لك</div>
        </div>
      ):(
        <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.06)",overflow:"hidden"}}>
          {myNotifs.map(function(n,idx){
            const s=typeIco(n.type);
            return(
              <div key={n.id} onClick={function(){navigate(n);}}
                style={{display:"flex",gap:14,padding:"16px 18px",borderBottom:idx<myNotifs.length-1?"1px solid #F3F4F6":"none",cursor:"pointer",background:isRead(n)?"white":"#FAFBFF",transition:"background 0.15s"}}>
                {/* Icon */}
                <div style={{width:40,height:40,borderRadius:10,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <i className={"ti "+s.icon} style={{fontSize:18,color:s.color}}/>
                </div>
                {/* Content */}
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    {!isRead(n)&&<span style={{width:8,height:8,borderRadius:"50%",background:"#3B82F6",display:"inline-block",flexShrink:0}}/>}
                    <span style={{fontSize:13,fontWeight:isRead(n)?400:700,color:"#374151"}}>{getMsg(n)}</span>
                  </div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"#9CA3AF",display:"flex",alignItems:"center",gap:4}}>
                      <i className="ti ti-user" style={{fontSize:11}}/>{n.actor}
                    </span>
                    <span style={{fontSize:11,color:"#9CA3AF",display:"flex",alignItems:"center",gap:4}}>
                      <i className="ti ti-clock" style={{fontSize:11}}/>{fmtTime(n.timestamp)}
                    </span>
                    {n.engagementTitle&&(
                      <span style={{fontSize:11,background:"#EFF6FF",color:"#1D4ED8",padding:"1px 7px",borderRadius:4,fontWeight:600}}>
                        {n.engagementTitle}
                      </span>
                    )}
                  </div>
                </div>
                {/* Entity badge + arrow */}
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0,paddingTop:2}}>
                  <div style={{fontSize:10,color:"#9CA3AF"}}>{entityLabel(n.entity)}</div>
                  <i className="ti ti-arrow-left" style={{fontSize:14,color:"#D1D5DB"}}/> 
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function LoginScreen({onLogin}){
  const [users,setUsers]=useState([]);
  const [sel,setSel]=useState(null);
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const loadUsers=function(){
    fetch("/api/users",{cache:"no-store"}).then(function(r){return r.json();}).then(setUsers).catch(function(){});
  };

  useEffect(function(){
    loadUsers();
    // تحديث القائمة كل ٥ ثوانٍ ليظهر أي مستخدم جديد أضافه المدير
    var iv=setInterval(loadUsers,5000);
    // تحديث القائمة عند العودة للنافذة
    var onFocus=function(){loadUsers();};
    window.addEventListener("focus",onFocus);
    return function(){clearInterval(iv);window.removeEventListener("focus",onFocus);};
  },[]);

  const back=function(){setSel(null);setPw("");setErr("");};
  const tryLogin=function(){
    setLoading(true);setErr("");
    fetch("/api/login",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId:sel.id,password:pw||"demo"}),
    })
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
    .then(function(res){
      setLoading(false);
      if(!res.ok){setErr(res.d.error||"فشل تسجيل الدخول");setPw("");return;}
      // حفظ التوكن
      window.__authToken=res.d.token;
      try{sessionStorage.setItem("auditToken",res.d.token);}catch(e){}
      onLogin(res.d.user,res.d.token);
    })
    .catch(function(){setLoading(false);setErr("تعذّر الاتصال بالسيرفر");});
  };

  if(!sel){
    return(
      <div style={{minHeight:"100vh",background:"#0D1F42",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,direction:"rtl"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{width:72,height:72,borderRadius:18,background:"#C8A84B",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>

          </div>
          <div style={{fontSize:28,fontWeight:800,color:"white"}}>AuditHub</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:4}}>نظام إدارة المراجعة الداخلية</div>
          <div style={{display:"inline-block",marginTop:14,background:"#C8A84B",color:"#0D1F42",fontSize:13,fontWeight:800,padding:"5px 16px",borderRadius:20}}>نسخة للعرض التوضيحي — بيانات افتراضية</div>
        </div>
        <div style={{width:"100%",maxWidth:400,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:14,color:"rgba(255,255,255,0.7)",textAlign:"center",marginBottom:6}}>الدخول بحساب مدير المراجعة</div>
          {users.length===0&&<div style={{textAlign:"center",color:"rgba(255,255,255,0.4)",fontSize:12}}>جارٍ تحميل المستخدمين…</div>}
          {users.map(function(u){return(
            <button key={u.id} onClick={function(){setSel(u);setTimeout(function(){var ev=u;setLoading(true);fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:ev.id,password:"demo"})}).then(function(r){return r.json();}).then(function(d){window.__authToken=d.token;try{sessionStorage.setItem("auditToken",d.token);}catch(e){}onLogin(d.user,d.token);});},50);}}
              style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,cursor:"pointer",width:"100%",textAlign:"right"}}>
              <div style={{width:44,height:44,borderRadius:10,background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,color:"white",flexShrink:0}}>
                {u.initials}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"white"}}>{u.name}</div>
                <div style={{fontSize:12,color:u.role==="manager"?"#C8A84B":"rgba(255,255,255,0.5)",marginTop:2}}>
                  {u.role==="manager"?"مدير المراجعة":"فريق المراجعة"}
                </div>
              </div>
              <i className="ti ti-chevron-left" style={{color:"rgba(255,255,255,0.3)",fontSize:18}}/>
            </button>
          );})}
        </div>
      </div>

  }
  return(
    <div style={{minHeight:"100vh",background:"#0D1F42",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,direction:"rtl"}}>
      <div style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:16,padding:28,width:"100%",maxWidth:380}}>
        <button onClick={back} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13,marginBottom:16,display:"flex",alignItems:"center",gap:5}}>
          <i className="ti ti-arrow-right"/>رجوع
        </button>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <div style={{width:50,height:50,borderRadius:12,background:sel.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,fontWeight:700,color:"white"}}>{sel.initials}</div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"white"}}>{sel.name}</div>
            <div style={{fontSize:12,color:sel.role==="manager"?"#C8A84B":"rgba(255,255,255,0.5)"}}>

            onKeyDown={function(e){if(e.key==="Enter")tryLogin();}}
            autoFocus
            style={{width:"100%",padding:"12px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,color:"white",fontSize:18,textAlign:"center",outline:"none",boxSizing:"border-box",letterSpacing:3}}/>
          {err&&<div style={{color:"#ff6b6b",fontSize:12,marginTop:6,textAlign:"center"}}>{err}</div>}
        </div>
        <button onClick={tryLogin} disabled={loading}
          style={{width:"100%",padding:"12px",background:loading?"#9C8A4B":"#C8A84B",border:"none",borderRadius:10,color:"white",fontSize:14,fontWeight:700,cursor:loading?"wait":"pointer",marginTop:14}}>
          <i className={"ti "+(loading?"ti-loader-2":"ti-login")} style={{marginLeft:8}}/>{loading?"جارٍ الدخول…":"دخول"}
        </button>
      </div>
    </div>
  );
}


/* ── Error Boundary ── */
class AppErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error:error};}
  componentDidCatch(error,info){console.error("AuditHub Error:",error,info);}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F1F5F9",fontFamily:"'Segoe UI',Tahoma,Arial,sans-serif",direction:"rtl"}},
        React.createElement("div",{style:{background:"white",borderRadius:12,padding:"40px",maxWidth:480,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,.1)",border:"1px solid #FECACA"}},
          React.createElement("i",{className:"ti ti-alert-triangle",style:{fontSize:48,color:"#DC2626",display:"block",marginBottom:16}}),
          React.createElement("div",{style:{fontSize:18,fontWeight:700,color:"#1E293B",marginBottom:8}},
            "حدث خطأ غير متوقع"
          ),
          React.createElement("div",{style:{fontSize:13,color:"#64748B",marginBottom:20,lineHeight:1.7}},
            "يرجى تحديث الصفحة. إذا استمرت المشكلة تواصل مع مسؤول النظام."
          ),
          React.createElement("div",{style:{background:"#F8FAFC",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#94A3B8",fontFamily:"monospace",textAlign:"right",marginBottom:20,maxHeight:80,overflow:"hidden",textOverflow:"ellipsis"}},
            this.state.error?this.state.error.message:""
          ),
          React.createElement("button",{onClick:function(){window.location.reload();},style:{background:"#0D1F42",color:"white",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,cursor:"pointer",fontWeight:600}},
            "تحديث الصفحة"
          )
        )
      );
    }
    return this.props.children;
  }
}

/* ── Toast notification system ── */
function Toast({toasts,remove}){
  if(!toasts||!toasts.length)return null;
  return React.createElement("div",{style:{position:"fixed",bottom:24,left:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8}},
    toasts.map(function(t){
      var colors={success:{bg:"#F0FDF4",border:"#BBF7D0",icon:"ti-circle-check",ic:"#16A34A",title:"#15803D"},
                  error:  {bg:"#FEF2F2",border:"#FECACA",icon:"ti-circle-x",    ic:"#DC2626",title:"#991B1B"},
                  warning:{bg:"#FFFBEB",border:"#FDE68A",icon:"ti-alert-triangle",ic:"#D97706",title:"#92400E"},
                  info:   {bg:"#EFF6FF",border:"#BFDBFE",icon:"ti-info-circle", ic:"#2563EB",title:"#1D4ED8"}};
      var cfg=colors[t.type]||colors.info;
      return React.createElement("div",{key:t.id,style:{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 16px",background:cfg.bg,border:"1px solid "+cfg.border,borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,.1)",minWidth:280,maxWidth:380,direction:"rtl",fontFamily:"inherit"}},
        React.createElement("i",{className:"ti "+cfg.icon,style:{fontSize:18,color:cfg.ic,flexShrink:0,marginTop:1}}),
        React.createElement("div",{style:{flex:1}},
          t.title&&React.createElement("div",{style:{fontSize:12,fontWeight:700,color:cfg.title,marginBottom:2}}),
          React.createElement("div",{style:{fontSize:12,color:"#374151",lineHeight:1.5}},t.msg)
        ),
        React.createElement("button",{onClick:function(){remove(t.id);},style:{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0}},
          React.createElement("i",{className:"ti ti-x",style:{fontSize:13}})
        )
      );
    })
  );
}


function ChangePasswordModal({forced,user,onClose,onDone}){
  const [oldPw,setOldPw]=useState("");
  const [newPw,setNewPw]=useState("");

          React.createElement("input",{type:"password",value:oldPw,onChange:function(e){setOldPw(e.target.value);},style:{width:"100%",border:"1px solid #E2E8F0",borderRadius:8,padding:"9px 12px",fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}})
        ),

        ),

        )
      )
    )
  );
}

function App(){
  // ── AUTH STATE (first — before any conditional return) ──
  const INIT_USERS=[

    {id:"u2",name:"الاء",role:"team",pin:"1111",color:"#3B82F6",initials:"ا",assignments:["AUD-2024-001","AUD-2024-002"]},

  // ── DATA STATE ──
  const [tab,setTab]=useState("dashboard");

  const [notifications,setNotifications]=useState([]);
  const [gFindings,setGFindings]=useState([]);

  // Workpapers helpers
  const genWpRef=(engId,allWp)=>{
    // WP-NN per-engagement، يعتمد على أعلى رقم موجود (يقلّل إعادة استخدام المحذوف)
    var maxNum=0;

      if(m){var n=parseInt(m[1],10);if(n>maxNum)maxNum=n;}

  // ── NOTIFICATION HELPER ──
  const addNotif=function(type,entity,message,engagementId,engagementTitle){
    const actor=currentUser?currentUser.name:"النظام";

    const engSubTab=
      entity==="program"?"program":
      entity==="auditplan"?"auditplan":
      entity==="finding"?"findings":
      entity==="workpaper"?"workpapers":

  const wpAPI={
    workpapers:gWorkpapers,
    addWp:function(wp){
      setGWorkpapers(function(d){return[wp,...d];});
      addNotif("add","workpaper","تم إضافة ورقة عمل: "+wp.name,wp.engagementId,wp.engagement);
      if(wp.engagementId){var user=currentUser;setGTrail(function(prev){var arr=(prev[wp.engagementId]||[]);return Object.assign({},prev,{[wp.engagementId]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user?user.name:"",role:"مراجع",rc:"#3B82F6",cat:"أوراق العمل",icon:"📎",action:'رفع ورقة العمل "'+wp.name+'"'}]});});}
    },
    addWpUsage:function(wpId,usage){
      setGWorkpapers(function(d){return d.map(function(w){
        if(w.id!==wpId)return w;
        var us=(w.usages||[]).slice();
        // تفادي تكرار نفس الاستخدام (نفس النوع ونفس الهدف)
        var exists=us.some(function(u){return u.type===usage.type&&String(u.targetId)===String(usage.targetId);});
        if(!exists)us.push(usage);
        return Object.assign({},w,{usages:us});
      });});
    },
    removeWpUsage:function(wpId,usageType,targetId){
      setGWorkpapers(function(d){return d.map(function(w){
        if(w.id!==wpId)return w;
        var us=(w.usages||[]).filter(function(u){return !(u.type===usageType&&String(u.targetId)===String(targetId));});
        return Object.assign({},w,{usages:us});
      });});
    },
    updateWp:function(id,upd){setGWorkpapers(function(d){return d.map(function(w){return w.id===id?Object.assign({},w,upd):w;});});var w=gWorkpapers.find(function(x){return x.id===id;});if(w)addNotif("edit","workpaper","تم تعديل ورقة عمل: "+w.name,w.engagementId,w.engagement);},
    delWp:function(id){
      var w=gWorkpapers.find(function(x){return x.id===id;});
      if(w){
        addNotif("delete","workpaper","تم حذف ورقة عمل: "+w.name,w.engagementId,w.engagement);
        if(w.engagementId){var user=currentUser;setGTrail(function(prev){var arr=(prev[w.engagementId]||[]);return Object.assign({},prev,{[w.engagementId]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user?user.name:"",role:"مراجع",rc:"#3B82F6",cat:"أوراق العمل",icon:"🗑",action:'حذف ورقة العمل "'+w.name+'"'}]});});}
      }
      setGWorkpapers(function(d){return d.filter(function(w){return w.id!==id;});});
    },
    genRef:function(engId){return genWpRef(engId,gWorkpapers);},
  };
  const [gEngagements,setGEngagements]=useState([]);
  const [gMessages,setGMessages]=useState({});
  const [gTrail,setGTrail]=useState({}); // {engId: [{id,at,by,role,cat,icon,action,changes}]}
  const [gPrograms,setGPrograms]=useState({});
  const [gAuditPlans,setGAuditPlans]=useState({});

  const findingsAPI={
    findings:gFindings,
    update:function(id,updates){
      var f=gFindings.find(function(x){return x.id===id;});
      // حفظ التعديل عبر نقطة مستقلة بالسيرفر مع فحص إصدار الملاحظة (يمنع تعارض تعديل نفس الملاحظة)
      var tk=getToken();
      var baseRev=f&&typeof f._rev==="number"?f._rev:0;
      var putBody={updates:updates,baseRev:baseRev};
      fetch("/api/findings/"+id,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify(putBody)})
        .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,d:d};});})
        .then(function(res){
          if(res.status===401){handle401();return;}
          if(res.status===409){
            alert("عدّل مستخدم آخر هذه الملاحظة في نفس الوقت. سيُعاد تحميل أحدث نسخة — يرجى إعادة تعديلك بعد التحميل.");
            window.location.reload();return;
          }
          if(res.ok&&res.d){
            if(typeof res.d.version!=="undefined")stateVersionRef.current=res.d.version;
            if(res.d.findings)setGFindings(res.d.findings);
          }
        })
        .catch(function(){});
      // تحديث محلي فوري (تجربة مستخدم سلسة قبل رد السيرفر)
      setGFindings(function(d){return d.map(function(x){return x.id===id?Object.assign({},x,updates):x;});});
      if(!f)return;
      var eng=gEngagements.find(function(x){return x.id===f.audit;});
      var engName=eng?eng.title:f.audit;
      var user3=currentUser;
      var isLeadUser=user3&&eng&&user3.id===eng.leadId;
      var isMgrUser=user3&&(user3.role==="manager"||user3.isManager);
      var role=isMgrUser?"مدير المراجعة":isLeadUser?"قائد المراجعة":"مراجع";
      var rc=isMgrUser?"#C8A84B":isLeadUser?"#C8A84B":"#3B82F6";

      // ── اعتمادات الملاحظة — تُسجَّل بتفاصيل مخصصة ──
      if(updates.approvalStatus==="under_review"){
        addNotif("info","finding",'أرسل '+( user3?user3.name:"")+' الملاحظة "'+f.title+'" للاعتماد',f.audit,engName);
        setGTrail(function(prev){var arr=(prev[f.audit]||[]);return Object.assign({},prev,{[f.audit]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user3?user3.name:"",role:"مراجع",rc:"#3B82F6",cat:"الملاحظات",icon:"📤",action:'أرسل الملاحظة "'+f.title+'" للاعتماد'}]});});
        return;
      }
      if(updates.approvalStatus==="approved"){
        addNotif("edit","finding",'اعتمد '+(user3?user3.name:"")+' الملاحظة "'+f.title+'"',f.audit,engName);
        setGTrail(function(prev){var arr=(prev[f.audit]||[]);return Object.assign({},prev,{[f.audit]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user3?user3.name:"",role:role,rc:rc,cat:"الملاحظات",icon:"✓",action:'اعتمد الملاحظة "'+f.title+'"'}]});});
        return;
      }
      if(updates.approvalStatus==="returned"){
        var reason=updates.returnComment||"";
        addNotif("warning","finding",'أعاد '+(user3?user3.name:"")+' الملاحظة "'+f.title+'" للمراجع',f.audit,engName);
        setGTrail(function(prev){var arr=(prev[f.audit]||[]);return Object.assign({},prev,{[f.audit]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user3?user3.name:"",role:role,rc:rc,cat:"الملاحظات",icon:"↩",action:'أعاد الملاحظة "'+f.title+'" للمراجع',detail:"سبب الإعادة: "+reason}]});});
        return;
      }

      // ── تعديلات عادية ──
      var fieldNames={status:"الحالة",risk:"مستوى المخاطرة",title:"عنوان الملاحظة",owner:"المسؤول",due:"تاريخ الإغلاق",rec:"التوصية",observation:"الملاحظة",intro:"الخلفية",risks:"المخاطر"};
      var fldLabels={title:"عنوان الملاحظة",risk:"مستوى المخاطرة",status:"الحالة",owner:"المسؤول",due:"تاريخ الإغلاق",rec:"التوصية",observation:"الملاحظة",intro:"الخلفية",risks:"المخاطر / الآثار المترتبة"};
      var findChanges=Object.keys(updates).filter(function(k){return fldLabels[k]&&String(f[k]||"").trim()!==String(updates[k]||"").trim();}).map(function(k){return{f:fldLabels[k],b:String(f[k]||"")||"—",a:String(updates[k]||"")||"—"};});
      addNotif("edit","finding",'تم تعديل الملاحظة "'+f.title+'"',f.audit,engName);
      setGTrail(function(prev){var arr=(prev[f.audit]||[]);return Object.assign({},prev,{[f.audit]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user3?user3.name:"",role:role,rc:rc,cat:"الملاحظات",icon:"✏️",action:'عدّل ملاحظة "'+f.title+'"',changes:findChanges.length?findChanges:undefined}]});});
    },
    add:function(newF){
      // إضافة الملاحظة عبر نقطة مستقلة في السيرفر (تتفادى تعارض الحفظ الكامل)

      return fetch("/api/findings",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify({finding:payload})})
        .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,d:d};});})
        .then(function(res){
          if(res.status===401){handle401();return null;}

          var saved=res.d.finding;
          // حدّث رقم الإصدار المحلي لتفادي تعارض لاحق في الحفظ الكامل
          if(typeof res.d.version!=="undefined")stateVersionRef.current=res.d.version;
          // استبدل القائمة بالكاملة من السيرفر (تشمل إضافات المستخدمين الآخرين)
          if(res.d.findings)setGFindings(res.d.findings);
          else setGFindings(function(d){return[...d,saved];});
          var eng2=gEngagements.find(function(x){return x.id===saved.audit;});
          addNotif("add","finding",'تم إضافة ملاحظة جديدة: "'+saved.title+'"',saved.audit,eng2?eng2.title:"");
          if(saved.audit){var user=currentUser;setGTrail(function(prev){var arr=(prev[saved.audit]||[]);return Object.assign({},prev,{[saved.audit]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user?user.name:"",role:"مراجع",rc:"#3B82F6",cat:"الملاحظات",icon:"⚠️",action:'أنشأ ملاحظة "'+saved.title+'"'}]});});}
          return saved;
        })
        .catch(function(){alert("تعذّر الاتصال بالسيرفر عند حفظ الملاحظة");return null;});
    },
    del:function(id){
      var f=gFindings.find(function(x){return x.id===id;});

      var tk=getToken();
      var delRev=f&&typeof f._rev==="number"?f._rev:0;
      fetch("/api/findings/"+id+"?baseRev="+delRev,{method:"DELETE",headers:{"Authorization":"Bearer "+tk}})
        .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,d:d};});})
        .then(function(res){
          if(res.status===401){handle401();return;}
          if(res.status===409){
            alert("عُدّلت هذه الملاحظة من مستخدم آخر بعد أن فتحتها. سيُعاد تحميل أحدث نسخة — راجعها قبل الحذف.");
            window.location.reload();return;
          }
          if(!res.ok){alert("تعذّر حذف الملاحظة: "+((res.d&&res.d.error)||("خطأ "+res.status)));return;}
          // النجاح فقط: سجّل التنبيه وسجل النشاط واحذف محلياً
          if(typeof res.d.version!=="undefined")stateVersionRef.current=res.d.version;
          if(res.d.findings)setGFindings(res.d.findings);
          else setGFindings(function(d){return d.filter(function(x){return x.id!==id;});});
          if(f)addNotif("delete","finding",'تم حذف الملاحظة: "'+f.title+'"',f.audit,eng3?eng3.title:"");
          if(f&&f.audit){var user2=currentUser;setGTrail(function(prev){var arr=(prev[f.audit]||[]);return Object.assign({},prev,{[f.audit]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:user2?user2.name:"",role:"قائد المراجعة",rc:"#C8A84B",cat:"الملاحظات",icon:"🗑",action:'حذف ملاحظة "'+f.title+'"'}]});});}
        })
        .catch(function(){alert("تعذّر الاتصال بالسيرفر عند حذف الملاحظة");});
    },
  };

  // Helpers for engagements
  const monthsFromDates=(start,end,status)=>{
    if(!start||!end)return{};
    const ms={};
    const s=new Date(start), e=new Date(end);
    let d=new Date(s.getFullYear(),s.getMonth(),1);
    const eom=new Date(e.getFullYear(),e.getMonth(),1);
    while(d<=eom){ms[d.getMonth()+1]=status||"مخطط";d.setMonth(d.getMonth()+1);}
    return ms;
  };
  const statusFromMonths=months=>{
    const v=Object.values(months);
    if(!v.length)return"مخطط";
    if(v.every(x=>x==="مكتمل"))return"مكتمل";
    if(v.some(x=>x==="قيد التنفيذ"))return"قيد التنفيذ";
    if(v.some(x=>x==="مراجعة"))return"مراجعة";
    return"مخطط";
  };
  const progressFromMonths=months=>{
    const v=Object.values(months);
    if(!v.length)return 0;
    return Math.round(v.filter(x=>x==="مكتمل").length/v.length*100);
  };

  const engAPI={
    engagements:gEngagements,
    programs:gPrograms,
    setPrograms:setGPrograms,
    auditPlans:gAuditPlans,
    setAuditPlans:setGAuditPlans,
    messages:gMessages,
    addMessage:function(engId,msg){setGMessages(function(prev){var arr=(prev[engId]||[]);return Object.assign({},prev,{[engId]:[...arr,msg]});});},
    markMessagesRead:function(engId,userId){
      if(!engId||!userId)return;
      setGMessages(function(prev){
        var arr=prev[engId]||[];
        var changed=false;
        var next=arr.map(function(m){
          var rb=m.readBy||[];
          if(m.userId!==userId&&rb.indexOf(userId)<0){changed=true;return Object.assign({},m,{readBy:rb.concat([userId])});}
          return m;
        });
        return changed?Object.assign({},prev,{[engId]:next}):prev;
      });
    },
    trail:gTrail,
    addTrail:function(engId,entry){setGTrail(function(prev){var arr=(prev[engId]||[]);return Object.assign({},prev,{[engId]:[...arr,entry]});});},
    navTarget:navTarget,
    clearNav:function(){setNavTarget(null);},
    addNotif:addNotif,
    goTo:function(opts){
      // تنقّل مباشر: opts={tab, engId, engSubTab, focusId}
      var t=(opts&&opts.tab)||"engagements";
      setTab(t);
      if(opts&&opts.engId){
        setNavTarget({tab:t,engId:opts.engId,engSubTab:(opts&&opts.engSubTab)||"overview",focusId:(opts&&opts.focusId)||null});
      }
    },
    addEng:function(eng){setGEngagements(function(d){return[...d,eng];});addNotif("add","engagement","تم إضافة مهمة مراجعة: "+eng.title,eng.id,eng.title);},
    updateEng:function(id,updates){var e=gEngagements.find(function(x){return x.id===id;});setGEngagements(function(d){return d.map(function(e){return e.id===id?Object.assign({},e,updates):e;});});if(e)addNotif("edit","engagement","تم تعديل مهمة: "+e.title,id,e.title);},
    removeEng:function(id){var e=gEngagements.find(function(x){return x.id===id;});if(e)addNotif("delete","engagement","تم حذف مهمة: "+e.title,id,e.title);setGEngagements(function(d){return d.filter(function(e){return e.id!==id;});});},
    monthsFromDates, statusFromMonths, progressFromMonths,
  };

  // cur يُحسب بعد visibleNav أدناه

  // ── LOAD DATA FROM SERVER ON MOUNT ──
  // مهم: يجب أن تكون هذه الـ hooks قبل أي return شرطي حتى تعمل شاشة التحميل ولا تعلق.
  // استعادة الجلسة عند تحديث الصفحة
  useEffect(function(){
    var tk=null;try{tk=sessionStorage.getItem("auditToken");}catch(e){}
    if(tk){
      window.__authToken=tk;
      fetch("/api/me",{headers:{"Authorization":"Bearer "+tk}})
        .then(function(r){return r.ok?r.json():null;})
        .then(function(d){
          if(d&&d.user){setCU(d.user);}
          else{window.__authToken=null;try{sessionStorage.removeItem("auditToken");}catch(e){}}
        })
        .catch(function(){window.__authToken=null;try{sessionStorage.removeItem("auditToken");}catch(e){}});
    }
  },[]);

  useEffect(function(){
    if(!currentUser)return;
    setAppLoading(true);
    fetch("/api/state",{headers:{"Authorization":"Bearer "+getToken()}})
      .then(function(r){if(r.status===401){handle401();return null;}return r.ok?r.json():{};})
      .then(function(data){
        if(!data)return;
        if(typeof data.__version!=="undefined")stateVersionRef.current=data.__version;
        if(data.findings  &&data.findings.length)   setGFindings(data.findings);
        if(data.workpapers&&data.workpapers.length)  setGWorkpapers(data.workpapers);
        if(data.engagements&&data.engagements.length)setGEngagements(data.engagements);
        if(data.programs&&Object.keys(data.programs).length)setGPrograms(data.programs);
        if(data.auditPlans&&Object.keys(data.auditPlans).length)setGAuditPlans(data.auditPlans);
        if("messages" in data)setGMessages(data.messages||{});
        if("trail" in data)setGTrail(data.trail||{});
        if(data.users     &&data.users.length)       setUsers(data.users);
        if(data.notifications&&data.notifications.length) setNotifications(data.notifications);
        setAppLoading(false);
      })
      .catch(function(){setAppLoading(false);});
  },[currentUser]);

  // ── AUTO-SAVE TO SERVER WHEN STATE CHANGES ──
  useEffect(function(){
    if(appLoading)return;
    setSaveStatus("saving");
    var t=setTimeout(function(){
      fetch("/api/state",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+getToken()},
        body:JSON.stringify({
          findings:gFindings,
          workpapers:gWorkpapers,
          engagements:gEngagements,
          programs:gPrograms,
          auditPlans:gAuditPlans,
          messages:gMessages,
          trail:gTrail,
          users:users,
          notifications:notifications,
          __version:stateVersionRef.current,
        }),
      })
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,d:d};});})
      .then(function(res){
        if(res.status===401){handle401();return;}
        if(res.status===409){
          // عدّل مستخدم آخر البيانات — احفظ علامة تعارض فقط (بدون بيانات حساسة) ثم أعد التحميل
          setSaveStatus("");
          try{
            localStorage.setItem("audithub_conflict_draft",JSON.stringify({savedAt:new Date().toISOString()}));
          }catch(e){}
          alert("تم تحديث البيانات من مستخدم آخر يعمل في نفس الوقت.\n\nلم يُحفظ آخر تعديل أدخلته للتو. سيُعاد تحميل أحدث نسخة الآن — يرجى إعادة إدخال تعديلك بعد التحميل إن لزم.");
          window.location.reload();
          return;
        }
        if(res.ok&&res.d&&typeof res.d.version!=="undefined"){stateVersionRef.current=res.d.version;}
        setSaveStatus("saved");setTimeout(function(){setSaveStatus("");},2000);
      })
      .catch(function(){setSaveStatus("");});
    },1200);
    return function(){clearTimeout(t);};
  },[gFindings,gWorkpapers,gEngagements,gPrograms,gAuditPlans,gMessages,gTrail,users,notifications,appLoading]);
  // ── AUTH API ──
  const isManager=currentUser&&currentUser.role==="manager";
  // مساعد: يقرأ التوكن دائماً (من الذاكرة أو sessionStorage)
  function getToken(){
    if(window.__authToken)return window.__authToken;
    try{var t=sessionStorage.getItem("auditToken");if(t){window.__authToken=t;return t;}}catch(e){}
    return "";
  }
  // مساعد: يتعامل مع انتهاء الجلسة (401) تلقائياً
  function handle401(){
    window.__authToken=null;
    try{sessionStorage.removeItem("auditToken");}catch(e){}
    setCU(null);
    alert("انتهت الجلسة. يرجى تسجيل الدخول من جديد.");
  }

  const authAPI={
    currentUser,users,isManager,
    canDelete:function(){return isManager;},
    canAccessEng:function(id){return isManager||(currentUser&&(currentUser.assignments||[]).indexOf(id)>=0);},
    login:function(u,token){if(token){window.__authToken=token;}setCU(u);},
    logout:function(){
      var tk=window.__authToken;
      fetch("/api/logout",{method:"POST",headers:{"Authorization":"Bearer "+(tk||"")}}).catch(function(){});
      window.__authToken=null;try{sessionStorage.removeItem("auditToken");}catch(e){}
      setCU(null);
    },
    addUser:function(u){
      var tk=getToken();
      return fetch("/api/users",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify({name:u.name,role:u.role,color:u.color,initials:u.initials,password:u.pin||u.password||"0000"})})
        .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,d:d};});})
        .then(function(res){
          if(res.status===401){handle401();return false;}
          if(!res.ok){
            alert("تعذّر إضافة المستخدم: "+((res.d&&res.d.error)||("خطأ "+res.status)));
            return false;
          }
          if(res.d&&res.d.id){setUsers(function(all){return [...all,Object.assign({},u,{id:res.d.id})];});}
          return true;
        })
        .catch(function(err){alert("تعذّر الاتصال بالسيرفر عند إضافة المستخدم");return false;});
    },
    updateUser:function(id,patch){
      var tk=getToken();
      setUsers(function(all){return all.map(function(x){return x.id===id?Object.assign({},x,patch,{initials:patch.name?patch.name.charAt(0):x.initials}):x;});});
      fetch("/api/users/"+id,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+(tk||"")},body:JSON.stringify(patch)}).catch(function(){});
    },
    removeUser:function(id){
      var tk=getToken();
      setUsers(function(all){return all.filter(function(x){return x.id!==id;});});
      fetch("/api/users/"+id,{method:"DELETE",headers:{"Authorization":"Bearer "+(tk||"")}}).catch(function(){});
    },
    resetPassword:function(id,newPw){
      var tk=getToken();
      return fetch("/api/users/"+id+"/reset-password",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+(tk||"")},body:JSON.stringify({newPassword:newPw})}).then(function(r){return r.json();});
    },
    changePassword:function(oldPw,newPw){
      var tk=getToken();
      return fetch("/api/change-password",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+(tk||"")},body:JSON.stringify({oldPassword:oldPw,newPassword:newPw})}).then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});});
    },
    assignEng:function(uid,engId){
      var u=users.find(function(x){return x.id===uid;});
      var e=gEngagements.find(function(x){return x.id===engId;});
      var newAssignments=u?(u.assignments||[]).filter(function(a){return a!==engId;}).concat([engId]):[engId];
      setUsers(function(all){return all.map(function(x){return x.id===uid?Object.assign({},x,{assignments:newAssignments}):x;});});
      var tk=getToken();
      fetch("/api/users/"+uid,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify({assignments:newAssignments})})
        .then(function(r){if(r.status===401){handle401();}}).catch(function(){});
      // تنبيه التعيين يُخزن بدون engagementId لكي يظهر للعضو قبل أن يمتلك الصلاحية
      if(u&&e){
        var actor=currentUser?currentUser.name:"المدير";
        var actorId=currentUser?currentUser.id:"";
        setNotifications(function(prev){return [{
          id:Date.now()+Math.random(),type:"assign",entity:"engagement",
          messageForAssigned:"تم تعيينك في مهمة: "+e.title,
          messageForOthers:"تم تعيين "+u.name+" في مهمة: "+e.title,
          message:"تم تعيين "+u.name+" في مهمة: "+e.title,
          actor:actor,actorId:actorId,
          engagementId:"",engagementTitle:e.title,targetTab:"engagements",
          timestamp:new Date().toISOString(),readBy:[],
          assignedTo:uid,assignedToName:u.name,
        },...prev].slice(0,100);});
        setGTrail(function(prev){var arr=(prev[engId]||[]);return Object.assign({},prev,{[engId]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:actor,role:"مدير المراجعة",rc:"#C8A84B",cat:"فريق المراجعة",icon:"👤",action:'عيّن "'+u.name+'" في المهمة'}]});});
      }
    },
    unassignEng:function(uid,engId){
      var u=users.find(function(x){return x.id===uid;});
      var e=gEngagements.find(function(x){return x.id===engId;});
      var newAssignments=u?(u.assignments||[]).filter(function(a){return a!==engId;}):[];
      setUsers(function(all){return all.map(function(x){return x.id===uid?Object.assign({},x,{assignments:newAssignments}):x;});});
      var tk=getToken();
      fetch("/api/users/"+uid,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify({assignments:newAssignments})})
        .then(function(r){if(r.status===401){handle401();}}).catch(function(){});
      if(u&&e){
        var actor=currentUser?currentUser.name:"المدير";
        var actorId=currentUser?currentUser.id:"";
        setNotifications(function(prev){return [{
          id:Date.now()+Math.random(),type:"delete",entity:"engagement",
          messageForAssigned:"تم إزالتك من مهمة: "+e.title,
          messageForOthers:"تم إزالة "+u.name+" من مهمة: "+e.title,
          message:"تم إزالة "+u.name+" من مهمة: "+e.title,
          actor:actor,actorId:actorId,
          engagementId:"",engagementTitle:e.title,targetTab:"engagements",
          timestamp:new Date().toISOString(),readBy:[],
          assignedTo:uid,assignedToName:u.name,
        },...prev].slice(0,100);});
        setGTrail(function(prev){var arr=(prev[engId]||[]);return Object.assign({},prev,{[engId]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:actor,role:"مدير المراجعة",rc:"#C8A84B",cat:"فريق المراجعة",icon:"👤",action:'أزال "'+u.name+'" من المهمة'}]});});
      }
    },
  };

  // ── NOTIF API ──
  const myId=currentUser?currentUser.id:"";
  // لا تُظهر التنبيهات التي أنشأها المستخدم نفسه
  const othersNotifs=notifications.filter(function(n){return n.actorId!==myId;});
  const visibleNotifs=isManager
    ?othersNotifs
    :othersNotifs.filter(function(n){
      // تنبيهات التعيين المخصصة لهذا المستخدم تحديداً
      if(n.assignedTo&&n.assignedTo===myId) return true;
      // تنبيهات المهام المسموح بها
      return!n.engagementId||(authAPI.canAccessEng&&authAPI.canAccessEng(n.engagementId));
    });
  // حالة القراءة مفصولة لكل مستخدم
  const isRead=function(n){return (n.readBy||[]).indexOf(myId)>=0;};
  const myUnread=visibleNotifs.filter(function(n){return!isRead(n);}).length;
  const notifAPI={
    notifications:visibleNotifs,
    unreadCount:myUnread,
    isRead:isRead,
    markRead:function(id){
      setNotifications(function(prev){
        return prev.map(function(n){
          if(n.id!==id)return n;
          var rb=n.readBy||[];
          return rb.indexOf(myId)>=0?n:Object.assign({},n,{readBy:rb.concat([myId])});
        });
      });
    },
    markAllRead:function(){
      setNotifications(function(prev){
        return prev.map(function(n){
          var rb=n.readBy||[];
          return rb.indexOf(myId)>=0?n:Object.assign({},n,{readBy:rb.concat([myId])});
        });
      });
    },
    navigate:function(n){
      // تحديد كمقروء
      setNotifications(function(prev){
        return prev.map(function(x){
          if(x.id!==n.id)return x;
          var rb=x.readBy||[];
          return rb.indexOf(myId)>=0?x:Object.assign({},x,{readBy:rb.concat([myId])});
        });
      });
      // الانتقال للصفحة
      var targetTab=n.targetTab||"engagements";
      setTab(targetTab);
      // إذا كانت مهمة محددة، انتقل إليها مع التبويب الفرعي المناسب
      if(n.engagementId){
        setNavTarget({tab:targetTab,engId:n.engagementId,engSubTab:n.engSubTab||"overview"});
      }
    },
  };


  // ── LOGIN GATE ──
  if(!currentUser){return React.createElement(LoginScreen,{onLogin:authAPI.login});}

  // ── LOADING SCREEN ──
  if(appLoading){
    return(
      <div style={{minHeight:"100vh",background:"#0D1F42",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,direction:"rtl"}}>
        <div style={{width:64,height:64,borderRadius:16,background:"#C8A84B",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <i className="ti ti-shield-check" style={{fontSize:32,color:"white"}}/>
        </div>
        <div style={{fontSize:20,fontWeight:700,color:"white"}}>AuditHub</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.5)"}}>جاري تحميل البيانات...</div>
        <div style={{width:200,height:3,background:"rgba(255,255,255,0.1)",borderRadius:3,overflow:"hidden"}}>
          <div style={{width:"60%",height:"100%",background:"#C8A84B",borderRadius:3,animation:"none"}}/>
        </div>
      </div>
    );
  }

  // قائمة التنقل المفلترة حسب الصلاحيات
  const managerOnlyPages=["universe","settings"];
  const visibleNav=isManager?NAV:NAV.filter(function(n){return managerOnlyPages.indexOf(n.id)<0;});
  const visibleGroups=GROUPS.map(function(g){
    return Object.assign({},g,{ids:g.ids.filter(function(id){return isManager||managerOnlyPages.indexOf(id)<0;})});
  }).filter(function(g){return g.ids.length>0;});
  const cur=visibleNav.find(function(n){return n.id===tab;})||visibleNav[0];

  return(
    <NotifCtx.Provider value={notifAPI}>
    <AuthCtx.Provider value={authAPI}>
    <FindingsCtx.Provider value={findingsAPI}>
    <EngCtx.Provider value={engAPI}>
    <WpCtx.Provider value={wpAPI}>
    <div style={{display:"flex",height:"100vh",background:"#EEF1F8",direction:"rtl",overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:228,background:NAVY,display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
        <div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:10,background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <i className="ti ti-shield-check" style={{fontSize:20,color:NAVY}}/>
            </div>
            <div>
              <div style={{color:"white",fontWeight:700,fontSize:16}}>AuditHub</div>
              <div style={{color:GOLD,fontSize:10,marginTop:1}}>نظام إدارة المراجعة الداخلية</div>
              {saveStatus&&(
                <div style={{fontSize:9,color:saveStatus==="saved"?"#10B981":"#F59E0B",marginTop:2,display:"flex",alignItems:"center",gap:3}}>
                  <i className={"ti "+(saveStatus==="saved"?"ti-check":"ti-loader")} style={{fontSize:9}}/>
                  {saveStatus==="saved"?"تم الحفظ":"جاري الحفظ..."}
                </div>
              )}
            </div>
          </div>
          {/* User info */}
          <div style={{marginTop:12,padding:"10px 12px",background:"rgba(255,255,255,0.06)",borderRadius:10,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:30,height:30,borderRadius:8,background:currentUser.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"white",flexShrink:0}}>{currentUser.initials}</div>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:12,fontWeight:600,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{currentUser.name}</div>
              <div style={{fontSize:10,color:isManager?"#C8A84B":"rgba(255,255,255,0.4)"}}>{isManager?"مدير المراجعة":"فريق المراجعة"}</div>
            </div>
            <button onClick={function(){authAPI.logout();}} title="تسجيل الخروج"
              style={{background:"rgba(239,68,68,0.2)",border:"none",borderRadius:6,cursor:"pointer",color:"#FCA5A5",padding:"4px 6px"}}>
              <i className="ti ti-logout" style={{fontSize:13}}/>
            </button>
          </div>
        </div>
        <div style={{padding:"6px 0",flex:1}}>
          {visibleGroups.map(function(g){return(
            <div key={g.sep}>
              <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.28)",padding:"10px 16px 4px",letterSpacing:"0.06em"}}>{g.sep}</div>
              {g.ids.map(function(id){
                const item=visibleNav.find(function(n){return n.id===id;});
                if(!item)return null;
                const active=tab===id;
                return(
                  <button key={id} onClick={function(){setTab(id);}} className="nbtn" style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 16px",border:"none",cursor:"pointer",textAlign:"right",background:active?"rgba(200,168,75,0.14)":"transparent",borderRight:"3px solid "+(active?GOLD:"transparent"),color:active?GOLD:"rgba(255,255,255,0.62)",fontSize:13,fontWeight:active?700:400,transition:"all 0.15s"}}>
                    <i className={"ti "+item.icon} style={{fontSize:18,flexShrink:0}}/>
                    <span style={{flex:1}}>{item.label}</span>
                    {id==="notifications"&&notifAPI.unreadCount>0&&(
                      <span style={{background:"#EF4444",color:"white",borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 6px",minWidth:18,textAlign:"center"}}>{notifAPI.unreadCount}</span>
                    )}
                  </button>
                );
              })}
            </div>
          );})}
        </div>
        <div style={{padding:"14px 16px",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:GOLD+"35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:GOLD,flexShrink:0}}>م</div>
          <div><div style={{color:"white",fontSize:13,fontWeight:600}}>محمد</div><div style={{color:"rgba(255,255,255,0.38)",fontSize:11}}>مدير المراجعة الداخلية</div></div>
        </div>
      </div>
      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <div style={{background:"white",padding:"12px 24px",borderBottom:"1px solid #E5E7EB",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <h1 style={{margin:0,fontSize:18,fontWeight:700,color:NAVY}}>{cur&&cur.label}</h1>
            <span title="رقم نسخة البناء" style={{fontSize:10,color:"#94A3B8",background:"#F1F5F9",padding:"2px 7px",borderRadius:10,fontWeight:600}}>DEMO</span>
          </div>
          <button style={{width:34,height:34,borderRadius:8,background:"#F3F4F6",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <i className="ti ti-bell" style={{fontSize:17,color:"#374151"}}/>
          </button>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"20px 24px"}}>
          <DeadlineReminder engagements={gEngagements} currentUser={currentUser} canAccess={authAPI.canAccessEng}/>
          {conflictDraft&&(
            <div style={{background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",alignItems:"flex-start",gap:12}}>
              <i className="ti ti-info-circle" style={{fontSize:20,color:"#D97706",marginTop:2}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#92400E",marginBottom:4}}>تنبيه: حدث تعارض في الحفظ سابقاً</div>
                <div style={{fontSize:12,color:"#78350F",lineHeight:1.6}}>
                  في {conflictDraft.savedAt?new Date(conflictDraft.savedAt).toLocaleString("ar"):"وقت سابق"} كان مستخدم آخر يعمل على نفس البيانات، فلم يُحفظ آخر تعديل أدخلته حينها. يرجى التأكد من أن تعديلك الأخير محفوظ — وإن لزم، أعد إدخاله الآن.
                </div>
              </div>
              <button onClick={function(){try{localStorage.removeItem("audithub_conflict_draft");}catch(e){}setConflictDraft(null);}} title="حسناً، فهمت" style={{background:"#D97706",color:"white",border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",padding:"6px 14px",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                حسناً، فهمت
              </button>
            </div>
          )}
          {PAGES[tab]}
        </div>
      </div>
      {currentUser&&currentUser.mustChange&&React.createElement(ChangePasswordModal,{forced:true,user:currentUser,onDone:function(){setCU(Object.assign({},currentUser,{mustChange:false}));}})}
      {showChangePw&&!(currentUser&&currentUser.mustChange)&&React.createElement(ChangePasswordModal,{forced:false,user:currentUser,onClose:function(){setShowChangePw(false);},onDone:function(){setShowChangePw(false);}})}
    </div>
    </WpCtx.Provider>
    </EngCtx.Provider>
    </FindingsCtx.Provider>
    </AuthCtx.Provider>
    </NotifCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
