function WpAddModal({open,onClose,engId,engTitle,context,engWps,steps,findings,addWp,addWpUsage,genRef,currentUser}){
  var [tab,setTab]=useState("existing"); // existing | upload
  var [pendingFile,setPendingFile]=useState(null);
  var [title,setTitle]=useState("");
  var [wpType,setWpType]=useState("مستند داعم");
  var [desc,setDesc]=useState("");
  var [selectedWpId,setSelectedWpId]=useState("");
  var inputId="wpunified-"+engId+"-"+(context?context.type:"")+"-"+(context?context.targetId:"");

  // إعادة الضبط عند الفتح + اختيار التبويب الافتراضي (إن لا توجد أوراق سابقة → رفع)
  useEffect(function(){
    if(open){
      setPendingFile(null);setTitle("");setWpType("مستند داعم");setDesc("");setSelectedWpId("");
      setTab((engWps&&engWps.length>0)?"existing":"upload");
    }
  },[open]);

  if(!open)return null;

  var ctxType=context?context.type:"engagement";
  var ctxTarget=context?context.targetId:engId;
  var ctxLabel=context?context.targetLabel:"المهمة العامة";
  var descRequired=(ctxType==="engagement");

  // بناء كائن الاستخدام للسياق الحالي
  var buildUsage=function(){
    return {type:ctxType,targetId:ctxTarget,targetLabel:ctxLabel,
      addedAt:new Date().toISOString(),addedBy:currentUser?currentUser.id:""};
  };

  // ربط ورقة موجودة (إضافة usage فقط)
  var doLinkExisting=function(){
    if(!selectedWpId){alert("الرجاء اختيار ورقة عمل");return;}
    if(addWpUsage)addWpUsage(selectedWpId,buildUsage());
    onClose&&onClose();
  };

  // رفع ورقة جديدة
  var doUpload=function(){
    if(!pendingFile){alert("الرجاء اختيار ملف للرفع");return;}
    if(descRequired&&(!desc||desc.trim().length<3)){
      alert("الرجاء إدخال وصف مختصر للورقة (إلزامي عند الإضافة للمهمة العامة أو مراسلة عامة)");return;
    }
    uploadFileToServer(pendingFile).then(function(fid){
      var ext=pendingFile.name.split(".").pop().toLowerCase();
      // توليد رقم ورقة العمل من السيرفر (لا يعيد المحذوف)
      var tkw=(window.__authToken||"");try{var stw=sessionStorage.getItem("auditToken");if(!tkw&&stw)tkw=stw;}catch(e){}
      return fetch("/api/next-ref",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tkw},body:JSON.stringify({engRef:engId,type:"WP"})})
        .then(function(r){return r.json();})
        .then(function(d){
          var wref=(d&&d.ref)?d.ref:(genRef?genRef(engId):"");
          addWp({
            id:Date.now()+Math.random(),
            name:pendingFile.name,
            title:(title&&title.trim())||pendingFile.name,
            type:ext,
            wpType:wpType,
            desc:desc||"",
            author:currentUser?currentUser.name:"",
            createdAt:new Date().toISOString(),
            modified:(function(){var d2=new Date();return d2.getFullYear()+"-"+String(d2.getMonth()+1).padStart(2,"0")+"-"+String(d2.getDate()).padStart(2,"0");})(),
            engagementId:engId,
            engagement:engTitle,
            ref:wref,
            engagementRef:engId,
            displayRef:engId+" / "+wref,
            fileId:fid,
            usages:[buildUsage()]
          });
          onClose&&onClose();
        });
    }).catch(function(){alert("تعذّر رفع الملف للسيرفر");});
  };

  var tabBtn=function(id,label){
    var active=tab===id;
    return React.createElement("button",{onClick:function(){setTab(id);},
      style:{flex:1,padding:"9px 12px",border:"none",borderBottom:active?"2px solid #C8A84B":"2px solid transparent",
        background:"transparent",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:active?700:500,
        color:active?"#9A7B2E":"#6B7280"}},label);
  };

  return React.createElement(Modal,{open:open,onClose:onClose,title:"إضافة ورقة عمل — "+ctxLabel},
    React.createElement("div",{style:{display:"flex",borderBottom:"1px solid #E5E7EB",marginBottom:14}},
      tabBtn("existing","اختيار من أوراق العمل المرفوعة"),
      tabBtn("upload","رفع ورقة عمل جديدة")
    ),
    tab==="existing"
      ? React.createElement("div",null,
          (engWps&&engWps.length>0)
            ? React.createElement("div",null,
                React.createElement("div",{style:{fontSize:12,color:"#6B7280",marginBottom:8}},"اختر ورقة عمل موجودة في هذه المهمة لربطها هنا (دون رفع ملف جديد):"),
                React.createElement("div",{style:{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}},
                  engWps.map(function(w){
                    var sel=String(selectedWpId)===String(w.id);
                    var already=(w.usages||[]).some(function(u){return u.type===ctxType&&String(u.targetId)===String(ctxTarget);});
                    return React.createElement("div",{key:w.id,onClick:function(){if(!already)setSelectedWpId(w.id);},
                      style:{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,cursor:already?"not-allowed":"pointer",
                        border:sel?"1.5px solid #C8A84B":"1px solid #E5E7EB",background:already?"#F9FAFB":(sel?"#FFFBEB":"white"),opacity:already?0.6:1}},
                      React.createElement(FileIco,{type:w.type}),
                      React.createElement("div",{style:{flex:1}},
                        React.createElement("div",{style:{fontSize:13,fontWeight:600,color:NAVY}},w.title||w.name),
                        React.createElement("div",{style:{fontSize:10,color:"#9CA3AF",fontFamily:"monospace"}},w.ref||"")
                      ),
                      already
                        ? React.createElement("span",{style:{fontSize:10,color:"#16A34A",fontWeight:600}},"مرتبطة هنا بالفعل")
                        : sel&&React.createElement("i",{className:"ti ti-circle-check",style:{fontSize:18,color:"#C8A84B"}})
                    );
                  })
                ),
                React.createElement("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}},
                  React.createElement(Btn,{v:"secondary",onClick:onClose},"إلغاء"),
                  React.createElement(Btn,{v:"gold",onClick:doLinkExisting},React.createElement("i",{className:"ti ti-link"})," ربط الورقة المختارة")
                )
              )
            : React.createElement("div",{style:{textAlign:"center",padding:"24px 12px",color:"#9CA3AF",fontSize:13}},
                "لا توجد أوراق عمل مرفوعة في هذه المهمة بعد. استخدم تبويب «رفع ورقة عمل جديدة».")
        )
      : React.createElement("div",null,
          pendingFile
            ? React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#F9FAFB",borderRadius:10,marginBottom:12}},
                React.createElement("i",{className:"ti ti-file",style:{fontSize:22,color:"#3B82F6"}}),
                React.createElement("div",{style:{flex:1}},
                  React.createElement("div",{style:{fontSize:13,fontWeight:600,color:NAVY}},pendingFile.name)
                ),
                React.createElement("label",{htmlFor:inputId,style:{fontSize:11,color:"#3B82F6",cursor:"pointer",textDecoration:"underline"}},"تغيير")
              )
            : React.createElement("label",{htmlFor:inputId,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"20px",border:"2px dashed #D1D5DB",borderRadius:10,cursor:"pointer",marginBottom:12,background:"#F9FAFB"}},
                React.createElement("i",{className:"ti ti-cloud-upload",style:{fontSize:28,color:"#9CA3AF"}}),
                React.createElement("div",{style:{fontSize:12,fontWeight:600,color:NAVY}},"اختر ملفاً للرفع"),
                React.createElement("div",{style:{fontSize:10,color:"#9CA3AF"}},"PDF, Excel, Word, ZIP")
              ),
          React.createElement("input",{id:inputId,type:"file",style:{display:"none"},
            onChange:function(e){if(e.target.files&&e.target.files[0])setPendingFile(e.target.files[0]);}}),
          React.createElement(FR,{label:"عنوان ورقة العمل"},
            React.createElement("input",{style:INP,value:title,placeholder:"مثال: تحليل عينة المشتريات",
              onChange:function(e){setTitle(e.target.value);}})),
          React.createElement(FR,{label:"نوع الورقة"},
            React.createElement("select",{style:INP,value:wpType,onChange:function(e){setWpType(e.target.value);}},
              ["مراسلة","مستند داعم","تحليل بيانات","اختبار رقابي","محضر اجتماع","مستند من الجهة","أخرى"].map(function(s){return React.createElement("option",{key:s},s);}))),
          React.createElement(FR,{label:descRequired?"وصف مختصر (إلزامي)":"وصف مختصر (اختياري)"},
            React.createElement("textarea",{style:Object.assign({},INP,{resize:"vertical",height:56,lineHeight:1.5}),value:desc,
              placeholder:"مثال: خطاب طلب البيانات من إدارة المشتريات",
              onChange:function(e){setDesc(e.target.value);}})),
          React.createElement("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}},
            React.createElement(Btn,{v:"secondary",onClick:onClose},"إلغاء"),
            React.createElement(Btn,{v:"gold",onClick:doUpload},React.createElement("i",{className:"ti ti-upload"})," رفع وإضافة")
          )
        )
  );
}

function EngWpTab({engId,engTitle,allWp,addWp,delWp,genRef,steps,findings,addWpUsage}){
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const currentUser=auth&&auth.currentUser;
  const {updateWp}=useContext(WpCtx);
  const stepIdSet=(steps||[]).map(function(s){return String(s.id);});
  const findIdSet=(findings||[]).map(function(f){return String(f.id);});
  const engWp=allWp.filter(function(w){
    if(w.engagementId===engId)return true;
    return (w.usages||[]).some(function(u){
      if(String(u.targetId)===String(engId))return true;
      if(u.type==="program_step"&&stepIdSet.indexOf(String(u.targetId))>=0)return true;
      if(u.type==="finding"&&findIdSet.indexOf(String(u.targetId))>=0)return true;
      return false;
    });
  });
  const [unifiedModal,setUnifiedModal]=useState(false);
  const inputId="wpinput-"+engId;
  const [modal,setModal]=useState(false);
  const [pendingFile,setPendingFile]=useState(null);
  const [editWp,setEditWp]=useState(null);
  const emptyForm={author:currentUser?currentUser.name:"",wpType:"مستند داعم",usageType:"المهمة عامة",usageTargetId:"",desc:""};
  const [form,setForm]=useState(emptyForm);

  const getT=function(n){const e=n.split(".").pop().toLowerCase();if(e==="pdf")return"pdf";if(["xlsx","xls","csv"].includes(e))return"xlsx";if(["docx","doc"].includes(e))return"docx";if(["zip","rar","7z"].includes(e))return"zip";return"file";};
  const fmtS=function(b){return b<1024?b+" B":b<1048576?(b/1024).toFixed(0)+" KB":(b/1048576).toFixed(1)+" MB";};
  const fmtD=function(){const d=new Date();const m=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];return d.getDate()+" "+m[d.getMonth()];};

  const openAdd=function(file){setPendingFile(file);setEditWp(null);setForm(Object.assign({},emptyForm,{author:currentUser?currentUser.name:""}));setModal(true);};
  const openEdit=function(wp){setEditWp(wp);setPendingFile(null);setForm({author:wp.author||"",wpType:wp.wpType||"مستند داعم",desc:wp.desc||"",usageType:"المهمة عامة",usageTargetId:""});setModal(true);};

  const handleFiles=function(files){Array.from(files).forEach(function(f){if(Array.from(files).length===1){setUnifiedModal(true);}else{uploadFileToServer(f).then(function(fid){addWp({id:Date.now()+Math.random(),name:f.name,title:f.name,type:getT(f.name),size:fmtS(f.size),modified:fmtD(),createdAt:new Date().toISOString(),wpType:"مستند داعم",desc:"",author:currentUser?currentUser.name:"",engagementId:engId,engagement:engTitle,ref:genRef(engId),fileId:fid,usages:[{type:"engagement",targetId:engId,targetLabel:"المهمة العامة",addedAt:new Date().toISOString(),addedBy:currentUser?currentUser.id:""}]});}).catch(function(){alert("تعذّر رفع الملف: "+f.name);});}});};

  // بناء كائن استخدام واحد من اختيار النموذج
  var buildUsage=function(){
    var ut=form.usageType;
    if(ut==="المهمة عامة")return {type:"engagement",targetId:engId,label:"المهمة"};
    if(ut==="إجراء في برنامج المراجعة"&&form.usageTargetId){
      var st0=(steps||[]).find(function(s){return String(s.id)===String(form.usageTargetId);});
      return {type:"program_step",targetId:form.usageTargetId,targetLabel:st0?stepRef(st0):"اختبار",label:st0?stepRef(st0):"اختبار"};
    }
    if(ut==="ملاحظة"&&form.usageTargetId){
      return {type:"finding",targetId:form.usageTargetId,label:form.usageTargetId};
    }
    return {type:"engagement",targetId:engId,label:"المهمة"};
  };
  var descRequired=function(){
    return form.usageType==="المهمة عامة";
  };
  var confirmSave=function(){
    if(editWp){
      updateWp(editWp.id,{author:form.author,wpType:form.wpType,desc:form.desc});
      setModal(false);setPendingFile(null);setEditWp(null);
    }else if(pendingFile){
      if(descRequired()&&(!form.desc||form.desc.trim().length<3)){
        alert("الرجاء إدخال وصف مختصر للورقة (إلزامي عند إضافة ورقة عامة غير مرتبطة باختبار أو ملاحظة)");return;
      }
      if((form.usageType==="إجراء في برنامج المراجعة"||form.usageType==="ملاحظة")&&!form.usageTargetId){
        alert("الرجاء تحديد "+(form.usageType==="ملاحظة"?"الملاحظة":"الاختبار")+" المرتبط");return;
      }
      var reader=new FileReader();
      reader.onload=function(){
        var base64=reader.result;
        var tk=(window.__authToken||"");
        try{var st=sessionStorage.getItem("auditToken");if(!tk&&st)tk=st;}catch(e){}
        fetch("/api/upload",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify({filename:pendingFile.name,dataBase64:base64})})
          .then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,d:d};});})
          .then(function(res){
            if(!res.ok){alert("تعذّر رفع الملف: "+((res.d&&res.d.error)||("خطأ "+res.status)));return;}
            addWp({id:Date.now()+Math.random(),name:pendingFile.name,type:getT(pendingFile.name),size:fmtS(pendingFile.size),modified:fmtD(),wpType:form.wpType,desc:form.desc,author:form.author,engagementId:engId,engagement:engTitle,ref:genRef(engId),fileId:res.d.fileId,usages:[buildUsage()]});
            setModal(false);setPendingFile(null);setEditWp(null);
          })
          .catch(function(){alert("تعذّر الاتصال بالسيرفر عند رفع الملف");});
      };
      reader.onerror=function(){alert("تعذّر قراءة الملف");};
      reader.readAsDataURL(pendingFile);
    }else{
      setModal(false);setPendingFile(null);setEditWp(null);
    }
  };

  return(
    <Card title={
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span>أوراق العمل</span>
          <span style={{fontSize:12,background:NAVY+"15",color:NAVY,padding:"2px 8px",borderRadius:8,fontWeight:600}}>{engWp.length}</span>
        </div>
        <div>
          <button onClick={function(){setUnifiedModal(true);}}
            style={{display:"inline-flex",alignItems:"center",gap:5,padding:"5px 12px",background:"#2D6A4F",color:"white",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,border:"none"}}>
            <i className="ti ti-plus" style={{fontSize:13}}/>إضافة ورقة عمل
          </button>
        </div>
      </div>
    }>
      <WpAddModal open={unifiedModal} onClose={function(){setUnifiedModal(false);}}
        engId={engId} engTitle={engTitle}
        context={{type:"engagement",targetId:engId,targetLabel:"المهمة العامة"}}
        engWps={engWp} steps={steps} findings={findings}
        addWp={addWp} addWpUsage={addWpUsage} genRef={genRef} currentUser={currentUser}/>
      {/* Modal التفاصيل */}
      <Modal open={modal} onClose={function(){setModal(false);setPendingFile(null);setEditWp(null);}} title={editWp?"تعديل ورقة العمل":"إضافة ورقة عمل"}>
        <div>
          {/* اختيار الملف — عند الإضافة فقط */}
          {!editWp&&(
            <div>
              <input type="file" id={inputId} style={{display:"none"}}
                onChange={function(ev){if(ev.target.files[0])setPendingFile(ev.target.files[0]);ev.target.value="";}}/>
              {pendingFile?(
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:10,marginBottom:14}}>
                  <FileIco type={getT(pendingFile.name)}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:NAVY}}>{pendingFile.name}</div>
                    <div style={{fontSize:11,color:"#9CA3AF"}}>{fmtS(pendingFile.size)} — {engTitle}</div>
                  </div>
                  <label htmlFor={inputId} style={{fontSize:11,color:"#3B82F6",cursor:"pointer",textDecoration:"underline"}}>تغيير</label>
                </div>
              ):(
                <label htmlFor={inputId} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"20px",border:"2px dashed #D1D5DB",borderRadius:10,cursor:"pointer",marginBottom:14,background:"#F9FAFB"}}>
                  <i className="ti ti-cloud-upload" style={{fontSize:28,color:"#9CA3AF"}}/>
                  <div style={{fontSize:12,fontWeight:600,color:NAVY}}>اختر الملف للرفع</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>PDF, Excel, Word, ZIP</div>
                </label>
              )}
            </div>
          )}
          {/* اسم الملف عند التعديل */}
          {editWp&&(
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#F9FAFB",borderRadius:10,marginBottom:14}}>
              <FileIco type={editWp.type}/>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:NAVY}}>{editWp.name}</div>
                <div style={{fontSize:11,color:"#9CA3AF"}}>{engTitle}</div>
              </div>
            </div>
          )}
          {editWp&&<UsagesDetail wp={editWp} steps={steps} findings={findings} onUnlink={function(u){if(window.confirm("فك ارتباط هذه الورقة من "+(u.type==="finding"?("الملاحظة "+u.targetId):"هذا الاختبار")+"؟ (لن تُحذف الورقة ولا الملف)")){updateWp(editWp.id,{usages:(editWp.usages||[]).filter(function(x){return !(x.type===u.type&&String(x.targetId)===String(u.targetId));})});setEditWp(Object.assign({},editWp,{usages:(editWp.usages||[]).filter(function(x){return !(x.type===u.type&&String(x.targetId)===String(u.targetId));})}));}}}/>}
          <FR label="نوع الورقة">
            <select style={INP} value={form.wpType} onChange={function(e){setForm(function(f){return Object.assign({},f,{wpType:e.target.value});});}}>
              {["مراسلة","مستند داعم","تحليل بيانات","اختبار رقابي","محضر اجتماع","مستند من الجهة","أخرى"].map(function(s){return <option key={s}>{s}</option>;})}
            </select>
          </FR>
          <FR label="استخدام الورقة في">
            <select style={INP} value={form.usageType} onChange={function(e){setForm(function(f){return Object.assign({},f,{usageType:e.target.value,usageTargetId:""});});}}>
              {["المهمة عامة","إجراء في برنامج المراجعة","ملاحظة"].map(function(s){return <option key={s}>{s}</option>;})}
            </select>
          </FR>
          {form.usageType==="إجراء في برنامج المراجعة"&&(
            <FR label="الاختبار المرتبط">
              <select style={INP} value={form.usageTargetId} onChange={function(e){setForm(function(f){return Object.assign({},f,{usageTargetId:e.target.value});});}}>
                <option value="">— اختر الاختبار —</option>
                {(steps||[]).map(function(s){return <option key={s.id} value={s.id}>{stepRef(s)+" — "+(s.process||s.objective||"").slice(0,40)}</option>;})}
              </select>
            </FR>
          )}
          {form.usageType==="ملاحظة"&&(
            <FR label="الملاحظة المرتبطة">
              <select style={INP} value={form.usageTargetId} onChange={function(e){setForm(function(f){return Object.assign({},f,{usageTargetId:e.target.value});});}}>
                <option value="">— اختر الملاحظة —</option>
                {(findings||[]).map(function(fd){return <option key={fd.id} value={fd.id}>{(fd.ref||fd.id)+" — "+(fd.title||"").slice(0,40)}</option>;})}
              </select>
            </FR>
          )}
          <FR label={(form.usageType==="المهمة عامة")?"وصف مختصر (إلزامي)":"وصف مختصر (اختياري)"}>
            <textarea style={Object.assign({},INP,{resize:"vertical",height:56,lineHeight:1.5})}
              value={form.desc} placeholder="مثال: خطاب طلب البيانات من إدارة المشتريات"
              onChange={function(e){setForm(function(f){return Object.assign({},f,{desc:e.target.value});});}}/>
          </FR>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <Btn v="secondary" onClick={function(){setModal(false);}}>إلغاء</Btn>
            <Btn v="gold" onClick={confirmSave}><i className={editWp?"ti ti-device-floppy":"ti ti-upload"}/>{editWp?"حفظ التعديلات":"إضافة ورقة العمل"}</Btn>
          </div>
        </div>
      </Modal>

      {engWp.length===0?(
        <div onClick={function(){setUnifiedModal(true);}} style={{border:"2px dashed #D1D5DB",borderRadius:12,padding:"36px 20px",textAlign:"center",cursor:"pointer",color:"#9CA3AF"}}>
          <i className="ti ti-cloud-upload" style={{fontSize:32,display:"block",marginBottom:8}}/>
          <div style={{fontSize:13,marginBottom:4}}>اضغط لإضافة ورقة عمل جديدة</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column"}}>
          {engWp.map(function(w){return(
            <div key={w.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 0",borderBottom:"1px solid #F3F4F6"}}>
              <FileIco type={w.type}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:NAVY}}>{w.title||w.name}</div>
                {w.title&&w.title!==w.name&&<div style={{fontSize:10,color:"#9CA3AF"}}>{w.name}</div>}
                <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontFamily:"monospace",fontSize:10,color:"#3B82F6",fontWeight:600}}>{w.ref}</span>
                  {w.wpType&&<span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"1px 7px",borderRadius:10}}>{w.wpType}</span>}
                  {w.author&&<span style={{fontSize:11,color:"#6B7280"}}>{w.author}</span>}
                </div>
                <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:10,color:"#9CA3AF"}}>مستخدمة في:</span>
                  <UsagesSummary wp={w}/>
                </div>
                {w.desc&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:4,fontStyle:"italic"}}>{w.desc}</div>}
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                <button onClick={function(){openEdit(w);}} title="تعديل" style={{background:"#EFF6FF",border:"none",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"4px 6px"}}><i className="ti ti-edit" style={{fontSize:13}}/></button>
                {(w.fileId||w._url)&&<button onClick={function(){downloadWorkpaper(w);}} style={{background:"#F0FDF4",border:"none",borderRadius:5,cursor:"pointer",color:"#10B981",padding:"4px 6px"}}><i className="ti ti-download" style={{fontSize:13}}/></button>}
                {isMgr&&<button onClick={function(){delWp(w.id);}} style={{background:"#FEF2F2",border:"none",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"4px 6px"}}><i className="ti ti-trash" style={{fontSize:13}}/></button>}
              </div>
            </div>
          );})}
          <button onClick={function(){setUnifiedModal(true);}} style={{display:"flex",alignItems:"center",gap:6,marginTop:10,padding:"8px",border:"1px dashed #D1D5DB",borderRadius:8,cursor:"pointer",color:"#9CA3AF",fontSize:12,justifyContent:"center",width:"100%",background:"transparent",fontFamily:"inherit"}}>
            <i className="ti ti-plus"/>إضافة / ربط ورقة عمل
          </button>

        </div>
      )}
      
    </Card>
  );
}

function Engagements(){
  const {findings:findData,update:updateFinding,add:addFinding,del:delFinding}=useContext(FindingsCtx);
  const {engagements,addEng,updateEng,removeEng,monthsFromDates,statusFromMonths,progressFromMonths,navTarget,clearNav,addNotif,programs:engPrograms,setPrograms:setEngPrograms,auditPlans:engAuditPlans,setAuditPlans:setEngAuditPlans,messages:engMsgs,addMessage:addEngMessage,markMessagesRead:markEngMessagesRead,trail:engTrail,addTrail:addEngTrail}=useContext(EngCtx);
  const {workpapers:allWp,addWp,delWp,genRef,addWpUsage}=useContext(WpCtx);
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const currentUser=auth&&auth.currentUser;
  const visibleEngs=isMgr?engagements:engagements.filter(function(e){return auth&&auth.canAccessEng(e.id);});
  const setData=()=>{};
  const [sel,setSel]=useState(null);
  const [sf,setSf]=useState("الكل");
  const [yearFilter,setYearFilter]=useState(2026);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({title:"",dept:"المراجعة التشغيلية",lead:"",start:"",end:""});
  const [selFinding,setSelFinding]=useState(null);
  const [engTab,setEngTab]=useState("overview");
  const [progModal,setProgModal]=useState(false);
  const [editStep,setEditStep]=useState(null);
  const [stepForm,setStepForm]=useState({});

  // الانتقال التلقائي من نظام التنبيهات
  useEffect(function(){
    if(navTarget&&navTarget.engId){
      setSel(navTarget.engId);
      setEngTab(navTarget.engSubTab||"overview");
      if(navTarget.focusId){
        setFocusRef(navTarget.focusId);
        // إزالة التمييز بعد 2.5 ثانية
        setTimeout(function(){setFocusRef(null);},2500);
      }
      clearNav();
    }
  },[navTarget]);
  const [focusRef,setFocusRef]=useState(null);
  const [programs,setPrograms]=[engPrograms,setEngPrograms];
  const [auditPlans,setAuditPlans]=[engAuditPlans,setEngAuditPlans];
  const [planEditMode,setPlanEditMode]=useState(false);
  const [planForm,setPlanForm]=useState({});
  const [addFindModal,setAddFindModal]=useState(false);
  const emptyFindForm={title:"",risk:"مرتفع",status:"مفتوح",owner:"",due:"",intro:"",observation:"",risks:"",rec:"",mgmt:"",mgmtReply:"",actionPlan:"",attachments:[],approvalStatus:"draft",returnComment:"",returnedBy:"",approvedBy:"",approvedAt:""};
  const [findForm,setFindForm]=useState(emptyFindForm);
  const findAttachRef=React.useRef();
  const getTypeEng=name=>{const ext=name.split(".").pop().toLowerCase();if(ext==="pdf")return"pdf";if(["xlsx","xls","csv"].includes(ext))return"xlsx";if(["docx","doc"].includes(ext))return"docx";if(["zip","rar","7z"].includes(ext))return"zip";return"file";};
  const fmtSzEng=b=>b<1024?b+" B":b<1048576?(b/1024).toFixed(0)+" KB":(b/1048576).toFixed(1)+" MB";
  const emptyPlan={auditArea:"",periodFrom:"",periodTo:"",auditTeam:"",objectives:"",scope:"",priorObservations:"",relatedRegulations:"",processBrief:"",processStakeholders:"",preliminaryRisks:[{id:"r0",text:""}],openingQuestions:"",requestList:""};

  const list=visibleEngs.filter(function(e){
    // فلترة حسب السنة
    var yearOk=(function(){
      if(!e.start&&!e.end)return true;
      var s=e.start?new Date(e.start.split("-")[0],+e.start.split("-")[1]-1,+e.start.split("-")[2]):null;
      var en=e.end?new Date(e.end.split("-")[0],+e.end.split("-")[1]-1,+e.end.split("-")[2]):null;
      var ys=new Date(yearFilter,0,1);var ye=new Date(yearFilter,11,31);
      if(s&&en)return s<=ye&&en>=ys;
      if(s)return s.getFullYear()===yearFilter;
      if(en)return en.getFullYear()===yearFilter;
      return true;
    })();
    if(!yearOk) return false;
    if(sf==="الكل") return true;
    var eFinalStatus=e.finalApprovalStatus||"none";
    if(eFinalStatus==="final_approved") return sf==="مكتمل";
    var today=new Date();today.setHours(0,0,0,0);
    var endDate=e.end?new Date(e.end):null;var startDate=e.start?new Date(e.start):null;
    if(endDate) endDate.setHours(0,0,0,0);if(startDate) startDate.setHours(0,0,0,0);
    var realSt=endDate&&today>endDate?"متأخر":startDate&&today>=startDate?"قيد التنفيذ":"مخطط";
    return realSt===sf;
  });
  const addEngagement=()=>{
    if(!form.title||form.title.trim().length<3){alert("يجب إدخال عنوان المهمة (٣ أحرف على الأقل)");return;}
    const newId=genEngId(yearFilter,engagements);
    addEng({id:newId,status:"مخطط",progress:0,findings:0,months:{},risk:"متوسط",...form});
    setForm({title:"",dept:"المراجعة التشغيلية",lead:"",start:"",end:""});
    setModal(false);
  };
  const chSt=(id,ns)=>updateFinding(id,{status:ns});
  const chRisk=(id,nr)=>updateFinding(id,{risk:nr});
  const getProg=id=>programs[id]||[];
  const saveProg=(engId,steps)=>setPrograms(p=>({...p,[engId]:steps}));
  const updateStep=(engId,stepId,upd)=>saveProg(engId,getProg(engId).map(s=>s.id===stepId?{...s,...upd}:s));
  // نسخة مع تنبيه للتغييرات المباشرة
  const updateStepInline=function(engId,stepId,upd){
    var e=engagements.find(function(x){return x.id===engId;});
    var s=getProg(engId).find(function(x){return x.id===stepId;});
    updateStep(engId,stepId,upd);
    if(e&&s){
      var fieldNames={testStatus:"حالة الاختبار",testResult:"نتيجة الاختبار"};
      var key=Object.keys(upd)[0];
      var proc=s.procedure?s.procedure.substring(0,50)+(s.procedure.length>50?'...':''):s.process;
      var msg=fieldNames[key]
        ?'تم تعديل برنامج المراجعة في خطوة "'+proc+'": تم تغيير '+fieldNames[key]+' إلى '+upd[key]
        :'تم تعديل برنامج المراجعة في خطوة "'+proc+'"';
      addNotif("edit","engagement",msg,engId,e.title);
    }
  };
  const deleteStep=function(engId,stepId){
    var e=engagements.find(function(x){return x.id===engId;});
    var s=getProg(engId).find(function(x){return x.id===stepId;});
    saveProg(engId,getProg(engId).filter(function(st){return st.id!==stepId;}));
    if(e&&s){
      addNotif("delete","program",'تم حذف خطوة من برنامج المراجعة: "'+(s.procedure?s.procedure.substring(0,50)+(s.procedure.length>50?'...':''):s.process)+'"',engId,e.title);
      logTrail(engId,{by:currentUser?currentUser.name:"",role:"مراجع",rc:"#3B82F6",cat:"برنامج المراجعة",icon:"🗑",action:'حذف البطاقة "'+(s.process||("رقم "+s.seq))+'"'});
    }
  };
  const openEditStep=(step)=>{setStepForm({...step});setEditStep(step);setProgModal(true);};
  const logTrail=function(engId,entry){
    if(!addEngTrail)return;
    addEngTrail(engId,Object.assign({id:Date.now()+Math.random(),at:new Date().toISOString()},entry));
  };
  const submitForReview=function(engId,stepId){
    var s0=getProg(engId).find(function(x){return x.id===stepId;});
    // إذا كانت النتيجة قصور ولا توجد ملاحظة مرتبطة → أجبر على إنشاء ملاحظة
    if(s0&&s0.testResult==="Deficiency"&&!s0.linkedFindingId){
      setDefTarget({engId:engId,stepId:stepId});
      setDefForm({title:"",risk:"مرتفع",intro:"",observation:"",risks:"",rec:"",owner:currentUser?currentUser.name:""});
      setDefModal(true);
      return;
    }
    var now=new Date().toISOString();
    var prepBy=currentUser?currentUser.name:"";
    var upd={approvalStatus:"under_review",submittedAt:now,returnComment:"",returnedBy:"",returnedAt:""};
    if(s0&&!s0.preparedBy)upd.preparedBy=prepBy;
    if(s0&&!s0.preparedAt)upd.preparedAt=now;
    updateStep(engId,stepId,upd);

    if(isNaN(d.getTime()))return s;
    var hh=d.getHours(), min=String(d.getMinutes()).padStart(2,"0"), ap=hh>=12?"م":"ص";
    hh=hh%12; if(hh===0)hh=12;
    return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear()+" — "+String(hh).padStart(2,"0")+":"+min+" "+ap;

                        <span style={{display:"inline-flex",alignItems:"center",borderRadius:20,overflow:"hidden",fontSize:10,flexShrink:0}}>
                          <span style={{background:"rgba(255,255,255,0.2)",color:"white",padding:"2px 8px"}}>مستوى الخطر:</span>
                          <span style={{background:rc,color:"white",padding:"2px 10px",fontWeight:600}}>{(ratingAr[s.riskRating]||s.riskRating)+" · "+(s.riskRating||"")}</span>
                        </span>
                      </div>
                      {/* يسار: حالة البطاقة + معتمد/بانتظار + أزرار */}
                      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                        <span style={{background:statusBg,color:"white",fontSize:10,padding:"2px 10px",borderRadius:20,fontWeight:500}}>
                          {isApproved?"مكتمل · Completed":isUnderReview?"قيد المراجعة · Under Review":isReturned?"مُعادة للتعديل · Returned":"قيد الإعداد · Draft"}
                        </span>
                        {isApproved&&<span style={{fontSize:10,color:"#6EE7B7",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-shield-check" style={{fontSize:11}}/> معتمد</span>}
                        {isUnderReview&&!isApproved&&<span style={{fontSize:10,color:"rgba(255,255,255,0.45)",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-lock" style={{fontSize:11,color:"#FCD34D"}}/> بانتظار اعتماد القائد</span>}
                        {isReturned&&<span style={{fontSize:10,color:"#FDBA74",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-corner-down-left" style={{fontSize:11}}/> يحتاج تعديلاً</span>}
                        {canEdit&&(isDraft||isApproved)&&!isEngLocked&&<button onClick={()=>openEditStep(s)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:6,color:"rgba(255,255,255,0.75)",cursor:"pointer",padding:"3px 8px",fontSize:10,display:"flex",alignItems:"center",gap:3}}>
                          <i className="ti ti-edit" style={{fontSize:10}}/>{isApproved?" تعديل (قائد فقط)":"تعديل"}
                        </button>}
                        {(isMgr||isLead)&&isUnderReview&&!isEngLocked&&<button onClick={()=>openEditStep(s)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:6,color:"rgba(255,255,255,0.75)",cursor:"pointer",padding:"3px 8px",fontSize:10,display:"flex",alignItems:"center",gap:3}}>
                          <i className="ti ti-edit" style={{fontSize:10}}/> تعديل
                        </button>}
                        {isReturned&&!isMgr&&!isLead&&!isEngLocked&&<button onClick={()=>openEditStep(s)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:6,color:"rgba(255,255,255,0.75)",cursor:"pointer",padding:"3px 8px",fontSize:10,display:"flex",alignItems:"center",gap:3}}>
                          <i className="ti ti-edit" style={{fontSize:10}}/> تعديل
                        </button>}
                        {canDelete&&!isEngLocked&&<button onClick={()=>{if(window.confirm("حذف هذه الخطوة؟"))deleteStep(e.id,s.id);}} style={{background:"rgba(239,68,68,0.2)",border:"none",borderRadius:6,color:"#FCA5A5",cursor:"pointer",padding:"3px 7px"}}>
                          <i className="ti ti-trash" style={{fontSize:11}}/>
                        </button>}
                      </div>
                    </div>

                    {/* شريط تعليق الإعادة */}
                    {isReturned&&s.returnComment&&(
                      <div style={{background:"#FFF7ED",borderBottom:"1.5px solid #FED7AA",padding:"10px 16px"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#C2410C",marginBottom:6,display:"flex",alignItems:"center",gap:5}}>
                          <i className="ti ti-corner-down-left" style={{fontSize:12}}/> تعليق القائد — سبب الإعادة
                        </div>
                        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                          <div style={{width:26,height:26,borderRadius:"50%",background:"#FEF3C7",border:"1.5px solid #FCD34D50",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#92400E",flexShrink:0}}>{s.returnedBy?s.returnedBy.charAt(0):"م"}</div>
                          <div style={{background:"white",border:"1px solid #FED7AA",borderRadius:"0 8px 8px 8px",padding:"8px 12px",flex:1}}>
                            <div style={{fontSize:10,fontWeight:600,color:"#C2410C",marginBottom:3}}>{s.returnedBy||""}</div>
                            <div style={{fontSize:12,color:"#9A3412",lineHeight:1.6}}>{s.returnComment}</div>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Body: عمودان */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                      {/* العمود الأيمن: النصوص */}
                      <div style={{padding:"14px 16px",borderLeft:"0.5px solid #F3F4F6",display:"flex",flexDirection:"column",gap:13}}>
                        <div>{LBL("الهدف · Audit Objective")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.objective||"—"}</div></div>
                        <div>{LBL("إجراء المراجعة · Audit Procedure")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.procedure||"—"}</div></div>
                        <div>{LBL("المخاطر المعالجة · Risk Addressed")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.riskAddressed||"—"}</div></div>
                      </div>
                      {/* العمود الأيسر: البيانات */}
                      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
                        {/* صف 1: الضابط + معدل التنفيذ + مالك الضابط */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                          <div>{RLBL("الضابط الرقابي المختبر · Control Tested")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.controlTested||"—"}</div></div>
                          <div>{RLBL("معدل تنفيذ الضابط · Control Frequency")}<div style={{fontSize:12,color:"#374151"}}>{s.controlFrequency?(freqAr[s.controlFrequency]||s.controlFrequency)+" · "+s.controlFrequency:s.frequency||"—"}</div></div>
                          <div>{RLBL("مالك الضابط · Control Owner")}<div style={{fontSize:12,color:"#374151"}}>{s.controlOwner||"—"}</div></div>
                        </div>
                        {/* صف 2: المجتمع + العينة + أسلوب اختيار العينة */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                          <div>{RLBL("المجتمع · Population")}<div style={{fontSize:12,color:"#374151"}}>{s.population||"—"}</div></div>
                          <div>{RLBL("العينة · Sample")}<div style={{fontSize:12,color:"#374151"}}>{s.sample||"—"}</div></div>
                          <div>{RLBL("أسلوب اختيار العينة · Sampling Method")}<div style={{fontSize:11,color:"#374151"}}>{s.samplingMethod?(samplingAr[s.samplingMethod]||s.samplingMethod)+" · "+s.samplingMethod:"—"}</div></div>
                        </div>
                        {/* صف 3: أسلوب الاختبار + حالة الاختبار + نتيجة الاختبار */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                          <div>{RLBL("أسلوب الاختبار · Test Technique")}<div style={{fontSize:12,color:"#374151"}}>{s.testTechnique?(techAr[s.testTechnique]||s.testTechnique)+" · "+s.testTechnique:"—"}</div></div>
                          <div>{RLBL("حالة الاختبار · Test Status")}<div><span style={{display:"inline-block",background:s.testStatus==="Completed"?"#ECFDF5":s.testStatus==="In Progress"?"#EFF6FF":"#F3F4F6",color:s.testStatus==="Completed"?"#065F46":s.testStatus==="In Progress"?"#1D4ED8":"#6B7280",fontSize:10,padding:"2px 8px",borderRadius:20}}>{s.testStatus||"لم يبدأ"}</span></div></div>
                          <div>{RLBL("نتيجة الاختبار · Test Result")}<span style={{display:"inline-block",background:resultBg[s.testResult]||"#F3F4F6",color:s.testResult==="Satisfactory"?"#065F46":s.testResult==="Deficiency"?"#991B1B":"#6B7280",fontSize:10,padding:"2px 10px",borderRadius:20,fontWeight:s.testResult?600:400}}>{s.testResult?(resultAr[s.testResult]||s.testResult)+" · "+s.testResult:"—"}</span></div>
                        </div>
                      </div>
                    </div>

                    {/* أوراق العمل - صف كامل */}
                    <div style={{padding:"10px 16px",borderTop:"0.5px solid #E5E7EB",background:"white"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:stepWps.length>0?9:0}}>
                        <div style={{fontSize:10,fontWeight:500,color:"#6B7280",borderRight:"2px solid #8B5CF6",paddingRight:6}}>
                          أوراق العمل · Working Papers {stepWps.length>0&&<span style={{fontWeight:400}}>({stepWps.length})</span>}
                        </div>
                        {(isDraft||isReturned)&&<button onClick={()=>{setStepWpTarget({engId:e.id,stepId:s.id});setStepWpModal(true);}}
                          style={{background:"#8B5CF610",border:"0.5px solid #8B5CF640",borderRadius:6,color:"#7C3AED",cursor:"pointer",padding:"2px 10px",fontSize:10,display:"flex",alignItems:"center",gap:3,fontFamily:"inherit"}}>
                          <i className="ti ti-plus" style={{fontSize:10}}/> إضافة
                        </button>}
                      </div>
                      {stepWps.length>0&&(
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                          {stepWps.map(function(wp){
                            var ext=wp.type||"file";
                            var iconColor=ext==="pdf"?"#EF4444":ext==="xlsx"||ext==="xls"?"#3B82F6":"#7C3AED";
                            var iconBg=ext==="pdf"?"#FEF2F2":ext==="xlsx"||ext==="xls"?"#EFF6FF":"#F5F3FF";
                            var iconCls=ext==="pdf"?"ti-file-type-pdf":ext==="xlsx"||ext==="xls"?"ti-file-spreadsheet":"ti-file-description";
                            return(
                              <div key={wp.id} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 9px",background:"white",border:"0.5px solid #E5E7EB",borderRadius:8}}>
                                <div style={{width:26,height:26,borderRadius:6,background:iconBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className={"ti "+iconCls} style={{fontSize:13,color:iconColor}}/></div>
                                <div style={{flex:1,minWidth:0}}><div style={{fontSize:10,fontWeight:500,color:"#374151",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{wp.title||wp.name}</div><div style={{fontSize:8,fontFamily:"monospace",color:"#7C3AED"}}>{wp.ref}</div><span style={{display:"inline-block",background:"#F5F3FF",color:"#7C3AED",fontSize:8,padding:"0 5px",borderRadius:8,marginTop:2}}>{wp.wpType||wp.status||"مستند"}</span></div>
                                <button onClick={function(){downloadWorkpaper(wp);}} title="تنزيل" style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",padding:1}}><i className="ti ti-download" style={{fontSize:11}}/></button>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>

                    {/* الملاحظات والاستنتاجات + رقم الملاحظة المرتبطة */}
                    {(s.remarks||s.linkedFindingId)&&(
                      <div style={{padding:"10px 16px",background:s.testResult==="Deficiency"?"#FEF2F2":s.testResult==="Satisfactory"?"#F0FDF4":"#F9FAFB",borderTop:"0.5px solid "+(s.testResult==="Deficiency"?"#FECACA":s.testResult==="Satisfactory"?"#6EE7B7":"#F3F4F6")}}>
                        <div style={{fontSize:10,fontWeight:500,color:s.testResult==="Deficiency"?"#991B1B":s.testResult==="Satisfactory"?"#065F46":"#6B7280",marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                          {s.testResult==="Deficiency"&&<i className="ti ti-alert-triangle" style={{fontSize:11}}/>}
                          الملاحظات والاستنتاجات · Remarks &amp; Conclusions
                          {s.linkedFindingId&&<span style={{background:"#FEF2F2",color:"#991B1B",border:"1px solid #FECACA",fontSize:10,padding:"1px 8px",borderRadius:10,fontWeight:700,marginRight:4}}>ملاحظة مرتبطة: {s.linkedFindingId}</span>}
                        </div>
                        {s.remarks&&<div style={{fontSize:12,color:s.testResult==="Deficiency"?"#7F1D1D":s.testResult==="Satisfactory"?"#065F46":"#374151",lineHeight:1.7}}>{s.remarks}</div>}
                      </div>
                    )}

                    {/* Footer: أعدّه + فُحص + زر إرسال/اعتماد */}
                    <div style={{padding:"10px 16px",background:isApproved?"#F0FDF4":isUnderReview?"#FFFBEB":"#F9FAFB",borderTop:"0.5px solid "+(isApproved?"#6EE7B7":isUnderReview?"#FDE68A":"#E5E7EB"),display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:16}}>
                        {/* أعدّه — يظهر دائماً */}
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:28,height:28,borderRadius:"50%",background:"#3B82F620",border:"1.5px solid #3B82F640",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,color:"#3B82F6",flexShrink:0}}>
                            {s.preparedBy?s.preparedBy.charAt(0):"؟"}
                          </div>
                          <div>
                            <div style={{fontSize:9,fontWeight:500,color:isApproved?"#065F46":isUnderReview?"#92400E":"#6B7280"}}>أعدّه · Prepared By</div>
                            <div style={{fontSize:11,fontWeight:500,color:"#374151"}}>{s.preparedBy||"—"}</div>
                            {s.preparedAt?<div style={{fontSize:9,color:"#6B7280"}}>{fmtDate(s.preparedAt)}</div>:null}
                          </div>
                        </div>
                        {/* فُحص من قبل — يظهر فقط عند الاعتماد أو المراجعة */}
                        {(isUnderReview||isApproved)&&(
                          <>
                            <div style={{width:"0.5px",height:36,background:isApproved?"#6EE7B7":"#FDE68A",flexShrink:0}}/>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{width:28,height:28,borderRadius:"50%",background:"#C8A84B20",border:isApproved?"1.5px solid #C8A84B50":"1.5px dashed #C8A84B",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,color:"#C8A84B",flexShrink:0}}>
                                {(s.reviewedBy||e.lead||"م").charAt(0)}
                              </div>
                              <div>
                                <div style={{fontSize:9,fontWeight:500,color:isApproved?"#065F46":"#92400E"}}>فُحص من قبل · Reviewed By</div>
                                <div style={{fontSize:11,fontWeight:500,color:isApproved?"#374151":"#6B7280"}}>
                                  {isApproved?(s.reviewedBy||e.lead||"قائد المراجعة"):(e.lead||"قائد المراجعة")}
                                </div>
                                {isApproved&&s.approvedAt
                                  ?<div style={{fontSize:9,color:"#6B7280"}}>{fmtDate(s.approvedAt)}</div>
                                  :<div style={{fontSize:9,color:"#D97706",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-clock" style={{fontSize:9}}/> بانتظار الاعتماد…</div>}
                              </div>
                              {isApproved&&<i className="ti ti-circle-check" style={{fontSize:18,color:"#059669",marginRight:4}}/>}
                            </div>
                          </>
                        )}
                      </div>
                      {/* أزرار الإجراءات */}
                      <div style={{display:"flex",gap:8,flexShrink:0}}>
                        {isDraft&&!isMgr&&!isLead&&(
                          <button onClick={()=>submitForReview(e.id,s.id)} style={{background:NAVY,color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                            <i className="ti ti-send" style={{fontSize:12}}/> إرسال للمراجعة · Submit
                          </button>
                        )}
                        {isReturned&&!isMgr&&!isLead&&(
                          <button onClick={()=>submitForReview(e.id,s.id)} style={{background:NAVY,color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                            <i className="ti ti-send" style={{fontSize:12}}/> إعادة الإرسال للاعتماد
                          </button>
                        )}
                        {canApproveStep&&(
                          <>
                            <button onClick={()=>{setReturnTarget({engId:e.id,stepId:s.id});setReturnComment("");setReturnModal(true);}} style={{background:"#EA580C",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                              <i className="ti ti-corner-down-left" style={{fontSize:12}}/> إعادة
                            </button>
                            <button onClick={()=>approveStep(e.id,s.id)} style={{background:"#059669",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                              <i className="ti ti-circle-check" style={{fontSize:13}}/> اعتماد · Approve
                            </button>
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Findings tab */}
      {engTab==="findings"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {isFinaLocked&&!isMgr&&React.createElement("div",{style:{background:"#FEF9EC",borderRadius:10,padding:"10px 16px",border:"1px solid "+GOLD+"40",display:"flex",alignItems:"center",gap:8,fontSize:11,color:"#92400E"}},
            React.createElement("i",{className:"ti ti-lock",style:{fontSize:14,color:GOLD}}),
            "المهمة مُعتمدة نهائياً — الملاحظات في وضع القراءة فقط"
          )}

          {/* Add Finding Modal */}
          <Modal open={addFindModal} onClose={()=>{setAddFindModal(false);setFindForm(emptyFindForm);}} title="إضافة ملاحظة جديدة">
            {/* Row 1: العنوان + الخطر + الحالة */}
            <FR label="عنوان الملاحظة *">
              <input style={INP} value={findForm.title} onChange={ev=>setFindForm(f=>({...f,title:ev.target.value}))} placeholder="عنوان الملاحظة"/>
            </FR>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <FR label="مستوى المخاطرة">
                <select style={{...INP,fontWeight:700}} value={findForm.risk} onChange={ev=>setFindForm(f=>({...f,risk:ev.target.value}))}>
                  {["حرج","مرتفع","متوسط","منخفض"].map(r=><option key={r}>{r}</option>)}
                </select>
              </FR>
              <FR label="الحالة">
                <select style={INP} value={findForm.status} onChange={ev=>setFindForm(f=>({...f,status:ev.target.value}))}>
                  {["مفتوح","قيد المعالجة","مغلق"].map(r=><option key={r}>{r}</option>)}
                </select>
              </FR>
              <FR label="الإدارة المعنية">
                <input style={INP} value={findForm.mgmt||""} onChange={ev=>setFindForm(f=>({...f,mgmt:ev.target.value}))} placeholder="اسم الإدارة"/>
              </FR>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <FR label="المسؤول">
                <input style={INP} value={findForm.owner} onChange={ev=>setFindForm(f=>({...f,owner:ev.target.value}))} placeholder="اسم المسؤول"/>
              </FR>
              <FR label="التاريخ المتوقع للمعالجة">
                <input type="date" style={INP} value={findForm.due} onChange={ev=>setFindForm(f=>({...f,due:ev.target.value}))}/>
              </FR>
            </div>
            {/* Content sections */}
            <div style={{display:"flex",flexDirection:"column",gap:0,border:"1px solid #E5E7EB",borderRadius:10,overflow:"hidden",marginBottom:10}}>
              {[
                {label:"الخلفية / المقدمة",           field:"intro",       ph:"الأساس القانوني أو التنظيمي للملاحظة...",rows:3},
                {label:"الملاحظة — ما تم رصده",       field:"observation", ph:"تفاصيل ما تم رصده ميدانياً:\n• ...",rows:4},
                {label:"المخاطر / الآثار المترتبة",   field:"risks",       ph:"• الأثر الأول\n• الأثر الثاني",rows:3},
                {label:"التوصية",                      field:"rec",         ph:"١. التوصية الأولى\n٢. التوصية الثانية",rows:3},
              ].map(({label,field,ph,rows},i)=>(
                <div key={field} style={{borderTop:i===0?"none":"1px solid #E5E7EB"}}>
                  <div style={{background:"#1E3A2F",color:"white",padding:"7px 14px",fontSize:12,fontWeight:700}}>{label}</div>
                  <textarea style={{...INP,height:rows*26,resize:"vertical",border:"none",borderRadius:0,lineHeight:1.7,background:"white"}}
                    value={findForm[field]||""} onChange={ev=>setFindForm(f=>({...f,[field]:ev.target.value}))} placeholder={ph}/>
                </div>
              ))}
            </div>
            {/* رد الإدارة + خطة المعالجة */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <FR label="رد الإدارة المعنية">
                <textarea style={{...INP,height:72,resize:"vertical",lineHeight:1.7}} value={findForm.mgmtReply||""} onChange={ev=>setFindForm(f=>({...f,mgmtReply:ev.target.value}))} placeholder="رد الإدارة على الملاحظة..."/>
              </FR>
              <FR label="خطة المعالجة">
                <textarea style={{...INP,height:72,resize:"vertical",lineHeight:1.7}} value={findForm.actionPlan||""} onChange={ev=>setFindForm(f=>({...f,actionPlan:ev.target.value}))} placeholder="خطوات المعالجة المتفق عليها..."/>
              </FR>
            </div>
            {/* ملاحظة: أوراق العمل تُضاف بعد حفظ الملاحظة من بطاقتها عبر النافذة الموحّدة */}
            <div style={{marginBottom:14,background:"#F0F9FF",border:"1px solid #BAE6FD",borderRadius:8,padding:"10px 12px",display:"flex",alignItems:"center",gap:8}}>
              <i className="ti ti-info-circle" style={{fontSize:16,color:"#0284C7"}}/>

function EngChatTab({eng,currentUser,isMgr,messages,addMessage,teamUsers,allFindings,allWp,stepCards}){
  const GOLD="#C8A84B",NAVY="#0D1F42";
  const [input,setInput]=useState("");
  const [refChip,setRefChip]=useState(null);
  // نظام الاقتراح الذكي
  const [suggest,setSuggest]=useState(null); // null | {type:"member"|"ref", query:"", items:[]}
  const [suggestIdx,setSuggestIdx]=useState(0);
  const messagesEndRef=React.useRef(null);
  const inputRef=React.useRef(null);
  const auth=useContext(AuthCtx);
  const allMembers=auth&&auth.users
    ?[...(auth.users.filter(function(u){return u.role!=="team";})),...(teamUsers||[])]
    :(teamUsers||[]);
  const myId=currentUser&&currentUser.id;

  useEffect(function(){if(messagesEndRef.current)messagesEndRef.current.scrollIntoView({behavior:"smooth"});},[messages]);

  const memberColors={"u1":{color:GOLD,bg:"#FEF3C7"},"u2":{color:"#3B82F6",bg:"#DBEAFE"},"u3":{color:"#10B981",bg:"#D1FAE5"},"u4":{color:"#8B5CF6",bg:"#EDE9FE"},"u5":{color:"#EF4444",bg:"#FEE2E2"}};
  const getColor=function(uid){return memberColors[uid]||{color:"#6B7280",bg:"#F3F4F6"};};

  const engFindings=allFindings||[];
  const engWp=allWp||[];
  const engSteps=stepCards||[];
  const prog=engSteps.length;
  const doneProg=engSteps.filter(function(s){return s.approvalStatus==="approved";}).length;

  // بناء قائمة العناصر القابلة للربط
  const refItems=[
    ...engSteps.map(function(s,i){return{icon:"📋",label:"بطاقة #"+(i+1)+(s.process?" — "+s.process:""),color:"#7C3AED",key:"s"+s.id};}),
    ...engFindings.map(function(f){return{icon:"⚠️",label:"ملاحظة: "+f.title,color:"#EF4444",key:"f"+f.id};}),
    ...engWp.slice(0,5).map(function(w){return{icon:"📎",label:(w.ref||"")+" — "+w.name,color:"#3B82F6",key:"w"+w.id};}),
  ];

  // استخراج آخر الإشارات الفعلية من الرسائل
  const recentRefs=[];
  messages.forEach(function(m){if(m.ref)recentRefs.push(m.ref);});
  const uniqueRefs=recentRefs.filter(function(r,i,a){return a.findIndex(function(x){return x.label===r.label;})===i;}).slice(-4);

  // تحليل input لاكتشاف @ أو #
  const handleInput=function(val){
    setInput(val);
    // الكلمة الحالية = آخر كلمة يكتبها المستخدم (بعد آخر مسافة)
    var lastWord=val.split(" ").pop();
    if(lastWord.startsWith("@")&&lastWord.length>=1){
      var query=lastWord.slice(1);
      var items=allMembers.filter(function(m){
        return !query||m.name.includes(query)||m.name.split(" ")[0].startsWith(query);
      });
      setSuggest({type:"member",query:query,items:items});
      setSuggestIdx(0);
    } else if(lastWord.startsWith("#")&&lastWord.length>=1){
      var query2=lastWord.slice(1);
      var items2=refItems.filter(function(r){return !query2||r.label.includes(query2);});
      setSuggest({type:"ref",query:query2,items:items2});
      setSuggestIdx(0);
    } else {
      setSuggest(null);
    }
  };

  // اختيار اقتراح
  const pickSuggest=function(item){
    // استبدل الكلمة الأخيرة (الـ @query أو #query) بالاختيار
    var words=input.split(" ");
    words.pop(); // احذف الكلمة الأخيرة (التي تحتوي @ أو #)
    var prefix=words.length>0?words.join(" ")+" ":"";
    if(suggest.type==="member"){
      var firstName=item.name.split(" ")[0];
      setInput(prefix+"@"+firstName+" ");
    } else {
      setRefChip({icon:item.icon,label:item.label,color:item.color});
      setInput(prefix);
    }
    setSuggest(null);
    if(inputRef.current)inputRef.current.focus();
  };

  // معالجة مفاتيح الكيبورد في الاقتراحات
  const handleKeyDown=function(ev){
    if(suggest&&suggest.items.length>0){
      if(ev.key==="ArrowDown"){ev.preventDefault();setSuggestIdx(function(i){return(i+1)%suggest.items.length;});return;}
      if(ev.key==="ArrowUp"){ev.preventDefault();setSuggestIdx(function(i){return(i-1+suggest.items.length)%suggest.items.length;});return;}
      if(ev.key==="Tab"){
        ev.preventDefault();pickSuggest(suggest.items[suggestIdx]);return;
      }
      if(ev.key==="Enter"&&suggest){ev.preventDefault();pickSuggest(suggest.items[suggestIdx]);return;}
      if(ev.key==="Escape"){setSuggest(null);return;}
    }
    if(ev.key==="Enter"&&!ev.shiftKey&&!suggest){ev.preventDefault();sendMessage();}
  };

  // إرسال رسالة
  const sendMessage=function(){
    if(!input.trim()&&!refChip)return;
    var now=new Date();
    var timeStr=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
    addMessage({id:Date.now(),userId:myId,userName:currentUser?currentUser.name:"",text:input.trim(),time:timeStr,isoTime:now.toISOString(),ref:refChip,readBy:[myId]});
    setInput("");setRefChip(null);setSuggest(null);
  };

  // تحويل نص الرسالة إلى عناصر React مع تمييز @المنشن
  const renderText=function(text,isMine){
    if(!text)return null;
    var parts=text.split(/(@\S+)/g);
    return parts.map(function(part,i){
      if(part.startsWith("@")){
        return React.createElement("span",{key:i,style:{color:isMine?"#7C3AED":"#3B82F6",fontWeight:700}},part);
      }
      return part;
    });
  };

  const fmtDate=function(iso){if(!iso)return"";var d=new Date(iso);var today=new Date();var isToday=d.toDateString()===today.toDateString();return isToday?"اليوم":(String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear());};
  var lastDate="";

  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 220px",gap:14,alignItems:"start",height:"calc(100vh - 200px)",minHeight:500}}>

      {/* Chat main */}
      <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>

// توليد معرّف مهمة فريد بناءً على أعلى رقم موجود (يتفادى التكرار عند الحذف)
function genEngId(year,engagements){
  // السنة من الخطة (مثل 2026) → AD26، والتسلسل داخل نفس السنة
  var yy=String(year).slice(-2);
  var prefix="AD"+yy+"-";
  var maxNum=0;
  (engagements||[]).forEach(function(e){
    var m=new RegExp("^AD"+yy+"-(\\d+)$").exec(String(e.id||""));
    if(m){var n=parseInt(m[1],10);if(n>maxNum)maxNum=n;}
  });
  var n=maxNum+1;
  return prefix+(n<100?String(n).padStart(2,"0"):String(n));
}

// ── نظام التذكير بمواعيد المهام ──
// حساب الأيام المتبقية حتى نهاية المهمة (بالأيام الكاملة، بتطبيع الوقت لمنتصف الليل)
function daysUntil(endStr){
  if(!endStr)return null;
  var parts=String(endStr).split("-");
  if(parts.length!==3)return null;
  var end=new Date(+parts[0],+parts[1]-1,+parts[2]);
  end.setHours(0,0,0,0);
  var today=new Date();today.setHours(0,0,0,0);
  return Math.round((end-today)/(1000*60*60*24));
}
// لون ونص العداد بناءً على الأيام المتبقية (null = لا عداد)
function countdownInfo(eng){
  if(!eng||!eng.end)return null;
  // المهمة معتمدة نهائياً → لا عداد (يُعرض تاريخ التسليم بدلاً منه)
  if(eng.finalApprovalStatus==="final_approved")return {delivered:true,deliveredAt:eng.finalApprovedAt||""};
  if(eng.status==="مكتمل")return null;
  var d=daysUntil(eng.end);
  if(d===null)return null;
  var ad=Math.abs(d);
  var unit=ad===1?"يوم":(ad>=2&&ad<=10?"أيام":"يوماً");
  // الألوان: رمادي >30، أصفر 15-30، أحمر 1-14، أحمر داكن لليوم/المتأخر
  var color,bg;
  if(d>30){color="#64748B";bg="#64748B14";}
  else if(d>=15){color="#B45309";bg="#FAEEDA";}
  else if(d>=1){color="#B91C1C";bg="#FCEBEB";}
  else {color="#7F1D1D";bg="#FCEBEB";}
  var text;
  if(d>0)text="متبقٍ "+d+" "+unit;
  else if(d===0)text="ينتهي اليوم";
  else text="متأخر "+ad+" "+unit;
  return {days:d,color:color,bg:bg,text:text,pulse:d<=0};
}
// عداد خفيف نصي يظهر بجانب تاريخ التسليم
function CountdownBadge({eng}){
  var info=countdownInfo(eng);
  if(!info)return null;
  // المهمة سُلّمت (اعتُمدت نهائياً)
  if(info.delivered){
    return React.createElement("span",{
      style:{display:"inline-flex",alignItems:"center",gap:4,background:"#DCFCE7",color:"#15803D",
        fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:6,whiteSpace:"nowrap"}

      info.deliveredAt?("سُلّمت بتاريخ "+info.deliveredAt):"سُلّمت"
    );
  }
  return React.createElement("span",{
    style:{display:"inline-flex",alignItems:"center",gap:4,background:info.bg,color:info.color,
      fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:6,whiteSpace:"nowrap",

  );
}

// الشريط العائم للتذكير بالمواعيد القريبة (آخر 14 يوماً + المتأخرة)
function DeadlineReminder({engagements,currentUser,canAccess}){
  var [dismissed,setDismissed]=useState(false);
  var [showAll,setShowAll]=useState(false);
  var todayStr=new Date().toISOString().slice(0,10);
  var uid=currentUser?currentUser.id:"anon";
  var dismissKey="audithub_reminder_dismissed_"+uid;

  useEffect(function(){
    try{
      var last=localStorage.getItem(dismissKey);
      setDismissed(last===todayStr);
    }catch(e){}
  },[dismissKey,todayStr]);

  // المهام القريبة (المتبقي ≤ 14، تشمل المتأخرة) وغير المكتملة والتي يراها المستخدم
  var due=(engagements||[]).filter(function(e){
    if(!e||e.status==="مكتمل"||e.finalApprovalStatus==="final_approved"||!e.end)return false;
    if(canAccess&&!canAccess(e.id))return false;
    var d=daysUntil(e.end);
    return d!==null&&d<=14;
  }).sort(function(a,b){return daysUntil(a.end)-daysUntil(b.end);}); // الأقرب/الأكثر تأخراً أولاً

  if(dismissed||due.length===0)return null;

  var soonest=due[0];
  var sd=daysUntil(soonest.end);
  var hasLate=due.some(function(e){return daysUntil(e.end)<0;});
  var barColor=hasLate||sd<=0?"#991B1B":"#DC2626";

  var msg;
  if(due.length===1){
    if(sd<0)msg='تأخّر إنجاز مهمة «'+soonest.title+'» بـ '+Math.abs(sd)+' يوماً';
    else if(sd===0)msg='ينتهي اليوم موعد إنجاز مهمة «'+soonest.title+'»';
    else msg='تبقّى '+sd+(sd<=10?' أيام':' يوماً')+' لإنجاز مهمة «'+soonest.title+'»';
  } else {
    var lead=sd<0?('الأكثر تأخراً «'+soonest.title+'» بـ '+Math.abs(sd)+' يوماً'):
             sd===0?('وتنتهي اليوم مهمة «'+soonest.title+'»'):
             ('الأقرب «'+soonest.title+'» خلال '+sd+(sd<=10?' أيام':' يوماً'));
    msg='لديك '+due.length+' مهام تقترب مواعيدها — '+lead;
  }

  var dismiss=function(){
    try{localStorage.setItem(dismissKey,todayStr);}catch(e){}
    setDismissed(true);
  };

  return React.createElement("div",{style:{animation:"audslidedown 0.3s ease-out"}},
    React.createElement("div",{style:{background:barColor,color:"white",borderRadius:10,padding:"11px 16px",
      marginBottom:14,display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px "+barColor+"40"}},
      React.createElement("i",{className:"ti ti-bell-ringing",style:{fontSize:18,flexShrink:0}}),
      React.createElement("div",{style:{flex:1,fontSize:13,fontWeight:600,lineHeight:1.5}},msg),
      due.length>1&&React.createElement("button",{onClick:function(){setShowAll(!showAll);},
        style:{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:6,color:"white",
          fontSize:12,fontWeight:600,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}},
        showAll?"إخفاء القائمة":"عرض الكل"),
      React.createElement("button",{onClick:dismiss,title:"إخفاء لليوم",
        style:{background:"white",color:barColor,border:"none",borderRadius:6,fontSize:12,fontWeight:700,
          padding:"5px 14px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}},"حسناً")
    ),
    showAll&&due.length>1&&React.createElement("div",{style:{background:"white",border:"1px solid #E5E7EB",
      borderRadius:10,padding:"8px 4px",marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}},
      due.map(function(e){
        var d=daysUntil(e.end);
        var c2=d<0?"#991B1B":d<=14?"#DC2626":"#D97706";
        var t=d<0?("متأخر "+Math.abs(d)+" يوماً"):d===0?"ينتهي اليوم":("متبقٍ "+d+(d<=10?" أيام":" يوماً"));
        return React.createElement("div",{key:e.id,style:{display:"flex",alignItems:"center",
          justifyContent:"space-between",padding:"8px 14px",borderBottom:"1px solid #F3F4F6"}},
          React.createElement("span",{style:{fontSize:13,color:"#374151",fontWeight:500}},e.title),
          React.createElement("span",{style:{fontSize:11,fontWeight:700,color:c2,background:c2+"14",
            padding:"2px 10px",borderRadius:20,whiteSpace:"nowrap"}},t)
        );
      })
    )
  );
}

// مساعد رفع ملف للسيرفر — يرجع Promise بـ fileId
function uploadFileToServer(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(){
      var tk=(window.__authToken||"");
      try{var st=sessionStorage.getItem("auditToken");if(!tk&&st)tk=st;}catch(e){}
      fetch("/api/upload",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},body:JSON.stringify({filename:file.name,dataBase64:reader.result})})
        .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
        .then(function(res){if(res.ok&&res.d.fileId){resolve(res.d.fileId);}else{reject(new Error((res.d&&res.d.error)||"فشل الرفع"));}})
        .catch(reject);
    };
    reader.onerror=function(){reject(new Error("تعذّر قراءة الملف"));};
    reader.readAsDataURL(file);
  });
}

// مساعد تحميل أوراق العمل من السيرفر عبر المعرّف الدائم
function downloadWorkpaper(w){
  if(w.fileId){
    var tk=(window.__authToken||"");
    try{var st=sessionStorage.getItem("auditToken");if(!tk&&st)tk=st;}catch(e){}
    fetch("/api/file/"+w.fileId,{headers:{"Authorization":"Bearer "+tk}})
      .then(function(r){if(!r.ok)throw new Error("تعذّر التحميل");return r.blob();})
      .then(function(blob){
        var url=URL.createObjectURL(blob);
        var a=document.createElement("a");a.href=url;a.download=w.name;a.click();
        setTimeout(function(){URL.revokeObjectURL(url);},1000);
      })
      .catch(function(){alert("تعذّر تحميل الملف من السيرفر");});
  } else if(w._url){
    // ملف قديم في نفس الجلسة (قبل ترقية الرفع)
    var a=document.createElement("a");a.href=w._url;a.download=w.name;a.click();
  } else {
    alert("هذا الملف رُفع بنسخة قديمة ولم يُحفظ على السيرفر. يرجى إعادة رفعه.");
  }
}

function usageShortLabel(u){
  if(!u)return "";
  if(u.type==="engagement")return u.targetId||"المهمة";
  if(u.type==="correspondence")return u.targetId||"مراسلة";
  if(u.type==="program_step")return u.targetLabel?u.targetLabel.split(" — ")[0]:(u.label||"اختبار");
  if(u.type==="finding")return u.targetLabel?u.targetLabel.split(" — ")[0]:(u.targetId||u.label||"ملاحظة");
  return u.targetLabel||u.label||"";
}
// ترميز بطاقة المراجعة: يفضّل المرجع المخزّن، وإلا يحسبه من التسلسل
function stepRef(s){
  if(!s)return "T-00";
  if(s.ref)return s.ref;
  var n=s.seq||0;
  return "T-"+(n<100?String(n).padStart(2,"0"):String(n));
}
// عرض مختصر لاستخدامات الورقة في الجدول (أول 3 + عدّاد)
function UsagesSummary({wp,composite,onUsageClick}){
  var usages=(wp&&wp.usages)||[];
  var engPrefix=(composite&&wp&&wp.engagementId)?(wp.engagementId+" / "):"";
  if(usages.length===0){
    // توافق مع الأوراق القديمة: اعرض رقم المهمة إن وُجد engagementId
    if(wp&&wp.engagementId)return React.createElement("span",{
      onClick:onUsageClick?function(ev){ev.stopPropagation();onUsageClick({type:"engagement",targetId:wp.engagementId},wp);}:undefined,
      title:onUsageClick?"الذهاب إلى المهمة":undefined,
      style:{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"1px 7px",borderRadius:10,cursor:onUsageClick?"pointer":"default",textDecoration:onUsageClick?"underline":"none"}},wp.engagementId);
    return null;
  }
  var shown=usages.slice(0,3);
  var extra=usages.length-shown.length;
  return React.createElement("span",{style:{display:"inline-flex",gap:4,flexWrap:"wrap",alignItems:"center"}},
    shown.map(function(u,i){
      var isF=u.type==="finding";
      var lbl=usageShortLabel(u);
      // خارج سياق المهمة: المرجع المركّب AD26-01 / F-01 (عدا استخدام المهمة نفسه)
      if(composite&&u.type!=="engagement"&&engPrefix)lbl=engPrefix+lbl;
      var clickable=onUsageClick&&(u.type==="finding"||u.type==="program_step"||u.type==="engagement");
      return React.createElement("span",{key:i,
        onClick:clickable?function(ev){ev.stopPropagation();onUsageClick(u,wp);}:undefined,
        title:clickable?(u.type==="finding"?"الذهاب إلى الملاحظة":u.type==="program_step"?"الذهاب إلى بطاقة المراجعة":"الذهاب إلى المهمة"):undefined,
        style:{fontSize:10,fontWeight:600,cursor:clickable?"pointer":"default",
        textDecoration:clickable?"underline":"none",
        color:isF?"#B45309":"#3B82F6",background:isF?"#FEF3C7":"#EFF6FF",padding:"1px 7px",borderRadius:10}},
        lbl);
    }),
    extra>0&&React.createElement("span",{style:{fontSize:10,color:"#9CA3AF",fontWeight:600}},"+"+extra)
  );
}
// عرض مفصّل لاستخدامات الورقة (في تفاصيل الورقة)
function UsagesDetail({wp,steps,findings,onUnlink}){
  var usages=(wp&&wp.usages)||[];
  if(usages.length===0&&wp&&wp.engagementId){
    usages=[{type:"engagement",targetId:wp.engagementId,targetLabel:"المهمة العامة"}];
  }
  if(usages.length===0)return null;
  var labelFor=function(u){
    if(u.type==="engagement")return (wp.engagement?wp.engagement+" ":"")+"("+(u.targetId||wp.engagementId||"")+")";
    if(u.type==="correspondence")return "مراسلة عامة";
    if(u.type==="program_step"){
      var s=(steps||[]).find(function(x){return String(x.id)===String(u.targetId);});
      return s?(stepRef(s)+(s.process?(" — "+s.process):"")):(u.targetLabel||("اختبار "+u.targetId));
    }
    if(u.type==="finding"){
      var fd=(findings||[]).find(function(x){return String(x.id)===String(u.targetId);});
      return fd?((fd.ref||fd.id)+(fd.title?(" — "+fd.title):"")):(u.targetLabel||u.targetId);
    }
    return u.targetLabel||u.targetId||"";
  };
  var typeLabel=function(t){return t==="engagement"?"المهمة":t==="correspondence"?"مراسلة":t==="program_step"?"برنامج المراجعة":"ملاحظة";};
  return React.createElement("div",{style:{background:"#F9FAFB",borderRadius:8,padding:"10px 12px",marginTop:8,marginBottom:8}},
    React.createElement("div",{style:{fontSize:12,fontWeight:700,color:NAVY,marginBottom:8}},"استخدامات ورقة العمل:"),
    usages.map(function(u,i){
      return React.createElement("div",{key:i,style:{display:"flex",gap:8,fontSize:12,marginBottom:5,alignItems:"center"}},
        React.createElement("span",{style:{color:"#9CA3AF",minWidth:96,flexShrink:0}},typeLabel(u.type)+":"),
        React.createElement("span",{style:{color:"#374151",fontWeight:500,flex:1}},labelFor(u)),
        onUnlink&&u.type!=="engagement"&&React.createElement("button",{onClick:function(){onUnlink(u);},
          title:"فك الارتباط",
          style:{background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:6,color:"#B91C1C",cursor:"pointer",
            fontSize:10,fontWeight:600,padding:"2px 8px",fontFamily:"inherit",flexShrink:0}},
          React.createElement("i",{className:"ti ti-unlink",style:{fontSize:10}})," فك الارتباط")
      );
    })
  );
}

function Workpapers(){

    return !w.engagementId||(auth&&auth.canAccessEng&&auth.canAccessEng(w.engagementId));
  });
  const [yearFilter,setYearFilter]=useState(2026);
  // فلترة حسب سنة المهمة المرتبطة
  function wpInYear(w){
    var eng=engagements.find(function(e){return e.id===w.engagementId;});
    if(!eng||(!eng.start&&!eng.end))return true;
    var s=eng.start?new Date(eng.start.split("-")[0],+eng.start.split("-")[1]-1,+eng.start.split("-")[2]):null;
    var en=eng.end?new Date(eng.end.split("-")[0],+eng.end.split("-")[1]-1,+eng.end.split("-")[2]):null;
    var ys=new Date(yearFilter,0,1);var ye=new Date(yearFilter,11,31);
    if(s&&en)return s<=ye&&en>=ys;
    if(s)return s.getFullYear()===yearFilter;
    if(en)return en.getFullYear()===yearFilter;
    return true;
  }
  const data=dataRaw.filter(wpInYear);
  // المهام المتاحة للمستخدم الحالي
  const myEngs=isMgr?engagements:engagements.filter(function(e){
