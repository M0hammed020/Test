                <thead>
                  <tr>
                    <Th>المرجع</Th><Th>اسم الملف</Th><Th>مهمة المراجعة</Th><Th>مستخدمة في</Th><Th>النوع</Th><Th>أضيفت من قبل</Th><Th>التاريخ</Th><Th></Th>
                  </tr>
                </thead>
                <tbody>
                  {list.map(function(w){return(
                    <tr key={w.id} className="hrow">
                      <Td><span style={{fontFamily:"monospace",fontSize:11,color:"#3B82F6",fontWeight:600}}>{w.engagementId&&w.ref?(w.engagementId+" / "+w.ref):(w.ref||"—")}</span></Td>
                      <Td>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <FileIco type={w.type}/>
                          <div style={{display:"flex",flexDirection:"column"}}>
                            <span style={{fontWeight:500,color:NAVY,fontSize:13}}>{w.title||w.name}</span>
                            {w.title&&w.title!==w.name&&<span style={{fontSize:10,color:"#9CA3AF"}}>{w.name}</span>}
                          </div>
                          {w._file&&<span style={{fontSize:10,background:"#DCFCE7",color:"#16A34A",padding:"1px 6px",borderRadius:4,fontWeight:600}}>جديد</span>}
                        </div>
                      </Td>
                      <Td>
                        {(w.engagement||w.engagementId)
                          ?<div onClick={function(){if(w.engagementId&&goTo)goTo({tab:"engagements",engId:w.engagementId,engSubTab:"overview"});}}
                             style={{display:"flex",flexDirection:"column",gap:2,alignItems:"flex-start",cursor:w.engagementId?"pointer":"default"}}
                             title={w.engagementId?"الذهاب إلى المهمة":""}>
                            {w.engagementId&&<span style={{fontSize:10,fontFamily:"monospace",background:"#EFF6FF",color:"#1D4ED8",padding:"1px 7px",borderRadius:6,fontWeight:700,textDecoration:w.engagementId?"underline":"none"}}>{w.engagementId}</span>}
                            {w.engagement&&<span style={{fontSize:11,color:"#475569"}}>{w.engagement.length>24?w.engagement.slice(0,24)+"...":w.engagement}</span>}
                          </div>
                          :<span style={{color:"#D1D5DB",fontSize:12}}>—</span>}
                      </Td>
                      <Td>
                        {(w.usages&&w.usages.length>0)
                          ?<UsagesSummary wp={w} composite={false} onUsageClick={function(u,wp){
                              if(!goTo)return;
                              if(u.type==="finding"){goTo({tab:"engagements",engId:wp.engagementId,engSubTab:"findings",focusId:u.targetId});}
                              else if(u.type==="program_step"){goTo({tab:"engagements",engId:wp.engagementId,engSubTab:"program",focusId:u.targetId});}
                              else if(u.type==="engagement"){goTo({tab:"engagements",engId:u.targetId||wp.engagementId,engSubTab:"overview"});}
                            }}/>
                          :w.stepId?<span style={{fontSize:10,background:"#F5F3FF",color:"#7C3AED",padding:"2px 8px",borderRadius:6,fontWeight:600,display:"inline-flex",alignItems:"center",gap:3}}><i className="ti ti-list-check" style={{fontSize:10}}/>بطاقة مراجعة</span>
                        :w.findingId?<span style={{fontSize:10,background:"#FEF2F2",color:"#991B1B",padding:"2px 8px",borderRadius:6,fontWeight:600,display:"inline-flex",alignItems:"center",gap:3}}><i className="ti ti-alert-triangle" style={{fontSize:10}}/>ملاحظة</span>
                        :w.engagementId?<span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"2px 8px",borderRadius:10}}>{w.engagementId}</span>
                        :<span style={{color:"#D1D5DB",fontSize:11}}>—</span>}
                      </Td>
                      <Td><span style={{fontSize:12,color:"#6B7280"}}>{w.wpType||"—"}</span></Td>
                      <Td><span style={{fontSize:12}}>{w.author||"—"}</span></Td>
                      <Td><span style={{fontSize:12,color:"#6B7280"}}>{w.modified||(w.createdAt?w.createdAt.slice(0,10):"—")}</span></Td>
                      <Td>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={function(){openEdit(w);}} title="تعديل التفاصيل"
                            style={{background:"#EFF6FF",border:"none",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"4px 6px"}}>
                            <i className="ti ti-edit" style={{fontSize:13}}/>
                          </button>
                          {(w.fileId||w._url)&&(
                            <button onClick={function(){downloadWorkpaper(w);}} title="تحميل"
                              style={{background:"#F0FDF4",border:"none",borderRadius:5,cursor:"pointer",color:"#10B981",padding:"4px 6px"}}>
                              <i className="ti ti-download" style={{fontSize:13}}/>
                            </button>
                          )}
                          {isMgr&&<button onClick={function(){delWp(w.id);}} title="حذف"
                            style={{background:"#FEF2F2",border:"none",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"4px 6px"}}>
                            <i className="ti ti-trash" style={{fontSize:13}}/>
                          </button>}
                        </div>
                      </Td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </Card>
    </div>
  );
}


function FindingCard({f,onClose,onChangeStatus,onChangeRisk,onEdit,onDelete,onUpdate,stepCards,leadId,engLocked}){
  const NAVY2="#0D1F42",GOLD2="#C8A84B",GRN2="#1E3A2F";
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const wpCtx=useContext(WpCtx);
  const editAttachRef=React.useRef();
  const [wpModalOpen,setWpModalOpen]=useState(false);
  const engWpsForFinding=(wpCtx&&wpCtx.workpapers||[]).filter(function(w){
    if(w.engagementId===f.audit)return true;
    return (w.usages||[]).some(function(u){return String(u.targetId)===String(f.audit);});
  });
  const linkedWpsForFinding=(wpCtx&&wpCtx.workpapers||[]).filter(function(w){
    return (w.usages||[]).some(function(u){return u.type==="finding"&&String(u.targetId)===String(f.id);});
  });
  const [editing,setEditing]=useState(false);
  const [editForm,setEditForm]=useState({});
  const [showStatusMenu,setShowStatusMenu]=useState(false);
  const [showReturnInput,setShowReturnInput]=useState(false);
  const [returnText,setReturnText]=useState("");
  const [sideField,setSideField]=useState(null);
  const [sideVal,setSideVal]=useState("");

  const currentUser=auth&&auth.currentUser;
  // القائد: صاحب leadId في المهمة — مدير المراجعة لديه صلاحيات كاملة دائماً، وإذا لم يُحدّد قائد فالمدير قائد تلقائياً
  var isLeadUser=!!(currentUser&&((leadId&&currentUser.id===leadId)||(!leadId&&isMgr)));
  var canApprove=(isMgr||isLeadUser)&&!engLocked; // من يمكنه اعتماد أو إعادة الملاحظة
  var isReviewer=!isMgr&&!isLeadUser;

  var approvalSt=f.approvalStatus||"draft";
  var isApproved=approvalSt==="approved";
  // إغلاق التعديل على المراجع بعد الاعتماد — فقط القائد/المدير يعدل بعد الاعتماد
  const APPR={
    draft:        {l:"مسودة",         c:"#64748B",bg:"#F1F5F9",border:"#E2E8F0",icon:"ti-pencil"},
    under_review: {l:"قيد الاعتماد",  c:"#0891B2",bg:"#EFF6FF",border:"#BFDBFE",icon:"ti-eye"},
    returned:     {l:"مُعادة",         c:"#D97706",bg:"#FFFBEB",border:"#FDE68A",icon:"ti-arrow-back-up"},
    approved:     {l:"مُعتمدة",        c:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0",icon:"ti-circle-check"},
  };
  var ac=APPR[approvalSt]||APPR.draft;
  var canEdit=(isMgr||isLeadUser||(isReviewer&&(approvalSt==="draft"||approvalSt==="returned")))&&!engLocked;
  const SC2={"مفتوح":{bg:"#FEE2E2",text:"#991B1B",nextSt:"قيد المعالجة"},"قيد المعالجة":{bg:"#FEF9C3",text:"#854D0E",nextSt:"مغلق"},"مغلق":{bg:"#DCFCE7",text:"#166634",nextSt:null}};
  const RC2={"حرج":{bg:"#FEE2E2",text:"#991B1B"},"مرتفع":{bg:"#FEE2E2",text:"#991B1B"},"متوسط":{bg:"#FEF9C3",text:"#854D0E"},"منخفض":{bg:"#DCFCE7",text:"#166634"}};
  const sc=SC2[f.status]||SC2["مفتوح"];
  const rc=RC2[f.risk]||RC2["مرتفع"];
  const SECS=[{key:"intro",label:"الخلفية / المقدمة"},{key:"observation",label:"الملاحظة — ما تم رصده"},{key:"risks",label:"المخاطر / الآثار المترتبة"},{key:"rec",label:"التوصية"}];
  var engCtx2=useContext(EngCtx);
  var engObj=engCtx2&&engCtx2.engagements?engCtx2.engagements.find(function(x){return x.id===f.audit;}):null;
  var engRef=engObj?(engObj.code||("AUD-"+String(engObj.id||"").slice(-3).padStart(3,"0"))):"";
  var linkedLabel=engObj?(engRef?" "+engRef+" — ":"")+engObj.title:f.audit||"—";

  const startEdit=function(){setEditForm({title:f.title||"",risk:f.risk||"مرتفع",status:f.status||"مفتوح",intro:f.intro||"",observation:f.observation||"",risks:f.risks||"",rec:f.rec||"",mgmt:f.mgmt||"",mgmtReply:f.mgmtReply||"",actionPlan:f.actionPlan||"",owner:f.owner||"",due:f.due||""});setEditing(true);};
  const saveEdit=function(){if(onUpdate){var changed={};Object.keys(editForm).forEach(function(k){if(String(editForm[k]||"")!==String(f[k]||""))changed[k]=editForm[k];});if(Object.keys(changed).length>0)onUpdate(f.id,changed);}setEditing(false);};
  const setEF=function(k){return function(v){setEditForm(function(prev){var n={};Object.keys(prev).forEach(function(pk){n[pk]=prev[pk];});n[k]=v;return n;});};};
  const saveSide=function(k){if(onUpdate){var u={};u[k]=sideVal;onUpdate(f.id,u);}setSideField(null);};

  const nowStr=function(){var d=new Date();return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();};
  const sendForReview=function(){if(onUpdate)onUpdate(f.id,{approvalStatus:"under_review",submittedAt:nowStr(),returnComment:"",returnedBy:"",returnedAt:""});};
  const approveFinding=function(){if(onUpdate)onUpdate(f.id,{approvalStatus:"approved",approvedBy:currentUser?currentUser.name:"",approvedAt:nowStr()});};
  const returnFinding=function(){if(!returnText.trim())return;if(onUpdate)onUpdate(f.id,{approvalStatus:"returned",returnComment:returnText,returnedBy:currentUser?currentUser.name:"",returnedAt:nowStr(),approvedBy:"",approvedAt:""});setShowReturnInput(false);setReturnText("");};

  const handleEditFiles=function(files){Array.from(files).forEach(function(file){var ext=file.name.split(".").pop().toLowerCase();var tp=["xlsx","xls","csv"].includes(ext)?"xlsx":ext==="pdf"?"pdf":["docx","doc"].includes(ext)?"docx":"file";uploadFileToServer(file).then(function(fid){if(onUpdate)onUpdate(f.id,{attachments:[...(f.attachments||[]),{id:Date.now()+Math.random(),name:file.name,size:Math.round(file.size/1024)+" KB",type:tp,fileId:fid}]});}).catch(function(){alert("تعذّر رفع المرفق: "+file.name);});});};

  const taS={width:"100%",border:"1px solid #BAE6FD",borderRadius:8,padding:"8px 10px",fontSize:13,fontFamily:"inherit",direction:"rtl",outline:"none",lineHeight:1.7,resize:"vertical",background:"#F0F9FF",boxSizing:"border-box",color:"#1E293B"};
  const inS={border:"1px solid #BAE6FD",borderRadius:8,padding:"6px 10px",fontSize:12,fontFamily:"inherit",direction:"rtl",outline:"none",background:"#F0F9FF",boxSizing:"border-box",color:"#1E293B",width:"100%"};
  function Pill2({label,cfg}){return <span style={{background:cfg?cfg.bg:"#F1F5F9",color:cfg?cfg.text:"#475569",fontSize:11,fontWeight:700,padding:"2px 9px",borderRadius:20}}>{label}</span>;}
  function SecLbl({label}){return <div style={{fontSize:10,fontWeight:700,color:GRN2,marginBottom:7,borderRight:"2px solid "+GRN2,paddingRight:7,letterSpacing:"0.04em"}}>{label}</div>;}

  return(
    <div style={{background:"white",borderRadius:12,border:"1.5px solid "+(isApproved?"#BBF7D0":approvalSt==="returned"?"#FDE68A":approvalSt==="under_review"?"#BFDBFE":"#E9EEF4"),boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
      {/* HEADER */}
      <div style={{background:GRN2,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
          <div style={{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className="ti ti-alert-triangle" style={{color:GOLD2,fontSize:15}}/></div>
          <div style={{minWidth:0}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontFamily:"monospace",marginBottom:1}}>{f.ref||f.id}</div>
            {editing?<input value={editForm.title||""} onChange={function(ev){setEF("title")(ev.target.value);}} style={{width:"100%",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.35)",borderRadius:6,padding:"4px 8px",color:"white",fontSize:13,fontWeight:700,outline:"none",fontFamily:"inherit"}}/>
              :<div style={{fontSize:13,fontWeight:700,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.title}</div>}
          </div>
          <span style={{display:"inline-flex",alignItems:"center",borderRadius:20,overflow:"hidden",fontSize:10,flexShrink:0}}>
            <span style={{background:"rgba(255,255,255,.14)",color:"rgba(255,255,255,.7)",padding:"2px 8px"}}>مستوى الخطر:</span>
            <span style={{background:rc.bg,color:rc.text,padding:"2px 10px",fontWeight:700}}>{f.risk}</span>
          </span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
          <span style={{background:ac.bg,color:ac.c,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20,border:"1px solid "+ac.border,display:"flex",alignItems:"center",gap:4}}><i className={"ti "+ac.icon} style={{fontSize:11}}/>{ac.l}</span>
          <span style={{background:sc.bg,color:sc.text,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20}}>{f.status}</span>
          {canEdit&&!editing&&<button onClick={startEdit} style={{background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",borderRadius:6,color:"rgba(255,255,255,.65)",cursor:"pointer",padding:"3px 8px",fontSize:10,fontFamily:"inherit"}}>✏ تعديل</button>}
          {editing&&<><button onClick={saveEdit} style={{background:GOLD2,border:"none",borderRadius:6,color:"white",cursor:"pointer",padding:"3px 8px",fontSize:10,fontFamily:"inherit",fontWeight:600}}>💾 حفظ</button><button onClick={function(){setEditing(false);}} style={{background:"rgba(239,68,68,.3)",border:"none",borderRadius:6,color:"white",cursor:"pointer",padding:"3px 8px",fontSize:10,fontFamily:"inherit"}}>✕</button></>}
          {isApproved&&!editing&&canApprove&&<div style={{position:"relative"}}><button onClick={function(){setShowStatusMenu(function(v){return !v;});}} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px",background:GOLD2,border:"none",borderRadius:6,fontSize:10,color:"white",cursor:"pointer",fontFamily:"inherit"}}><i className="ti ti-chevron-down" style={{fontSize:11}}/> الحالة</button>
            {showStatusMenu&&<div style={{position:"absolute",left:0,top:"110%",background:"white",border:"1px solid #E2E8F0",borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,.12)",zIndex:999,minWidth:160,overflow:"hidden"}}>
              {["مفتوح","قيد المعالجة","مغلق"].map(function(st){return <div key={st} onClick={function(){onChangeStatus&&onChangeStatus(f.id,st);setShowStatusMenu(false);}} style={{padding:"9px 14px",fontSize:12,cursor:"pointer",color:"#334155",borderBottom:"0.5px solid #F1F5F9",background:f.status===st?"#F0F9FF":"white",fontWeight:f.status===st?700:400}}>{st}</div>;})}
            </div>}
          </div>}
          {isMgr&&!editing&&<button onClick={function(){if(window.confirm("حذف الملاحظة؟"))onDelete&&onDelete(f.id);}} style={{padding:"3px 7px",background:"rgba(239,68,68,.2)",border:"none",borderRadius:6,color:"#FCA5A5",cursor:"pointer"}}><i className="ti ti-trash" style={{fontSize:13}}/></button>}
        </div>
      </div>
      {/* META BAR */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",padding:"10px 18px",gap:10,background:"#FAFBFC",borderBottom:"1px solid #F1F5F9"}}>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>رقم الملاحظة</div><span style={{fontSize:12,fontWeight:700,color:"#334155",fontFamily:"monospace"}}>{f.ref||f.id}</span></div>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>الحالة</div><Pill2 label={f.status} cfg={sc}/></div>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>مستوى الخطر</div>{editing?<select value={editForm.risk||""} onChange={function(ev){setEF("risk")(ev.target.value);}} style={{fontSize:11,border:"1px solid #BAE6FD",borderRadius:6,padding:"2px 6px",background:"#F0F9FF",fontFamily:"inherit",outline:"none"}}>{["حرج","مرتفع","متوسط","منخفض"].map(function(r){return <option key={r}>{r}</option>;})}</select>:<Pill2 label={f.risk} cfg={rc}/>}</div>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>المرتبطة بـ</div><span style={{fontSize:12,fontWeight:500,color:"#334155"}}>{linkedLabel||"—"}</span></div>
      </div>
      {/* شريط الإعادة */}
      {approvalSt==="returned"&&f.returnComment&&(
        <div style={{background:"#FFFBEB",borderBottom:"1px solid #FDE68A",padding:"10px 18px",display:"flex",alignItems:"flex-start",gap:8}}>
          <i className="ti ti-arrow-back-up" style={{fontSize:14,color:"#D97706",flexShrink:0,marginTop:1}}/>
          <div><div style={{fontSize:10,fontWeight:700,color:"#92400E",marginBottom:3}}>تعليق القائد {f.returnedBy?"("+f.returnedBy+")":""} — سبب الإعادة:</div><div style={{fontSize:12,color:"#78350F",lineHeight:1.6}}>{f.returnComment}</div></div>
        </div>
      )}
      {/* BODY */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 280px"}}>
        <div style={{borderLeft:"1px solid #F1F5F9",padding:"20px 22px",display:"flex",flexDirection:"column",gap:16}}>
          {SECS.map(function(s){return(
            <div key={s.key}><SecLbl label={s.label}/>{editing?<textarea rows={4} value={editForm[s.key]||""} onChange={function(ev){var v=ev.target.value;setEF(s.key)(v);}} style={taS}/>:<div style={{fontSize:13,color:"#475569",lineHeight:1.85,whiteSpace:"pre-line"}}>{f[s.key]||<span style={{color:"#CBD5E1",fontStyle:"italic"}}>لم يُضَف بعد</span>}</div>}</div>
          );})}
          <div style={{paddingTop:14,borderTop:"1px solid #F5F7FA"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:700,color:"#1E293B"}}><i className="ti ti-paperclip" style={{fontSize:13,color:GOLD2}}/> أوراق العمل ({((f.attachments||[]).length)+(linkedWpsForFinding.length)})</div>
              <input ref={editAttachRef} type="file" multiple={true} style={{display:"none"}} onChange={function(ev){handleEditFiles(ev.target.files);ev.target.value="";}}/>
              <button onClick={function(){setWpModalOpen(true);}} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 12px",background:"#FFFBEB",border:"1px solid #C8A84B",borderRadius:7,fontSize:11,color:"#9A7B2E",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}><i className="ti ti-files" style={{fontSize:12}}/> إضافة / ربط ورقة عمل</button>
            </div>
            <WpAddModal open={wpModalOpen} onClose={function(){setWpModalOpen(false);}}
              engId={f.audit} engTitle={f.auditTitle||f.audit}
              context={{type:"finding",targetId:f.id,targetLabel:(f.ref||f.id)+(f.title?(" — "+f.title):"")}}
              engWps={engWpsForFinding} steps={stepCards||[]} findings={[]}
              addWp={wpCtx&&wpCtx.addWp} addWpUsage={wpCtx&&wpCtx.addWpUsage} genRef={wpCtx&&wpCtx.genRef} currentUser={auth&&auth.currentUser}/>
            {(f.attachments||[]).length===0?null
              :<div style={{display:"flex",flexDirection:"column",gap:5}}><div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,marginBottom:2}}>مرفقات قديمة:</div>{(f.attachments||[]).map(function(att,i){var ec={"pdf":"#DC2626","xlsx":"#16A34A","docx":"#2563EB"}[att.type]||"#6B7280";var ebg={"pdf":"#FEE2E2","xlsx":"#DCFCE7","docx":"#DBEAFE"}[att.type]||"#F1F5F9";return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#F8FAFC",border:"1px solid #E9EEF4",borderRadius:8}}>
                  <div style={{width:28,height:28,borderRadius:6,background:ebg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:ec,flexShrink:0}}>{att.type?att.type.toUpperCase().slice(0,3):"FILE"}</div>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:500,color:"#334155",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.name}</div>{att.size&&<div style={{fontSize:9,color:"#94A3B8"}}>{att.size}</div>}</div>
                  {(att.fileId||att._url)&&<button onClick={function(){downloadWorkpaper(att);}} style={{color:"#94A3B8",textDecoration:"none",background:"none",border:"none",cursor:"pointer",padding:0}}><i className="ti ti-download" style={{fontSize:14}}/></button>}
                </div>
              );})}
              </div>}
              {linkedWpsForFinding.length>0&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:5}}>
                <div style={{fontSize:10,color:"#9A7B2E",fontWeight:600,marginBottom:2}}>أوراق عمل مرتبطة بهذه الملاحظة:</div>
                {linkedWpsForFinding.map(function(w){return(
                  <div key={w.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8}}>

          <div style={{padding:"14px 16px"}}>{editing?<div style={{display:"flex",flexDirection:"column",gap:7}}><div><div style={{fontSize:10,fontWeight:600,color:"#64748B",marginBottom:3}}>المسؤول</div><input value={editForm.owner||""} onChange={function(ev){setEF("owner")(ev.target.value);}} style={inS} placeholder="اسم المسؤول"/></div><div><div style={{fontSize:10,fontWeight:600,color:"#64748B",marginBottom:3}}>موعد تطبيق خطة المعالجة</div><input type="date" value={editForm.due||""} onChange={function(ev){setEF("due")(ev.target.value);}} style={inS}/></div></div>:<div>{[{i:"ti-calendar-event",l:"موعد تطبيق خطة المعالجة",v:f.due},{i:"ti-user",l:"المسؤول",v:f.owner},{i:"ti-calendar-plus",l:"تاريخ الإنشاء",v:f.opened||""},{i:"ti-user-check",l:"أعدّه",v:f.preparedBy||""}].map(function(r,i){return(<div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:i<3?"1px solid #F8FAFC":"none"}}><i className={"ti "+r.i} style={{fontSize:12,color:"#94A3B8",width:15,textAlign:"center",flexShrink:0}}/><span style={{fontSize:11,color:"#64748B",flex:1}}>{r.l}</span><span style={{fontSize:11,fontWeight:600,color:"#334155"}}>{r.v||"—"}</span></div>);})}</div>}</div>
        </div>

      {approvalSt==="under_review"&&canApprove&&!showReturnInput&&(

      {/* مربع تعليق الإعادة */}

        <div style={{background:"#FFFBEB",borderTop:"1px solid #FDE68A",padding:"14px 18px"}}>

          <textarea value={returnText} onChange={function(ev){setReturnText(ev.target.value);}} rows={3} placeholder="اكتب سبب الإعادة والملاحظات المطلوبة للمراجع..." style={{width:"100%",border:"1.5px solid "+(returnText.trim()?"#FED7AA":"#E5E7EB"),borderRadius:8,padding:"8px 12px",fontSize:12,fontFamily:"inherit",direction:"rtl",outline:"none",lineHeight:1.7,resize:"none",background:"white",boxSizing:"border-box"}}/>
          {!returnText.trim()&&<div style={{fontSize:11,color:"#EF4444",marginTop:4}}>هذا الحقل مطلوب</div>}
          <div style={{display:"flex",gap:8,marginTop:10,justifyContent:"flex-end"}}>
            <button onClick={function(){setShowReturnInput(false);setReturnText("");}} style={{padding:"6px 14px",background:"white",border:"1px solid #E2E8F0",borderRadius:8,fontSize:12,cursor:"pointer",color:"#475569",fontFamily:"inherit"}}>إلغاء</button>
            <button onClick={returnFinding} disabled={!returnText.trim()} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 16px",background:returnText.trim()?"#D97706":"#E2E8F0",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:returnText.trim()?"pointer":"not-allowed",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-send" style={{fontSize:12}}/> إرسال الإعادة</button>
          </div>
        </div>
      )}
      {/* FOOTER */}
      <div style={{padding:"11px 18px",background:ac.bg,borderTop:"0.5px solid "+ac.border,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {f.preparedBy&&<div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:28,height:28,borderRadius:"50%",background:"#DBEAFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#1D4ED8"}}>{(f.preparedBy||"م").charAt(0)}</div><div><div style={{fontSize:9,color:"#6B7280",fontWeight:600}}>أعدّه · Prepared By</div><div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{f.preparedBy}</div>{f.preparedAt&&<div style={{fontSize:9,color:"#9CA3AF"}}>{f.preparedAt}</div>}</div></div>}
          {approvalSt==="approved"&&f.approvedBy&&<><div style={{width:"0.5px",height:32,background:ac.border}}/><div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:28,height:28,borderRadius:"50%",background:"#FEF9EC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:GOLD2}}>{(f.approvedBy||"م").charAt(0)}</div><div><div style={{fontSize:9,color:"#6B7280",fontWeight:600}}>اعتمده · Approved By</div><div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{f.approvedBy}</div>{f.approvedAt&&<div style={{fontSize:9,color:"#9CA3AF"}}>{f.approvedAt}</div>}</div><i className="ti ti-circle-check" style={{fontSize:17,color:"#16A34A"}}/></div></>}
          {approvalSt==="under_review"&&<span style={{fontSize:11,color:"#0891B2",display:"flex",alignItems:"center",gap:5,background:"#EFF6FF",padding:"4px 10px",borderRadius:8,border:"1px solid #BFDBFE"}}><i className="ti ti-clock" style={{fontSize:11}}/> بانتظار اعتماد القائد</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          {(approvalSt==="draft"||approvalSt==="returned")&&!isMgr&&<button onClick={sendForReview} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 16px",background:"#0D1F42",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-send" style={{fontSize:12}}/>{approvalSt==="returned"?"إعادة الإرسال للاعتماد":"إرسال للاعتماد"}</button>}
          {approvalSt==="draft"&&isMgr&&<button onClick={approveFinding} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 16px",background:GRN2,color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-circle-check" style={{fontSize:12}}/> اعتماد مباشر</button>}
        </div>

  );
}


function Findings(){
  const NAVY2="#0D1F42",GRN2="#1E3A2F",GOLD2="#C8A84B";
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const findCtx=useContext(FindingsCtx);
  const allFindings=findCtx&&findCtx.findings?findCtx.findings:[];
  const update=findCtx&&findCtx.update?findCtx.update:function(){};
  const engCtxF=useContext(EngCtx);
  const ENG=engCtxF&&engCtxF.engagements?engCtxF.engagements:[];
  const [yearFilter,setYearFilter]=useState(2026);
  const data=(isMgr?allFindings:allFindings.filter(function(f){
    return !f.audit||(auth&&auth.canAccessEng&&auth.canAccessEng(f.audit));
  })).filter(function(f){
    // فلترة حسب سنة المهمة
    var eng=ENG.find(function(e){return e.id===f.audit;});
    if(!eng||(!eng.start&&!eng.end))return true;
    var s=eng.start?new Date(eng.start.split("-")[0],+eng.start.split("-")[1]-1,+eng.start.split("-")[2]):null;
    var en=eng.end?new Date(eng.end.split("-")[0],+eng.end.split("-")[1]-1,+eng.end.split("-")[2]):null;
    var ys=new Date(yearFilter,0,1);var ye=new Date(yearFilter,11,31);
    if(s&&en)return s<=ye&&en>=ys;
    if(s)return s.getFullYear()===yearFilter;
    if(en)return en.getFullYear()===yearFilter;
    return true;
  });

  const [logModal,setLogModal]=useState(null);
  const [logDate,setLogDate]=useState("");
  const [logNote,setLogNote]=useState("");
  const [selEng,setSelEng]=useState(null);
  const [tracking,setTracking]=useState({});
  const [calYear,setCalYear]=useState(new Date().getFullYear());
  const [calMonth,setCalMonth]=useState(new Date().getMonth());
  const [calSelDay,setCalSelDay]=useState(null);

  const getT=function(id){return tracking[id]||{stage:"not_sent",sentAt:"",r1Sent:false,r2Sent:false,r3Sent:false,escalated:false,notes:""};};
  const setT=function(id,patch){setTracking(function(p){var cur=getT(id);return Object.assign({},p,{[id]:Object.assign({},cur,patch)});});};

  // ── Helpers — defined first ──
  const getEngObj=function(id){return ENG.find(function(e){return e.id===id;})||null;};
  const getEngTitle=function(id){var e=getEngObj(id);return e?e.title:id||"—";};
  const getEngCode=function(id){var e=getEngObj(id);return e?(e.code||id):id||"—";};

  // Add N working days — Sunday(0) to Thursday(4) are work days; Friday(5) Sat(6) are off
  const addWorkDays=function(dateStr,n){
    if(!dateStr||!n)return null;
    var d=new Date(dateStr);
    var added=0;
    while(added<n){d.setDate(d.getDate()+1);var dw=d.getDay();if(dw!==5&&dw!==6)added++;}
    return d.toISOString().slice(0,10);
  };

  const daysDiff=function(dateStr){
    if(!dateStr)return null;
    return Math.ceil((new Date(dateStr)-new Date())/(1000*60*60*24));
  };

  const fmtDate=function(d){
    if(!d)return"—";
    try{
      var p=d.split("-");
      if(p.length===3)return p[2]+"/"+p[1]+"/"+p[0];
      return d;
    }catch(e){return d;}
  };

  // Compute schedule from sent date: R1=+6wd, R2=+12wd, R3=+18wd, deadline=+25wd
  const computeSchedule=function(sentAt){
    if(!sentAt)return null;
    return{
      r1Date:addWorkDays(sentAt,6),
      r2Date:addWorkDays(sentAt,12),
      r3Date:addWorkDays(sentAt,18),
      deadline:addWorkDays(sentAt,25),
    };
  };

  // What is the NEXT action and when
  const computeNextAction=function(t){
    if(!t||t.stage==="not_sent")return{action:"إرسال التقرير",date:null,stage:"not_sent"};
    if(t.stage==="closed")return{action:"مغلقة",date:null,stage:"closed"};
    if(t.stage==="escalation")return{action:"انتظار رد التصعيد",date:null,stage:"escalation"};
    var sch=computeSchedule(t.sentAt);
    if(!sch)return null;
    if(!t.r1Sent)return{action:"إرسال التذكير الأول",  date:sch.r1Date, stage:"reminder1"};
    if(!t.r2Sent)return{action:"إرسال التذكير الثاني", date:sch.r2Date, stage:"reminder2"};
    if(!t.r3Sent)return{action:"إرسال التذكير الثالث", date:sch.r3Date, stage:"reminder3"};
    return{action:"انتهاء المهلة — التصعيد",date:sch.deadline,stage:"escalation_due"};
  };

  const STAGE_CFG={
    not_sent:      {l:"لم يُرسَل",        c:"#94A3B8",bg:"#F1F5F9",border:"#E2E8F0",icon:"ti-mail"},
    sent:          {l:"أُرسل التقرير",    c:"#0891B2",bg:"#F0F9FF",border:"#BAE6FD",icon:"ti-mail-check"},
    reminder1:     {l:"تم التذكير الأول", c:"#D97706",bg:"#FFFBEB",border:"#FDE68A",icon:"ti-bell"},
    reminder2:     {l:"تم التذكير الثاني",c:"#D97706",bg:"#FFFBEB",border:"#FDE68A",icon:"ti-bell"},
    reminder3:     {l:"تم التذكير الثالث",c:"#EA580C",bg:"#FFF7ED",border:"#FED7AA",icon:"ti-bell-ringing"},
    escalation:    {l:"مرحلة التصعيد",    c:"#DC2626",bg:"#FEF2F2",border:"#FECACA",icon:"ti-arrow-up"},
    closed:        {l:"مغلقة",            c:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0",icon:"ti-circle-check"},
  };

  const URGENCY={
    critical:{dot:"#DC2626",bg:"#FEE2E2",text:"#991B1B",border:"#FECACA",label:"عاجل"},
    high:    {dot:"#EA580C",bg:"#FFF7ED",text:"#9A3412",border:"#FED7AA",label:"مهم"},
    medium:  {dot:"#D97706",bg:"#FFFBEB",text:"#854D0E",border:"#FDE68A",label:"قريب"},
    normal:  {dot:"#94A3B8",bg:"#F8FAFC",text:"#475569",border:"#E9EEF4",label:"قادم"},
  };

  // Group findings by engagement
  var engMap={};
  data.forEach(function(f){if(!f.audit)return;if(!engMap[f.audit])engMap[f.audit]={id:f.audit,findings:[]};engMap[f.audit].findings.push(f);});

  var engGroups=Object.values(engMap).map(function(eg){
    var t=getT(eg.id);
    var next=computeNextAction(t);
    var sch=t.sentAt?computeSchedule(t.sentAt):null;
    var dl=next&&next.date?daysDiff(next.date):null;
    var urgency=t.stage==="not_sent"?"normal":t.stage==="closed"?"normal":t.stage==="escalation"?"critical":dl===null?"normal":dl<0?"critical":dl<=2?"critical":dl<=5?"high":"medium";
    return Object.assign({},eg,{t:t,next:next,sch:sch,dl:dl,urgency:urgency});
  }).sort(function(a,b){
    var p={"critical":0,"high":1,"medium":2,"normal":3};return(p[a.urgency]||3)-(p[b.urgency]||3);
  });

  // Build calendar events map
  var calEvents={};
  var addCalEv=function(dateStr,ev){if(!dateStr)return;if(!calEvents[dateStr])calEvents[dateStr]=[];calEvents[dateStr].push(ev);};
  engGroups.forEach(function(eg){
    var t=eg.t;var sch=eg.sch;var code=getEngCode(eg.id);
    if(!sch||t.stage==="not_sent"||t.stage==="closed")return;
    if(!t.r1Sent)addCalEv(sch.r1Date,{code:code,label:"تذكير ١",urgency:daysDiff(sch.r1Date)<0?"critical":daysDiff(sch.r1Date)<=3?"high":"medium"});
    if(!t.r2Sent)addCalEv(sch.r2Date,{code:code,label:"تذكير ٢",urgency:daysDiff(sch.r2Date)<0?"critical":daysDiff(sch.r2Date)<=3?"high":"medium"});
    if(!t.r3Sent)addCalEv(sch.r3Date,{code:code,label:"تذكير ٣",urgency:daysDiff(sch.r3Date)<0?"critical":daysDiff(sch.r3Date)<=3?"high":"medium"});
    addCalEv(sch.deadline,{code:code,label:"نهاية المهلة",urgency:"critical"});
  });

  // Log action handler
  const doLog=function(){
    if(!logModal)return;
    var id=logModal.engId;var stage=logModal.nextStage;
    if(stage==="reset"){setT(id,{stage:"not_sent",sentAt:"",r1Sent:false,r2Sent:false,r3Sent:false,escalated:false,notes:"",closedAt:"",responseDate:""});setLogModal(null);setLogDate("");setLogNote("");return;}
    if(!logDate){alert("يرجى تحديد تاريخ الإجراء");return;}
    var d=new Date(logDate);if(isNaN(d.getTime())){alert("تاريخ غير صحيح");return;}
    if(stage==="sent")          setT(id,{stage:"sent",sentAt:logDate,r1Sent:false,r2Sent:false,r3Sent:false,escalated:false,notes:logNote,closedAt:"",responseDate:""});
    else if(stage==="r1")       setT(id,{stage:"reminder1",r1Sent:true,r1Date:logDate});
    else if(stage==="r2")       setT(id,{stage:"reminder2",r2Sent:true,r2Date:logDate});
    else if(stage==="r3")       setT(id,{stage:"reminder3",r3Sent:true,r3Date:logDate});
    else if(stage==="escalation")setT(id,{stage:"escalation",escalatedAt:logDate});
    else if(stage==="response") setT(id,{stage:"closed",closedAt:logDate,responseDate:logDate,notes:logNote||getT(id).notes});
    else if(stage==="closed")   setT(id,{stage:"closed",closedAt:logDate});
    setLogModal(null);setLogDate("");setLogNote("");
  };

  // Calendar
  const MONTH_NAMES=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const DAY_NAMES=["أحد","اثن","ثلا","أرب","خمي","جمع","سبت"];
  var firstDay=new Date(calYear,calMonth,1).getDay(); // 0=Sun
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var todayStr=new Date().toISOString().slice(0,10);

  // Selected day events
  var selDayEvents=calSelDay?(calEvents[calSelDay]||[]):[];
  var selDayEngGroups=selDayEvents.map(function(ev){return engGroups.find(function(eg){return getEngCode(eg.id)===ev.code;})||null;}).filter(Boolean);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* Log Modal */}
      <Modal open={!!logModal} onClose={function(){setLogModal(null);setLogDate("");setLogNote("");}} title={logModal?logModal.actionLabel:""}>
        {logModal&&(
          <div>
            <div style={{background:"#F0FDF4",borderRadius:10,padding:"12px 14px",marginBottom:14,border:"1px solid #BBF7D0"}}>
              <div style={{fontSize:11,color:"#166534"}}>المهمة</div>
              <div style={{fontSize:13,fontWeight:700,color:NAVY2,marginTop:2}}>{getEngCode(logModal.engId)} — {getEngTitle(logModal.engId)}</div>
              {logModal.suggestedDate&&<div style={{fontSize:11,color:"#64748B",marginTop:6}}>الموعد المقترح: <strong style={{color:GRN2}}>{fmtDate(logModal.suggestedDate)}</strong></div>}
            </div>
            <FR label="تاريخ تنفيذ الإجراء *">
              <input type="date" style={INP} value={logDate} onChange={function(ev){setLogDate(ev.target.value);}}/>
            </FR>
            {(logModal.nextStage==="sent"||logModal.nextStage==="response")&&(
              <FR label="ملاحظة (اختياري)">
                <textarea rows={2} style={{...INP,height:60,resize:"none",lineHeight:1.6}} value={logNote} onChange={function(ev){setLogNote(ev.target.value);}} placeholder={logModal.nextStage==="response"?"ملخص الرد الوارد...":"ملاحظات حول الإرسال..."}/>
              </FR>
            )}
            {logModal.nextStage==="reset"&&(
              <div style={{background:"#FEF2F2",borderRadius:8,padding:"12px",border:"1px solid #FECACA",fontSize:12,color:"#991B1B",marginBottom:8}}>
                سيتم حذف جميع بيانات المتابعة لهذه المهمة وإعادتها للحالة الابتدائية. هل أنت متأكد؟
              </div>
            )}
            <div style={{background:"#FFFBEB",borderRadius:8,padding:"10px 12px",marginBottom:14,border:"1px solid #FDE68A",fontSize:11,color:"#92400E",lineHeight:1.6}}>
              <i className="ti ti-info-circle" style={{marginLeft:5,fontSize:12}}/>
              بعد التسجيل سيحسب البرنامج تلقائياً مواعيد التذكيرات الثلاثة ومهلة الـ ٢٥ يوم.
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="secondary" onClick={function(){setLogModal(null);setLogDate("");setLogNote("");}}>إلغاء</Btn>
              {logModal.nextStage==="reset"
                ?<button onClick={doLog} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 18px",background:"#DC2626",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}><i className="ti ti-refresh"/> تأكيد الإعادة</button>
                :<Btn v="gold" onClick={doLog} disabled={!logDate}><i className="ti ti-check"/> تسجيل</Btn>
              }
            </div>
          </div>
        )}
      </Modal>

      {/* Header */}
      <div style={{background:NAVY2,borderRadius:12,padding:"12px 20px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:"white"}}>متابعة تطبيق التوصيات</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>
            سجّل الإجراءات يدوياً · البرنامج يحسب مواعيد التذكيرات ومهلة ٢٥ يوم عمل تلقائياً
          </div>
        </div>
        {/* Year selector */}
        <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.1)",borderRadius:9,padding:"4px 8px"}}>
          <button onClick={function(){setYearFilter(function(y){return y-1;});}} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:5,color:"white",width:24,height:24,cursor:"pointer",fontSize:14}}>›</button>
          <span style={{fontSize:13,fontWeight:700,color:GOLD2,minWidth:42,textAlign:"center"}}>{yearFilter}</span>
          <button onClick={function(){setYearFilter(function(y){return y+1;});}} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:5,color:"white",width:24,height:24,cursor:"pointer",fontSize:14}}>‹</button>
        </div>
        <div style={{display:"flex",gap:8}}>
          {[
            {l:"إجراء عاجل",v:engGroups.filter(function(e){return e.urgency==="critical"&&e.t.stage!=="closed";}).length,c:"#FCA5A5"},
            {l:"هذا الأسبوع",v:engGroups.filter(function(e){return e.urgency==="high"||e.urgency==="medium";}).length,c:"#FDE68A"},
            {l:"لم يُرسَل", v:engGroups.filter(function(e){return e.t.stage==="not_sent";}).length,c:"rgba(255,255,255,.5)"},
          ].map(function(k){return(
            <div key={k.l} style={{textAlign:"center",padding:"5px 12px",background:"rgba(255,255,255,.08)",borderRadius:8}}>
              <div style={{fontSize:16,fontWeight:700,color:k.c}}>{k.v}</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,.35)"}}>{k.l}</div>
            </div>
          );})}
        </div>
      </div>

      {/* Main grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 290px",gap:14,alignItems:"start"}}>

        {/* ══ Engagement cards ══ */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {engGroups.length===0&&(
            <div style={{background:"white",borderRadius:12,padding:"40px",textAlign:"center",color:"#94A3B8",border:"1px solid #E9EEF4"}}>
              <i className="ti ti-clipboard-x" style={{fontSize:36,display:"block",marginBottom:10}}/>
              <div style={{fontSize:13,fontWeight:600}}>لا توجد ملاحظات مرتبطة بمهام مراجعة</div>
            </div>
          )}
          {engGroups.map(function(eg){
            var t=eg.t;var next=eg.next;var sch=eg.sch;
            var sc=STAGE_CFG[t.stage]||STAGE_CFG.not_sent;
            var uc=URGENCY[eg.urgency]||URGENCY.normal;
            var dl=eg.dl;
            var isExpanded=selEng===eg.id;
            var closedCount=eg.findings.filter(function(f){return f.status==="مغلق";}).length;

            // Next action button config
            var btnConfig=null;
            if(t.stage==="not_sent")  btnConfig={label:"تسجيل إرسال التقرير",nextStage:"sent",actionLabel:"تسجيل إرسال التقرير النهائي",suggestedDate:null,ic:"ti-mail-forward",c:"#0891B2"};
            else if(!t.r1Sent)        btnConfig={label:"تسجيل التذكير الأول", nextStage:"r1",actionLabel:"تسجيل إرسال التذكير الأول",suggestedDate:sch?sch.r1Date:null,ic:"ti-bell",c:dl!==null&&dl<0?"#DC2626":NAVY2};
            else if(!t.r2Sent)        btnConfig={label:"تسجيل التذكير الثاني",nextStage:"r2",actionLabel:"تسجيل إرسال التذكير الثاني",suggestedDate:sch?sch.r2Date:null,ic:"ti-bell",c:dl!==null&&dl<0?"#DC2626":NAVY2};
            else if(!t.r3Sent)        btnConfig={label:"تسجيل التذكير الثالث",nextStage:"r3",actionLabel:"تسجيل إرسال التذكير الثالث",suggestedDate:sch?sch.r3Date:null,ic:"ti-bell-ringing",c:dl!==null&&dl<0?"#DC2626":NAVY2};
            else if(t.stage!=="escalation"&&t.stage!=="closed") btnConfig={label:"تسجيل التصعيد",nextStage:"escalation",actionLabel:"تسجيل مرحلة التصعيد",suggestedDate:sch?sch.deadline:null,ic:"ti-arrow-up",c:"#DC2626"};
            else if(t.stage==="escalation") btnConfig={label:"تسجيل الإغلاق",nextStage:"closed",actionLabel:"تسجيل إغلاق المتابعة",suggestedDate:null,ic:"ti-circle-check",c:"#16A34A"};

            return(
              <div key={eg.id} style={{background:"white",borderRadius:12,overflow:"hidden",
                border:"1.5px solid "+(t.stage==="not_sent"?"#E9EEF4":t.stage==="closed"?"#BBF7D0":uc.border),
                boxShadow:"0 1px 8px rgba(0,0,0,.07)"}}>

                {/* Engagement header */}
                <div style={{background:GRN2,padding:"11px 18px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"rgba(255,255,255,.4)",fontFamily:"monospace"}}>{getEngCode(eg.id)}</span>
                      <span style={{fontSize:13,fontWeight:700,color:"white"}}>{getEngTitle(eg.id)}</span>
                    </div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,.45)",marginTop:2}}>
                      {eg.findings.length} ملاحظة · {eg.findings.filter(function(f){return f.status!=="مغلق";}).length} مفتوحة
                    </div>
                  </div>
                  <div style={{width:90,flexShrink:0}}>
                    <div style={{height:4,background:"rgba(255,255,255,.2)",borderRadius:4,overflow:"hidden",marginBottom:3}}>
                      <div style={{height:"100%",background:"#6EE7B7",borderRadius:4,width:(closedCount/Math.max(eg.findings.length,1)*100)+"%"}}/>
                    </div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,.5)",textAlign:"center"}}>{closedCount}/{eg.findings.length} مغلقة</div>
                  </div>
                </div>

                {/* Status & schedule */}
                <div style={{padding:"14px 18px",display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap"}}>

                  {/* Stage badge */}
                  <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:200}}>
                    <div style={{width:40,height:40,borderRadius:10,background:sc.bg,border:"1px solid "+(sc.border||"#E2E8F0"),
                      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <i className={"ti "+sc.icon} style={{fontSize:19,color:sc.c}}/>
                    </div>
                    <div>
                      <span style={{background:sc.bg,color:sc.c,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,border:"1px solid "+(sc.border||"#E2E8F0")}}>{sc.l}</span>
                      {t.sentAt&&<div style={{fontSize:10,color:"#94A3B8",marginTop:4}}>تاريخ الإرسال: <strong>{fmtDate(t.sentAt)}</strong></div>}
                    </div>
                  </div>

                  {/* Schedule timeline — only if sent */}
                  {sch&&t.stage!=="not_sent"&&(
                    <div style={{flex:2,minWidth:280}}>
                      <div style={{fontSize:10,fontWeight:600,color:"#64748B",marginBottom:8}}>جدول المتابعة — مهلة ٢٥ يوم عمل</div>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}>
                        {[
                          {label:"ت١",date:sch.r1Date,done:t.r1Sent,urgent:!t.r1Sent&&daysDiff(sch.r1Date)!==null&&daysDiff(sch.r1Date)<=3},
                          {label:"ت٢",date:sch.r2Date,done:t.r2Sent,urgent:!t.r2Sent&&t.r1Sent&&daysDiff(sch.r2Date)!==null&&daysDiff(sch.r2Date)<=3},
                          {label:"ت٣",date:sch.r3Date,done:t.r3Sent,urgent:!t.r3Sent&&t.r2Sent&&daysDiff(sch.r3Date)!==null&&daysDiff(sch.r3Date)<=3},
                          {label:"مهلة",date:sch.deadline,done:t.stage==="escalation"||t.stage==="closed",isDeadline:true},
                        ].map(function(step,i){
                          var dl2=daysDiff(step.date);
                          var color=step.done?"#16A34A":step.isDeadline?"#DC2626":step.urgent?"#EA580C":"#94A3B8";
                          return(
                            <React.Fragment key={i}>
                              <div style={{textAlign:"center",minWidth:0}}>
                                <div style={{width:28,height:28,borderRadius:"50%",margin:"0 auto 4px",
                                  background:step.done?"#16A34A":step.urgent||step.isDeadline?"#FEE2E2":"#F1F5F9",
                                  border:"2px solid "+(step.done?"#16A34A":step.urgent||step.isDeadline?"#EF4444":"#E2E8F0"),
                                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  {step.done?<i className="ti ti-check" style={{fontSize:12,color:"white"}}/>
                                  :<span style={{fontSize:9,fontWeight:700,color}}>{step.label}</span>}
                                </div>
                                <div style={{fontSize:9,color:color,fontFamily:"monospace",whiteSpace:"nowrap"}}>{step.date?step.date.slice(5):""}</div>
                                {!step.done&&dl2!==null&&<div style={{fontSize:9,fontWeight:700,color:dl2<0?"#DC2626":dl2===0?"#EA580C":color}}>{dl2<0?Math.abs(dl2)+"−":dl2===0?"اليوم":dl2+"+"}</div>}
                              </div>
                              {i<3&&<div style={{flex:1,height:2,background:step.done?"#16A34A":"#E2E8F0",marginBottom:18}}/>}
                            </React.Fragment>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Next action highlight */}
                  {next&&next.date&&t.stage!=="closed"&&(
                    <div style={{textAlign:"center",padding:"10px 14px",borderRadius:10,background:uc.bg,border:"1.5px solid "+uc.border,flexShrink:0}}>
                      <div style={{fontSize:9,color:uc.text,fontWeight:600,marginBottom:2}}>الإجراء التالي</div>
                      <div style={{fontSize:15,fontWeight:700,color:uc.dot,lineHeight:1}}>
                        {dl!==null?(dl<0?Math.abs(dl)+" متأخر":dl===0?"اليوم !!":dl+" يوم"):"—"}
                      </div>
                      <div style={{fontSize:9,color:"#94A3B8",marginTop:3,fontFamily:"monospace"}}>{next.date}</div>
                      <div style={{fontSize:9,fontWeight:600,color:uc.text,marginTop:3}}>{next.action}</div>
                    </div>
                  )}
                  {t.stage==="closed"&&<div style={{padding:"10px 14px",background:"#F0FDF4",borderRadius:10,border:"1px solid #BBF7D0",minWidth:100}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#16A34A",display:"flex",alignItems:"center",gap:5}}><i className="ti ti-circle-check" style={{fontSize:14}}/> مغلقة</div>
                    {t.responseDate&&<div style={{fontSize:10,color:"#16A34A",marginTop:3}}>رد وارد: {fmtDate(t.responseDate)}</div>}
                    {t.closedAt&&!t.responseDate&&<div style={{fontSize:10,color:"#94A3B8",marginTop:3}}>تاريخ الإغلاق: {fmtDate(t.closedAt)}</div>}
                  </div>}
                </div>

                {/* Action row */}
                <div style={{padding:"0 18px 14px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {/* زر الإجراء التالي */}
                  {btnConfig&&t.stage!=="closed"&&(
                    <button onClick={function(){setLogModal({engId:eg.id,nextStage:btnConfig.nextStage,actionLabel:btnConfig.actionLabel,suggestedDate:btnConfig.suggestedDate});setLogDate(btnConfig.suggestedDate||new Date().toISOString().slice(0,10));setLogNote("");}}
                      style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px",background:btnConfig.c||NAVY2,color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>
                      <i className={"ti "+btnConfig.ic} style={{fontSize:13}}/>{btnConfig.label}
                    </button>
                  )}
                  {/* زر استلمت رداً — يظهر بعد الإرسال وقبل الإغلاق */}
                  {t.stage!=="not_sent"&&t.stage!=="closed"&&(
                    <button onClick={function(){setLogModal({engId:eg.id,nextStage:"response",actionLabel:"تسجيل استلام رد من الإدارة",suggestedDate:null});setLogDate(new Date().toISOString().slice(0,10));setLogNote("");}}
                      style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",background:"#16A34A",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>
                      <i className="ti ti-mail-check" style={{fontSize:13}}/> استلمت رداً
                    </button>
                  )}
                  {/* زر تعديل — يظهر دائماً */}
                  {t.stage!=="not_sent"&&(
                    <button onClick={function(){setLogModal({engId:eg.id,nextStage:"reset",actionLabel:"إعادة تعيين المتابعة",suggestedDate:null});setLogDate("");setLogNote("");}}
                      style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:"white",border:"1px solid #FECACA",borderRadius:8,fontSize:11,color:"#DC2626",cursor:"pointer",fontFamily:"inherit"}}>
                      <i className="ti ti-refresh" style={{fontSize:12}}/> إعادة تعيين
                    </button>
                  )}
                  <button onClick={function(){setSelEng(isExpanded?null:eg.id);}}
                    style={{display:"flex",alignItems:"center",gap:4,padding:"6px 12px",background:"white",border:"1px solid #E2E8F0",borderRadius:8,fontSize:11,color:"#475569",cursor:"pointer",fontFamily:"inherit"}}>
                    <i className={"ti "+(isExpanded?"ti-chevron-up":"ti-list")} style={{fontSize:12}}/>
                    {isExpanded?"إخفاء":"عرض الملاحظات"}
                  </button>
                  {t.notes&&<span style={{fontSize:11,color:"#94A3B8",flex:1}}>📝 {t.notes}</span>}
                </div>

                {/* Expanded findings table */}
                {isExpanded&&(
                  <div style={{borderTop:"1px solid #E9EEF4",overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead>
                        <tr style={{background:"#F0F4F8"}}>
                          {["#","الملاحظة","الخطر","الحالة","موعد التطبيق"].map(function(h){return(
                            <th key={h} style={{padding:"8px 12px",fontSize:10,fontWeight:700,color:"#64748B",textAlign:"right",borderBottom:"1px solid #E2E8F0"}}>{h}</th>
                          );})}
                        </tr>
                      </thead>
                      <tbody>
                        {eg.findings.map(function(f){
                          var rc={"حرج":{bg:"#FEE2E2",text:"#991B1B"},"مرتفع":{bg:"#FEE2E2",text:"#991B1B"},"متوسط":{bg:"#FEF9C3",text:"#854D0E"},"منخفض":{bg:"#DCFCE7",text:"#166534"}}[f.risk]||{bg:"#F1F5F9",text:"#475569"};
                          var sc2={"مفتوح":{bg:"#FEE2E2",text:"#991B1B"},"قيد المعالجة":{bg:"#FEF9C3",text:"#854D0E"},"مغلق":{bg:"#DCFCE7",text:"#166534"}}[f.status]||{bg:"#F1F5F9",text:"#475569"};
                          return(
                            <tr key={f.id} style={{borderBottom:"1px solid #F5F7FA",background:f.status==="مغلق"?"#F9FAFB":"white"}}>
                              <td style={{padding:"9px 12px"}}><span style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:NAVY2}}>{f.displayRef||f.id}</span></td>
                              <td style={{padding:"9px 12px"}}><span style={{fontSize:12,color:f.status==="مغلق"?"#94A3B8":"#1E293B"}}>{f.title}</span></td>
                              <td style={{padding:"9px 12px"}}><span style={{background:rc.bg,color:rc.text,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20}}>{f.risk}</span></td>
                              <td style={{padding:"9px 12px"}}><span style={{background:sc2.bg,color:sc2.text,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20}}>{f.status}</span></td>
                              <td style={{padding:"9px 12px"}}><span style={{fontSize:11,color:"#64748B",fontFamily:"monospace"}}>{f.due||"—"}</span></td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* ══ Calendar ══ */}
        <div style={{background:"white",borderRadius:12,overflow:"hidden",border:"1px solid #E9EEF4",boxShadow:"0 1px 6px rgba(0,0,0,.06)",position:"sticky",top:0}}>
          {/* Year + month nav */}
          <div style={{background:GRN2,padding:"10px 14px",display:"flex",alignItems:"center",gap:6}}>
            <button onClick={function(){var m=calMonth-1;if(m<0){setCalMonth(11);setCalYear(function(y){return y-1;});}else setCalMonth(m);}}
              style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:6,color:"white",width:26,height:26,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,color:"white"}}>{MONTH_NAMES[calMonth]}</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:2}}>
                <button onClick={function(){setCalYear(function(y){return y-1;});}} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:11,padding:"0 3px"}}>‹</button>
                <span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>{calYear}</span>
                <button onClick={function(){setCalYear(function(y){return y+1;});}} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:11,padding:"0 3px"}}>›</button>
              </div>
            </div>
            <button onClick={function(){var m=calMonth+1;if(m>11){setCalMonth(0);setCalYear(function(y){return y+1;});}else setCalMonth(m);}}
              style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:6,color:"white",width:26,height:26,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>›</button>
          </div>
          {/* Month quick select */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:2,padding:"6px",background:"#F8FAFC",borderBottom:"1px solid #E9EEF4"}}>
            {MONTH_NAMES.map(function(mn,mi){return(
              <button key={mi} onClick={function(){setCalMonth(mi);}}
                style={{padding:"3px 0",borderRadius:5,border:"none",cursor:"pointer",fontSize:9,fontWeight:mi===calMonth?700:400,
                  background:mi===calMonth?NAVY2:"white",color:mi===calMonth?"white":"#64748B",fontFamily:"inherit"}}>
                {mn.slice(0,3)}
              </button>
            );})}
          </div>
          {/* Day headers */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#F8FAFC",borderBottom:"1px solid #E9EEF4"}}>
            {DAY_NAMES.map(function(d,i){return(
              <div key={i} style={{textAlign:"center",padding:"5px 1px",fontSize:8,fontWeight:600,color:i===5?"#DC2626":"#94A3B8"}}>{d}</div>
            );})}

              var evs=calEvents[dateKey]||[];

              var topU=evs.length?evs.reduce(function(a,b){var p={"critical":0,"high":1,"medium":2,"normal":3};return(p[a.urgency]||3)<=(p[b.urgency]||3)?a:b;},{urgency:"normal"}).urgency:null;
              var uc2=topU?URGENCY[topU]:null;

                  <div style={{fontSize:10,fontWeight:isToday||isSel?700:400,color:isToday?GRN2:isSel?NAVY2:"#374151",textAlign:"center"}}>{d}</div>
                  {evs.slice(0,2).map(function(ev,j){

                  {(function(){var p=calSelDay.split("-");var days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];var months=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];var d=new Date(calSelDay);return days[d.getDay()]+" "+p[2]+" "+months[parseInt(p[1])-1]+" "+p[0];})()}
                </div>
                {(calEvents[calSelDay]||[]).length===0?(
                  <div style={{textAlign:"center",color:"#CBD5E1",padding:"10px 0",fontSize:11}}>لا توجد إجراءات هذا اليوم</div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {(calEvents[calSelDay]||[]).map(function(ev,j){
                      var uc3=URGENCY[ev.urgency]||URGENCY.normal;
                      return(
                        <div key={j} style={{background:uc3.bg,borderRadius:8,padding:"7px 10px",borderRight:"3px solid "+uc3.dot}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:10,fontWeight:700,color:uc3.text}}>{ev.label}</span>
                            <span style={{fontSize:10,color:"#94A3B8"}}>·</span>
                            <span style={{fontSize:10,fontFamily:"monospace",color:NAVY2,fontWeight:600}}>{ev.code}</span>
                          </div>
                          <div style={{fontSize:11,color:uc3.text,marginTop:2,fontWeight:600}}>{(function(){var eg2=engGroups.find(function(eg){return getEngCode(eg.id)===ev.code;});return eg2?getEngTitle(eg2.id):"—";})()}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ):(
              <div style={{padding:"16px 12px",textAlign:"center",color:"#CBD5E1"}}>
                <i className="ti ti-hand-click" style={{fontSize:22,display:"block",marginBottom:4}}/>
                <div style={{fontSize:10}}>اضغط على يوم لعرض تفاصيله</div>
              </div>
            )}
          </div>

          {/* Legend */}
          <div style={{padding:"7px 12px",background:"#F8FAFC",borderTop:"1px solid #E9EEF4",display:"flex",gap:10,flexWrap:"wrap"}}>
            {[{l:"عاجل",c:"#DC2626"},{l:"مهم",c:"#EA580C"},{l:"قريب",c:"#D97706"},{l:"قادم",c:"#94A3B8"}].map(function(k){return(
              <div key={k.l} style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:"#64748B"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:k.c}}/>
                {k.l}
