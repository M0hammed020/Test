/* ═══════════════════════════════════════════════
   SELF-CONTAINED DOCX GENERATOR  (no CDN needed)
═══════════════════════════════════════════════ */
(function(){

// ── CRC32 table ──
const CRC_T=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i>>>0;for(let j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF>>>0;for(let i=0;i<b.length;i++)c=((CRC_T[(c^b[i])&0xFF])^(c>>>8))>>>0;return(c^0xFFFFFFFF)>>>0;}

// ── helpers ──
function u16(n){return[n&0xFF,(n>>8)&0xFF];}
function u32(n){n=n>>>0;return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
const ENC=new TextEncoder();
function eb(s){return ENC.encode(s);}
function escX(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Uncompressed (STORED) ZIP ──
function makeZip(files){
  // files: [{name:string, data:Uint8Array}]
  const lparts=[];
  const cdir=[];
  let off=0;

  for(const f of files){
    const nb=eb(f.name);
    const cr=crc32(f.data);
    const sz=f.data.length;
    const lh=new Uint8Array([
      0x50,0x4B,0x03,0x04,
      ...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(cr),...u32(sz),...u32(sz),
      ...u16(nb.length),...u16(0)
    ]);
    cdir.push({nb,cr,sz,off});
    off+=lh.length+nb.length+sz;
    lparts.push(lh,nb,f.data);
  }

  const cdStart=off;
  const cparts=[];
  for(const {nb,cr,sz,off:lo} of cdir){
    const cd=new Uint8Array([
      0x50,0x4B,0x01,0x02,
      ...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(cr),...u32(sz),...u32(sz),
      ...u16(nb.length),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(0),...u32(lo)
    ]);
    cparts.push(cd,nb);
  }
  const cdSz=cparts.reduce((s,p)=>s+p.length,0);

  const eocd=new Uint8Array([
    0x50,0x4B,0x05,0x06,
    ...u16(0),...u16(0),
    ...u16(files.length),...u16(files.length),
    ...u32(cdSz),...u32(cdStart),...u16(0)
  ]);

  const all=[...lparts,...cparts,eocd];
  const total=all.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total);
  let pos=0;
  for(const p of all){out.set(p,pos);pos+=p.length;}
  return out;
}

// ── OOXML helpers ──
const RCLR={حرج:"C62828",مرتفع:"B71C1C",متوسط:"E65100",منخفض:"1B5E20"};
const RBGC={حرج:"FFCDD2",مرتفع:"FFEBEE",متوسط:"FFF3E0",منخفض:"E8F5E9"};
const GREEN="2D6A4F";

function xmlPara(text,{bold,italic,color="000000",size=22,center}={}){
  return text.split('\n').map(line=>`<w:p>
    <w:pPr><w:bidi/><w:jc w:val="${center?'center':'right'}"/><w:spacing w:after="60"/><w:rPr><w:rtl/></w:rPr></w:pPr>
    <w:r><w:rPr>${bold?'<w:b/><w:bCs/>':''}${italic?'<w:i/>':''}
      <w:color w:val="${color}"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/><w:rtl/>
      <w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>
    </w:rPr><w:t xml:space="preserve">${escX(line)||' '}</w:t></w:r>
  </w:p>`).join('');
}

function xmlCell(content,w,{bg,span,vCenter}={}){
  const sp=span?`<w:gridSpan w:val="${span}"/>`:'';
  const sh=bg?`<w:shd w:val="clear" w:color="auto" w:fill="${bg}"/>`:'';
  const va=vCenter?`<w:vAlign w:val="center"/>`:'';
  return `<w:tc>
    <w:tcPr>
      <w:tcW w:w="${w}" w:type="dxa"/>
      ${sp}${sh}${va}
      <w:tcMar>
        <w:top w:w="100" w:type="dxa"/><w:left w:w="130" w:type="dxa"/>
        <w:bottom w:w="100" w:type="dxa"/><w:right w:w="130" w:type="dxa"/>
      </w:tcMar>
    </w:tcPr>
    ${content}
  </w:tc>`;
}

function labelCell(text,LW){
  return xmlCell(xmlPara(text,{bold:true,color:"FFFFFF",size:22,center:true}),LW,{bg:GREEN,vCenter:true});
}

function buildDocXml(report,findings){
  const TW=9026,LW=1700,CW=TW-LW;

  function findingTable(f,idx){
    const rc=RCLR[f.risk]||"C62828", rb=RBGC[f.risk]||"FFEBEE";
    const rows=[];

    // Title row
    rows.push(`<w:tr>
      ${xmlCell(xmlPara(`${idx}    ${f.title}`,{bold:true,color:"FFFFFF",size:26}),TW,{bg:GREEN,span:2})}
    </w:tr>`);

    // Risk row
    rows.push(`<w:tr>
      ${labelCell("مستوى المخاطر",LW)}
      ${xmlCell(xmlPara(f.risk,{bold:true,color:rc,size:24}),CW,{bg:rb,vCenter:true})}
    </w:tr>`);

    // Content rows
    const sections=[
      {label:"المقدمة",text:f.intro},
      {label:"الملاحظة",text:f.observation},
      {label:"المخاطر/ الآثار المترتبة",text:f.risks},
      {label:"التوصيات",text:f.rec},
    ];
    for(const {label,text} of sections){
      if(!text)continue;
      rows.push(`<w:tr>
        ${labelCell(label,LW)}
        ${xmlCell(xmlPara(text,{size:22}),CW)}
      </w:tr>`);
    }

    return `<w:tbl>
      <w:tblPr>
        <w:tblW w:w="${TW}" w:type="dxa"/>
        <w:bidiVisual/>
        <w:tblBorders>
          <w:top w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:left w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:bottom w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:right w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:insideH w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
          <w:insideV w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
        </w:tblBorders>
      </w:tblPr>
      <w:tblGrid>
        <w:gridCol w:w="${LW}"/>
        <w:gridCol w:w="${CW}"/>
      </w:tblGrid>
      ${rows.join('')}
    </w:tbl>
    <w:p><w:pPr><w:bidi/><w:spacing w:after="300"/></w:pPr></w:p>`;
  }

  const title=`
    <w:p><w:pPr><w:bidi/><w:jc w:val="center"/><w:spacing w:before="0" w:after="160"/><w:rPr><w:rtl/></w:rPr></w:pPr>
      <w:r><w:rPr><w:b/><w:bCs/><w:color w:val="${GREEN}"/><w:sz w:val="44"/><w:szCs w:val="44"/><w:rtl/><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/></w:rPr>
        <w:t>${escX(report.title)}</w:t></w:r></w:p>
    <w:p><w:pPr><w:bidi/><w:jc w:val="center"/><w:spacing w:after="400"/><w:rPr><w:rtl/></w:rPr></w:pPr>
      <w:r><w:rPr><w:color w:val="666666"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/></w:rPr>
        <w:t>تاريخ التقرير: ${escX(report.date)}    |    عدد الملاحظات: ${findings.length}</w:t></w:r></w:p>`;

  const tables=findings.length
    ? findings.map((f,i)=>findingTable(f,i+1)).join('')
    : `<w:p><w:pPr><w:bidi/><w:jc w:val="right"/><w:rPr><w:rtl/></w:rPr></w:pPr>
        <w:r><w:rPr><w:color w:val="999999"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/></w:rPr>
        <w:t>لا توجد ملاحظات مرتبطة بهذا التقرير.</w:t></w:r></w:p>`;

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  mc:Ignorable="wp">
  <w:body>
    ${title}${tables}
    <w:sectPr>
      <w:bidi/>
      <w:pgSz w:w="11906" w:h="16838"/>
      <w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/>
    </w:sectPr>
  </w:body>
</w:document>`;
}

// ── Main export ──
window.downloadDocx=function(report,findings){
  const CONTENT_TYPES=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

  const RELS=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1"
    Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument"
    Target="word/document.xml"/>
</Relationships>`;

  const DOC_RELS=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"/>`;

  const SETTINGS=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:bidi/>
  <w:defaultTabStop w:val="720"/>
</w:settings>`;

  try{
    const docXml=buildDocXml(report,findings);
    const zip=makeZip([
      {name:'[Content_Types].xml', data:eb(CONTENT_TYPES)},
      {name:'_rels/.rels',         data:eb(RELS)},
      {name:'word/_rels/document.xml.rels', data:eb(DOC_RELS)},
      {name:'word/settings.xml',   data:eb(SETTINGS)},
      {name:'word/document.xml',   data:eb(docXml)},
    ]);
    const blob=new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=(report.title||'تقرير المراجعة')+'.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    return true;
  }catch(e){
    alert('خطأ في التوليد: '+e.message);
    return false;
  }
};

})();
</script>

  window.fetch = function(url, opts){
    opts = opts||{};
    var u = (typeof url==="string") ? url : (url && url.url) || "";
    var method = (opts.method||"GET").toUpperCase();
    var body = {};
    try { if(opts.body) body = JSON.parse(opts.body); } catch(e){}

    // ليست نقطة API؟ مرّرها (نادر في نسخة العرض)
    if(u.indexOf("/api/")<0){
      return realFetch ? realFetch(url,opts) : jsonResp({},404);
    }

    }
    // ── الدخول (بلا كلمة مرور) ──
    if(u.indexOf("/api/login")>=0){
      return jsonResp({ token:"demo-token", user:DEMO_MANAGER });
    }
    if(u.indexOf("/api/logout")>=0){ return jsonResp({ ok:true }); }
    if(u.indexOf("/api/me")>=0){ return jsonResp({ user:DEMO_MANAGER }); }
    if(u.indexOf("/api/change-password")>=0){ return jsonResp({ ok:true }); }

    // ── الحالة الكاملة ──
    if(u.indexOf("/api/state")>=0 && method==="GET"){
      return jsonResp(Object.assign({}, STORE));
    }
    if(u.indexOf("/api/state")>=0 && method==="POST"){
      // احفظ ما يرسله العميل في الذاكرة (تفاعلي) — البنية مسطّحة
      ["engagements","programs","auditPlans","messages","trail","notifications","workpapers"].forEach(function(k){
        if(k in body) STORE[k]=body[k];
      });
      // الملاحظات تُدار عبر نقاطها المستقلة، لا نكتبها من هنا
      STORE.__version=(STORE.__version||1)+1;
      return jsonResp({ ok:true, version:STORE.__version });
    }

    // ── توليد مرجع جديد (اختبار/ورقة) ──
    if(u.indexOf("/api/next-ref")>=0){
      var key="counter:"+body.engRef+":"+body.type;

      var ref=body.type+"-"+padRef(COUNTERS[key]);
      return jsonResp({ ok:true, ref:ref, localRef:ref, num:COUNTERS[key] });
    }

    // ── رفع ملف (وهمي) ──
    if(u.indexOf("/api/upload")>=0){
      return jsonResp({ ok:true, fileId:"demo-"+Date.now(), size:1024 });
    }
    if(u.indexOf("/api/file/")>=0){

      var f = body.finding||{};
      var engRef = f.audit||f.engagementRef||"";
      COUNTERS["counter:"+engRef+":F"]=(COUNTERS["counter:"+engRef+":F"]||0)+1;
      var fnum=COUNTERS["counter:"+engRef+":F"];

      var newId=(engRef?engRef+"__":"")+ref;
      var saved=Object.assign({}, f, { id:newId, ref:ref, engagementRef:engRef, displayRef:(engRef?engRef+" / ":"")+ref, _rev:0 });
      STORE.findings=STORE.findings.concat([saved]);
      STORE.__version++;
      return jsonResp({ ok:true, finding:saved, findings:STORE.findings, version:STORE.__version });
    }
    // ── الملاحظات: تعديل ──
    if(u.indexOf("/api/findings/")>=0 && (method==="PUT")){
      var fid=decodeURIComponent(u.split("/api/findings/")[1].split("?")[0]);
      STORE.findings=STORE.findings.map(function(x){
        if(x.id!==fid)return x;
        var upd=Object.assign({}, x, body.updates||body.finding||body||{});
        upd._rev=(x._rev||0)+1; upd.id=x.id; upd.ref=x.ref; return upd;
      });
      STORE.__version++;
      return jsonResp({ ok:true, findings:STORE.findings, version:STORE.__version });
    }
    // ── الملاحظات: حذف ──
    if(u.indexOf("/api/findings/")>=0 && method==="DELETE"){
      var did=decodeURIComponent(u.split("/api/findings/")[1].split("?")[0]);
      STORE.findings=STORE.findings.filter(function(x){return x.id!==did;});
      STORE.__version++;
      return jsonResp({ ok:true, findings:STORE.findings, version:STORE.__version });
    }

    // افتراضي
    return jsonResp({ ok:true });
  };

  // علامة لنسخة العرض (يقرؤها الكود إن لزم)
  window.__AUDITHUB_DEMO__ = true;

/* ══════════════════════════════════════════
   SVG CHARTS (no external libs)
══════════════════════════════════════════ */
function BarChart({data}){
  const W=480,H=150,PL=28,PB=22;
  const max=Math.max(...data.map(d=>Math.max(d.p,d.c)))||1;
  const colW=(W-PL)/data.length;
  const bw=13,gap=3;
  const y=v=>H-(v/max)*H;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H+PB+10}`} preserveAspectRatio="xMidYMid meet">
      {[0,2,4,6].map(v=>(
        <line key={v} x1={PL} y1={y(v)} x2={W} y2={y(v)} stroke="#E5E7EB" strokeWidth={0.6}/>
      ))}
      {data.map((d,i)=>{
        const cx=PL+i*colW+colW/2;
        const ph=Math.max((d.p/max)*H,1), ch=Math.max((d.c/max)*H,1);
        return(
          <g key={i}>
            <rect x={cx-bw-gap/2} y={H-ph} width={bw} height={ph} fill="#BFDBFE" rx={3}/>
            <rect x={cx+gap/2} y={H-ch} width={bw} height={ch} fill={NAVY} rx={3}/>

function DonutChart({data,size=150}){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  const cx=size/2, cy=size/2, R=size/2-10, r=R*0.52;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sa=angle, sw=(d.v/total)*2*Math.PI;
    angle+=sw;
    const ea=angle;
    const cos1=Math.cos(sa),sin1=Math.sin(sa),cos2=Math.cos(ea),sin2=Math.sin(ea);
    const lg=sw>Math.PI?1:0;
    const path=`M${cx+R*cos1} ${cy+R*sin1} A${R} ${R} 0 ${lg} 1 ${cx+R*cos2} ${cy+R*sin2} L${cx+r*cos2} ${cy+r*sin2} A${r} ${r} 0 ${lg} 0 ${cx+r*cos1} ${cy+r*sin1}Z`;
    return{...d,path};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.f} stroke="white" strokeWidth={2}/>)}
    </svg>
  );
}

function PieChart({data,size=130}){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  const cx=size/2,cy=size/2,R=size/2-6;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sa=angle,sw=(d.v/total)*2*Math.PI;
    angle+=sw;
    const ea=angle;
    const lg=sw>Math.PI?1:0;
    const path=`M${cx} ${cy} L${cx+R*Math.cos(sa)} ${cy+R*Math.sin(sa)} A${R} ${R} 0 ${lg} 1 ${cx+R*Math.cos(ea)} ${cy+R*Math.sin(ea)}Z`;
    return{...d,path};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.f} stroke="white" strokeWidth={2}/>)}
    </svg>
  );
}

function Legend({data}){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {data.map((d,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12}}>

          <span style={{color:"#9CA3AF",minWidth:30}}>{Math.round(d.v/total*100)}%</span>
        </div>
      ))}
    </div>
  );
}

function Dashboard(){
  const auth=useContext(AuthCtx);
  const {findings:allFindings}=useContext(FindingsCtx);
  const {engagements,programs:dashPrograms,auditPlans:dashPlans}=useContext(EngCtx);
  const isMgr=auth&&auth.isManager;
  const [yearFilter,setYearFilter]=useState(2026);

  // فلترة حسب السنة
  function inYear(e){
    if(!e.start&&!e.end)return true;
    var s=e.start?new Date(e.start.split("-")[0],+e.start.split("-")[1]-1,+e.start.split("-")[2]):null;
    var en=e.end?new Date(e.end.split("-")[0],+e.end.split("-")[1]-1,+e.end.split("-")[2]):null;
    var ys=new Date(yearFilter,0,1);var ye=new Date(yearFilter,11,31);
    if(s&&en)return s<=ye&&en>=ys;
    if(s)return s.getFullYear()===yearFilter;
    if(en)return en.getFullYear()===yearFilter;
    return true;
  }

  const myFindings=(isMgr?allFindings:allFindings.filter(function(f){
    return !f.audit||(auth&&auth.canAccessEng&&auth.canAccessEng(f.audit));
  })).filter(function(f){
    var eng=engagements.find(function(e){return e.id===f.audit;});
    return eng?inYear(eng):true;
  });
  const myEngs=(isMgr?engagements:engagements.filter(function(e){
    return auth&&auth.canAccessEng&&auth.canAccessEng(e.id);
  })).filter(inYear);

  // ── حالة المهمة المحسوبة ──
  function engStatus(e){
    if(e.finalApprovalStatus==="final_approved")return "مكتمل";
    var today=new Date();today.setHours(0,0,0,0);
    var s=e.start?new Date(e.start):null;var en=e.end?new Date(e.end):null;
    if(en)en.setHours(0,0,0,0);if(s)s.setHours(0,0,0,0);
    if(en&&today>en)return "متأخر";
    if(s&&today>=s)return "قيد التنفيذ";
    return "مخطط";
  }

  // ── نسبة إنجاز المهمة المحسوبة ──
  function engProgress(e){
    var prog=(dashPrograms&&dashPrograms[e.id])||[];
    var finds=myFindings.filter(function(f){return f.audit===e.id;});
    var planObj=(dashPlans&&dashPlans[e.id])||null;
    var planOk=planObj&&planObj.planStatus==="approved";
    var noFinds=finds.length===0;
    var pWeight=noFinds?80:40;
    var score=0;
    if(planOk)score+=10;
    if(prog.length>0){var ac=prog.filter(function(s){return s.approvalStatus==="approved";}).length;score+=Math.round((ac/prog.length)*pWeight);}
    if(!noFinds){var af=finds.filter(function(f){return f.approvalStatus==="approved";}).length;score+=Math.round((af/finds.length)*40);}
    if(e.finalApprovalStatus==="final_approved")score+=10;
    return Math.min(score,100);
  }

  // ── حساب الحالات ──
  var statusCounts={"مخطط":0,"قيد التنفيذ":0,"متأخر":0,"مكتمل":0};
  myEngs.forEach(function(e){var st=engStatus(e);statusCounts[st]=(statusCounts[st]||0)+1;});

  var inProgressCount=statusCounts["قيد التنفيذ"];
  var completedCount=statusCounts["مكتمل"];
  var lateCount=statusCounts["متأخر"];

  // متوسط نسبة الإنجاز
  var avgProgress=myEngs.length?Math.round(myEngs.reduce(function(a,e){return a+engProgress(e);},0)/myEngs.length):0;

  // ── الملاحظات المعتمدة المفتوحة ──
  var approvedFindings=myFindings.filter(function(f){return f.approvalStatus==="approved";});
  var openFindings=approvedFindings.filter(function(f){return f.status!=="مغلق";});

  // ── توزيع الحالة (donut) ──
  var statusDist=[
    {n:"مخطط",v:statusCounts["مخطط"],f:"#3B82F6"},
    {n:"قيد التنفيذ",v:statusCounts["قيد التنفيذ"],f:"#F59E0B"},
    {n:"متأخر",v:statusCounts["متأخر"],f:"#EF4444"},
    {n:"مكتمل",v:statusCounts["مكتمل"],f:"#10B981"},
  ].filter(function(x){return x.v>0;});

  // ── توزيع المخاطر من الملاحظات المعتمدة ──
  var riskCounts={"حرج":0,"مرتفع":0,"متوسط":0,"منخفض":0};
  approvedFindings.forEach(function(f){if(riskCounts[f.risk]!==undefined)riskCounts[f.risk]++;});
  var riskDist=[
    {n:"حرج",v:riskCounts["حرج"],f:"#991B1B"},
    {n:"مرتفع",v:riskCounts["مرتفع"],f:"#EF4444"},
    {n:"متوسط",v:riskCounts["متوسط"],f:"#F59E0B"},
    {n:"منخفض",v:riskCounts["منخفض"],f:"#10B981"},
  ].filter(function(x){return x.v>0;});

  // ── مخطط الأقسام: مخطط مقابل منجز ──
  var deptStats={};
  myEngs.forEach(function(e){
    var d=e.dept||"غير مصنّف";
    if(!deptStats[d])deptStats[d]={planned:0,done:0};
    deptStats[d].planned++;
    if(e.finalApprovalStatus==="final_approved")deptStats[d].done++;
  });
  var deptBars=Object.keys(deptStats).map(function(d){return{label:d,planned:deptStats[d].planned,done:deptStats[d].done};});

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Year selector */}
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6,background:NAVY,borderRadius:9,padding:"5px 10px"}}>
          <button onClick={function(){setYearFilter(function(y){return y-1;});}} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:5,color:"white",width:26,height:26,cursor:"pointer",fontSize:15}}>›</button>
          <span style={{fontSize:14,fontWeight:700,color:GOLD,minWidth:48,textAlign:"center"}}>{yearFilter}</span>
          <button onClick={function(){setYearFilter(function(y){return y+1;});}} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:5,color:"white",width:26,height:26,cursor:"pointer",fontSize:15}}>‹</button>
        </div>
        <span style={{fontSize:12,color:"#94A3B8"}}>عرض إحصائيات سنة {yearFilter}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
        <KPI icon="ti-clipboard-list" label="إجمالي المراجعات" value={String(myEngs.length)} sub={isMgr?"كل المهام":"مهامك المعيّنة"} color="#3B82F6"/>
        <KPI icon="ti-loader" label="قيد التنفيذ" value={String(inProgressCount)} sub={lateCount>0?lateCount+" متأخرة":"مهام نشطة"} color="#F59E0B"/>
        <KPI icon="ti-alert-triangle" label="ملاحظات مفتوحة" value={String(openFindings.length)} sub={"من "+approvedFindings.length+" معتمدة"} color="#EF4444"/>
        <KPI icon="ti-check" label="متوسط الإنجاز" value={avgProgress+"%"} sub={completedCount+" مكتملة"} color="#10B981"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14}}>
        <Card title="المراجعات حسب القسم — مخطط مقابل منجز">
          {deptBars.length===0?(
            <div style={{padding:"30px",textAlign:"center",color:"#9CA3AF",fontSize:13}}>لا توجد مهام بعد</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:14,padding:"6px 0"}}>
              {deptBars.map(function(b){
                var pct=b.planned?Math.round(b.done/b.planned*100):0;
                return(
                  <div key={b.label}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12}}>
                      <span style={{color:"#374151",fontWeight:600}}>{b.label}</span>
                      <span style={{color:"#6B7280"}}>{b.done} / {b.planned} منجز</span>
                    </div>
                    <div style={{height:18,background:"#F1F5F9",borderRadius:6,overflow:"hidden",position:"relative"}}>
                      <div style={{height:"100%",background:"#10B981",borderRadius:6,width:pct+"%",transition:"width .3s",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingLeft:6}}>
                        {pct>15&&<span style={{fontSize:9,color:"white",fontWeight:700}}>{pct}%</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
        <Card title="توزيع حسب الحالة">
          {statusDist.length===0?(
            <div style={{padding:"30px",textAlign:"center",color:"#9CA3AF",fontSize:13}}>لا توجد بيانات</div>
          ):(
            <>
              <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><DonutChart data={statusDist} size={140}/></div>
              <Legend data={statusDist}/>
            </>
          )}
        </Card>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:14}}>
        <Card title="آخر الملاحظات المفتوحة">
          {openFindings.length===0?(
            <div style={{padding:"24px",textAlign:"center",color:"#9CA3AF",fontSize:13}}>لا توجد ملاحظات مفتوحة معتمدة</div>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><Th>الرقم</Th><Th>الملاحظة</Th><Th>المخاطرة</Th><Th>الحالة</Th></tr></thead>
              <tbody>
                {openFindings.slice(0,5).map(function(f){return(
                  <tr key={f.id} className="hrow">
                    <Td><span style={{fontFamily:"monospace",fontSize:11,color:"#9CA3AF"}}>{f.displayRef||f.id}</span></Td>
                    <Td><span style={{fontSize:12}}>{f.title.length>36?f.title.slice(0,36)+"…":f.title}</span></Td>
                    <Td><RBadge risk={f.risk}/></Td>
                    <Td><SBadge status={f.status}/></Td>
                  </tr>
                );})}
              </tbody>
            </table>
          )}
        </Card>
        <Card title="توزيع المخاطر (ملاحظات معتمدة)">
          {riskDist.length===0?(
            <div style={{padding:"24px",textAlign:"center",color:"#9CA3AF",fontSize:13}}>لا توجد ملاحظات معتمدة</div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <PieChart data={riskDist} size={120}/>
              <Legend data={riskDist}/>
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

          <FR label="تكرار المراجعة"><select style={INP} value={form.freq} onChange={e=>setForm(f=>({...f,freq:e.target.value}))}>{["سنوي","نصف سنوي","ربع سنوي"].map(r=><option key={r}>{r}</option>)}</select></FR>
        </div>
        <FR label="المسؤول"><input style={INP} value={form.owner} onChange={e=>setForm(f=>({...f,owner:e.target.value}))} placeholder="اسم المسؤول"/></FR>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}><Btn v="secondary" onClick={()=>setModal(false)}>إلغاء</Btn><Btn v="gold" onClick={add}>إضافة</Btn></div>
      </Modal>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <SearchBox value={q} onChange={setQ} ph="بحث في عالم المراجعة…"/>
        {["الكل","مرتفع","متوسط","منخفض"].map(r=><FilterBtn key={r} label={r} active={rf===r} onClick={()=>setRf(r)}/>)}
        <span style={{marginRight:"auto",fontSize:13,color:"#6B7280"}}>{list.length} وحدة</span>
        {isMgr2&&<Btn v="gold" onClick={openAdd}><i className="ti ti-plus"/>إضافة وحدة</Btn>}
      </div>
      <Card>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:820}}>
            <thead><tr><Th>#</Th><Th>الوحدة / العملية</Th><Th>الإدارة</Th><Th>المخاطرة</Th><Th sty={{minWidth:110}}>درجة المخاطر</Th><Th>آخر مراجعة</Th><Th>التكرار</Th><Th>المسؤول</Th><Th>القادمة</Th>{isMgr2&&<Th>إجراءات</Th>}</tr></thead>
            <tbody>
              {list.map((u,i)=>(
                <tr key={u.id} className="hrow" style={{cursor:"pointer"}}>
                  <Td><span style={{color:"#9CA3AF",fontSize:12}}>{i+1}</span></Td>
                  <Td><span style={{fontWeight:600,color:NAVY}}>{u.entity}</span></Td>
                  <Td><span style={{color:"#6B7280",fontSize:12}}>{u.dept}</span></Td>
                  <Td><RBadge risk={u.risk}/></Td>
                  <Td><ScoreBar score={u.score}/></Td>
                  <Td>{u.lastAudit}</Td>
                  <Td><span style={{fontSize:12,color:"#6B7280"}}>{u.freq}</span></Td>
                  <Td><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:26,height:26,borderRadius:"50%",background:NAVY+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:NAVY,fontWeight:700}}>{u.owner.charAt(0)}</div><span style={{fontSize:12}}>{u.owner}</span></div></Td>
                  <Td><span style={{fontSize:12,color:"#3B82F6",fontWeight:600}}>{u.next}</span></Td>
                  {isMgr2&&<Td><div style={{display:"flex",gap:4,justifyContent:"center"}}>
                    <button onClick={function(ev){ev.stopPropagation();openEdit(u);}} style={{background:"#EFF6FF",border:"none",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"4px 6px"}}><i className="ti ti-edit" style={{fontSize:13}}/></button>
                    <button onClick={function(ev){ev.stopPropagation();delUnit(u.id);}} style={{background:"#FEF2F2",border:"none",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"4px 6px"}}><i className="ti ti-trash" style={{fontSize:13}}/></button>
                  </div></Td>}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function AuditPlan(){
  const {engagements,addEng,updateEng,removeEng}=useContext(EngCtx);
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const teamUsers=auth&&auth.users?auth.users.filter(function(u){return u.role==="team";}):[];
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const emptyForm={title:"",dept:"المراجعة التشغيلية",lead:"",start:"",end:""};
  const [form,setForm]=useState(emptyForm);
  const [filterDept,setFilterDept]=useState("الكل");
  const [selTask,setSelTask]=useState(null);

  const [YEAR,setYEAR]=useState(new Date().getFullYear());
  const MOS2=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const DEPTS=["المراجعة التشغيلية","المراجعة المالية","مراجعة المخزون"];
  const RC2={"المراجعة التشغيلية":"#2563EB","المراجعة المالية":"#7C3AED","مراجعة المخزون":"#0891B2"};
  const RCL={"المراجعة التشغيلية":"#EFF6FF","المراجعة المالية":"#F5F3FF","مراجعة المخزون":"#F0F9FF"};

  const filtered=engagements.filter(function(e){
    var deptOk=filterDept==="الكل"||e.dept===filterDept;
    // فلترة حسب السنة: المهمة تظهر إذا كانت فترتها تتقاطع مع السنة المختارة
    var yearOk=(function(){
      if(!e.start&&!e.end)return true;
      var s=e.start?new Date(e.start.split("-")[0],+e.start.split("-")[1]-1,+e.start.split("-")[2]):null;
      var en=e.end?new Date(e.end.split("-")[0],+e.end.split("-")[1]-1,+e.end.split("-")[2]):null;
      var ys=new Date(YEAR,0,1);var ye=new Date(YEAR,11,31);
      if(s&&en)return s<=ye&&en>=ys;
      if(s)return s.getFullYear()===YEAR;
      if(en)return en.getFullYear()===YEAR;
      return true;
    })();
    return deptOk&&yearOk;
  });

  function fmtDate(d){
    if(!d)return"—";
    var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];
  }

  function getStatus(start,end){
    var today=new Date();today.setHours(0,0,0,0);
    var s=start?new Date(start):null;var e=end?new Date(end):null;
    if(e&&today>e)return{l:"متأخر",c:"#DC2626",bg:"#FEE2E2"};
    if(s&&today>=s)return{l:"قيد التنفيذ",c:"#D97706",bg:"#FFFBEB"};
    return{l:"مخطط",c:"#3B82F6",bg:"#EFF6FF"};
  }

  // Gantt bar position: left% and width% relative to full year
  function getBar(start,end){
    if(!start||!end)return null;
    // Parse as local dates to avoid UTC timezone shift
    var sp=start.split("-"),ep=end.split("-");
    var s=new Date(+sp[0],+sp[1]-1,+sp[2]);
    var e=new Date(+ep[0],+ep[1]-1,+ep[2]);
    var yearStart=new Date(YEAR,0,1);
    var yearEnd=new Date(YEAR,11,31,23,59,59);
    var total=yearEnd-yearStart;
    // right% = % from January (right side in RTL)
    var rPct=Math.max(0,(s-yearStart)/total*100);  // right offset
    var ePct=Math.min(100,(e-yearStart)/total*100);
    if(ePct<0||rPct>100)return null;
    var w=Math.max(ePct-rPct,0.5);
    // In RTL: right=rPct means distance from January (right edge)
    // But CSS right% is from RIGHT of container, and January is on the RIGHT in RTL
    // So right = rPct correctly places bar from January
    return{right:rPct,width:w};
  }

  // Today line %
  var todayPct=(function(){
    var today=new Date();today.setHours(12,0,0,0);
    var yearStart=new Date(YEAR,0,1);
    var yearEnd=new Date(YEAR,11,31,23,59,59);
    return Math.max(0,Math.min(100,(today-yearStart)/(yearEnd-yearStart)*100));
  })();

  const openAdd=function(){setEditId(null);setForm(emptyForm);setModal(true);};
  const openEdit=function(e){
    setEditId(e.id);
    setForm({title:e.title,dept:e.dept||"المراجعة التشغيلية",lead:e.lead||"",start:e.start||"",end:e.end||""});
    setModal(true);
  };
  const del=function(id){if(confirm("حذف هذه المراجعة من الخطة؟"))removeEng(id);};

  const save=function(){
    if(!form.title||form.title.trim().length<3){alert("يجب إدخال عنوان المهمة (٣ أحرف على الأقل)");return;}
    if(!form.start){alert("يجب إدخال تاريخ البداية");return;}
    if(!form.end){alert("يجب إدخال تاريخ الانتهاء");return;}
    if(new Date(form.end)<new Date(form.start)){alert("تاريخ الانتهاء يجب أن يكون بعد تاريخ البداية");return;}
    var patch={title:form.title,dept:form.dept,lead:form.lead,start:form.start,end:form.end,months:{}};
    if(editId){
      updateEng(editId,patch);
    }else{
      var newId=genEngId(YEAR,engagements);
      addEng(Object.assign({id:newId,findings:0,status:"مخطط",progress:0,risk:"متوسط"},patch));
    }
    setModal(false);setForm(emptyForm);setEditId(null);
  };

  // Summary counts using computed status
  var totals={planned:0,inprog:0,late:0,done:0};
  filtered.forEach(function(e){
    var st=getStatus(e.start,e.end);
    if(e.finalApprovalStatus==="final_approved")totals.done++;
    else if(st.l==="متأخر")totals.late++;
    else if(st.l==="قيد التنفيذ")totals.inprog++;
    else totals.planned++;
  });

  var selEng=selTask?engagements.find(function(e){return e.id===selTask;}):null;
  var selSt=selEng?getStatus(selEng.start,selEng.end):null;
  var selBar=selEng?getBar(selEng.start,selEng.end):null;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* ── Modal ── */}
      <Modal open={modal} onClose={function(){setModal(false);setForm(emptyForm);setEditId(null);}}
        title={editId?"تعديل مراجعة في الخطة السنوية":"إضافة مراجعة للخطة السنوية"}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{gridColumn:"span 2"}}>
            <FR label="عنوان المراجعة *">
              <input style={INP} value={form.title} onChange={function(ev){setForm(function(f){return Object.assign({},f,{title:ev.target.value});});}} placeholder="مثال: مراجعة إجراءات المشتريات"/>
            </FR>
          </div>
          <FR label="تاريخ البداية *">
            <input type="date" style={INP} value={form.start} onChange={function(ev){setForm(function(f){return Object.assign({},f,{start:ev.target.value});});}}/>
          </FR>
          <FR label="تاريخ الانتهاء *">
            <input type="date" style={INP} value={form.end} min={form.start} onChange={function(ev){setForm(function(f){return Object.assign({},f,{end:ev.target.value});});}}/>
          </FR>
          {/* Preview bar */}
          {form.start&&form.end&&new Date(form.end)>new Date(form.start)&&(function(){
            var b=getBar(form.start,form.end);
            var dur=Math.round((new Date(form.end)-new Date(form.start))/(1000*60*60*24*30.4));
            return b?React.createElement("div",{style:{gridColumn:"span 2",background:"#F8FAFC",borderRadius:8,padding:"10px 12px",border:"1px solid #E9EEF4"}},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94A3B8",marginBottom:5}},
                React.createElement("span",null,"معاينة الفترة على الخطة السنوية"),
                React.createElement("span",{style:{color:NAVY,fontWeight:600}},dur+" شهر تقريباً")
              ),
              React.createElement("div",{style:{height:10,background:"#E9EEF4",borderRadius:6,position:"relative",overflow:"hidden"}},
                React.createElement("div",{style:{position:"absolute",top:0,height:"100%",background:RC2[form.dept]||GOLD,borderRadius:6,right:b.right+"%",width:b.width+"%"}})
              ),
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94A3B8",marginTop:3}},
                React.createElement("span",null,"يناير "+YEAR),React.createElement("span",null,"ديسمبر "+YEAR)
              )
            ):null;
          })()}
          <FR label="القسم">
            <select style={INP} value={form.dept} onChange={function(ev){setForm(function(f){return Object.assign({},f,{dept:ev.target.value});});}}>
              {["المراجعة التشغيلية","المراجعة المالية","مراجعة المخزون"].map(function(r){return <option key={r}>{r}</option>;})}
            </select>
          </FR>
          <FR label="قائد المراجعة">
            <select style={INP} value={form.lead||""} onChange={function(ev){setForm(function(f){return Object.assign({},f,{lead:ev.target.value});});}}>
              <option value="">— اختر قائد المراجعة —</option>
              {teamUsers.map(function(u){return <option key={u.id} value={u.name}>{u.name}</option>;})}
            </select>
          </FR>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
          <Btn v="secondary" onClick={function(){setModal(false);setForm(emptyForm);setEditId(null);}}>إلغاء</Btn>
          <Btn v="gold" onClick={save}>
            <i className={"ti "+(editId?"ti-device-floppy":"ti-plus")}/>
            {editId?"حفظ التعديلات":"إضافة للخطة"}
          </Btn>
        </div>
      </Modal>

      {/* ── Header bar ── */}
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:6}}>
          {["الكل","المراجعة التشغيلية","المراجعة المالية","مراجعة المخزون"].map(function(r){return(
            <button key={r} onClick={function(){setFilterDept(r);}}
              style={{padding:"4px 12px",borderRadius:7,border:"1px solid "+(filterDept===r?(RC2[r]||NAVY):"#E2E8F0"),background:filterDept===r?(RC2[r]||NAVY):"white",color:filterDept===r?"white":"#374151",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
              {r}
            </button>
          );})}
        </div>
        <div style={{display:"flex",gap:12,marginRight:"auto",alignItems:"center"}}>
          {[{l:"مخطط",v:totals.planned,c:"#3B82F6"},{l:"جارية",v:totals.inprog,c:"#D97706"},{l:"متأخر",v:totals.late,c:"#DC2626"},{l:"مكتمل",v:totals.done,c:"#16A34A"}].map(function(k){return(
            <span key={k.l} style={{fontSize:12,color:"#6B7280"}}>{k.l}: <strong style={{color:k.c}}>{k.v}</strong></span>
          );})}
        </div>
        {isMgr&&<Btn v="gold" onClick={openAdd}><i className="ti ti-plus"/>إضافة مراجعة</Btn>}
      </div>

      {/* ── Gantt Chart ── */}
      <div style={{background:"white",borderRadius:12,overflow:"hidden",border:"1px solid #E9EEF4",boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>

        {/* Year navigation */}
        <div style={{background:NAVY,padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={function(){setYEAR(function(y){return y-1;});}} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:6,color:"white",width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
            <div style={{fontSize:16,fontWeight:700,color:GOLD,minWidth:50,textAlign:"center"}}>{YEAR}</div>
            <button onClick={function(){setYEAR(function(y){return y+1;});}} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:6,color:"white",width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          </div>
          <span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>الخطة السنوية للمراجعة الداخلية</span>
        </div>
        {/* Month headers */}
        <div style={{display:"grid",gridTemplateColumns:"220px 1fr",borderBottom:"1px solid #E9EEF4"}}>
          <div style={{padding:"10px 16px",fontSize:11,fontWeight:700,color:"#64748B",background:"#F8FAFC",borderLeft:"1px solid #E9EEF4"}}>المهمة</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",background:"#F8FAFC"}}>
            {MOS2.map(function(m,mi){
              var isNow=mi===new Date().getMonth()&&YEAR===new Date().getFullYear();
              return(
                <div key={mi} style={{padding:"10px 2px",fontSize:8,fontWeight:isNow?700:600,color:isNow?NAVY:"#64748B",textAlign:"center",borderLeft:mi>0?"1px solid #F1F5F9":"none",background:isNow?"#EFF6FF":"transparent"}}>
                  {m}
                  {isNow&&<div style={{width:12,height:2,background:NAVY,borderRadius:2,margin:"2px auto 0"}}/>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Rows */}
        {filtered.length===0?(
          <div style={{padding:"30px",textAlign:"center",color:"#94A3B8",fontSize:13}}>لا توجد مهام مطابقة</div>
        ):filtered.map(function(e,i){
          var bar=getBar(e.start,e.end);
          var st=getStatus(e.start,e.end);
          var isSelected=selTask===e.id;
          var rc=RC2[e.dept]||RC2[e.risk]||"#64748B";
          return(
            <div key={e.id} style={{display:"grid",gridTemplateColumns:"220px 1fr",borderBottom:i<filtered.length-1?"1px solid #F5F7FA":"none",background:isSelected?"#F0F9FF":"white",transition:"background .15s"}}>
              {/* Left: task info */}
              <div style={{padding:"12px 14px",borderLeft:"1px solid #E9EEF4",cursor:"pointer"}} onClick={function(){setSelTask(isSelected?null:e.id);}}>
                <div style={{fontSize:10,color:"#94A3B8",fontFamily:"monospace",marginBottom:2}}>{e.id}</div>
                <div style={{fontSize:12,fontWeight:700,color:NAVY,lineHeight:1.3,marginBottom:4}}>{e.title.length>30?e.title.slice(0,30)+"…":e.title}</div>
                <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{background:rc+"18",color:rc,fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:20}}>{e.dept||e.risk||"—"}</span>
                  <span style={{background:st.bg,color:st.c,fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:20}}>{st.l}</span>
                </div>
              </div>
              {/* Right: Gantt */}
              <div style={{position:"relative",cursor:"pointer"}} onClick={function(){setSelTask(isSelected?null:e.id);}}>
                {/* Month grid lines */}
                <div style={{position:"absolute",inset:0,display:"grid",gridTemplateColumns:"repeat(12,1fr)",pointerEvents:"none"}}>
                  {MOS2.map(function(_,mi){return <div key={mi} style={{borderLeft:mi>0?"1px solid #F5F7FA":"none"}}/>;} )}
                </div>
                {/* Today line */}
                <div style={{position:"absolute",top:0,bottom:0,right:todayPct+"%",width:1.5,background:"#EF4444",opacity:.5,pointerEvents:"none"}}/>
                {/* Bar */}
                <div style={{padding:"14px 6px",position:"relative"}}>
                  {bar?(
                    <div style={{position:"absolute",top:"50%",transform:"translateY(-50%)",height:22,borderRadius:6,
                      background:isSelected?rc:rc+"cc",right:"calc("+bar.right+"% + 6px)",
                      width:"calc("+bar.width+"% - 12px)",
                      boxShadow:isSelected?"0 0 0 2px white, 0 0 0 3.5px "+rc:"0 1px 3px rgba(0,0,0,.12)",
                      display:"flex",alignItems:"center",paddingRight:6,overflow:"hidden",transition:"all .15s"}}>
                      <span style={{fontSize:9,color:"white",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.lead||""}</span>
                    </div>
                  ):(
                    <div style={{color:"#CBD5E1",fontSize:10,textAlign:"center",padding:"10px 0"}}>لم تحدد الفترة</div>
                  )}
                  <div style={{height:22}}/>
                </div>
                {/* Actions */}
                {isMgr&&(
                  <div style={{position:"absolute",top:"50%",transform:"translateY(-50%)",left:6,display:"flex",gap:3,zIndex:5}}>
                    <button onClick={function(ev){ev.stopPropagation();openEdit(e);}} style={{background:"white",border:"1px solid #E2E8F0",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"2px 5px",boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
                      <i className="ti ti-edit" style={{fontSize:11}}/>
                    </button>
                    <button onClick={function(ev){ev.stopPropagation();del(e.id);}} style={{background:"white",border:"1px solid #E2E8F0",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"2px 5px",boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
                      <i className="ti ti-trash" style={{fontSize:11}}/>
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        })}

        {/* ── Details panel ── */}
        <div style={{borderTop:"1px solid #E9EEF4",transition:"all .2s"}}>
          {selEng?(
            <div style={{padding:"14px 20px",display:"flex",gap:18,alignItems:"flex-start",flexWrap:"wrap",background:"#F8FAFC"}}>
              <div style={{display:"flex",gap:10,alignItems:"center",flex:1,minWidth:250}}>
                <div style={{width:5,height:44,borderRadius:3,background:RC2[selEng.dept]||RC2[selEng.risk]||GOLD,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:10,color:"#94A3B8",fontFamily:"monospace",marginBottom:1}}>{selEng.id}</div>
                  <div style={{fontSize:14,fontWeight:700,color:NAVY,marginBottom:5}}>{selEng.title}</div>
                  <div style={{display:"flex",gap:6}}>
                    <span style={{background:(RC2[selEng.dept]||GOLD)+"18",color:RC2[selEng.dept]||GOLD,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20}}>{selEng.dept||selEng.risk||"—"}</span>
                    <span style={{background:selSt.bg,color:selSt.c,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20}}>{selSt.l}</span>
                  </div>
                </div>
              </div>
              {/* Dates */}
              <div style={{display:"flex",background:"white",borderRadius:10,border:"1px solid #E9EEF4",overflow:"hidden",flexShrink:0}}>

                  <div key={d.l} style={{padding:"10px 16px",textAlign:"center",borderLeft:di>0?"1px solid #E9EEF4":"none"}}>

              {/* Lead */}
              {selEng.lead&&(

                    <div style={{width:28,height:28,borderRadius:"50%",background:NAVY+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:NAVY}}>{selEng.lead.charAt(0)}</div>

                  </div>
                </div>

              {/* Close */}
              <button onClick={function(){setSelTask(null);}} style={{background:"white",border:"1px solid #E2E8F0",borderRadius:8,color:"#94A3B8",cursor:"pointer",padding:"5px 8px",flexShrink:0,marginTop:4}}>
                <i className="ti ti-x" style={{fontSize:13}}/>
              </button>
            </div>
          ):(
            <div style={{padding:"14px 20px",display:"flex",alignItems:"center",gap:8,color:"#CBD5E1",background:"#FAFBFC"}}>
              <i className="ti ti-hand-click" style={{fontSize:16}}/>
              <span style={{fontSize:11}}>اضغط على أي مهمة لعرض تفاصيلها هنا</span>
            </div>
          )}
        </div>

        {/* Legend */}
        <div style={{padding:"7px 16px",background:"#F8FAFC",borderTop:"1px solid #E9EEF4",display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#64748B"}}>
            <div style={{width:12,height:2,background:"#EF4444",borderRadius:2}}/> اليوم
          </div>
          {[{l:"المراجعة التشغيلية",c:"#2563EB"},{l:"المراجعة المالية",c:"#7C3AED"},{l:"مراجعة المخزون",c:"#0891B2"}].map(function(k){return(
            <div key={k.l} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#64748B"}}>
              <div style={{width:14,height:8,borderRadius:3,background:k.c}}/>{k.l}
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

  const parseRisks=function(text){if(!text)return[];return text.split("\n").map(function(l){return l.replace(/^[\d\-\*\•\.]+\s*/,"").trim();}).filter(function(l){return l.length>0;});};

  const getVal=function(f){
    if(f.autoTeam) return teamLabel||(plan.auditTeam||"");
    if(f.dateRange) return (eng&&eng.start&&eng.end)?((function(){var p=eng.start.split("-");return p[2]+"/"+p[1]+"/"+p[0];})()+"  ←  "+(function(){var p=eng.end.split("-");return p[2]+"/"+p[1]+"/"+p[0];})()):plan.periodFrom&&plan.periodTo?plan.periodFrom+"  ←  "+plan.periodTo:plan.periodFrom||plan.periodTo||"";
    var v=plan[f.field];
    // تحويل مصفوفة المخاطر إلى نص للعرض
    if(Array.isArray(v))return v.filter(function(r){return r&&r.text;}).map(function(r,i){return(i+1)+". "+r.text;}).join("\n");

  };

//  نافذة موحّدة لإضافة/ربط ورقة عمل (تبويبان: اختيار موجودة / رفع جديدة)
//  تُستدعى من: وعاء المهمة، اختبار البرنامج، ملاحظة، مراسلة عامة
//  context = {type:"engagement"|"program_step"|"finding"|"correspondence", targetId, targetLabel}
