}

function EngChatTab({eng,currentUser,isMgr,messages,addMessage,teamUsers,allFindings,allWp,stepCards}){
  const GOLD="#C8A84B",NAVY="#0D1F42";
  const [input,setInput]=useState("");
  const [refChip,setRefChip]=useState(null);
  // نظام الاقتراح الذكي
  const [suggest,setSuggest]=useState(null); // null | {type:"member"|"ref", query:"", items:[]}
  const [suggestIdx,setSuggestIdx]=useState(0);
  const messagesEndRef=React.useRef(null);
  const inputRef=React.useRef(null);
  const auth=useContext(AuthCtx);
  const allMembers=auth&&auth.users
    ?[...(auth.users.filter(function(u){return u.role!=="team";})),...(teamUsers||[])]
    :(teamUsers||[]);
  const myId=currentUser&&currentUser.id;

  useEffect(function(){if(messagesEndRef.current)messagesEndRef.current.scrollIntoView({behavior:"smooth"});},[messages]);

  const memberColors={"u1":{color:GOLD,bg:"#FEF3C7"},"u2":{color:"#3B82F6",bg:"#DBEAFE"},"u3":{color:"#10B981",bg:"#D1FAE5"},"u4":{color:"#8B5CF6",bg:"#EDE9FE"},"u5":{color:"#EF4444",bg:"#FEE2E2"}};
  const getColor=function(uid){return memberColors[uid]||{color:"#6B7280",bg:"#F3F4F6"};};

  const engFindings=allFindings||[];
  const engWp=allWp||[];
  const engSteps=stepCards||[];
  const prog=engSteps.length;
  const doneProg=engSteps.filter(function(s){return s.approvalStatus==="approved";}).length;

  // بناء قائمة العناصر القابلة للربط
  const refItems=[
    ...engSteps.map(function(s,i){return{icon:"📋",label:"بطاقة #"+(i+1)+(s.process?" — "+s.process:""),color:"#7C3AED",key:"s"+s.id};}),
    ...engFindings.map(function(f){return{icon:"⚠️",label:"ملاحظة: "+f.title,color:"#EF4444",key:"f"+f.id};}),
    ...engWp.slice(0,5).map(function(w){return{icon:"📎",label:(w.ref||"")+" — "+w.name,color:"#3B82F6",key:"w"+w.id};}),
  ];

  // استخراج آخر الإشارات الفعلية من الرسائل
  const recentRefs=[];
  messages.forEach(function(m){if(m.ref)recentRefs.push(m.ref);});
  const uniqueRefs=recentRefs.filter(function(r,i,a){return a.findIndex(function(x){return x.label===r.label;})===i;}).slice(-4);

  // تحليل input لاكتشاف @ أو #
  const handleInput=function(val){
    setInput(val);
    // الكلمة الحالية = آخر كلمة يكتبها المستخدم (بعد آخر مسافة)
    var lastWord=val.split(" ").pop();
    if(lastWord.startsWith("@")&&lastWord.length>=1){
      var query=lastWord.slice(1);
      var items=allMembers.filter(function(m){
        return !query||m.name.includes(query)||m.name.split(" ")[0].startsWith(query);
      });
      setSuggest({type:"member",query:query,items:items});
      setSuggestIdx(0);
    } else if(lastWord.startsWith("#")&&lastWord.length>=1){
      var query2=lastWord.slice(1);
      var items2=refItems.filter(function(r){return !query2||r.label.includes(query2);});
      setSuggest({type:"ref",query:query2,items:items2});
      setSuggestIdx(0);
    } else {
      setSuggest(null);
    }
  };

  // اختيار اقتراح
  const pickSuggest=function(item){
    // استبدل الكلمة الأخيرة (الـ @query أو #query) بالاختيار
    var words=input.split(" ");
    words.pop(); // احذف الكلمة الأخيرة (التي تحتوي @ أو #)
    var prefix=words.length>0?words.join(" ")+" ":"";
    if(suggest.type==="member"){
      var firstName=item.name.split(" ")[0];
      setInput(prefix+"@"+firstName+" ");
    } else {
      setRefChip({icon:item.icon,label:item.label,color:item.color});
      setInput(prefix);
    }
    setSuggest(null);
    if(inputRef.current)inputRef.current.focus();
  };

  // معالجة مفاتيح الكيبورد في الاقتراحات
  const handleKeyDown=function(ev){
    if(suggest&&suggest.items.length>0){
      if(ev.key==="ArrowDown"){ev.preventDefault();setSuggestIdx(function(i){return(i+1)%suggest.items.length;});return;}
      if(ev.key==="ArrowUp"){ev.preventDefault();setSuggestIdx(function(i){return(i-1+suggest.items.length)%suggest.items.length;});return;}
      if(ev.key==="Tab"){
        ev.preventDefault();pickSuggest(suggest.items[suggestIdx]);return;
      }
      if(ev.key==="Enter"&&suggest){ev.preventDefault();pickSuggest(suggest.items[suggestIdx]);return;}
      if(ev.key==="Escape"){setSuggest(null);return;}
    }
    if(ev.key==="Enter"&&!ev.shiftKey&&!suggest){ev.preventDefault();sendMessage();}
  };

  // إرسال رسالة
  const sendMessage=function(){
    if(!input.trim()&&!refChip)return;
    var now=new Date();
    var timeStr=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
    addMessage({id:Date.now(),userId:myId,userName:currentUser?currentUser.name:"",text:input.trim(),time:timeStr,isoTime:now.toISOString(),ref:refChip,readBy:[myId]});
    setInput("");setRefChip(null);setSuggest(null);
  };

  // تحويل نص الرسالة إلى عناصر React مع تمييز @المنشن
  const renderText=function(text,isMine){
    if(!text)return null;
    var parts=text.split(/(@\S+)/g);
    return parts.map(function(part,i){
      if(part.startsWith("@")){
        return React.createElement("span",{key:i,style:{color:isMine?"#7C3AED":"#3B82F6",fontWeight:700}},part);
      }
      return part;
    });
  };

  const fmtDate=function(iso){if(!iso)return"";var d=new Date(iso);var today=new Date();var isToday=d.toDateString()===today.toDateString();return isToday?"اليوم":(String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear());};
  var lastDate="";

  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 220px",gap:14,alignItems:"start",height:"calc(100vh - 200px)",minHeight:500}}>

      {/* Chat main */}
      <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"12px 18px",borderBottom:"0.5px solid #E5E7EB",display:"flex",alignItems:"center",gap:10,background:"white",flexShrink:0}}>
          <div style={{width:36,height:36,borderRadius:10,background:"#F5F3FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>💬</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:NAVY}}>نقاش الفريق</div>
            <div style={{fontSize:11,color:"#9CA3AF"}}>{eng.title} · {allMembers.length} أعضاء</div>
          </div>
          <div style={{marginRight:"auto",display:"flex",gap:6,alignItems:"center"}}>
            {allMembers.slice(0,4).map(function(m){var c=getColor(m.id);return(
              <div key={m.id} style={{width:26,height:26,borderRadius:"50%",background:c.bg,border:"1.5px solid "+c.color+"40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:c.color}}>{m.name.charAt(0)}</div>
            );})}
          </div>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 18px",display:"flex",flexDirection:"column",gap:14}}>
          {messages.length===0&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:"#9CA3AF"}}>
              <div style={{fontSize:36,marginBottom:10}}>💬</div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>لا توجد رسائل بعد</div>
              <div style={{fontSize:12}}>ابدأ النقاش مع فريقك حول هذه المهمة</div>
            </div>
          )}
          {messages.map(function(msg,idx){
            var isMine=msg.userId===myId;
            var msgDate=msg.isoTime?fmtDate(msg.isoTime):"";
            var showDate=msgDate!==lastDate;
            if(showDate)lastDate=msgDate;
            var mc=getColor(msg.userId);
            return(
              <div key={msg.id}>
                {showDate&&<div style={{textAlign:"center",marginBottom:8}}>
                  <span style={{fontSize:10,color:"#9CA3AF",background:"#F9FAFB",padding:"3px 14px",borderRadius:20,border:"0.5px solid #E5E7EB"}}>{msgDate}</span>
                </div>}
                <div style={{display:"flex",gap:9,alignItems:"flex-start",flexDirection:isMine?"row-reverse":"row"}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:mc.bg,border:"1.5px solid "+mc.color+"30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:mc.color,flexShrink:0}}>{msg.userName?msg.userName.charAt(0):"؟"}</div>
                  <div style={{maxWidth:"70%",display:"flex",flexDirection:"column",alignItems:isMine?"flex-end":"flex-start",gap:3}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexDirection:isMine?"row-reverse":"row"}}>
                      <span style={{fontSize:11,fontWeight:700,color:NAVY}}>{msg.userName}</span>
                      <span style={{fontSize:10,color:"#9CA3AF"}}>{msg.time}</span>
                    </div>
                    {msg.ref&&(
                      <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#F5F3FF",border:"0.5px solid #DDD6FE",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#7C3AED",cursor:"pointer"}}>
                        <span>{msg.ref.icon}</span>
                        <span style={{fontWeight:500}}>{msg.ref.label}</span>
                      </div>
                    )}
                    <div style={{background:isMine?"#EDE9FE":"#F9FAFB",color:isMine?"#4C1D95":"#374151",padding:"10px 14px",borderRadius:isMine?"14px 4px 14px 14px":"4px 14px 14px 14px",fontSize:13,lineHeight:1.6,border:isMine?"1px solid #DDD6FE":"0.5px solid #E5E7EB"}}>
                      {renderText(msg.text,isMine)}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          <div ref={messagesEndRef}/>
        </div>

        {/* Input */}
        <div style={{padding:"12px 18px",borderTop:"0.5px solid #E5E7EB",background:"white",flexShrink:0}}>
          {/* قائمة الاقتراحات الذكية */}
          {suggest&&suggest.items.length>0&&(
            <div style={{background:"white",border:"0.5px solid #E5E7EB",borderRadius:12,padding:"6px 0",marginBottom:8,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",maxHeight:240,overflowY:"auto"}}>
              <div style={{padding:"4px 14px 6px",fontSize:10,fontWeight:600,color:"#9CA3AF",letterSpacing:"0.05em"}}>
                {suggest.type==="member"?"👤 اختر عضواً":"🔗 اختر عنصراً للربط"}
                <span style={{color:"#C4B5FD",fontWeight:400,marginRight:6}}>Tab أو مسافة للإكمال</span>
              </div>
              {suggest.items.map(function(item,i){
                var isActive=i===suggestIdx;
                if(suggest.type==="member"){
                  var mc=getColor(item.id);
                  return(
                    <button key={item.id} onClick={function(){pickSuggest(item);}}
                      style={{display:"flex",alignItems:"center",gap:9,padding:"7px 14px",width:"100%",background:isActive?"#F5F3FF":"none",border:"none",cursor:"pointer",textAlign:"right"}}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:mc.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:mc.color,flexShrink:0}}>{item.name.charAt(0)}</div>
                      <span style={{fontSize:12,color:isActive?"#7C3AED":"#374151",fontWeight:isActive?700:500}}>{item.name}</span>
                      <span style={{fontSize:10,color:"#9CA3AF",marginRight:"auto"}}>{item.id===eng.leadId?"قائد":"مراجع"}</span>
                    </button>
                  );
                }
                return(
                  <button key={item.key} onClick={function(){pickSuggest(item);}}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",width:"100%",background:isActive?"#F5F3FF":"none",border:"none",cursor:"pointer",textAlign:"right"}}>
                    <span style={{fontSize:13}}>{item.icon}</span>
                    <span style={{fontSize:11,color:isActive?"#7C3AED":item.color,fontWeight:isActive?700:500}}>{item.label}</span>
                  </button>
                );
              })}
            </div>
          )}
          {refChip&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#F5F3FF",border:"0.5px solid #DDD6FE",borderRadius:8,padding:"4px 10px",marginBottom:8,fontSize:11,color:refChip.color}}>
              <span>{refChip.icon}</span><span style={{fontWeight:500}}>{refChip.label}</span>
              <button onClick={function(){setRefChip(null);}} style={{background:"none",border:"none",color:"#9CA3AF",cursor:"pointer",fontSize:12,padding:"0 2px"}}>×</button>
            </div>
          )}
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <div style={{flex:1,background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
              <input ref={inputRef} value={input}
                onChange={function(ev){handleInput(ev.target.value);}}
                onKeyDown={handleKeyDown}
                placeholder="رسالة، @عضو أو #عنصر للربط…"
                style={{flex:1,background:"none",border:"none",outline:"none",fontSize:13,color:"#374151",fontFamily:"inherit",direction:"rtl"}}/>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <button onClick={function(){handleInput(input+"@");if(inputRef.current)inputRef.current.focus();}}
                  style={{background:"none",border:"none",borderRadius:7,color:"#9CA3AF",cursor:"pointer",padding:"2px 6px",fontSize:12,fontWeight:700}}>@</button>
                <button onClick={function(){handleInput(input+"#");if(inputRef.current)inputRef.current.focus();}}
                  style={{background:"none",border:"none",borderRadius:7,color:"#9CA3AF",cursor:"pointer",padding:"2px 6px",fontSize:12,fontWeight:700}}>#</button>
                <button style={{background:"none",border:"none",color:"#9CA3AF",cursor:"pointer",fontSize:15}}>😊</button>
              </div>
            </div>
            <button onClick={sendMessage} style={{background:"#7C3AED",border:"none",borderRadius:12,color:"white",padding:"11px 16px",cursor:"pointer",fontSize:16,flexShrink:0}}>➤</button>
          </div>
          <div style={{fontSize:10,color:"#D1D5DB",marginTop:5,textAlign:"center"}}>Enter للإرسال · @ # للإشارة</div>
        </div>
      </div>

      {/* Right sidebar */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {/* Team */}
        <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:700,color:NAVY,marginBottom:12}}>فريق المراجعة</div>
          {allMembers.map(function(m){var c=getColor(m.id);var isLead=m.id===eng.leadId;return(
            <div key={m.id} style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:c.bg,border:"1.5px solid "+c.color+"40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:c.color,flexShrink:0}}>{m.name.charAt(0)}</div>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:"#374151"}}>{m.name}</div>
                <div style={{fontSize:10,color:isLead?GOLD:"#9CA3AF",fontWeight:isLead?600:400}}>{isLead?"قائد المراجعة":"مراجع"}</div>
              </div>
            </div>
          );})}
          <div style={{background:"#FFFBEB",border:"0.5px solid #FDE68A",borderRadius:8,padding:"7px 10px",marginTop:4}}>
            <div style={{fontSize:10,color:"#92400E",display:"flex",alignItems:"center",gap:4}}><span>🔒</span> مرئي للفريق المعيّن فقط</div>
          </div>
        </div>

        {/* Recent refs from actual messages */}
        {uniqueRefs.length>0&&(
          <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",padding:"14px 16px"}}>
            <div style={{fontSize:12,fontWeight:700,color:NAVY,marginBottom:12}}>آخر الإشارات</div>
            {uniqueRefs.map(function(r,i){return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#F9FAFB",borderRadius:8,marginBottom:6,border:"0.5px solid #E5E7EB",cursor:"pointer"}}>
                <span style={{fontSize:13,flexShrink:0}}>{r.icon}</span>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:500,color:r.color||"#7C3AED",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.label}</div></div>
              </div>
            );})}
          </div>
        )}

        {/* Progress */}
        <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:700,color:NAVY,marginBottom:12}}>تقدم المهمة</div>
          {[{l:"البطاقات",d:doneProg,t:prog||1},{l:"الملاحظات",d:engFindings.filter(function(f){return f.status==="مغلق";}).length,t:engFindings.length||1},{l:"أوراق العمل",d:engWp.filter(function(w){return w.status==="مكتمل"||w.status==="معتمد";}).length,t:engWp.length||1}].map(function(p){return(
            <div key={p.l} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:11,color:"#374151"}}>{p.l}</span>
                <span style={{fontSize:11,color:"#9CA3AF"}}>{p.d}/{p.t}</span>
              </div>
              <div style={{height:5,background:"#E5E7EB",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:(p.d/p.t*100)+"%",background:GOLD,borderRadius:4}}/>
              </div>
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

function Workpapers(){
  const {workpapers:allData,addWp,updateWp,delWp,genRef}=useContext(WpCtx);
  const {engagements}=useContext(EngCtx);
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const currentUser=auth&&auth.currentUser;
  // فلترة حسب الصلاحيات
  const data=isMgr?allData:allData.filter(function(w){
    return !w.engagementId||(auth&&auth.canAccessEng&&auth.canAccessEng(w.engagementId));
  });
  // المهام المتاحة للمستخدم الحالي
  const myEngs=isMgr?engagements:engagements.filter(function(e){
    return auth&&auth.canAccessEng&&auth.canAccessEng(e.id);
  });

  const [q,setQ]=useState("");
  const [sf,setSf]=useState("الكل");
  const [engFilter,setEngFilter]=useState("الكل");
  const [sourceFilter,setSourceFilter]=useState("الكل"); // الكل / بطاقة / ملاحظة / مباشر
  const [dragging,setDragging]=useState(false);
  const [toast,setToast]=useState(null);
  const [modal,setModal]=useState(false);
  const [modalFile,setModalFile]=useState(null);
  const [editWp,setEditWp]=useState(null); // ورقة عمل للتعديل
  const emptyForm={status:"مسودة",author:currentUser?currentUser.name:"",engagementId:"",goal:""};
  const [uploadForm,setUploadForm]=useState(emptyForm);
  const fileInputRef=React.useRef();

  const getType=function(name){const e=name.split(".").pop().toLowerCase();if(e==="pdf")return"pdf";if(["xlsx","xls","csv"].includes(e))return"xlsx";if(["docx","doc"].includes(e))return"docx";if(["zip","rar","7z"].includes(e))return"zip";return"file";};
  const fmtSize=function(b){if(b<1024)return b+" B";if(b<1048576)return(b/1024).toFixed(0)+" KB";return(b/1048576).toFixed(1)+" MB";};
  const fmtDate=function(d){const m=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];return d.getDate()+" "+m[d.getMonth()]+" "+d.getFullYear();};
  const showToast=function(msg,color){setToast({msg,color:color||"#10B981"});setTimeout(function(){setToast(null);},3000);};

  const openUpload=function(file){
    setModalFile(file);
    setUploadForm(Object.assign({},emptyForm,{author:currentUser?currentUser.name:""}));
    setEditWp(null);
    setModal(true);
  };

  const openEdit=function(wp){
    setEditWp(wp);
    setModalFile(null);
    setUploadForm({status:wp.status||"مسودة",author:wp.author||"",engagementId:wp.engagementId||"",goal:wp.goal||""});
    setModal(true);
  };

  const buildWp=function(file,form){
    const eng=engagements.find(function(e){return e.id===form.engagementId;});
    return{
      id:Date.now()+Math.random(),
      name:file.name,type:getType(file.name),
      size:fmtSize(file.size),modified:fmtDate(new Date()),
      status:form.status,author:form.author||"",
      goal:form.goal||"",
      engagementId:form.engagementId,engagement:eng?eng.title:"",
      ref:genRef(form.engagementId),_file:file,_url:URL.createObjectURL(file),
    };
  };

  const confirmSave=function(){
    if(editWp){
      const eng=engagements.find(function(e){return e.id===uploadForm.engagementId;});
      updateWp(editWp.id,{status:uploadForm.status,author:uploadForm.author,goal:uploadForm.goal,engagementId:uploadForm.engagementId,engagement:eng?eng.title:editWp.engagement});
      showToast("تم تحديث ورقة العمل بنجاح");
    }else{
      if(!modalFile)return;
      addWp(buildWp(modalFile,uploadForm));
      showToast("تم رفع \""+modalFile.name+"\" بنجاح");
    }
    setModal(false);setModalFile(null);setEditWp(null);
  };

  const processFiles=function(files){
    const arr=Array.from(files);
    if(!arr.length)return;
    if(arr.length===1){openUpload(arr[0]);}
    else{
      arr.forEach(function(f){
        const eng=engagements.find(function(e){return e.id===uploadForm.engagementId;});
        addWp({id:Date.now()+Math.random(),name:f.name,type:getType(f.name),size:fmtSize(f.size),modified:fmtDate(new Date()),status:"مسودة",author:currentUser?currentUser.name:"",goal:"",engagementId:"",engagement:"",ref:genRef(""),_file:f,_url:URL.createObjectURL(f)});
      });
      showToast("تم رفع "+arr.length+" ملفات — يمكنك تعديل تفاصيلها لاحقاً");
    }
  };

  const list=data.filter(function(w){
    var matchSrc=sourceFilter==="الكل"||(sourceFilter==="بطاقة"&&w.stepId)||(sourceFilter==="ملاحظة"&&w.findingId)||(sourceFilter==="مباشر"&&!w.stepId&&!w.findingId);
    return (sf==="الكل"||w.status===sf)&&(engFilter==="الكل"||w.engagementId===engFilter)&&matchSrc&&(w.name.includes(q)||w.author.includes(q)||(w.ref||"").includes(q)||(w.goal||"").includes(q));
  });

  const modalTitle=editWp?"تعديل بيانات ورقة العمل":"إضافة ورقة عمل";

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"white",padding:"10px 22px",borderRadius:10,fontSize:14,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>{toast.msg}</div>}

      {/* Upload/Edit Modal */}
      <Modal open={modal} onClose={function(){setModal(false);setModalFile(null);setEditWp(null);}} title={modalTitle}>
        <div>
          {/* اختيار الملف — يظهر فقط عند الإضافة وليس التعديل */}
          {!editWp&&(
            <div>
              <input type="file" id="wp-main-input" style={{display:"none"}}
                onChange={function(ev){if(ev.target.files[0])setModalFile(ev.target.files[0]);ev.target.value="";}}/>
              {modalFile?(
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:10,marginBottom:16}}>
                  <FileIco type={getType(modalFile.name)}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:NAVY}}>{modalFile.name}</div>
                    <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{fmtSize(modalFile.size)}</div>
                  </div>
                  <label htmlFor="wp-main-input" style={{fontSize:12,color:"#3B82F6",cursor:"pointer",textDecoration:"underline"}}>تغيير</label>
                </div>
              ):(
                <label htmlFor="wp-main-input" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"24px",border:"2px dashed #D1D5DB",borderRadius:10,cursor:"pointer",marginBottom:16,background:"#F9FAFB"}}>
                  <i className="ti ti-cloud-upload" style={{fontSize:32,color:"#9CA3AF"}}/>
                  <div style={{fontSize:13,fontWeight:600,color:NAVY}}>اختر الملف للرفع</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>PDF, Excel, Word, ZIP</div>
                </label>
              )}
            </div>
          )}

          {/* اسم الملف عند التعديل */}
          {editWp&&(
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#F9FAFB",borderRadius:10,marginBottom:16}}>
              <FileIco type={editWp.type}/>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:NAVY}}>{editWp.name}</div>
                <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{editWp.size}</div>
              </div>
            </div>
          )}

          {/* مهمة المراجعة */}
          <FR label="مهمة المراجعة المرتبطة">
            <select style={INP} value={uploadForm.engagementId} onChange={function(e){setUploadForm(function(f){return Object.assign({},f,{engagementId:e.target.value});});}}>
              <option value="">— اختر المهمة —</option>
              {myEngs.map(function(e){return <option key={e.id} value={e.id}>{e.title}</option>;})}
            </select>
          </FR>

          {/* الحالة فقط - المؤلف تلقائي من الحساب */}
          <FR label="حالة الورقة">
            <select style={INP} value={uploadForm.status} onChange={function(e){setUploadForm(function(f){return Object.assign({},f,{status:e.target.value});});}}>
              {["مسودة","تحت المراجعة","مكتمل","معتمد"].map(function(s){return <option key={s}>{s}</option>;})}
            </select>
          </FR>

          {/* هدف ورقة العمل */}
          <FR label="هدف ورقة العمل">
            <textarea style={Object.assign({},INP,{resize:"vertical",height:72,lineHeight:1.5})}
              value={uploadForm.goal}
              placeholder="مثال: التحقق من تنفيذ ضوابط الرقابة على المشتريات"
              onChange={function(e){setUploadForm(function(f){return Object.assign({},f,{goal:e.target.value});});}}/>
          </FR>

          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <Btn v="secondary" onClick={function(){setModal(false);setModalFile(null);setEditWp(null);}}>إلغاء</Btn>
            <Btn v="gold" onClick={confirmSave} style={{opacity:(!editWp&&!modalFile)?0.5:1}}>
              <i className={editWp?"ti ti-device-floppy":"ti ti-upload"}/>
              {editWp?"حفظ التعديلات":"إضافة ورقة العمل"}
            </Btn>
          </div>
        </div>
      </Modal>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[{l:"الإجمالي",v:data.length,c:NAVY},{l:"مكتملة",v:data.filter(w=>w.status==="مكتمل").length,c:"#10B981"},{l:"قيد المراجعة",v:data.filter(w=>w.status==="مراجعة").length,c:"#F59E0B"},{l:"مسودات",v:data.filter(w=>w.status==="مسودة").length,c:"#6B7280"}].map(({l,v,c})=>(
          <div key={l} style={{background:"white",borderRadius:10,padding:"14px 16px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.08)",borderTop:`3px solid ${c}`}}>
            <div style={{fontSize:24,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:12,color:"#6B7280",marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <SearchBox value={q} onChange={setQ} ph="بحث في أوراق العمل..."/>
        <select value={sf} onChange={e=>setSf(e.target.value)} style={{...INP,width:"auto",height:36,paddingTop:0,paddingBottom:0}}>
          {["الكل","مكتمل","مراجعة","مسودة"].map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={engFilter} onChange={e=>setEngFilter(e.target.value)} style={{...INP,width:"auto",height:36,paddingTop:0,paddingBottom:0,maxWidth:220}}>
          <option value="الكل">كل المهام</option>
          {engagements.map(e=><option key={e.id} value={e.id}>{e.title}</option>)}
        </select>
        <select value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)} style={{...INP,width:"auto",height:36,paddingTop:0,paddingBottom:0}}>
          <option value="الكل">كل المصادر</option>
          <option value="بطاقة">بطاقة مراجعة</option>
          <option value="ملاحظة">ملاحظة</option>
          <option value="مباشر">رفع مباشر</option>
        </select>
        <input ref={fileInputRef} type="file" multiple style={{display:"none"}} onChange={ev=>{processFiles(ev.target.files);ev.target.value="";}}/>
        <Btn v="gold" onClick={function(){setEditWp(null);setModalFile(null);setUploadForm(Object.assign({},emptyForm,{author:currentUser?currentUser.name:""}));setModal(true);}}><i className="ti ti-plus"/>إضافة ورقة عمل</Btn>
      </div>

      {/* Drop zone + Table */}
      <Card>
        <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);processFiles(e.dataTransfer.files);}}>
          {list.length===0?(
            <div onClick={()=>fileInputRef.current.click()} style={{border:`2px dashed ${dragging?GOLD:"#D1D5DB"}`,borderRadius:12,padding:"40px 20px",textAlign:"center",cursor:"pointer",color:dragging?GOLD:"#9CA3AF",transition:"all 0.2s"}}>
              <i className="ti ti-cloud-upload" style={{fontSize:36,display:"block",marginBottom:8}}/>
              <div style={{fontSize:14,marginBottom:4}}>اسحب الملفات هنا أو اضغط لاختيارها</div>
              <div style={{fontSize:12}}>يدعم: PDF, Excel, Word, ZIP</div>
            </div>
          ):(
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:750}}>
                <thead>
                  <tr>
                    <Th>المرجع</Th><Th>اسم الملف</Th><Th>مهمة المراجعة</Th><Th>المصدر</Th><Th>هدف ورقة العمل</Th><Th>الحالة</Th><Th>أضيفت من قبل</Th><Th>التاريخ</Th><Th></Th>
                  </tr>
                </thead>
                <tbody>
                  {list.map(function(w){return(
                    <tr key={w.id} className="hrow">
                      <Td><span style={{fontFamily:"monospace",fontSize:11,color:"#3B82F6",fontWeight:600}}>{w.ref}</span></Td>
                      <Td>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <FileIco type={w.type}/>
                          <span style={{fontWeight:500,color:NAVY,fontSize:13}}>{w.name}</span>
                          {w._file&&<span style={{fontSize:10,background:"#DCFCE7",color:"#16A34A",padding:"1px 6px",borderRadius:4,fontWeight:600}}>جديد</span>}
                        </div>
                      </Td>
                      <Td>
                        {w.engagement
                          ?<span style={{fontSize:11,background:"#EFF6FF",color:"#1D4ED8",padding:"2px 8px",borderRadius:6,fontWeight:600}}>{w.engagement.length>22?w.engagement.slice(0,22)+"...":w.engagement}</span>
                          :<span style={{color:"#D1D5DB",fontSize:12}}>—</span>}
                      </Td>
                      <Td>
                        {w.stepId?<span style={{fontSize:10,background:"#F5F3FF",color:"#7C3AED",padding:"2px 8px",borderRadius:6,fontWeight:600,display:"inline-flex",alignItems:"center",gap:3}}><i className="ti ti-list-check" style={{fontSize:10}}/>بطاقة مراجعة</span>
                        :w.findingId?<span style={{fontSize:10,background:"#FEF2F2",color:"#991B1B",padding:"2px 8px",borderRadius:6,fontWeight:600,display:"inline-flex",alignItems:"center",gap:3}}><i className="ti ti-alert-triangle" style={{fontSize:10}}/>ملاحظة</span>
                        :<span style={{color:"#D1D5DB",fontSize:11}}>—</span>}
                      </Td>
                      <Td><span style={{fontSize:12,color:"#6B7280"}}>{w.goal||"—"}</span></Td>
                      <Td><SBadge status={w.status}/></Td>
                      <Td><span style={{fontSize:12}}>{w.author||"—"}</span></Td>
                      <Td><span style={{fontSize:12,color:"#6B7280"}}>{w.modified}</span></Td>
                      <Td>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={function(){openEdit(w);}} title="تعديل التفاصيل"
                            style={{background:"#EFF6FF",border:"none",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"4px 6px"}}>
                            <i className="ti ti-edit" style={{fontSize:13}}/>
                          </button>
                          {w._url&&(
                            <button onClick={function(){const a=document.createElement("a");a.href=w._url;a.download=w.name;a.click();}} title="تحميل"
                              style={{background:"#F0FDF4",border:"none",borderRadius:5,cursor:"pointer",color:"#10B981",padding:"4px 6px"}}>
                              <i className="ti ti-download" style={{fontSize:13}}/>
                            </button>
                          )}
                          {isMgr&&<button onClick={function(){delWp(w.id);}} title="حذف"
                            style={{background:"#FEF2F2",border:"none",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"4px 6px"}}>
                            <i className="ti ti-trash" style={{fontSize:13}}/>
                          </button>}
                        </div>
                      </Td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </Card>
    </div>
  );
}


function FindingCard({f,onClose,onChangeStatus,onChangeRisk,onEdit,onDelete,onUpdate,stepCards,leadId,engLocked}){
  const NAVY2="#0D1F42",GOLD2="#C8A84B",GRN2="#1E3A2F";
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const wpCtx=useContext(WpCtx);
  const editAttachRef=React.useRef();
  const [editing,setEditing]=useState(false);
  const [editForm,setEditForm]=useState({});
  const [showStatusMenu,setShowStatusMenu]=useState(false);
  const [showReturnInput,setShowReturnInput]=useState(false);
  const [returnText,setReturnText]=useState("");
  const [sideField,setSideField]=useState(null);
  const [sideVal,setSideVal]=useState("");

  const currentUser=auth&&auth.currentUser;
  // القائد: صاحب leadId في المهمة — مدير البرنامج لديه صلاحيات كاملة دائماً
  var isLeadUser=!!(currentUser&&leadId&&currentUser.id===leadId);
  var canApprove=(isMgr||isLeadUser)&&!engLocked; // من يمكنه اعتماد أو إعادة الملاحظة
  var isReviewer=!isMgr&&!isLeadUser;

  var approvalSt=f.approvalStatus||"draft";
  var isApproved=approvalSt==="approved";
  // إغلاق التعديل على المراجع بعد الاعتماد — فقط القائد/المدير يعدل بعد الاعتماد
  const APPR={
    draft:        {l:"مسودة",         c:"#64748B",bg:"#F1F5F9",border:"#E2E8F0",icon:"ti-pencil"},
    under_review: {l:"قيد الاعتماد",  c:"#0891B2",bg:"#EFF6FF",border:"#BFDBFE",icon:"ti-eye"},
    returned:     {l:"مُعادة",         c:"#D97706",bg:"#FFFBEB",border:"#FDE68A",icon:"ti-arrow-back-up"},
    approved:     {l:"مُعتمدة",        c:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0",icon:"ti-circle-check"},
  };
  var ac=APPR[approvalSt]||APPR.draft;
  var canEdit=(isMgr||isLeadUser||(isReviewer&&(approvalSt==="draft"||approvalSt==="returned")))&&!engLocked;
  const SC2={"مفتوح":{bg:"#FEE2E2",text:"#991B1B",nextSt:"قيد المعالجة"},"قيد المعالجة":{bg:"#FEF9C3",text:"#854D0E",nextSt:"مغلق"},"مغلق":{bg:"#DCFCE7",text:"#166634",nextSt:null}};
  const RC2={"حرج":{bg:"#FEE2E2",text:"#991B1B"},"مرتفع":{bg:"#FEE2E2",text:"#991B1B"},"متوسط":{bg:"#FEF9C3",text:"#854D0E"},"منخفض":{bg:"#DCFCE7",text:"#166634"}};
  const sc=SC2[f.status]||SC2["مفتوح"];
  const rc=RC2[f.risk]||RC2["مرتفع"];
  const SECS=[{key:"intro",label:"الخلفية / المقدمة"},{key:"observation",label:"الملاحظة — ما تم رصده"},{key:"risks",label:"المخاطر / الآثار المترتبة"},{key:"rec",label:"التوصية"}];
  var engCtx2=useContext(EngCtx);
  var engObj=engCtx2&&engCtx2.engagements?engCtx2.engagements.find(function(x){return x.id===f.audit;}):null;
  var engRef=engObj?(engObj.code||("AUD-"+String(engObj.id||"").slice(-3).padStart(3,"0"))):"";
  var linkedLabel=engObj?(engRef?" "+engRef+" — ":"")+engObj.title:f.audit||"—";

  const startEdit=function(){setEditForm({title:f.title||"",risk:f.risk||"مرتفع",status:f.status||"مفتوح",intro:f.intro||"",observation:f.observation||"",risks:f.risks||"",rec:f.rec||"",mgmt:f.mgmt||"",mgmtReply:f.mgmtReply||"",actionPlan:f.actionPlan||"",owner:f.owner||"",due:f.due||""});setEditing(true);};
  const saveEdit=function(){if(onUpdate){var changed={};Object.keys(editForm).forEach(function(k){if(String(editForm[k]||"")!==String(f[k]||""))changed[k]=editForm[k];});if(Object.keys(changed).length>0)onUpdate(f.id,changed);}setEditing(false);};
  const setEF=function(k){return function(v){setEditForm(function(prev){var n={};Object.keys(prev).forEach(function(pk){n[pk]=prev[pk];});n[k]=v;return n;});};};
  const saveSide=function(k){if(onUpdate){var u={};u[k]=sideVal;onUpdate(f.id,u);}setSideField(null);};

  const nowStr=function(){var d=new Date();return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();};
  const sendForReview=function(){if(onUpdate)onUpdate(f.id,{approvalStatus:"under_review",submittedAt:nowStr(),returnComment:"",returnedBy:"",returnedAt:""});};
  const approveFinding=function(){if(onUpdate)onUpdate(f.id,{approvalStatus:"approved",approvedBy:currentUser?currentUser.name:"",approvedAt:nowStr()});};
  const returnFinding=function(){if(!returnText.trim())return;if(onUpdate)onUpdate(f.id,{approvalStatus:"returned",returnComment:returnText,returnedBy:currentUser?currentUser.name:"",returnedAt:nowStr(),approvedBy:"",approvedAt:""});setShowReturnInput(false);setReturnText("");};

  const handleEditFiles=function(files){var newAtts=Array.from(files).map(function(file){var ext=file.name.split(".").pop().toLowerCase();var tp=["xlsx","xls","csv"].includes(ext)?"xlsx":ext==="pdf"?"pdf":["docx","doc"].includes(ext)?"docx":"file";return{id:Date.now()+Math.random(),name:file.name,size:Math.round(file.size/1024)+" KB",type:tp,_file:file,_url:URL.createObjectURL(file)};});if(onUpdate)onUpdate(f.id,{attachments:[...(f.attachments||[]),...newAtts]});};

  const taS={width:"100%",border:"1px solid #BAE6FD",borderRadius:8,padding:"8px 10px",fontSize:13,fontFamily:"inherit",direction:"rtl",outline:"none",lineHeight:1.7,resize:"vertical",background:"#F0F9FF",boxSizing:"border-box",color:"#1E293B"};
  const inS={border:"1px solid #BAE6FD",borderRadius:8,padding:"6px 10px",fontSize:12,fontFamily:"inherit",direction:"rtl",outline:"none",background:"#F0F9FF",boxSizing:"border-box",color:"#1E293B",width:"100%"};
  function Pill2({label,cfg}){return <span style={{background:cfg?cfg.bg:"#F1F5F9",color:cfg?cfg.text:"#475569",fontSize:11,fontWeight:700,padding:"2px 9px",borderRadius:20}}>{label}</span>;}
  function SecLbl({label}){return <div style={{fontSize:10,fontWeight:700,color:GRN2,marginBottom:7,borderRight:"2px solid "+GRN2,paddingRight:7,letterSpacing:"0.04em"}}>{label}</div>;}

  return(
    <div style={{background:"white",borderRadius:12,border:"1.5px solid "+(isApproved?"#BBF7D0":approvalSt==="returned"?"#FDE68A":approvalSt==="under_review"?"#BFDBFE":"#E9EEF4"),boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}}>
      {/* HEADER */}
      <div style={{background:GRN2,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
          <div style={{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className="ti ti-alert-triangle" style={{color:GOLD2,fontSize:15}}/></div>
          <div style={{minWidth:0}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.35)",fontFamily:"monospace",marginBottom:1}}>{f.id}</div>
            {editing?<input value={editForm.title||""} onChange={function(ev){setEF("title")(ev.target.value);}} style={{width:"100%",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.35)",borderRadius:6,padding:"4px 8px",color:"white",fontSize:13,fontWeight:700,outline:"none",fontFamily:"inherit"}}/>
              :<div style={{fontSize:13,fontWeight:700,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.title}</div>}
          </div>
          <span style={{display:"inline-flex",alignItems:"center",borderRadius:20,overflow:"hidden",fontSize:10,flexShrink:0}}>
            <span style={{background:"rgba(255,255,255,.14)",color:"rgba(255,255,255,.7)",padding:"2px 8px"}}>مستوى الخطر:</span>
            <span style={{background:rc.bg,color:rc.text,padding:"2px 10px",fontWeight:700}}>{f.risk}</span>
          </span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
          <span style={{background:ac.bg,color:ac.c,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20,border:"1px solid "+ac.border,display:"flex",alignItems:"center",gap:4}}><i className={"ti "+ac.icon} style={{fontSize:11}}/>{ac.l}</span>
          <span style={{background:sc.bg,color:sc.text,fontSize:10,fontWeight:700,padding:"2px 10px",borderRadius:20}}>{f.status}</span>
          {canEdit&&!editing&&<button onClick={startEdit} style={{background:"rgba(255,255,255,.1)",border:"0.5px solid rgba(255,255,255,.2)",borderRadius:6,color:"rgba(255,255,255,.65)",cursor:"pointer",padding:"3px 8px",fontSize:10,fontFamily:"inherit"}}>✏ تعديل</button>}
          {editing&&<><button onClick={saveEdit} style={{background:GOLD2,border:"none",borderRadius:6,color:"white",cursor:"pointer",padding:"3px 8px",fontSize:10,fontFamily:"inherit",fontWeight:600}}>💾 حفظ</button><button onClick={function(){setEditing(false);}} style={{background:"rgba(239,68,68,.3)",border:"none",borderRadius:6,color:"white",cursor:"pointer",padding:"3px 8px",fontSize:10,fontFamily:"inherit"}}>✕</button></>}
          {isApproved&&!editing&&canApprove&&<div style={{position:"relative"}}><button onClick={function(){setShowStatusMenu(function(v){return !v;});}} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px",background:GOLD2,border:"none",borderRadius:6,fontSize:10,color:"white",cursor:"pointer",fontFamily:"inherit"}}><i className="ti ti-chevron-down" style={{fontSize:11}}/> الحالة</button>
            {showStatusMenu&&<div style={{position:"absolute",left:0,top:"110%",background:"white",border:"1px solid #E2E8F0",borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,.12)",zIndex:999,minWidth:160,overflow:"hidden"}}>
              {["مفتوح","قيد المعالجة","مغلق"].map(function(st){return <div key={st} onClick={function(){onChangeStatus&&onChangeStatus(f.id,st);setShowStatusMenu(false);}} style={{padding:"9px 14px",fontSize:12,cursor:"pointer",color:"#334155",borderBottom:"0.5px solid #F1F5F9",background:f.status===st?"#F0F9FF":"white",fontWeight:f.status===st?700:400}}>{st}</div>;})}
            </div>}
          </div>}
          {isMgr&&!editing&&<button onClick={function(){if(window.confirm("حذف الملاحظة؟"))onDelete&&onDelete(f.id);}} style={{padding:"3px 7px",background:"rgba(239,68,68,.2)",border:"none",borderRadius:6,color:"#FCA5A5",cursor:"pointer"}}><i className="ti ti-trash" style={{fontSize:13}}/></button>}
        </div>
      </div>
      {/* META BAR */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",padding:"10px 18px",gap:10,background:"#FAFBFC",borderBottom:"1px solid #F1F5F9"}}>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>رقم الملاحظة</div><span style={{fontSize:12,fontWeight:700,color:"#334155",fontFamily:"monospace"}}>{f.id}</span></div>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>الحالة</div><Pill2 label={f.status} cfg={sc}/></div>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>مستوى الخطر</div>{editing?<select value={editForm.risk||""} onChange={function(ev){setEF("risk")(ev.target.value);}} style={{fontSize:11,border:"1px solid #BAE6FD",borderRadius:6,padding:"2px 6px",background:"#F0F9FF",fontFamily:"inherit",outline:"none"}}>{["حرج","مرتفع","متوسط","منخفض"].map(function(r){return <option key={r}>{r}</option>;})}</select>:<Pill2 label={f.risk} cfg={rc}/>}</div>
        <div><div style={{fontSize:10,color:"#94A3B8",fontWeight:600,marginBottom:5}}>المرتبطة بـ</div><span style={{fontSize:12,fontWeight:500,color:"#334155"}}>{linkedLabel||"—"}</span></div>
      </div>
      {/* شريط الإعادة */}
      {approvalSt==="returned"&&f.returnComment&&(
        <div style={{background:"#FFFBEB",borderBottom:"1px solid #FDE68A",padding:"10px 18px",display:"flex",alignItems:"flex-start",gap:8}}>
          <i className="ti ti-arrow-back-up" style={{fontSize:14,color:"#D97706",flexShrink:0,marginTop:1}}/>
          <div><div style={{fontSize:10,fontWeight:700,color:"#92400E",marginBottom:3}}>تعليق القائد {f.returnedBy?"("+f.returnedBy+")":""} — سبب الإعادة:</div><div style={{fontSize:12,color:"#78350F",lineHeight:1.6}}>{f.returnComment}</div></div>
        </div>
      )}
      {/* BODY */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 280px"}}>
        <div style={{borderLeft:"1px solid #F1F5F9",padding:"20px 22px",display:"flex",flexDirection:"column",gap:16}}>
          {SECS.map(function(s){return(
            <div key={s.key}><SecLbl label={s.label}/>{editing?<textarea rows={4} value={editForm[s.key]||""} onChange={function(ev){var v=ev.target.value;setEF(s.key)(v);}} style={taS}/>:<div style={{fontSize:13,color:"#475569",lineHeight:1.85,whiteSpace:"pre-line"}}>{f[s.key]||<span style={{color:"#CBD5E1",fontStyle:"italic"}}>لم يُضَف بعد</span>}</div>}</div>
          );})}
          <div style={{paddingTop:14,borderTop:"1px solid #F5F7FA"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:700,color:"#1E293B"}}><i className="ti ti-paperclip" style={{fontSize:13,color:GOLD2}}/> المرفقات ({(f.attachments||[]).length})</div>
              <input ref={editAttachRef} type="file" multiple={true} style={{display:"none"}} onChange={function(ev){handleEditFiles(ev.target.files);ev.target.value="";}}/>
              <button onClick={function(){editAttachRef.current&&editAttachRef.current.click();}} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px",background:"white",border:"1px solid #E2E8F0",borderRadius:7,fontSize:11,color:"#475569",cursor:"pointer",fontFamily:"inherit"}}><i className="ti ti-plus" style={{fontSize:11}}/> إرفاق</button>
            </div>
            {(f.attachments||[]).length===0?<div onClick={function(){editAttachRef.current&&editAttachRef.current.click();}} style={{border:"1px dashed #CBD5E1",borderRadius:8,padding:"10px",textAlign:"center",cursor:"pointer",color:"#94A3B8",fontSize:11}}><i className="ti ti-paperclip" style={{fontSize:16,display:"block",marginBottom:3}}/> إرفاق ملف</div>
              :<div style={{display:"flex",flexDirection:"column",gap:5}}>{(f.attachments||[]).map(function(att,i){var ec={"pdf":"#DC2626","xlsx":"#16A34A","docx":"#2563EB"}[att.type]||"#6B7280";var ebg={"pdf":"#FEE2E2","xlsx":"#DCFCE7","docx":"#DBEAFE"}[att.type]||"#F1F5F9";return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#F8FAFC",border:"1px solid #E9EEF4",borderRadius:8}}>
                  <div style={{width:28,height:28,borderRadius:6,background:ebg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:ec,flexShrink:0}}>{att.type?att.type.toUpperCase().slice(0,3):"FILE"}</div>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:500,color:"#334155",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.name}</div>{att.size&&<div style={{fontSize:9,color:"#94A3B8"}}>{att.size}</div>}</div>
                  {att._url&&<a href={att._url} download={att.name} style={{color:"#94A3B8",textDecoration:"none"}}><i className="ti ti-download" style={{fontSize:14}}/></a>}
                </div>
              );})}
              </div>}
          </div>
        </div>
        <div style={{background:"white"}}>
          <div style={{padding:"14px 16px",borderBottom:"1px solid #F1F5F9"}}><SecLbl label="الإدارة المعنية"/>{editing?<input value={editForm.mgmt||""} onChange={function(ev){setEF("mgmt")(ev.target.value);}} style={inS} placeholder="اسم الإدارة"/>:<div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:24,height:24,borderRadius:"50%",background:"#E8F5FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#0EA5E9"}}>{(f.mgmt||"إ").charAt(0)}</div><span style={{fontSize:12,fontWeight:600,color:"#1E293B"}}>{f.mgmt||"—"}</span></div>}</div>
          <div style={{padding:"14px 16px",borderBottom:"1px solid #F1F5F9"}}><SecLbl label="رد الإدارة المعنية"/>{editing?<textarea rows={3} value={editForm.mgmtReply||""} onChange={function(ev){setEF("mgmtReply")(ev.target.value);}} style={taS}/>:sideField==="mgmtReply"?<div><textarea rows={3} value={sideVal} onChange={function(ev){setSideVal(ev.target.value);}} style={taS} autoFocus={true}/><div style={{display:"flex",gap:5,marginTop:5}}><button onClick={function(){saveSide("mgmtReply");}} style={{background:GRN2,color:"white",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>حفظ</button><button onClick={function(){setSideField(null);}} style={{background:"none",border:"1px solid #E2E8F0",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontFamily:"inherit",color:"#6B7280"}}>إلغاء</button></div></div>:f.mgmtReply?<div style={{fontSize:12,color:"#475569",lineHeight:1.7,cursor:canEdit?"pointer":"default"}} onClick={function(){if(canEdit){setSideField("mgmtReply");setSideVal(f.mgmtReply||"");}}}>{f.mgmtReply}</div>:<div style={{textAlign:"center",padding:"6px 0"}}><div style={{width:34,height:34,borderRadius:8,background:"#F8FAFC",border:"1px dashed #CBD5E1",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 6px"}}><i className="ti ti-message-circle" style={{fontSize:15,color:"#94A3B8"}}/></div><div style={{fontSize:11,color:"#94A3B8",marginBottom:6}}>لم يتم تقديم رد بعد</div>{canEdit&&<button onClick={function(){setSideField("mgmtReply");setSideVal("");}} style={{background:GRN2,color:"white",border:"none",borderRadius:7,padding:"5px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",width:"100%"}}>إضافة رد الإدارة</button>}</div>}</div>
          <div style={{padding:"14px 16px",borderBottom:"1px solid #F1F5F9"}}><SecLbl label="خطة المعالجة"/>{editing?<textarea rows={3} value={editForm.actionPlan||""} onChange={function(ev){setEF("actionPlan")(ev.target.value);}} style={taS}/>:sideField==="actionPlan"?<div><textarea rows={3} value={sideVal} onChange={function(ev){setSideVal(ev.target.value);}} style={taS} autoFocus={true}/><div style={{display:"flex",gap:5,marginTop:5}}><button onClick={function(){saveSide("actionPlan");}} style={{background:GRN2,color:"white",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>حفظ</button><button onClick={function(){setSideField(null);}} style={{background:"none",border:"1px solid #E2E8F0",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer",fontFamily:"inherit",color:"#6B7280"}}>إلغاء</button></div></div>:f.actionPlan?<div style={{fontSize:12,color:"#475569",lineHeight:1.7,whiteSpace:"pre-line",cursor:canEdit?"pointer":"default"}} onClick={function(){if(canEdit){setSideField("actionPlan");setSideVal(f.actionPlan||"");}}}>{f.actionPlan}</div>:<div style={{textAlign:"center",padding:"6px 0"}}><div style={{width:34,height:34,borderRadius:8,background:"#F8FAFC",border:"1px dashed #CBD5E1",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 6px"}}><i className="ti ti-clipboard-list" style={{fontSize:15,color:"#94A3B8"}}/></div><div style={{fontSize:11,color:"#94A3B8",marginBottom:6}}>لم تحدد بعد</div>{canEdit&&<button onClick={function(){setSideField("actionPlan");setSideVal("");}} style={{background:GRN2,color:"white",border:"none",borderRadius:7,padding:"5px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",width:"100%"}}>إضافة خطة معالجة</button>}</div>}</div>
          <div style={{padding:"14px 16px"}}>{editing?<div style={{display:"flex",flexDirection:"column",gap:7}}><div><div style={{fontSize:10,fontWeight:600,color:"#64748B",marginBottom:3}}>المسؤول</div><input value={editForm.owner||""} onChange={function(ev){setEF("owner")(ev.target.value);}} style={inS} placeholder="اسم المسؤول"/></div><div><div style={{fontSize:10,fontWeight:600,color:"#64748B",marginBottom:3}}>موعد تطبيق خطة المعالجة</div><input type="date" value={editForm.due||""} onChange={function(ev){setEF("due")(ev.target.value);}} style={inS}/></div></div>:<div>{[{i:"ti-calendar-event",l:"موعد تطبيق خطة المعالجة",v:f.due},{i:"ti-user",l:"المسؤول",v:f.owner},{i:"ti-calendar-plus",l:"تاريخ الإنشاء",v:f.opened||""},{i:"ti-user-check",l:"أعدّه",v:f.preparedBy||""}].map(function(r,i){return(<div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:i<3?"1px solid #F8FAFC":"none"}}><i className={"ti "+r.i} style={{fontSize:12,color:"#94A3B8",width:15,textAlign:"center",flexShrink:0}}/><span style={{fontSize:11,color:"#64748B",flex:1}}>{r.l}</span><span style={{fontSize:11,fontWeight:600,color:"#334155"}}>{r.v||"—"}</span></div>);})}</div>}</div>
        </div>
      </div>
      {/* شريط اعتماد القائد */}
      {approvalSt==="under_review"&&canApprove&&!showReturnInput&&(
        <div style={{background:"#EFF6FF",borderTop:"1px solid #BFDBFE",padding:"12px 18px",display:"flex",alignItems:"center",gap:10}}>
          <i className="ti ti-eye" style={{fontSize:14,color:"#0891B2",flexShrink:0}}/>
          <span style={{fontSize:12,color:"#0369A1",flex:1}}>الملاحظة بانتظار مراجعتك واعتمادك</span>
          <button onClick={approveFinding} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px",background:GRN2,color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-circle-check" style={{fontSize:13}}/> اعتماد الملاحظة</button>
          <button onClick={function(){setShowReturnInput(true);}} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",background:"white",color:"#D97706",border:"1px solid #FDE68A",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-arrow-back-up" style={{fontSize:13}}/> إعادة مع تعليق</button>
        </div>
      )}
      {/* مربع تعليق الإعادة */}
      {approvalSt==="under_review"&&canApprove&&showReturnInput&&(
        <div style={{background:"#FFFBEB",borderTop:"1px solid #FDE68A",padding:"14px 18px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#92400E",marginBottom:8,display:"flex",alignItems:"center",gap:6}}><i className="ti ti-arrow-back-up" style={{fontSize:13}}/> سبب الإعادة (مطلوب)</div>
          <textarea value={returnText} onChange={function(ev){setReturnText(ev.target.value);}} rows={3} placeholder="اكتب سبب الإعادة والملاحظات المطلوبة للمراجع..." style={{width:"100%",border:"1.5px solid "+(returnText.trim()?"#FED7AA":"#E5E7EB"),borderRadius:8,padding:"8px 12px",fontSize:12,fontFamily:"inherit",direction:"rtl",outline:"none",lineHeight:1.7,resize:"none",background:"white",boxSizing:"border-box"}}/>
          {!returnText.trim()&&<div style={{fontSize:11,color:"#EF4444",marginTop:4}}>هذا الحقل مطلوب</div>}
          <div style={{display:"flex",gap:8,marginTop:10,justifyContent:"flex-end"}}>
            <button onClick={function(){setShowReturnInput(false);setReturnText("");}} style={{padding:"6px 14px",background:"white",border:"1px solid #E2E8F0",borderRadius:8,fontSize:12,cursor:"pointer",color:"#475569",fontFamily:"inherit"}}>إلغاء</button>
            <button onClick={returnFinding} disabled={!returnText.trim()} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 16px",background:returnText.trim()?"#D97706":"#E2E8F0",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:returnText.trim()?"pointer":"not-allowed",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-send" style={{fontSize:12}}/> إرسال الإعادة</button>
          </div>
        </div>
      )}
      {/* FOOTER */}
      <div style={{padding:"11px 18px",background:ac.bg,borderTop:"0.5px solid "+ac.border,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {f.preparedBy&&<div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:28,height:28,borderRadius:"50%",background:"#DBEAFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#1D4ED8"}}>{(f.preparedBy||"م").charAt(0)}</div><div><div style={{fontSize:9,color:"#6B7280",fontWeight:600}}>أعدّه · Prepared By</div><div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{f.preparedBy}</div>{f.preparedAt&&<div style={{fontSize:9,color:"#9CA3AF"}}>{f.preparedAt}</div>}</div></div>}
          {approvalSt==="approved"&&f.approvedBy&&<><div style={{width:"0.5px",height:32,background:ac.border}}/><div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:28,height:28,borderRadius:"50%",background:"#FEF9EC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:GOLD2}}>{(f.approvedBy||"م").charAt(0)}</div><div><div style={{fontSize:9,color:"#6B7280",fontWeight:600}}>اعتمده · Approved By</div><div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{f.approvedBy}</div>{f.approvedAt&&<div style={{fontSize:9,color:"#9CA3AF"}}>{f.approvedAt}</div>}</div><i className="ti ti-circle-check" style={{fontSize:17,color:"#16A34A"}}/></div></>}
          {approvalSt==="under_review"&&<span style={{fontSize:11,color:"#0891B2",display:"flex",alignItems:"center",gap:5,background:"#EFF6FF",padding:"4px 10px",borderRadius:8,border:"1px solid #BFDBFE"}}><i className="ti ti-clock" style={{fontSize:11}}/> بانتظار اعتماد القائد</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          {(approvalSt==="draft"||approvalSt==="returned")&&!isMgr&&<button onClick={sendForReview} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 16px",background:"#0D1F42",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-send" style={{fontSize:12}}/>{approvalSt==="returned"?"إعادة الإرسال للاعتماد":"إرسال للاعتماد"}</button>}
          {approvalSt==="draft"&&isMgr&&<button onClick={approveFinding} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 16px",background:GRN2,color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}><i className="ti ti-circle-check" style={{fontSize:12}}/> اعتماد مباشر</button>}
        </div>
      </div>
    </div>
  );
}


function Findings(){
  const NAVY2="#0D1F42",GRN2="#1E3A2F",GOLD2="#C8A84B";
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const findCtx=useContext(FindingsCtx);
  const allFindings=findCtx&&findCtx.findings?findCtx.findings:[];
  const update=findCtx&&findCtx.update?findCtx.update:function(){};
  const engCtxF=useContext(EngCtx);
  const ENG=engCtxF&&engCtxF.engagements?engCtxF.engagements:[];
  const data=isMgr?allFindings:allFindings.filter(function(f){
    return !f.audit||(auth&&auth.canAccessEng&&auth.canAccessEng(f.audit));
  });

  const [logModal,setLogModal]=useState(null);
  const [logDate,setLogDate]=useState("");
  const [logNote,setLogNote]=useState("");
  const [selEng,setSelEng]=useState(null);
  const [tracking,setTracking]=useState({});
  const [calYear,setCalYear]=useState(new Date().getFullYear());
  const [calMonth,setCalMonth]=useState(new Date().getMonth());
  const [calSelDay,setCalSelDay]=useState(null);

  const getT=function(id){return tracking[id]||{stage:"not_sent",sentAt:"",r1Sent:false,r2Sent:false,r3Sent:false,escalated:false,notes:""};};
  const setT=function(id,patch){setTracking(function(p){var cur=getT(id);return Object.assign({},p,{[id]:Object.assign({},cur,patch)});});};

  // ── Helpers — defined first ──
  const getEngObj=function(id){return ENG.find(function(e){return e.id===id;})||null;};
  const getEngTitle=function(id){var e=getEngObj(id);return e?e.title:id||"—";};
  const getEngCode=function(id){var e=getEngObj(id);return e?(e.code||id):id||"—";};

  // Add N working days — Sunday(0) to Thursday(4) are work days; Friday(5) Sat(6) are off
  const addWorkDays=function(dateStr,n){
    if(!dateStr||!n)return null;
    var d=new Date(dateStr);
    var added=0;
    while(added<n){d.setDate(d.getDate()+1);var dw=d.getDay();if(dw!==5&&dw!==6)added++;}
    return d.toISOString().slice(0,10);
  };

  const daysDiff=function(dateStr){
    if(!dateStr)return null;
    return Math.ceil((new Date(dateStr)-new Date())/(1000*60*60*24));
  };

  const fmtDate=function(d){
    if(!d)return"—";
    try{
      var p=d.split("-");
      if(p.length===3)return p[2]+"/"+p[1]+"/"+p[0];
      return d;
    }catch(e){return d;}
  };

  // Compute schedule from sent date: R1=+6wd, R2=+12wd, R3=+18wd, deadline=+25wd
  const computeSchedule=function(sentAt){
    if(!sentAt)return null;
    return{
      r1Date:addWorkDays(sentAt,6),
      r2Date:addWorkDays(sentAt,12),
      r3Date:addWorkDays(sentAt,18),
      deadline:addWorkDays(sentAt,25),
    };
  };

  // What is the NEXT action and when
  const computeNextAction=function(t){
    if(!t||t.stage==="not_sent")return{action:"إرسال التقرير",date:null,stage:"not_sent"};
    if(t.stage==="closed")return{action:"مغلقة",date:null,stage:"closed"};
    if(t.stage==="escalation")return{action:"انتظار رد التصعيد",date:null,stage:"escalation"};
    var sch=computeSchedule(t.sentAt);
    if(!sch)return null;
    if(!t.r1Sent)return{action:"إرسال التذكير الأول",  date:sch.r1Date, stage:"reminder1"};
    if(!t.r2Sent)return{action:"إرسال التذكير الثاني", date:sch.r2Date, stage:"reminder2"};
    if(!t.r3Sent)return{action:"إرسال التذكير الثالث", date:sch.r3Date, stage:"reminder3"};
    return{action:"انتهاء المهلة — التصعيد",date:sch.deadline,stage:"escalation_due"};
  };

  const STAGE_CFG={
    not_sent:      {l:"لم يُرسَل",        c:"#94A3B8",bg:"#F1F5F9",border:"#E2E8F0",icon:"ti-mail"},
    sent:          {l:"أُرسل التقرير",    c:"#0891B2",bg:"#F0F9FF",border:"#BAE6FD",icon:"ti-mail-check"},
    reminder1:     {l:"تم التذكير الأول", c:"#D97706",bg:"#FFFBEB",border:"#FDE68A",icon:"ti-bell"},
    reminder2:     {l:"تم التذكير الثاني",c:"#D97706",bg:"#FFFBEB",border:"#FDE68A",icon:"ti-bell"},
    reminder3:     {l:"تم التذكير الثالث",c:"#EA580C",bg:"#FFF7ED",border:"#FED7AA",icon:"ti-bell-ringing"},
    escalation:    {l:"مرحلة التصعيد",    c:"#DC2626",bg:"#FEF2F2",border:"#FECACA",icon:"ti-arrow-up"},
    closed:        {l:"مغلقة",            c:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0",icon:"ti-circle-check"},
  };

  const URGENCY={
    critical:{dot:"#DC2626",bg:"#FEE2E2",text:"#991B1B",border:"#FECACA",label:"عاجل"},
    high:    {dot:"#EA580C",bg:"#FFF7ED",text:"#9A3412",border:"#FED7AA",label:"مهم"},
    medium:  {dot:"#D97706",bg:"#FFFBEB",text:"#854D0E",border:"#FDE68A",label:"قريب"},
    normal:  {dot:"#94A3B8",bg:"#F8FAFC",text:"#475569",border:"#E9EEF4",label:"قادم"},
  };

  // Group findings by engagement
  var engMap={};
  data.forEach(function(f){if(!f.audit)return;if(!engMap[f.audit])engMap[f.audit]={id:f.audit,findings:[]};engMap[f.audit].findings.push(f);});

  var engGroups=Object.values(engMap).map(function(eg){
    var t=getT(eg.id);
    var next=computeNextAction(t);
    var sch=t.sentAt?computeSchedule(t.sentAt):null;
    var dl=next&&next.date?daysDiff(next.date):null;
    var urgency=t.stage==="not_sent"?"normal":t.stage==="closed"?"normal":t.stage==="escalation"?"critical":dl===null?"normal":dl<0?"critical":dl<=2?"critical":dl<=5?"high":"medium";
    return Object.assign({},eg,{t:t,next:next,sch:sch,dl:dl,urgency:urgency});
  }).sort(function(a,b){
    var p={"critical":0,"high":1,"medium":2,"normal":3};return(p[a.urgency]||3)-(p[b.urgency]||3);
  });

  // Build calendar events map
  var calEvents={};
  var addCalEv=function(dateStr,ev){if(!dateStr)return;if(!calEvents[dateStr])calEvents[dateStr]=[];calEvents[dateStr].push(ev);};
  engGroups.forEach(function(eg){
    var t=eg.t;var sch=eg.sch;var code=getEngCode(eg.id);
    if(!sch||t.stage==="not_sent"||t.stage==="closed")return;
    if(!t.r1Sent)addCalEv(sch.r1Date,{code:code,label:"تذكير ١",urgency:daysDiff(sch.r1Date)<0?"critical":daysDiff(sch.r1Date)<=3?"high":"medium"});
    if(!t.r2Sent)addCalEv(sch.r2Date,{code:code,label:"تذكير ٢",urgency:daysDiff(sch.r2Date)<0?"critical":daysDiff(sch.r2Date)<=3?"high":"medium"});
    if(!t.r3Sent)addCalEv(sch.r3Date,{code:code,label:"تذكير ٣",urgency:daysDiff(sch.r3Date)<0?"critical":daysDiff(sch.r3Date)<=3?"high":"medium"});
    addCalEv(sch.deadline,{code:code,label:"نهاية المهلة",urgency:"critical"});
  });

  // Log action handler
  const doLog=function(){
    if(!logModal)return;
    var id=logModal.engId;var stage=logModal.nextStage;
    if(stage==="reset"){setT(id,{stage:"not_sent",sentAt:"",r1Sent:false,r2Sent:false,r3Sent:false,escalated:false,notes:"",closedAt:"",responseDate:""});setLogModal(null);setLogDate("");setLogNote("");return;}
    if(!logDate){alert("يرجى تحديد تاريخ الإجراء");return;}
    var d=new Date(logDate);if(isNaN(d.getTime())){alert("تاريخ غير صحيح");return;}
    if(stage==="sent")          setT(id,{stage:"sent",sentAt:logDate,r1Sent:false,r2Sent:false,r3Sent:false,escalated:false,notes:logNote,closedAt:"",responseDate:""});
    else if(stage==="r1")       setT(id,{stage:"reminder1",r1Sent:true,r1Date:logDate});
    else if(stage==="r2")       setT(id,{stage:"reminder2",r2Sent:true,r2Date:logDate});
    else if(stage==="r3")       setT(id,{stage:"reminder3",r3Sent:true,r3Date:logDate});
    else if(stage==="escalation")setT(id,{stage:"escalation",escalatedAt:logDate});
    else if(stage==="response") setT(id,{stage:"closed",closedAt:logDate,responseDate:logDate,notes:logNote||getT(id).notes});
    else if(stage==="closed")   setT(id,{stage:"closed",closedAt:logDate});
    setLogModal(null);setLogDate("");setLogNote("");
  };

  // Calendar
  const MONTH_NAMES=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const DAY_NAMES=["أحد","اثن","ثلا","أرب","خمي","جمع","سبت"];
  var firstDay=new Date(calYear,calMonth,1).getDay(); // 0=Sun
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var todayStr=new Date().toISOString().slice(0,10);

  // Selected day events
  var selDayEvents=calSelDay?(calEvents[calSelDay]||[]):[];
  var selDayEngGroups=selDayEvents.map(function(ev){return engGroups.find(function(eg){return getEngCode(eg.id)===ev.code;})||null;}).filter(Boolean);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* Log Modal */}
      <Modal open={!!logModal} onClose={function(){setLogModal(null);setLogDate("");setLogNote("");}} title={logModal?logModal.actionLabel:""}>
        {logModal&&(
          <div>
            <div style={{background:"#F0FDF4",borderRadius:10,padding:"12px 14px",marginBottom:14,border:"1px solid #BBF7D0"}}>
              <div style={{fontSize:11,color:"#166534"}}>المهمة</div>
              <div style={{fontSize:13,fontWeight:700,color:NAVY2,marginTop:2}}>{getEngCode(logModal.engId)} — {getEngTitle(logModal.engId)}</div>
              {logModal.suggestedDate&&<div style={{fontSize:11,color:"#64748B",marginTop:6}}>الموعد المقترح: <strong style={{color:GRN2}}>{fmtDate(logModal.suggestedDate)}</strong></div>}
            </div>
            <FR label="تاريخ تنفيذ الإجراء *">
              <input type="date" style={INP} value={logDate} onChange={function(ev){setLogDate(ev.target.value);}}/>
            </FR>
            {(logModal.nextStage==="sent"||logModal.nextStage==="response")&&(
              <FR label="ملاحظة (اختياري)">
                <textarea rows={2} style={{...INP,height:60,resize:"none",lineHeight:1.6}} value={logNote} onChange={function(ev){setLogNote(ev.target.value);}} placeholder={logModal.nextStage==="response"?"ملخص الرد الوارد...":"ملاحظات حول الإرسال..."}/>
              </FR>
            )}
            {logModal.nextStage==="reset"&&(
              <div style={{background:"#FEF2F2",borderRadius:8,padding:"12px",border:"1px solid #FECACA",fontSize:12,color:"#991B1B",marginBottom:8}}>
                سيتم حذف جميع بيانات المتابعة لهذه المهمة وإعادتها للحالة الابتدائية. هل أنت متأكد؟
              </div>
            )}

                  <div style={{textAlign:"center",color:"#CBD5E1",padding:"10px 0",fontSize:11}}>لا توجد إجراءات هذا اليوم</div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {(calEvents[calSelDay]||[]).map(function(ev,j){
                      var uc3=URGENCY[ev.urgency]||URGENCY.normal;
                      return(
                        <div key={j} style={{background:uc3.bg,borderRadius:8,padding:"7px 10px",borderRight:"3px solid "+uc3.dot}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:10,fontWeight:700,color:uc3.text}}>{ev.label}</span>
                            <span style={{fontSize:10,color:"#94A3B8"}}>·</span>
                            <span style={{fontSize:10,fontFamily:"monospace",color:NAVY2,fontWeight:600}}>{ev.code}</span>
                          </div>
                          <div style={{fontSize:11,color:uc3.text,marginTop:2,fontWeight:600}}>{(function(){var eg2=engGroups.find(function(eg){return getEngCode(eg.id)===ev.code;});return eg2?getEngTitle(eg2.id):"—";})()}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ):(
              <div style={{padding:"16px 12px",textAlign:"center",color:"#CBD5E1"}}>
                <i className="ti ti-hand-click" style={{fontSize:22,display:"block",marginBottom:4}}/>
                <div style={{fontSize:10}}>اضغط على يوم لعرض تفاصيله</div>
              </div>
            )}
          </div>

          {/* Legend */}
          <div style={{padding:"7px 12px",background:"#F8FAFC",borderTop:"1px solid #E9EEF4",display:"flex",gap:10,flexWrap:"wrap"}}>
            {[{l:"عاجل",c:"#DC2626"},{l:"مهم",c:"#EA580C"},{l:"قريب",c:"#D97706"},{l:"قادم",c:"#94A3B8"}].map(function(k){return(
              <div key={k.l} style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:"#64748B"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:k.c}}/>
                {k.l}
              </div>
            );})}
          </div>
        </div>
      </div>
    </div>
  );
}
