/* ═══════════════════════════════════════════════
   SELF-CONTAINED DOCX GENERATOR  (no CDN needed)
═══════════════════════════════════════════════ */
(function(){

// ── CRC32 table ──
const CRC_T=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i>>>0;for(let j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF>>>0;for(let i=0;i<b.length;i++)c=((CRC_T[(c^b[i])&0xFF])^(c>>>8))>>>0;return(c^0xFFFFFFFF)>>>0;}

// ── helpers ──
function u16(n){return[n&0xFF,(n>>8)&0xFF];}
function u32(n){n=n>>>0;return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
const ENC=new TextEncoder();
function eb(s){return ENC.encode(s);}
function escX(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Uncompressed (STORED) ZIP ──
function makeZip(files){
  // files: [{name:string, data:Uint8Array}]
  const lparts=[];
  const cdir=[];
  let off=0;

  for(const f of files){
    const nb=eb(f.name);
    const cr=crc32(f.data);
    const sz=f.data.length;
    const lh=new Uint8Array([
      0x50,0x4B,0x03,0x04,
      ...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(cr),...u32(sz),...u32(sz),
      ...u16(nb.length),...u16(0)
    ]);
    cdir.push({nb,cr,sz,off});
    off+=lh.length+nb.length+sz;
    lparts.push(lh,nb,f.data);
  }

  const cdStart=off;
  const cparts=[];
  for(const {nb,cr,sz,off:lo} of cdir){
    const cd=new Uint8Array([
      0x50,0x4B,0x01,0x02,
      ...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(cr),...u32(sz),...u32(sz),
      ...u16(nb.length),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(0),...u32(lo)
    ]);
    cparts.push(cd,nb);
  }
  const cdSz=cparts.reduce((s,p)=>s+p.length,0);

  const eocd=new Uint8Array([
    0x50,0x4B,0x05,0x06,
    ...u16(0),...u16(0),
    ...u16(files.length),...u16(files.length),
    ...u32(cdSz),...u32(cdStart),...u16(0)
  ]);

  const all=[...lparts,...cparts,eocd];
  const total=all.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total);
  let pos=0;
  for(const p of all){out.set(p,pos);pos+=p.length;}
  return out;
}

// ── OOXML helpers ──
const RCLR={حرج:"C62828",مرتفع:"B71C1C",متوسط:"E65100",منخفض:"1B5E20"};
const RBGC={حرج:"FFCDD2",مرتفع:"FFEBEE",متوسط:"FFF3E0",منخفض:"E8F5E9"};
const GREEN="2D6A4F";

function xmlPara(text,{bold,italic,color="000000",size=22,center}={}){
  return text.split('\n').map(line=>`<w:p>
    <w:pPr><w:bidi/><w:jc w:val="${center?'center':'right'}"/><w:spacing w:after="60"/><w:rPr><w:rtl/></w:rPr></w:pPr>
    <w:r><w:rPr>${bold?'<w:b/><w:bCs/>':''}${italic?'<w:i/>':''}
      <w:color w:val="${color}"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/><w:rtl/>
      <w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>
    </w:rPr><w:t xml:space="preserve">${escX(line)||' '}</w:t></w:r>
  </w:p>`).join('');
}

function xmlCell(content,w,{bg,span,vCenter}={}){
  const sp=span?`<w:gridSpan w:val="${span}"/>`:'';
  const sh=bg?`<w:shd w:val="clear" w:color="auto" w:fill="${bg}"/>`:'';
  const va=vCenter?`<w:vAlign w:val="center"/>`:'';
  return `<w:tc>
    <w:tcPr>
      <w:tcW w:w="${w}" w:type="dxa"/>
      ${sp}${sh}${va}
      <w:tcMar>
        <w:top w:w="100" w:type="dxa"/><w:left w:w="130" w:type="dxa"/>
        <w:bottom w:w="100" w:type="dxa"/><w:right w:w="130" w:type="dxa"/>
      </w:tcMar>
    </w:tcPr>
    ${content}
  </w:tc>`;
}

function labelCell(text,LW){
  return xmlCell(xmlPara(text,{bold:true,color:"FFFFFF",size:22,center:true}),LW,{bg:GREEN,vCenter:true});
}

function buildDocXml(report,findings){
  const TW=9026,LW=1700,CW=TW-LW;

  function findingTable(f,idx){
    const rc=RCLR[f.risk]||"C62828", rb=RBGC[f.risk]||"FFEBEE";
    const rows=[];

    // Title row
    rows.push(`<w:tr>
      ${xmlCell(xmlPara(`${idx}    ${f.title}`,{bold:true,color:"FFFFFF",size:26}),TW,{bg:GREEN,span:2})}
    </w:tr>`);

    // Risk row
    rows.push(`<w:tr>
      ${labelCell("مستوى المخاطر",LW)}
      ${xmlCell(xmlPara(f.risk,{bold:true,color:rc,size:24}),CW,{bg:rb,vCenter:true})}
    </w:tr>`);

    // Content rows
    const sections=[
      {label:"المقدمة",text:f.intro},
      {label:"الملاحظة",text:f.observation},
      {label:"المخاطر/ الآثار المترتبة",text:f.risks},
      {label:"التوصيات",text:f.rec},
    ];
    for(const {label,text} of sections){
      if(!text)continue;
      rows.push(`<w:tr>
        ${labelCell(label,LW)}
        ${xmlCell(xmlPara(text,{size:22}),CW)}
      </w:tr>`);
    }

    return `<w:tbl>
      <w:tblPr>
        <w:tblW w:w="${TW}" w:type="dxa"/>
        <w:bidiVisual/>
        <w:tblBorders>
          <w:top w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:left w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:bottom w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:right w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
          <w:insideH w:val="single" w:sz="4" w:space="0" w:color="CCCCCC"/>
          <w:insideV w:val="single" w:sz="4" w:space="0" w:color="${GREEN}"/>
        </w:tblBorders>
      </w:tblPr>
      <w:tblGrid>
        <w:gridCol w:w="${LW}"/>
        <w:gridCol w:w="${CW}"/>
      </w:tblGrid>
      ${rows.join('')}
    </w:tbl>
    <w:p><w:pPr><w:bidi/><w:spacing w:after="300"/></w:pPr></w:p>`;
  }

  const title=`
    <w:p><w:pPr><w:bidi/><w:jc w:val="center"/><w:spacing w:before="0" w:after="160"/><w:rPr><w:rtl/></w:rPr></w:pPr>
      <w:r><w:rPr><w:b/><w:bCs/><w:color w:val="${GREEN}"/><w:sz w:val="44"/><w:szCs w:val="44"/><w:rtl/><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/></w:rPr>
        <w:t>${escX(report.title)}</w:t></w:r></w:p>
    <w:p><w:pPr><w:bidi/><w:jc w:val="center"/><w:spacing w:after="400"/><w:rPr><w:rtl/></w:rPr></w:pPr>
      <w:r><w:rPr><w:color w:val="666666"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/></w:rPr>
        <w:t>تاريخ التقرير: ${escX(report.date)}    |    عدد الملاحظات: ${findings.length}</w:t></w:r></w:p>`;

  const tables=findings.length
    ? findings.map((f,i)=>findingTable(f,i+1)).join('')
    : `<w:p><w:pPr><w:bidi/><w:jc w:val="right"/><w:rPr><w:rtl/></w:rPr></w:pPr>
        <w:r><w:rPr><w:color w:val="999999"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/></w:rPr>
        <w:t>لا توجد ملاحظات مرتبطة بهذا التقرير.</w:t></w:r></w:p>`;

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  mc:Ignorable="wp">
  <w:body>
    ${title}${tables}
    <w:sectPr>
      <w:bidi/>
      <w:pgSz w:w="11906" w:h="16838"/>
      <w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/>
    </w:sectPr>
  </w:body>
</w:document>`;
}

// ── Main export ──
window.downloadDocx=function(report,findings){
  const CONTENT_TYPES=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

  const RELS=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1"
    Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument"
    Target="word/document.xml"/>
</Relationships>`;

  const DOC_RELS=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"/>`;

  const SETTINGS=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:bidi/>
  <w:defaultTabStop w:val="720"/>
</w:settings>`;

  try{
    const docXml=buildDocXml(report,findings);
    const zip=makeZip([
      {name:'[Content_Types].xml', data:eb(CONTENT_TYPES)},
      {name:'_rels/.rels',         data:eb(RELS)},
      {name:'word/_rels/document.xml.rels', data:eb(DOC_RELS)},
      {name:'word/settings.xml',   data:eb(SETTINGS)},
      {name:'word/document.xml',   data:eb(docXml)},
    ]);
    const blob=new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=(report.title||'تقرير المراجعة')+'.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    return true;
  }catch(e){
    alert('خطأ في التوليد: '+e.message);
    return false;
  }
};

})();
</script>

function BarChart({data}){
  const W=480,H=150,PL=28,PB=22;
  const max=Math.max(...data.map(d=>Math.max(d.p,d.c)))||1;
  const colW=(W-PL)/data.length;
  const bw=13,gap=3;
  const y=v=>H-(v/max)*H;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H+PB+10}`} preserveAspectRatio="xMidYMid meet">
      {[0,2,4,6].map(v=>(
        <line key={v} x1={PL} y1={y(v)} x2={W} y2={y(v)} stroke="#E5E7EB" strokeWidth={0.6}/>
      ))}
      {data.map((d,i)=>{
        const cx=PL+i*colW+colW/2;
        const ph=Math.max((d.p/max)*H,1), ch=Math.max((d.c/max)*H,1);
        return(
          <g key={i}>
            <rect x={cx-bw-gap/2} y={H-ph} width={bw} height={ph} fill="#BFDBFE" rx={3}/>
            <rect x={cx+gap/2} y={H-ch} width={bw} height={ch} fill={NAVY} rx={3}/>
            <text x={cx} y={H+PB-4} textAnchor="middle" fontSize={10} fill="#9CA3AF">{d.m.slice(0,3)}</text>
          </g>
        );
      })}
      <rect x={PL} y={H+PB+2} width={10} height={8} fill="#BFDBFE" rx={2}/>
      <text x={PL+13} y={H+PB+9} fontSize={10} fill="#6B7280">مخطط</text>
      <rect x={PL+56} y={H+PB+2} width={10} height={8} fill={NAVY} rx={2}/>
      <text x={PL+69} y={H+PB+9} fontSize={10} fill="#6B7280">منجز</text>
    </svg>
  );
}

function DonutChart({data,size=150}){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  const cx=size/2, cy=size/2, R=size/2-10, r=R*0.52;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sa=angle, sw=(d.v/total)*2*Math.PI;
    angle+=sw;
    const ea=angle;
    const cos1=Math.cos(sa),sin1=Math.sin(sa),cos2=Math.cos(ea),sin2=Math.sin(ea);
    const lg=sw>Math.PI?1:0;
    const path=`M${cx+R*cos1} ${cy+R*sin1} A${R} ${R} 0 ${lg} 1 ${cx+R*cos2} ${cy+R*sin2} L${cx+r*cos2} ${cy+r*sin2} A${r} ${r} 0 ${lg} 0 ${cx+r*cos1} ${cy+r*sin1}Z`;
    return{...d,path};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.f} stroke="white" strokeWidth={2}/>)}
    </svg>
  );
}

function PieChart({data,size=130}){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  const cx=size/2,cy=size/2,R=size/2-6;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sa=angle,sw=(d.v/total)*2*Math.PI;
    angle+=sw;
    const ea=angle;
    const lg=sw>Math.PI?1:0;
    const path=`M${cx} ${cy} L${cx+R*Math.cos(sa)} ${cy+R*Math.sin(sa)} A${R} ${R} 0 ${lg} 1 ${cx+R*Math.cos(ea)} ${cy+R*Math.sin(ea)}Z`;
    return{...d,path};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.f} stroke="white" strokeWidth={2}/>)}
    </svg>
  );
}

function Legend({data}){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {data.map((d,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12}}>
          <div style={{width:10,height:10,borderRadius:2,background:d.f,flexShrink:0}}/>
          <span style={{color:"#374151",flex:1}}>{d.n}</span>
          <span style={{fontWeight:700,color:NAVY}}>{d.v}</span>
          <span style={{color:"#9CA3AF",minWidth:30}}>{Math.round(d.v/total*100)}%</span>
        </div>
      ))}
    </div>
  );
}

      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:16,padding:28,width:540,maxWidth:"94vw",maxHeight:"86vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>

};

          <FR label="مستوى المخاطرة"><select style={INP} value={form.risk} onChange={e=>setForm(f=>({...f,risk:e.target.value}))}>{["مرتفع","متوسط","منخفض"].map(r=><option key={r}>{r}</option>)}</select></FR>
          <FR label="تكرار المراجعة"><select style={INP} value={form.freq} onChange={e=>setForm(f=>({...f,freq:e.target.value}))}>{["سنوي","نصف سنوي","ربع سنوي"].map(r=><option key={r}>{r}</option>)}</select></FR>

        <span style={{marginRight:"auto",fontSize:13,color:"#6B7280"}}>{list.length} وحدة</span>

            <tbody>
              {list.map((u,i)=>(
                <tr key={u.id} className="hrow" style={{cursor:"pointer"}}>

function AuditPlan(){
  const {engagements,addEng,updateEng,removeEng,monthsFromDates,statusFromMonths,progressFromMonths}=useContext(EngCtx);
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const emptyForm={title:"",risk:"مرتفع",lead:"",months:{}};
  const [form,setForm]=useState(emptyForm);
  const [filterRisk,setFilterRisk]=useState("الكل");

  const filtered=engagements.filter(e=>filterRisk==="الكل"||e.risk===filterRisk);

  const openAdd=()=>{setEditId(null);setForm(emptyForm);setModal(true);};
  const openEdit=e=>{setEditId(e.id);setForm({title:e.title,risk:e.risk,lead:e.lead||"",months:{...(e.months||{})}});setModal(true);};
  const del=id=>{if(confirm("حذف هذه المراجعة من الخطة والمهام؟"))removeEng(id);};
  const save=()=>{
    if(!form.title||form.title.trim().length<3){alert("يجب إدخال عنوان المهمة (٣ أحرف على الأقل)");return;}
    const months=form.months||{};
    const status=statusFromMonths(months);
    const progress=progressFromMonths(months);
    // derive start/end from months
    const mkeys=Object.keys(months).map(Number).sort((a,b)=>a-b);
    const startM=mkeys[0], endM=mkeys[mkeys.length-1];
    const startDate=startM?`2024-${String(startM).padStart(2,"0")}-01`:"";
    const endDate=endM?`2024-${String(endM).padStart(2,"0")}-28`:"";
    if(editId){
      updateEng(editId,{title:form.title,risk:form.risk,lead:form.lead,months,status,progress,start:startDate,end:endDate});
    } else {
      const newId=`AUD-2024-${String(engagements.length+1).padStart(3,"0")}`;
      addEng({id:newId,title:form.title,risk:form.risk,lead:form.lead||"",status,progress,start:startDate,end:endDate,months,findings:0});
    }
    setModal(false);setForm(emptyForm);setEditId(null);
  };

  const totals={total:engagements.length,done:0,inprog:0,planned:0};
  engagements.forEach(e=>{
    const v=Object.values(e.months||{});
    if(v.some(x=>x==="مكتمل"))totals.done++;
    if(v.some(x=>x==="قيد التنفيذ"))totals.inprog++;
    if(v.some(x=>x==="مخطط"))totals.planned++;
  });

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      <Modal open={modal} onClose={()=>{setModal(false);setForm(emptyForm);setEditId(null);}}
        title={editId?"تعديل مراجعة في الخطة السنوية":"إضافة مراجعة للخطة السنوية"}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{gridColumn:"span 2"}}>
            <FR label="منطقة / عنوان المراجعة">
              <input style={INP} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="مثال: مراجعة المشتريات والعقود"/>
            </FR>
          </div>
          <FR label="مستوى المخاطرة">
            <select style={INP} value={form.risk} onChange={e=>setForm(f=>({...f,risk:e.target.value}))}>
              {["حرج","مرتفع","متوسط","منخفض"].map(r=><option key={r}>{r}</option>)}
            </select>
          </FR>
          <FR label="قائد الفريق">
            <input style={INP} value={form.lead||""} onChange={e=>setForm(f=>({...f,lead:e.target.value}))} placeholder="اسم المسؤول"/>
          </FR>
        </div>
        <div style={{marginTop:6}}>
          <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>توزيع الأشهر والحالة</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {MOS.map((m,i)=>{
              const mi=i+1; const val=(form.months||{})[mi]||"";
              return(
                <div key={mi} style={{background:"#F9FAFB",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:11,color:"#9CA3AF",marginBottom:5,fontWeight:600}}>{m}</div>
                  <select value={val} onChange={e=>{const v=e.target.value;setForm(f=>{const nm={...(f.months||{})};if(v)nm[mi]=v;else delete nm[mi];return{...f,months:nm};});}}
                    style={{width:"100%",border:"1px solid #E5E7EB",borderRadius:6,padding:"4px 6px",fontSize:11,outline:"none",background:val?PSC[val]+"18":"white",color:val?PSC[val]:"#9CA3AF",fontWeight:val?700:400,cursor:"pointer"}}>
                    <option value="">--</option>
                    {["مكتمل","قيد التنفيذ","مراجعة","مخطط"].map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
          <Btn v="secondary" onClick={()=>{setModal(false);setForm(emptyForm);setEditId(null);}}>إلغاء</Btn>
          <Btn v="gold" onClick={save}>
            <i className={`ti ${editId?"ti-device-floppy":"ti-plus"}`}/>
            {editId?"حفظ التعديلات":"إضافة للخطة"}
          </Btn>
        </div>
      </Modal>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {Object.entries(PSC).map(([s,c])=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:12,height:12,borderRadius:3,background:c}}/><span style={{fontSize:12,color:"#6B7280"}}>{s}</span></div>
          ))}
          <span style={{color:"#E5E7EB",margin:"0 4px"}}>|</span>
          {["الكل","حرج","مرتفع","متوسط","منخفض"].map(r=>(
            <button key={r} onClick={()=>setFilterRisk(r)}
              style={{padding:"3px 10px",borderRadius:6,border:`1px solid ${filterRisk===r?NAVY:"#E5E7EB"}`,background:filterRisk===r?NAVY:"white",color:filterRisk===r?"white":"#374151",fontSize:11,cursor:"pointer"}}>
              {r}
            </button>
          ))}
        </div>
        {isMgr&&<Btn v="gold" onClick={openAdd}><i className="ti ti-plus"/>إضافة مراجعة</Btn>}
      </div>

      <Card sty={{overflowX:"auto"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:1020}}>
            <thead>
              <tr>
                <th style={{padding:"10px 12px",textAlign:"right",fontSize:12,fontWeight:700,color:"#4B5563",background:"#F9FAFB",borderBottom:"2px solid #E5E7EB",minWidth:190,position:"sticky",right:0,zIndex:2}}>منطقة المراجعة</th>
                <th style={{padding:"8px",background:"#F9FAFB",borderBottom:"2px solid #E5E7EB",fontSize:11,color:"#4B5563",fontWeight:700,width:70,textAlign:"center"}}>المخاطرة</th>
                {MOS.map((m,i)=>(
                  <th key={i} style={{padding:"10px 4px",textAlign:"center",fontSize:11,fontWeight:600,color:i<5?NAVY:"#9CA3AF",background:i===4?"#EFF6FF":"#F9FAFB",borderBottom:"2px solid #E5E7EB",minWidth:65,borderLeft:"1px solid #F0F0F0"}}>{m.slice(0,5)}</th>
                ))}
                <th style={{padding:"8px",background:"#F9FAFB",borderBottom:"2px solid #E5E7EB",width:68,textAlign:"center",fontSize:11,color:"#9CA3AF"}}>إجراءات</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length===0?(
                <tr><td colSpan={15} style={{textAlign:"center",padding:"30px",color:"#9CA3AF",fontSize:13}}>لا توجد مراجعات مطابقة</td></tr>
              ):(
                filtered.map(e=>(
                  <tr key={e.id} className="hrow">
                    <td style={{padding:"10px 12px",fontSize:13,fontWeight:600,color:NAVY,borderBottom:"1px solid #F3F4F6",position:"sticky",right:0,background:"white",zIndex:1}}>
                      <div>{e.title}</div>
                      {e.lead&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{e.lead}</div>}
                    </td>
                    <td style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #F3F4F6"}}><RBadge risk={e.risk}/></td>
                    {MOS.map((_,mi)=>{
                      const s=(e.months||{})[mi+1];
                      return(
                        <td key={mi} style={{padding:"4px 3px",textAlign:"center",borderBottom:"1px solid #F3F4F6",borderLeft:"1px solid #F9FAFB"}}>
                          {s?<div style={{background:PSC[s]+"22",color:PSC[s],borderRadius:6,padding:"4px 2px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{s}</div>:<div style={{height:26}}/>}

                      );
                    })}
                    <td style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #F3F4F6"}}>
                      {isMgr&&<div style={{display:"flex",gap:4,justifyContent:"center"}}>
                        <button onClick={()=>openEdit(e)} title="تعديل"
                          style={{background:"#EFF6FF",border:"none",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"4px 6px"}}>
                          <i className="ti ti-edit" style={{fontSize:13}}/>
                        </button>
                        <button onClick={()=>del(e.id)} title="حذف"
                          style={{background:"#FEF2F2",border:"none",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"4px 6px"}}>
                          <i className="ti ti-trash" style={{fontSize:13}}/>
                        </button>
                      </div>}
                    </td>
                  </tr>
                ))
              )}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:12,padding:"10px 14px",background:"#EFF6FF",borderRadius:8,display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"#1D4ED8"}}>خطة المراجعة الداخلية</span>
          <div style={{display:"flex",gap:16,marginRight:"auto"}}>
            {[{l:"الإجمالي",v:totals.total,c:NAVY},{l:"منجز",v:totals.done,c:"#10B981"},{l:"جارٍ",v:totals.inprog,c:"#F59E0B"},{l:"مخطط",v:totals.planned,c:"#3B82F6"}].map(({l,v,c})=>(

    </div>
  );

              <input type="date" value={fromVal||""} onChange={e=>onFromChange(e.target.value)} style={{...inCSS,width:"auto"}}/>
              <span style={{color:"#9CA3AF"}}>—</span>
              <input type="date" value={toVal||""} onChange={e=>onToChange(e.target.value)} style={{...inCSS,width:"auto"}}/>
            </>
          ):(
            <span style={{direction:"ltr"}}>{fromVal&&toVal?fromVal+" to "+toVal:fromVal||toVal||"---"}</span>
          )}
        </div>
      </div>
    );
  }
  return(
    <div style={{...rowSt,background:highlight?"#FEFCE8":"white"}}>
      <div style={lblSt}>{label}</div>
      <div style={valSt}>
        {editing
          ?(multi
            ?<textarea value={value||""} onChange={e=>onChange(e.target.value)} rows={rows} style={{...taCSS,minHeight:rows*24}}/>
            :<input value={value||""} onChange={e=>onChange(e.target.value)} style={inCSS}/>
          )
          :(value?<span style={{whiteSpace:"pre-line"}}>{value}</span>:<span style={{color:"#D1D5DB",fontStyle:"italic"}}>---</span>)
        }
      </div>
    </div>
  );
}

        </div>

                  </div>
                  <label htmlFor={inputId} style={{fontSize:11,color:"#3B82F6",cursor:"pointer",textDecoration:"underline"}}>تغيير</label>
                </div>

                <label htmlFor={inputId} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"20px",border:"2px dashed #D1D5DB",borderRadius:10,cursor:"pointer",marginBottom:14,background:"#F9FAFB"}}>

function Engagements(){
  const {findings:findData,update:updateFinding,add:addFinding,del:delFinding}=useContext(FindingsCtx);
  const {engagements,addEng,updateEng,removeEng,monthsFromDates,statusFromMonths,progressFromMonths,navTarget,clearNav,addNotif,programs:engPrograms,setPrograms:setEngPrograms,auditPlans:engAuditPlans,setAuditPlans:setEngAuditPlans,messages:engMsgs,addMessage:addEngMessage,trail:engTrail,addTrail:addEngTrail}=useContext(EngCtx);
  const {workpapers:allWp,addWp,delWp,genRef}=useContext(WpCtx);
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const currentUser=auth&&auth.currentUser;
  const visibleEngs=isMgr?engagements:engagements.filter(function(e){return auth&&auth.canAccessEng(e.id);});
  const setData=()=>{};
  const [sel,setSel]=useState(null);
  const [sf,setSf]=useState("الكل");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({title:"",risk:"مرتفع",lead:"",start:"",end:""});
  const [selFinding,setSelFinding]=useState(null);
  const [engTab,setEngTab]=useState("overview");
  const [progModal,setProgModal]=useState(false);
  const [editStep,setEditStep]=useState(null);
  const [stepForm,setStepForm]=useState({});

  // الانتقال التلقائي من نظام التنبيهات
  useEffect(function(){
    if(navTarget&&navTarget.engId){
      setSel(navTarget.engId);
      setEngTab(navTarget.engSubTab||"overview");
      clearNav();
    }
  },[navTarget]);
  const [programs,setPrograms]=[engPrograms,setEngPrograms];
  const [auditPlans,setAuditPlans]=[engAuditPlans,setEngAuditPlans];
  const [planEditMode,setPlanEditMode]=useState(false);
  const [planForm,setPlanForm]=useState({});
  const [addFindModal,setAddFindModal]=useState(false);
  const emptyFindForm={title:"",risk:"مرتفع",status:"مفتوح",owner:"",due:"",intro:"",observation:"",risks:"",rec:"",mgmt:"",mgmtReply:"",actionPlan:"",attachments:[],approvalStatus:"draft",returnComment:"",returnedBy:"",approvedBy:"",approvedAt:""};
  const [findForm,setFindForm]=useState(emptyFindForm);
  const findAttachRef=React.useRef();
  const getTypeEng=name=>{const ext=name.split(".").pop().toLowerCase();if(ext==="pdf")return"pdf";if(["xlsx","xls","csv"].includes(ext))return"xlsx";if(["docx","doc"].includes(ext))return"docx";if(["zip","rar","7z"].includes(ext))return"zip";return"file";};
  const fmtSzEng=b=>b<1024?b+" B":b<1048576?(b/1024).toFixed(0)+" KB":(b/1048576).toFixed(1)+" MB";
  const emptyPlan={auditArea:"",periodFrom:"",periodTo:"",auditTeam:"",objectives:"",scope:"",priorObservations:"",relatedRegulations:"",processBrief:"",processStakeholders:"",preliminaryRisks:[{id:"r0",text:""}],openingQuestions:"",requestList:""};

  const list=visibleEngs.filter(function(e){
    if(sf==="الكل") return true;
    // حساب الحالة الفعلية للفلترة
    var eFinalStatus=e.finalApprovalStatus||"none";
    if(eFinalStatus==="final_approved") return sf==="مكتمل";
    var today=new Date();today.setHours(0,0,0,0);
    var endDate=e.end?new Date(e.end):null;var startDate=e.start?new Date(e.start):null;
    if(endDate) endDate.setHours(0,0,0,0);if(startDate) startDate.setHours(0,0,0,0);
    var realSt=endDate&&today>endDate?"متأخر":startDate&&today>=startDate?"قيد التنفيذ":"مخطط";
    return realSt===sf;
  });
  const addEngagement=()=>{
    if(!form.title)return;
    const months=monthsFromDates(form.start,form.end,form.status||"مخطط");
    const status=statusFromMonths(months)||"مخطط";
    const newId="AUD-2024-"+String(engagements.length+1).padStart(3,"0");
    addEng({id:newId,status,progress:0,findings:0,months,...form});
    setForm({title:"",risk:"مرتفع",lead:"",start:"",end:""});
    setModal(false);
  };
  const chSt=(id,ns)=>updateFinding(id,{status:ns});
  const chRisk=(id,nr)=>updateFinding(id,{risk:nr});
  const getProg=id=>programs[id]||[];
  const saveProg=(engId,steps)=>setPrograms(p=>({...p,[engId]:steps}));
  const updateStep=(engId,stepId,upd)=>saveProg(engId,getProg(engId).map(s=>s.id===stepId?{...s,...upd}:s));
  // نسخة مع تنبيه للتغييرات المباشرة
  const updateStepInline=function(engId,stepId,upd){
    var e=engagements.find(function(x){return x.id===engId;});
    var s=getProg(engId).find(function(x){return x.id===stepId;});
    updateStep(engId,stepId,upd);
    if(e&&s){
      var fieldNames={testStatus:"حالة الاختبار",testResult:"نتيجة الاختبار"};
      var key=Object.keys(upd)[0];
      var proc=s.procedure?s.procedure.substring(0,50)+(s.procedure.length>50?'...':''):s.process;
      var msg=fieldNames[key]
        ?'تم تعديل برنامج المراجعة في خطوة "'+proc+'": تم تغيير '+fieldNames[key]+' إلى '+upd[key]
        :'تم تعديل برنامج المراجعة في خطوة "'+proc+'"';
      addNotif("edit","engagement",msg,engId,e.title);
    }
  };
  const deleteStep=function(engId,stepId){
    var e=engagements.find(function(x){return x.id===engId;});
    var s=getProg(engId).find(function(x){return x.id===stepId;});

            if(typeof planCopy.preliminaryRisks==="string"){

              planCopy.preliminaryRisks=lines.map(function(t,i){return{id:"r"+i+"_"+Date.now(),text:t};});
            } else if(!Array.isArray(planCopy.preliminaryRisks)){
              planCopy.preliminaryRisks=[{id:"r0_"+Date.now(),text:""}];
            }
            setPlanForm(planCopy);setPlanEditMode(true);
          }}
          onSave={function(){
            var now=new Date().toISOString();
            var prepBy=currentUser?currentUser.name:"";
            var saved=Object.assign({},planForm,{planPreparedBy:currentPlan.planPreparedBy||prepBy,planPreparedAt:currentPlan.planPreparedAt||now,planStatus:currentPlan.planStatus||"draft"});
            setAuditPlans(function(p){return Object.assign({},p,{[e.id]:saved});});
            setPlanEditMode(false);
            addNotif("edit","auditplan","تم تحديث خطة المراجعة: "+e.title,e.id,e.title);
            logTrail(e.id,{by:currentUser?currentUser.name:"",role:"قائد المراجعة",rc:"#C8A84B",cat:"خطة المراجعة",icon:"✏️",action:"عدّل خطة المراجعة"});
            // إذا كانت الخطة معتمدة — زامن بطاقات المراجعة مع المخاطر المعدّلة
            if(currentPlan.planStatus==="approved"){
              var risks2=Array.isArray(planForm.preliminaryRisks)
                ?planForm.preliminaryRisks.filter(function(r){return r.text&&r.text.trim();})
                :[];
              if(risks2.length>0){
                var existing2=getProg(e.id)||[];
                var newSteps2=[...existing2];
                risks2.forEach(function(risk,idx){
                  var linked=existing2.find(function(s){return s.linkedRiskId===risk.id;});
                  if(!linked){
                    newSteps2.push({id:Date.now()+idx,process:"",subProcess:"",objective:"",procedure:"",riskAddressed:risk.text,linkedRiskId:risk.id,riskRating:"High",controlTested:"",controlFrequency:"Monthly",testTechnique:"Inspection",population:"",sample:"",samplingMethod:"",controlOwner:"",testStatus:"Not Started",testResult:"",remarks:"",seq:newSteps2.length+1,approvalStatus:"draft",preparedBy:"",preparedAt:""});
                  }
                });
                // حذف بطاقات المخاطر المحذوفة (draft وفارغة فقط)
                var riskIds2=risks2.map(function(r){return r.id;});
                newSteps2=newSteps2.filter(function(s){
                  if(!s.linkedRiskId)return true;
                  if(riskIds2.indexOf(s.linkedRiskId)>=0)return true;
                  return s.approvalStatus!=="draft"||s.testResult||s.remarks||s.objective;
                });
                newSteps2=newSteps2.map(function(s,i){return Object.assign({},s,{seq:i+1});});
                saveProg(e.id,newSteps2);
                addNotif("add","program",'تم مزامنة بطاقات المراجعة مع المخاطر المعدّلة: '+e.title,e.id,e.title);
              }
            }

          onSubmitForReview={function(){

            setAuditPlans(function(p){return Object.assign({},p,{[e.id]:upd});});
            addNotif("assign","auditplan","تم إرسال خطة المراجعة للاعتماد: "+e.title,e.id,e.title);
              logTrail(e.id,{by:currentUser?currentUser.name:"",role:"مراجع",rc:"#3B82F6",cat:"خطة المراجعة",icon:"📤",action:"أرسل خطة المراجعة للاعتماد"});
          }}
          onApprovePlan={function(){
            var now=new Date().toISOString();
            var reviewer=currentUser?currentUser.name:"";

            setAuditPlans(function(p){return Object.assign({},p,{[e.id]:upd});});
            addNotif("add","auditplan","تم اعتماد خطة المراجعة: "+e.title,e.id,e.title);
            logTrail(e.id,{by:currentUser?currentUser.name:"",role:"مدير البرنامج",rc:"#C8A84B",cat:"خطة المراجعة",icon:"✓",action:"اعتمد خطة المراجعة"});
            // إنشاء بطاقات المراجعة من المخاطر الأولية بعد الاعتماد
            var risks=Array.isArray(currentPlan.preliminaryRisks)
              ?currentPlan.preliminaryRisks.filter(function(r){return r.text&&r.text.trim();})
              :[];
            if(risks.length>0){
              var prepBy=currentUser?currentUser.name:"";
              var existing=getProg(e.id)||[];
              var newSteps=[...existing];
              risks.forEach(function(risk,idx){
                var alreadyLinked=existing.find(function(s){return s.linkedRiskId===risk.id;});

                  newSteps.push({id:Date.now()+idx,process:"",subProcess:"",objective:"",procedure:"",riskAddressed:risk.text,linkedRiskId:risk.id,riskRating:"High",controlTested:"",controlFrequency:"Monthly",testTechnique:"Inspection",population:"",sample:"",samplingMethod:"",controlOwner:"",testStatus:"Not Started",testResult:"",remarks:"",seq:newSteps.length+1,approvalStatus:"draft",preparedBy:"",preparedAt:""});
                }
              });
              newSteps=newSteps.map(function(s,i){return Object.assign({},s,{seq:i+1});});
              saveProg(e.id,newSteps);
            }
          }}
          onCreateStepsFromRisks={function(risks){
            // مزامنة ذكية: إضافة جديد، حذف غير المبدوءة، الإبقاء على المعدّلة
            var prepBy=currentUser?currentUser.name:"";
            var now=new Date().toISOString();
            var existing=getProg(e.id)||[];
            var newSteps=[...existing];
            // إضافة بطاقة لكل مخاطرة جديدة (ليس لها linkedRiskId مطابق)
            risks.forEach(function(risk,idx){
              var alreadyLinked=existing.find(function(s){return s.linkedRiskId===risk.id;});
              if(!alreadyLinked){
                newSteps.push({id:Date.now()+idx,process:"",subProcess:"",objective:"",procedure:"",riskAddressed:risk.text,linkedRiskId:risk.id,riskRating:"High",controlTested:"",controlFrequency:"Monthly",testTechnique:"Inspection",population:"",sample:"",samplingMethod:"",controlOwner:"",testStatus:"Not Started",testResult:"",remarks:"",seq:newSteps.length+1,approvalStatus:"draft",preparedBy:prepBy,preparedAt:now});
              }
            });
            // حذف البطاقات المرتبطة بمخاطر حُذفت ولم تُبدأ بعد
            var riskIds=risks.map(function(r){return r.id;});
            newSteps=newSteps.filter(function(s){

              return s.approvalStatus!=="draft"||s.testResult||s.remarks||s.objective;
            });
            // إعادة ترقيم
            newSteps=newSteps.map(function(s,i){return Object.assign({},s,{seq:i+1});});
            saveProg(e.id,newSteps);
            addNotif("add","program",'تم مزامنة '+risks.length+' بطاقة مراجعة مع المخاطر الأولية: '+e.title,e.id,e.title);

                          <i className="ti ti-edit" style={{fontSize:10}}/> تعديل
                        </button>}
                        {canDelete&&!isEngLocked&&<button onClick={()=>{if(window.confirm("حذف هذه الخطوة؟"))deleteStep(e.id,s.id);}} style={{background:"rgba(239,68,68,0.2)",border:"none",borderRadius:6,color:"#FCA5A5",cursor:"pointer",padding:"3px 7px"}}>
                          <i className="ti ti-trash" style={{fontSize:11}}/>
                        </button>}
                      </div>
                    </div>

                    {/* شريط تعليق الإعادة */}
                    {isReturned&&s.returnComment&&(
                      <div style={{background:"#FFF7ED",borderBottom:"1.5px solid #FED7AA",padding:"10px 16px"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#C2410C",marginBottom:6,display:"flex",alignItems:"center",gap:5}}>
                          <i className="ti ti-corner-down-left" style={{fontSize:12}}/> تعليق القائد — سبب الإعادة
                        </div>
                        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                          <div style={{width:26,height:26,borderRadius:"50%",background:"#FEF3C7",border:"1.5px solid #FCD34D50",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#92400E",flexShrink:0}}>{s.returnedBy?s.returnedBy.charAt(0):"م"}</div>
                          <div style={{background:"white",border:"1px solid #FED7AA",borderRadius:"0 8px 8px 8px",padding:"8px 12px",flex:1}}>
                            <div style={{fontSize:10,fontWeight:600,color:"#C2410C",marginBottom:3}}>{s.returnedBy||""}</div>
                            <div style={{fontSize:12,color:"#9A3412",lineHeight:1.6}}>{s.returnComment}</div>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Body: عمودان */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                      {/* العمود الأيمن: النصوص */}
                      <div style={{padding:"14px 16px",borderLeft:"0.5px solid #F3F4F6",display:"flex",flexDirection:"column",gap:13}}>
                        <div>{LBL("الهدف · Audit Objective")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.objective||"—"}</div></div>
                        <div>{LBL("إجراء المراجعة · Audit Procedure")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.procedure||"—"}</div></div>
                        <div>{LBL("المخاطر المعالجة · Risk Addressed")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.riskAddressed||"—"}</div></div>
                      </div>
                      {/* العمود الأيسر: البيانات */}
                      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
                        {/* صف 1: الضابط + معدل التنفيذ + مالك الضابط */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                          <div>{RLBL("الضابط الرقابي المختبر · Control Tested")}<div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{s.controlTested||"—"}</div></div>
                          <div>{RLBL("معدل تنفيذ الضابط · Control Frequency")}<div style={{fontSize:12,color:"#374151"}}>{s.controlFrequency?(freqAr[s.controlFrequency]||s.controlFrequency)+" · "+s.controlFrequency:s.frequency||"—"}</div></div>
                          <div>{RLBL("مالك الضابط · Control Owner")}<div style={{fontSize:12,color:"#374151"}}>{s.controlOwner||"—"}</div></div>
                        </div>
                        {/* صف 2: المجتمع + العينة + أسلوب اختيار العينة */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                          <div>{RLBL("المجتمع · Population")}<div style={{fontSize:12,color:"#374151"}}>{s.population||"—"}</div></div>
                          <div>{RLBL("العينة · Sample")}<div style={{fontSize:12,color:"#374151"}}>{s.sample||"—"}</div></div>
                          <div>{RLBL("أسلوب اختيار العينة · Sampling Method")}<div style={{fontSize:11,color:"#374151"}}>{s.samplingMethod?(samplingAr[s.samplingMethod]||s.samplingMethod)+" · "+s.samplingMethod:"—"}</div></div>
                        </div>
                        {/* صف 3: أسلوب الاختبار + حالة الاختبار + نتيجة الاختبار */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                          <div>{RLBL("أسلوب الاختبار · Test Technique")}<div style={{fontSize:12,color:"#374151"}}>{s.testTechnique?(techAr[s.testTechnique]||s.testTechnique)+" · "+s.testTechnique:"—"}</div></div>
                          <div>{RLBL("حالة الاختبار · Test Status")}<div><span style={{display:"inline-block",background:s.testStatus==="Completed"?"#ECFDF5":s.testStatus==="In Progress"?"#EFF6FF":"#F3F4F6",color:s.testStatus==="Completed"?"#065F46":s.testStatus==="In Progress"?"#1D4ED8":"#6B7280",fontSize:10,padding:"2px 8px",borderRadius:20}}>{s.testStatus||"لم يبدأ"}</span></div></div>
                          <div>{RLBL("نتيجة الاختبار · Test Result")}<span style={{display:"inline-block",background:resultBg[s.testResult]||"#F3F4F6",color:s.testResult==="Satisfactory"?"#065F46":s.testResult==="Deficiency"?"#991B1B":"#6B7280",fontSize:10,padding:"2px 10px",borderRadius:20,fontWeight:s.testResult?600:400}}>{s.testResult?(resultAr[s.testResult]||s.testResult)+" · "+s.testResult:"—"}</span></div>
                        </div>
                      </div>
                    </div>

                    {/* أوراق العمل - صف كامل */}
                    <div style={{padding:"10px 16px",borderTop:"0.5px solid #E5E7EB",background:"white"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:stepWps.length>0?9:0}}>
                        <div style={{fontSize:10,fontWeight:500,color:"#6B7280",borderRight:"2px solid #8B5CF6",paddingRight:6}}>
                          أوراق العمل · Working Papers {stepWps.length>0&&<span style={{fontWeight:400}}>({stepWps.length})</span>}
                        </div>
                        {(isDraft||isReturned)&&<button onClick={()=>{setStepWpTarget({engId:e.id,stepId:s.id});setStepWpForm({status:"مكتمل",reason:""});setStepWpModal(true);}}
                          style={{background:"#8B5CF610",border:"0.5px solid #8B5CF640",borderRadius:6,color:"#7C3AED",cursor:"pointer",padding:"2px 10px",fontSize:10,display:"flex",alignItems:"center",gap:3,fontFamily:"inherit"}}>
                          <i className="ti ti-plus" style={{fontSize:10}}/> إضافة
                        </button>}
                      </div>
                      {stepWps.length>0&&(
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                          {stepWps.map(function(wp){
                            var ext=wp.type||"file";
                            var iconColor=ext==="pdf"?"#EF4444":ext==="xlsx"||ext==="xls"?"#3B82F6":"#7C3AED";
                            var iconBg=ext==="pdf"?"#FEF2F2":ext==="xlsx"||ext==="xls"?"#EFF6FF":"#F5F3FF";
                            var iconCls=ext==="pdf"?"ti-file-type-pdf":ext==="xlsx"||ext==="xls"?"ti-file-spreadsheet":"ti-file-description";
                            return(
                              <div key={wp.id} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 9px",background:"white",border:"0.5px solid #E5E7EB",borderRadius:8}}>
                                <div style={{width:26,height:26,borderRadius:6,background:iconBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className={"ti "+iconCls} style={{fontSize:13,color:iconColor}}/></div>
                                <div style={{flex:1,minWidth:0}}><div style={{fontSize:10,fontWeight:500,color:"#374151",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{wp.name}</div><div style={{fontSize:8,fontFamily:"monospace",color:"#7C3AED"}}>{wp.ref}</div><span style={{display:"inline-block",background:wp.status==="معتمد"?"#DCFCE7":"#FFFBEB",color:wp.status==="معتمد"?"#166534":"#92400E",fontSize:8,padding:"0 5px",borderRadius:8,marginTop:2}}>{wp.status}</span></div>
                                <button style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",padding:1}}><i className="ti ti-download" style={{fontSize:11}}/></button>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>

                    {/* الملاحظات والاستنتاجات + رقم الملاحظة المرتبطة */}
                    {(s.remarks||s.linkedFindingId)&&(
                      <div style={{padding:"10px 16px",background:s.testResult==="Deficiency"?"#FEF2F2":s.testResult==="Satisfactory"?"#F0FDF4":"#F9FAFB",borderTop:"0.5px solid "+(s.testResult==="Deficiency"?"#FECACA":s.testResult==="Satisfactory"?"#6EE7B7":"#F3F4F6")}}>
                        <div style={{fontSize:10,fontWeight:500,color:s.testResult==="Deficiency"?"#991B1B":s.testResult==="Satisfactory"?"#065F46":"#6B7280",marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                          {s.testResult==="Deficiency"&&<i className="ti ti-alert-triangle" style={{fontSize:11}}/>}
                          الملاحظات والاستنتاجات · Remarks &amp; Conclusions
                          {s.linkedFindingId&&<span style={{background:"#FEF2F2",color:"#991B1B",border:"1px solid #FECACA",fontSize:10,padding:"1px 8px",borderRadius:10,fontWeight:700,marginRight:4}}>ملاحظة مرتبطة: {s.linkedFindingId}</span>}
                        </div>
                        {s.remarks&&<div style={{fontSize:12,color:s.testResult==="Deficiency"?"#7F1D1D":s.testResult==="Satisfactory"?"#065F46":"#374151",lineHeight:1.7}}>{s.remarks}</div>}
                      </div>
                    )}

                    {/* Footer: أعدّه + فُحص + زر إرسال/اعتماد */}
                    <div style={{padding:"10px 16px",background:isApproved?"#F0FDF4":isUnderReview?"#FFFBEB":"#F9FAFB",borderTop:"0.5px solid "+(isApproved?"#6EE7B7":isUnderReview?"#FDE68A":"#E5E7EB"),display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:16}}>
                        {/* أعدّه — يظهر دائماً */}
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:28,height:28,borderRadius:"50%",background:"#3B82F620",border:"1.5px solid #3B82F640",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,color:"#3B82F6",flexShrink:0}}>
                            {s.preparedBy?s.preparedBy.charAt(0):"؟"}
                          </div>
                          <div>
                            <div style={{fontSize:9,fontWeight:500,color:isApproved?"#065F46":isUnderReview?"#92400E":"#6B7280"}}>أعدّه · Prepared By</div>
                            <div style={{fontSize:11,fontWeight:500,color:"#374151"}}>{s.preparedBy||"—"}</div>
                            {s.preparedAt?<div style={{fontSize:9,color:"#6B7280"}}>{fmtDate(s.preparedAt)}</div>:null}
                          </div>
                        </div>
                        {/* فُحص من قبل — يظهر فقط عند الاعتماد أو المراجعة */}
                        {(isUnderReview||isApproved)&&(
                          <>
                            <div style={{width:"0.5px",height:36,background:isApproved?"#6EE7B7":"#FDE68A",flexShrink:0}}/>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{width:28,height:28,borderRadius:"50%",background:"#C8A84B20",border:isApproved?"1.5px solid #C8A84B50":"1.5px dashed #C8A84B",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,color:"#C8A84B",flexShrink:0}}>
                                {(s.reviewedBy||e.lead||"م").charAt(0)}
                              </div>
                              <div>
                                <div style={{fontSize:9,fontWeight:500,color:isApproved?"#065F46":"#92400E"}}>فُحص من قبل · Reviewed By</div>
                                <div style={{fontSize:11,fontWeight:500,color:isApproved?"#374151":"#6B7280"}}>
                                  {isApproved?(s.reviewedBy||e.lead||"قائد المراجعة"):(e.lead||"قائد المراجعة")}
                                </div>
                                {isApproved&&s.approvedAt
                                  ?<div style={{fontSize:9,color:"#6B7280"}}>{fmtDate(s.approvedAt)}</div>
                                  :<div style={{fontSize:9,color:"#D97706",display:"flex",alignItems:"center",gap:3}}><i className="ti ti-clock" style={{fontSize:9}}/> بانتظار الاعتماد…</div>}
                              </div>
                              {isApproved&&<i className="ti ti-circle-check" style={{fontSize:18,color:"#059669",marginRight:4}}/>}
                            </div>
                          </>
                        )}
                      </div>
                      {/* أزرار الإجراءات */}
                      <div style={{display:"flex",gap:8,flexShrink:0}}>
                        {isDraft&&!isMgr&&!isLead&&(
                          <button onClick={()=>submitForReview(e.id,s.id)} style={{background:NAVY,color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                            <i className="ti ti-send" style={{fontSize:12}}/> إرسال للمراجعة · Submit
                          </button>
                        )}
                        {isReturned&&!isMgr&&!isLead&&(
                          <button onClick={()=>submitForReview(e.id,s.id)} style={{background:NAVY,color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                            <i className="ti ti-send" style={{fontSize:12}}/> إعادة الإرسال للاعتماد
                          </button>
                        )}
                        {canApproveStep&&(
                          <>
                            <button onClick={()=>{setReturnTarget({engId:e.id,stepId:s.id});setReturnComment("");setReturnModal(true);}} style={{background:"#EA580C",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                              <i className="ti ti-corner-down-left" style={{fontSize:12}}/> إعادة
                            </button>
                            <button onClick={()=>approveStep(e.id,s.id)} style={{background:"#059669",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                              <i className="ti ti-circle-check" style={{fontSize:13}}/> اعتماد · Approve
                            </button>
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Findings tab */}
      {engTab==="findings"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {isFinaLocked&&!isMgr&&React.createElement("div",{style:{background:"#FEF9EC",borderRadius:10,padding:"10px 16px",border:"1px solid "+GOLD+"40",display:"flex",alignItems:"center",gap:8,fontSize:11,color:"#92400E"}},
            React.createElement("i",{className:"ti ti-lock",style:{fontSize:14,color:GOLD}}),
            "المهمة مُعتمدة نهائياً — الملاحظات في وضع القراءة فقط"
          )}

          {/* Add Finding Modal */}
          <Modal open={addFindModal} onClose={()=>{setAddFindModal(false);setFindForm(emptyFindForm);}} title="إضافة ملاحظة جديدة">
            {/* Row 1: العنوان + الخطر + الحالة */}
            <FR label="عنوان الملاحظة *">
              <input style={INP} value={findForm.title} onChange={ev=>setFindForm(f=>({...f,title:ev.target.value}))} placeholder="عنوان الملاحظة"/>
            </FR>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <FR label="مستوى المخاطرة">
                <select style={{...INP,fontWeight:700}} value={findForm.risk} onChange={ev=>setFindForm(f=>({...f,risk:ev.target.value}))}>
                  {["حرج","مرتفع","متوسط","منخفض"].map(r=><option key={r}>{r}</option>)}
                </select>
              </FR>
              <FR label="الحالة">
                <select style={INP} value={findForm.status} onChange={ev=>setFindForm(f=>({...f,status:ev.target.value}))}>
                  {["مفتوح","قيد المعالجة","مغلق"].map(r=><option key={r}>{r}</option>)}
                </select>
              </FR>
              <FR label="الإدارة المعنية">
                <input style={INP} value={findForm.mgmt||""} onChange={ev=>setFindForm(f=>({...f,mgmt:ev.target.value}))} placeholder="اسم الإدارة"/>
              </FR>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <FR label="المسؤول">
                <input style={INP} value={findForm.owner} onChange={ev=>setFindForm(f=>({...f,owner:ev.target.value}))} placeholder="اسم المسؤول"/>
              </FR>
              <FR label="التاريخ المتوقع للمعالجة">
                <input type="date" style={INP} value={findForm.due} onChange={ev=>setFindForm(f=>({...f,due:ev.target.value}))}/>
              </FR>
            </div>
            {/* Content sections */}
            <div style={{display:"flex",flexDirection:"column",gap:0,border:"1px solid #E5E7EB",borderRadius:10,overflow:"hidden",marginBottom:10}}>
              {[
                {label:"الخلفية / المقدمة",           field:"intro",       ph:"الأساس القانوني أو التنظيمي للملاحظة...",rows:3},
                {label:"الملاحظة — ما تم رصده",       field:"observation", ph:"تفاصيل ما تم رصده ميدانياً:\n• ...",rows:4},
                {label:"المخاطر / الآثار المترتبة",   field:"risks",       ph:"• الأثر الأول\n• الأثر الثاني",rows:3},
                {label:"التوصية",                      field:"rec",         ph:"١. التوصية الأولى\n٢. التوصية الثانية",rows:3},
              ].map(({label,field,ph,rows},i)=>(
                <div key={field} style={{borderTop:i===0?"none":"1px solid #E5E7EB"}}>
                  <div style={{background:"#1E3A2F",color:"white",padding:"7px 14px",fontSize:12,fontWeight:700}}>{label}</div>
                  <textarea style={{...INP,height:rows*26,resize:"vertical",border:"none",borderRadius:0,lineHeight:1.7,background:"white"}}
                    value={findForm[field]||""} onChange={ev=>setFindForm(f=>({...f,[field]:ev.target.value}))} placeholder={ph}/>
                </div>
              ))}
            </div>
            {/* رد الإدارة + خطة المعالجة */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <FR label="رد الإدارة المعنية">
                <textarea style={{...INP,height:72,resize:"vertical",lineHeight:1.7}} value={findForm.mgmtReply||""} onChange={ev=>setFindForm(f=>({...f,mgmtReply:ev.target.value}))} placeholder="رد الإدارة على الملاحظة..."/>
              </FR>
              <FR label="خطة المعالجة">
                <textarea style={{...INP,height:72,resize:"vertical",lineHeight:1.7}} value={findForm.actionPlan||""} onChange={ev=>setFindForm(f=>({...f,actionPlan:ev.target.value}))} placeholder="خطوات المعالجة المتفق عليها..."/>
              </FR>
            </div>
            {/* Attachments */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:6}}>أوراق العمل والأدلة الداعمة</div>
              <input ref={findAttachRef} type="file" multiple style={{display:"none"}} onChange={ev=>{
                const files=Array.from(ev.target.files).map(f=>({id:Date.now()+Math.random(),name:f.name,size:fmtSzEng(f.size),type:getTypeEng(f.name),_file:f,_url:URL.createObjectURL(f)}));
                setFindForm(f=>({...f,attachments:[...(f.attachments||[]),...files]}));
                ev.target.value="";
              }}/>
              {(!findForm.attachments||findForm.attachments.length===0)?(
                <div onClick={()=>findAttachRef.current.click()} style={{border:"2px dashed #D1D5DB",borderRadius:8,padding:"12px",textAlign:"center",cursor:"pointer",color:"#9CA3AF",fontSize:12}}>
                  <i className="ti ti-paperclip" style={{fontSize:18,display:"block",marginBottom:4}}/>إرفاق ملف دليل أو ورقة عمل
                </div>
              ):(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {findForm.attachments.map((att,ai)=>(
                    <div key={ai} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#F9FAFB",borderRadius:8,border:"1px solid #E5E7EB"}}>
                      <FileIco type={att.type}/>
                      <span style={{flex:1,fontSize:12,color:NAVY}}>{att.name}</span>
                      <span style={{fontSize:11,color:"#9CA3AF"}}>{att.size}</span>
                      <button onClick={()=>setFindForm(f=>({...f,attachments:f.attachments.filter((_,i)=>i!==ai)}))} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444"}}><i className="ti ti-x" style={{fontSize:13}}/></button>
                    </div>
                  ))}
                  <button onClick={()=>findAttachRef.current.click()} style={{background:"none",border:"1px dashed #D1D5DB",borderRadius:8,padding:"5px",fontSize:11,color:"#6B7280",cursor:"pointer",fontFamily:"inherit"}}><i className="ti ti-plus"/> إضافة ملف آخر</button>
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="secondary" onClick={()=>{setAddFindModal(false);setFindForm(emptyFindForm);}}>إلغاء</Btn>
              <Btn v="gold" onClick={()=>{
                if(!findForm.title)return;
                const nowStr=(function(){var d=new Date();return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();})();if(!findForm.title||findForm.title.trim().length<3){alert("يجب إدخال عنوان الملاحظة (٣ أحرف على الأقل)");return;}
                if(!findForm.observation||findForm.observation.trim().length<5){alert("يجب إدخال نص الملاحظة");return;}
                const newFinding={id:"F-"+String(findData.length+1).padStart(3,"0"),audit:e.id,opened:"اليوم",preparedBy:currentUser?currentUser.name:"",preparedAt:nowStr,attachments:[],approvalStatus:"draft",returnComment:"",...findForm};
                addFinding(newFinding);
                (findForm.attachments||[]).forEach(att=>{
                  if(att._file){
                    addWp({id:Date.now()+Math.random(),name:att.name,type:att.type,size:att.size,modified:"اليوم",status:"مسودة",author:"محمد",engagementId:e.id,engagement:e.title,ref:genRef(e.id),_file:att._file,_url:att._url});
                  }
                });
                setFindForm(emptyFindForm);setAddFindModal(false);
              }}>
                <i className="ti ti-check"/>إضافة الملاحظة
              </Btn>
            </div>
          </Modal>

          {/* Findings list — sidebar+main layout */}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

                  {k.active&&<span style={{background:"rgba(255,255,255,.2)",borderRadius:20,padding:"0 6px",fontSize:11}}>{k.v}</span>}

{!isEngLocked&&<button onClick={function(){setAddFindModal(true);}}

                <i className="ti ti-plus" style={{fontSize:13}}/>إضافة ملاحظة
              </button>}
            </div>
            {engFindings.length===0?(

  {!isEngLocked&&<button onClick={()=>setAddFindModal(true)}
                  style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 16px",background:"#1E3A2F",color:"white",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>

                  onClose={function(){}}

                  onChangeRisk={chRisk}

      {engTab==="workpapers"&&(
        <EngWpTab engId={e.id} engTitle={e.title} allWp={allWp} addWp={addWp} delWp={delWp} genRef={genRef}/>

      {/* Chat tab */}
      {engTab==="chat"&&(

        <EngTrailTab engId={e.id} trail={(engTrail&&engTrail[e.id])||[]}/>

}


function EngTrailTab({engId,trail}){

  const [filter,setFilter]=useState("الكل");
  const [search,setSearch]=useState("");
  const [exp,setExp]=useState(null);

  const IC={"✓":"#059669","📤":"#D97706","↩":"#EA580C","✏️":"#3B82F6","📎":"#7C3AED","⚠️":"#EF4444","👤":"#6B7280","📄":"#3B82F6"};
  var sorted=[...trail].sort(function(a,b){return new Date(b.at)-new Date(a.at);});
  var visible=sorted.filter(function(e){
    if(filter!=="الكل"&&e.cat!==filter)return false;
    if(search&&!e.action.includes(search)&&!(e.by||"").includes(search))return false;
    return true;
  });
  var grouped=visible.reduce(function(acc,e){
    var d=e.at?new Date(e.at).toLocaleDateString("en-GB"):"";

    acc[d].push(e);
    return acc;

    <div style={{display:"flex",flexDirection:"column",gap:12}}>

          <div style={{fontSize:13,fontWeight:700,color:NAVY}}>سجل عمليات المهمة</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>يُسجَّل تلقائياً — التتبع يبدأ من أول إرسال للاعتماد</div>
        </div>
        <div style={{display:"flex",gap:7}}>
          {[{l:"الكل",v:trail.length,c:NAVY},{l:"اعتمادات",v:trail.filter(function(e){return e.icon==="✓";}).length,c:"#059669"},{l:"إعادات",v:trail.filter(function(e){return e.icon==="↩";}).length,c:"#EA580C"},{l:"تعديلات",v:trail.filter(function(e){return e.changes&&e.changes.length;}).length,c:"#3B82F6"}].map(function(s){return(
            <div key={s.l} style={{textAlign:"center",padding:"5px 10px",background:"#F9FAFB",borderRadius:8,border:"0.5px solid #E5E7EB",minWidth:54}}>
              <div style={{fontSize:15,fontWeight:700,color:s.c}}>{s.v}</div>
              <div style={{fontSize:9,color:"#9CA3AF"}}>{s.l}</div>

        </div>
      </div>
      {/* Filters + search */}
      <div style={{background:"white",borderRadius:12,padding:"10px 14px",boxShadow:"0 1px 4px rgba(0,0,0,.05)",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:"1 1 160px"}}>
          <span style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",color:"#9CA3AF",fontSize:12}}>🔍</span>
          <input value={search} onChange={function(ev){setSearch(ev.target.value);}} placeholder="بحث..."
            style={{width:"100%",paddingRight:28,paddingLeft:10,height:30,border:"0.5px solid #E5E7EB",borderRadius:8,fontSize:11,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>

            var cnt=f==="الكل"?trail.length:trail.filter(function(e){return e.cat===f;}).length;
            var a=filter===f;
            return <button key={f} onClick={function(){setFilter(f);}} style={{padding:"3px 10px",borderRadius:20,border:a&&f!=="الكل"?"1.5px solid "+cs.dot:"1px solid transparent",cursor:"pointer",fontSize:10,fontWeight:600,background:a?(f==="الكل"?NAVY:cs.bg):"#F3F4F6",color:a?(f==="الكل"?"white":cs.color):"#6B7280",whiteSpace:"nowrap"}}>{f} ({cnt})</button>;

          <div style={{fontSize:34,marginBottom:8}}>📋</div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>لا توجد عمليات مسجّلة بعد</div>

        var day=kv[0]; var entries=kv[1];
        return(

              <div style={{flex:1,height:"0.5px",background:"#E5E7EB"}}/>

            <div style={{background:"white",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>

                var cs=CS[e.cat]||{dot:"#9CA3AF",bg:"#F9FAFB",color:"#374151"};
                var ic=IC[e.icon]||"#6B7280";
                var isExp=exp===e.id;

                var isLast=idx===entries.length-1;
                var timeStr=e.at?new Date(e.at).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true}):"";
                return(
                  <div key={e.id} style={{borderBottom:isLast?"none":"0.5px solid #F3F4F6"}}>
                    <div style={{display:"flex",alignItems:"center",cursor:(hasC||e.detail)?"pointer":"default",padding:"9px 14px",gap:9,background:isExp?"#FAFAFA":"white"}}
                      onClick={function(){if(hasC||e.detail)setExp(isExp?null:e.id);}}>

                      <div style={{width:26,height:26,borderRadius:"50%",background:ic+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{e.icon||"•"}</div>
                      <Av n={e.by} c={e.rc||"#9CA3AF"}/>
                      <div style={{flex:1,minWidth:0,fontSize:12,color:"#374151"}}>
                        <span style={{fontWeight:700,color:NAVY}}>{e.by}</span>

                        <span style={{fontSize:10,color:e.rc||"#9CA3AF",background:(e.rc||"#9CA3AF")+"12",padding:"1px 7px",borderRadius:10}}>{e.role}</span>

                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>

                        {(hasC||e.detail)&&<span style={{fontSize:11,color:"#9CA3AF"}}>{isExp?"▲":"▼"}</span>}
                      </div>

                    {isExp&&e.detail&&!hasC&&(
                      <div style={{background:"#F9FAFB",borderTop:"0.5px solid #E5E7EB",padding:"10px 20px"}}>

                        {e.changes.map(function(ch,ci){return(

                              <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"8px 10px"}}>
                                <div style={{fontSize:9,fontWeight:600,color:"#991B1B",marginBottom:4}}>قبل</div>

                                <div style={{fontSize:12,color:"#065F46",lineHeight:1.6}}>{ch.a}</div>
