function Reports(){
  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const {findings:allFindings}=useContext(FindingsCtx);

  const allReports=REP.map(function(r){return Object.assign({},r,{auditId:(ENG[REP.indexOf(r)%ENG.length]||{id:""}).id});});

  // فلترة التقارير والملاحظات حسب الصلاحيات
  const reports=isMgr?allReports:allReports.filter(function(r){
    return !r.auditId||(auth&&auth.canAccessEng&&auth.canAccessEng(r.auditId));
  });
  const findingsData=isMgr?allFindings:allFindings.filter(function(f){
    return !f.audit||(auth&&auth.canAccessEng&&auth.canAccessEng(f.audit));
  });

  const [showModal,setShowModal]=useState(false);
  const [assign,setAssign]=useState({findingId:"",reportId:""});
  const [generating,setGenerating]=useState(null);
  const [toast,setToast]=useState(null);

  const showMsg=(msg,c="#10B981")=>{setToast({msg,c});setTimeout(()=>setToast(null),3000);};

  // Get findings for a specific audit ID
  const findingsForReport=r=>{
    if(!r.auditId||r.auditId==="متعدد")return findingsData.filter(f=>f.status!=="مغلق").slice(0,findingsData.length);
    return findingsData.filter(f=>f.audit===r.auditId);
  };

  const handleDownload=(r)=>{
    setGenerating(r.id);
    const fs=findingsForReport(r);
    setTimeout(()=>{
      const ok=window.downloadDocx(r,fs);
      if(ok) showMsg(`تم تحميل "${r.title}" بنجاح ✓`);
      setGenerating(null);
    },80);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.c,color:"white",padding:"10px 22px",borderRadius:10,fontSize:14,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>{toast.msg}</div>}

      {/* Stats bar */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[{l:"إجمالي التقارير",v:reports.length,c:NAVY},{l:"تقارير صادرة",v:reports.filter(r=>r.status==="صادر").length,c:"#10B981"},{l:"مسودات",v:reports.filter(r=>r.status==="مسودة").length,c:"#F59E0B"},{l:"إجمالي الملاحظات",v:findingsData.length,c:"#EF4444"}].map(({l,v,c})=>(
          <div key={l} style={{background:"white",borderRadius:10,padding:"14px 16px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.08)",borderTop:`3px solid ${c}`}}>
            <div style={{fontSize:24,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:12,color:"#6B7280",marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Filter & actions */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["الكل","تقرير نهائي","مسودة","تقرير تنفيذي","تقرير متابعة"].map((t,i)=>(
            <button key={t} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${i===0?NAVY:"#E5E7EB"}`,background:i===0?NAVY:"white",color:i===0?"white":"#374151",fontSize:12,cursor:"pointer"}}>{t}</button>
          ))}
        </div>
        <Btn v="gold"><i className="ti ti-plus"/>تقرير جديد</Btn>
      </div>

      {/* Report cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
        {reports.map(r=>{
          const rFindings=findingsForReport(r);
          const byRisk={"حرج":0,"مرتفع":0,"متوسط":0,"منخفض":0};
          rFindings.forEach(f=>{if(byRisk[f.risk]!==undefined)byRisk[f.risk]++;});
          const isGen=generating===r.id;
          return(
            <div key={r.id} className="chov" style={{background:"white",borderRadius:14,boxShadow:"0 1px 6px rgba(0,0,0,0.08)",border:"1px solid transparent",transition:"all 0.2s",overflow:"hidden"}}>
              {/* Card header */}
              <div style={{background:"#2D6A4F",padding:"14px 18px"}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.65)",marginBottom:4}}>{r.type}</div>
                <div style={{fontSize:15,fontWeight:700,color:"white",lineHeight:1.4}}>{r.title}</div>
                <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                  <SBadge status={r.status}/>
                  <span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{r.date}</span>
                  <span style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginRight:"auto"}}>{r.pages} صفحة</span>
                </div>
              </div>

              {/* Findings summary */}
              <div style={{padding:"14px 18px"}}>
                <div style={{fontSize:13,fontWeight:700,color:NAVY,marginBottom:10}}>
                  الملاحظات المرتبطة <span style={{background:NAVY+"15",color:NAVY,padding:"1px 8px",borderRadius:10,fontSize:12}}>{rFindings.length}</span>
                </div>
                {rFindings.length===0?(
                  <div style={{fontSize:13,color:"#9CA3AF",padding:"10px 0"}}>لا توجد ملاحظات مرتبطة بهذا التقرير</div>
                ):(
                  <>
                    {/* Risk breakdown */}
                    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                      {Object.entries(byRisk).filter(([,v])=>v>0).map(([k,v])=>(
                        <span key={k} style={{background:({حرج:"#FFCDD2",مرتفع:"#FFEBEE",متوسط:"#FFF3E0",منخفض:"#E8F5E9"})[k],color:({حرج:"#C62828",مرتفع:"#B71C1C",متوسط:"#E65100",منخفض:"#1B5E20"})[k],padding:"2px 10px",borderRadius:20,fontSize:12,fontWeight:600}}>
                          {k}: {v}
                        </span>
                      ))}
                    </div>
                    {/* Findings list */}
                    <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:160,overflowY:"auto"}}>
                      {rFindings.slice(0,5).map(f=>(
                        <div key={f.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#F9FAFB",borderRadius:8}}>
                          <span style={{fontFamily:"monospace",fontSize:11,color:"#9CA3AF",flexShrink:0}}>{f.id}</span>
                          <span style={{fontSize:12,color:"#374151",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.title}</span>
                          <RBadge risk={f.risk}/>
                        </div>
                      ))}
                      {rFindings.length>5&&<div style={{fontSize:12,color:"#9CA3AF",textAlign:"center",padding:"4px 0"}}>+ {rFindings.length-5} ملاحظات أخرى</div>}
                    </div>
                  </>
                )}
              </div>

              {/* Actions */}
              <div style={{padding:"12px 18px",borderTop:"1px solid #F3F4F6",display:"flex",gap:8,justifyContent:"flex-end"}}>
                <Btn sm v="ghost"><i className="ti ti-eye"/>معاينة</Btn>
                <button
                  onClick={()=>handleDownload(r)}
                  disabled={isGen}
                  style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",background:isGen?"#9CA3AF":"#2D6A4F",color:"white",border:"none",borderRadius:8,fontSize:13,cursor:isGen?"not-allowed":"pointer",fontWeight:600,transition:"background 0.2s"}}>
                  {isGen?(
                    <><i className="ti ti-loader-2" style={{animation:"spin 1s linear infinite",fontSize:15}}/>جارٍ التوليد...</>
                  ):(
                    <><i className="ti ti-file-word" style={{fontSize:15}}/>تحميل Word</>
                  )}
                </button>
              </div>
            </div>
          );
        })}
      </div>

      <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

function Settings(){
  const [saved,setSaved]=useState(false);
  const auth=useContext(AuthCtx);
  const {engagements}=useContext(EngCtx);
  const isMgr=auth&&auth.isManager;
  const [selUser,setSelUser]=useState(null);
  const [memberModal,setMemberModal]=useState(false);
  const [editMember,setEditMember]=useState(null); // null=add, obj=edit
  const [memberForm,setMemberForm]=useState({name:"",role:"team",pin:"",color:"#3B82F6"});

  const teamUsers=auth&&auth.users?auth.users.filter(function(u){return u.role==="team";}):[];

  const openAddMember=function(){
    setEditMember(null);
    setMemberForm({name:"",role:"team",pin:"",color:"#3B82F6"});
    setMemberModal(true);
  };
  const openEditMember=function(u){
    setEditMember(u);
    setMemberForm({name:u.name,role:u.role,pin:u.pin||"",color:u.color||"#3B82F6"});
    setMemberModal(true);
  };
  const saveMember=function(){
    if(!memberForm.name.trim()){alert("يجب إدخال الاسم");return;}
    if(editMember){
      auth.updateUser&&auth.updateUser(editMember.id,memberForm);
    } else {
      var newId="u"+Date.now();
      var initials=memberForm.name.trim().charAt(0);
      auth.addUser&&auth.addUser({id:newId,name:memberForm.name.trim(),role:memberForm.role,pin:memberForm.pin,color:memberForm.color,initials:initials,assignments:[]});
    }
    setMemberModal(false);setEditMember(null);
  };
  const deleteMember=function(u){
    if(!confirm("حذف "+u.name+" من فريق المراجعة؟"))return;
    auth.removeUser&&auth.removeUser(u.id);
    if(selUser&&selUser.id===u.id)setSelUser(null);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Member modal */}
      <Modal open={memberModal} onClose={function(){setMemberModal(false);setEditMember(null);}} title={editMember?"تعديل بيانات العضو":"إضافة عضو جديد"}>
        <FR label="الاسم الكامل *"><input style={INP} value={memberForm.name} onChange={function(ev){setMemberForm(function(p){return Object.assign({},p,{name:ev.target.value});});}} placeholder="اسم العضو"/></FR>
        <FR label="الدور">
          <select style={INP} value={memberForm.role} onChange={function(ev){setMemberForm(function(p){return Object.assign({},p,{role:ev.target.value});});}}>
            <option value="team">فريق المراجعة</option>
            <option value="manager">مدير البرنامج</option>
          </select>
        </FR>
        <FR label="رمز PIN (اختياري)"><input style={INP} value={memberForm.pin} onChange={function(ev){setMemberForm(function(p){return Object.assign({},p,{pin:ev.target.value});});}} placeholder="رمز الدخول"/></FR>
        <FR label="لون الأفاتار">
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["#C8A84B","#3B82F6","#10B981","#8B5CF6","#EF4444","#F59E0B","#06B6D4","#EC4899"].map(function(col){return(
              <div key={col} onClick={function(){setMemberForm(function(p){return Object.assign({},p,{color:col});});}}
                style={{width:28,height:28,borderRadius:"50%",background:col,cursor:"pointer",border:memberForm.color===col?"3px solid #1E293B":"3px solid transparent"}}/>
            );})}
          </div>
        </FR>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <Btn v="secondary" onClick={function(){setMemberModal(false);setEditMember(null);}}>إلغاء</Btn>
          <Btn v="gold" onClick={saveMember}><i className="ti ti-check"/>{editMember?"حفظ التعديلات":"إضافة العضو"}</Btn>
        </div>
      </Modal>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card title="معلومات المنظمة">
        {[{l:"اسم الجهة",v:"وزارة المالية - المراجعة الداخلية"},{l:"الإطار المرجعي",v:"معايير IIA الدولية"},{l:"السنة المالية",v:"2024 (يناير - ديسمبر)"},{l:"العملة",v:"ريال سعودي (SAR)"}].map(function({l,v}){return(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderBottom:"1px solid #F3F4F6"}}><span style={{fontSize:13,color:"#6B7280"}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{v}</span></div>
        );})}
        <button onClick={function(){setSaved(true);setTimeout(function(){setSaved(false);},2200);}} style={{marginTop:14,padding:"8px 20px",background:saved?"#10B981":NAVY,color:"white",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600,transition:"background 0.3s"}}>
          {saved?"✓ تم الحفظ":"حفظ التغييرات"}
        </button>
      </Card>
      <Card title="تصنيف المخاطر">
        {[{r:"حرج",c:"#991B1B",d:"يؤثر على استمرارية المنظمة"},{r:"مرتفع",c:"#EF4444",d:"تأثير كبير على الأهداف الاستراتيجية"},{r:"متوسط",c:"#F59E0B",d:"تأثير محدود ويمكن التحكم فيه"},{r:"منخفض",c:"#10B981",d:"مخاطر ضئيلة أو مقبولة"}].map(function({r,c,d}){return(
          <div key={r} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 0",borderBottom:"1px solid #F3F4F6"}}>
            <div style={{width:13,height:13,borderRadius:"50%",background:c,marginTop:2,flexShrink:0}}/>
            <div><div style={{fontSize:13,fontWeight:700,color:"#374151"}}>{r}</div><div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{d}</div></div>
          </div>
        );})}
      </Card>

      {/* فريق المراجعة */}
      <Card title="فريق المراجعة" sty={{gridColumn:"1/-1"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          {isMgr&&<div style={{fontSize:12,color:"#9CA3AF"}}><i className="ti ti-info-circle" style={{marginLeft:4}}/>اضغط على الاسم لإدارة مهامه · استخدم الأزرار للتعديل أو الحذف</div>}
          {isMgr&&<Btn v="gold" onClick={openAddMember}><i className="ti ti-plus"/>إضافة عضو</Btn>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {teamUsers.map(function(u){
            const isSelected=selUser&&selUser.id===u.id;
            const assignedCount=(u.assignments||[]).length;
            return(
              <div key={u.id} style={{background:isSelected?NAVY+"10":"#F9FAFB",borderRadius:10,padding:"16px",textAlign:"center",border:"2px solid "+(isSelected?NAVY:"transparent"),transition:"all 0.2s",position:"relative"}}>
                {/* أزرار التعديل والحذف */}
                {isMgr&&<div style={{position:"absolute",top:8,left:8,display:"flex",gap:4}}>
                  <button onClick={function(ev){ev.stopPropagation();openEditMember(u);}} style={{background:"#EFF6FF",border:"none",borderRadius:5,cursor:"pointer",color:"#3B82F6",padding:"3px 5px"}}><i className="ti ti-edit" style={{fontSize:11}}/></button>
                  <button onClick={function(ev){ev.stopPropagation();deleteMember(u);}} style={{background:"#FEF2F2",border:"none",borderRadius:5,cursor:"pointer",color:"#EF4444",padding:"3px 5px"}}><i className="ti ti-trash" style={{fontSize:11}}/></button>
                </div>}
                <div onClick={function(){if(isMgr)setSelUser(isSelected?null:u);}} style={{cursor:isMgr?"pointer":"default"}}>
                  <div style={{width:46,height:46,borderRadius:"50%",background:u.color+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:u.color,margin:"0 auto 10px"}}>{u.initials||u.name.charAt(0)}</div>
                  <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>{u.name}</div>
                  <div style={{fontSize:12,color:"#9CA3AF",marginTop:3}}>{u.role==="manager"?"مدير البرنامج":"فريق المراجعة"}</div>
                  <div style={{marginTop:8,display:"inline-block",padding:"3px 10px",borderRadius:20,background:u.color+"20",color:u.color,fontSize:11,fontWeight:600}}>{assignedCount} {assignedCount===1?"مهمة":"مهام"}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* لوحة إدارة مهام العضو المحدد */}
        {isMgr&&selUser&&(
          <div style={{marginTop:20,borderTop:"2px solid #F3F4F6",paddingTop:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:36,height:36,borderRadius:9,background:selUser.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,color:"white"}}>{selUser.initials}</div>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:NAVY}}>مهام {selUser.name}</div>
                <div style={{fontSize:12,color:"#9CA3AF"}}>{(selUser.assignments||[]).length} مهمة مُعيَّنة من أصل {engagements.length}</div>
              </div>
              <button onClick={function(){setSelUser(null);}} style={{marginRight:"auto",background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:18}}>×</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {engagements.map(function(eng){
                const assigned=(selUser.assignments||[]).indexOf(eng.id)>=0;
                return(
                  <div key={eng.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,background:assigned?"#F0FDF4":"#F9FAFB",border:"1px solid "+(assigned?"#86EFAC":"#E5E7EB")}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#374151"}}>{eng.title}</div>
                      <div style={{display:"flex",gap:8,marginTop:3}}>
                        <span style={{fontSize:11,color:"#9CA3AF",fontFamily:"monospace"}}>{eng.id}</span>
                        <SBadge status={eng.status}/>
                      </div>
                    </div>
                    <button
                      onClick={function(){
                        if(assigned){auth.unassignEng(selUser.id,eng.id);}
                        else{auth.assignEng(selUser.id,eng.id);}
                        // تحديث selUser محلياً
                        setSelUser(function(prev){
                          var newAssignments=assigned
                            ?(prev.assignments||[]).filter(function(a){return a!==eng.id;})
                            :(prev.assignments||[]).concat([eng.id]);
                          return Object.assign({},prev,{assignments:newAssignments});
                        });
                      }}
                      style={{padding:"6px 16px",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",background:assigned?"#EF4444":"#10B981",color:"white",minWidth:80}}>
                      {assigned?"إزالة":"تعيين"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Card>
    </div>
    </div>
  );
}

  const auth=useContext(AuthCtx);
  const isMgr=auth&&auth.isManager;
  const myId=auth&&auth.currentUser?auth.currentUser.id:"";
  // حساب الرسالة الصحيحة لكل مستخدم
  const getMsg=function(n){
    if(n.assignedTo){
      return n.assignedTo===myId?(n.messageForAssigned||n.message):(n.messageForOthers||n.message);
    }
    return n.message;
  };

  // التنبيهات مفلترة مسبقاً في notifAPI (بدون تنبيهات المستخدم نفسه)
  const myNotifs=notifications;

  const typeIco=function(t){
    if(t==="add")   return{icon:"ti-plus",    bg:"#ECFDF5",color:"#10B981"};
    if(t==="edit")  return{icon:"ti-edit",    bg:"#EFF6FF",color:"#3B82F6"};
    if(t==="delete")return{icon:"ti-trash",   bg:"#FEF2F2",color:"#EF4444"};
    if(t==="assign")return{icon:"ti-user-plus",bg:"#F5F3FF",color:"#8B5CF6"};
    return{icon:"ti-bell",bg:"#F3F4F6",color:"#6B7280"};
  };
  const entityLabel=function(e){
    if(e==="engagement") return"مهمة مراجعة";
    if(e==="finding")    return"ملاحظة";
    if(e==="workpaper")  return"ورقة عمل";
    return e;
  };
  const fmtTime=function(iso){
    const d=new Date(iso);
    const now=new Date();
    const diff=Math.floor((now-d)/1000);
    if(diff<60)return"الآن";
    if(diff<3600)return Math.floor(diff/60)+" دقيقة";
    if(diff<86400)return Math.floor(diff/3600)+" ساعة";
    const m=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
    return d.getDate()+" "+m[d.getMonth()]+" — "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"white",borderRadius:10,padding:"12px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:NAVY,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <i className="ti ti-bell" style={{fontSize:18,color:"white"}}/>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:NAVY}}>التنبيهات</div>
            <div style={{fontSize:12,color:"#9CA3AF"}}>{myNotifs.filter(function(n){return!isRead(n);}).length} غير مقروء من أصل {myNotifs.length}</div>
          </div>
        </div>
        {unreadCount>0&&(
          <button onClick={markAllRead}
            style={{padding:"6px 14px",background:"#F3F4F6",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",color:"#374151",fontWeight:600}}>
            <i className="ti ti-checks" style={{marginLeft:5}}/>تحديد الكل كمقروء
          </button>
        )}
      </div>

      {/* List */}
      {myNotifs.length===0?(
        <div style={{background:"white",borderRadius:12,padding:"60px 20px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <i className="ti ti-bell-off" style={{fontSize:48,color:"#E5E7EB",display:"block",marginBottom:12}}/>
          <div style={{fontSize:15,fontWeight:600,color:"#9CA3AF"}}>لا توجد تنبيهات</div>
          <div style={{fontSize:13,color:"#D1D5DB",marginTop:4}}>ستظهر هنا أي تغييرات على المهام المعيّنة لك</div>
        </div>
      ):(
        <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.06)",overflow:"hidden"}}>
          {myNotifs.map(function(n,idx){
            const s=typeIco(n.type);
            return(
              <div key={n.id} onClick={function(){navigate(n);}}
                style={{display:"flex",gap:14,padding:"16px 18px",borderBottom:idx<myNotifs.length-1?"1px solid #F3F4F6":"none",cursor:"pointer",background:isRead(n)?"white":"#FAFBFF",transition:"background 0.15s"}}>
                {/* Icon */}
                <div style={{width:40,height:40,borderRadius:10,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <i className={"ti "+s.icon} style={{fontSize:18,color:s.color}}/>
                </div>
                {/* Content */}
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    {!isRead(n)&&<span style={{width:8,height:8,borderRadius:"50%",background:"#3B82F6",display:"inline-block",flexShrink:0}}/>}
                    <span style={{fontSize:13,fontWeight:isRead(n)?400:700,color:"#374151"}}>{getMsg(n)}</span>
                  </div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"#9CA3AF",display:"flex",alignItems:"center",gap:4}}>
                      <i className="ti ti-user" style={{fontSize:11}}/>{n.actor}
                    </span>
                    <span style={{fontSize:11,color:"#9CA3AF",display:"flex",alignItems:"center",gap:4}}>
                      <i className="ti ti-clock" style={{fontSize:11}}/>{fmtTime(n.timestamp)}
                    </span>
                    {n.engagementTitle&&(
                      <span style={{fontSize:11,background:"#EFF6FF",color:"#1D4ED8",padding:"1px 7px",borderRadius:4,fontWeight:600}}>
                        {n.engagementTitle}
                      </span>
                    )}
                  </div>
                </div>
                {/* Entity badge + arrow */}
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0,paddingTop:2}}>
                  <div style={{fontSize:10,color:"#9CA3AF"}}>{entityLabel(n.entity)}</div>
                  <i className="ti ti-arrow-left" style={{fontSize:14,color:"#D1D5DB"}}/> 
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── Error Boundary ── */
class AppErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error:error};}
  componentDidCatch(error,info){console.error("AuditHub Error:",error,info);}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#F1F5F9",fontFamily:"'Segoe UI',Tahoma,Arial,sans-serif",direction:"rtl"}},
        React.createElement("div",{style:{background:"white",borderRadius:12,padding:"40px",maxWidth:480,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,.1)",border:"1px solid #FECACA"}},
          React.createElement("i",{className:"ti ti-alert-triangle",style:{fontSize:48,color:"#DC2626",display:"block",marginBottom:16}}),
          React.createElement("div",{style:{fontSize:18,fontWeight:700,color:"#1E293B",marginBottom:8}},
            "حدث خطأ غير متوقع"
          ),
          React.createElement("div",{style:{fontSize:13,color:"#64748B",marginBottom:20,lineHeight:1.7}},
            "يرجى تحديث الصفحة. إذا استمرت المشكلة تواصل مع مسؤول النظام."
          ),
          React.createElement("div",{style:{background:"#F8FAFC",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#94A3B8",fontFamily:"monospace",textAlign:"right",marginBottom:20,maxHeight:80,overflow:"hidden",textOverflow:"ellipsis"}},
            this.state.error?this.state.error.message:""
          ),
          React.createElement("button",{onClick:function(){window.location.reload();},style:{background:"#0D1F42",color:"white",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,cursor:"pointer",fontWeight:600}},
            "تحديث الصفحة"
          )
        )
      );
    }
    return this.props.children;
  }
}

/* ── Toast notification system ── */
function Toast({toasts,remove}){
  if(!toasts||!toasts.length)return null;
  return React.createElement("div",{style:{position:"fixed",bottom:24,left:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8}},
    toasts.map(function(t){
      var colors={success:{bg:"#F0FDF4",border:"#BBF7D0",icon:"ti-circle-check",ic:"#16A34A",title:"#15803D"},
                  error:  {bg:"#FEF2F2",border:"#FECACA",icon:"ti-circle-x",    ic:"#DC2626",title:"#991B1B"},
                  warning:{bg:"#FFFBEB",border:"#FDE68A",icon:"ti-alert-triangle",ic:"#D97706",title:"#92400E"},
                  info:   {bg:"#EFF6FF",border:"#BFDBFE",icon:"ti-info-circle", ic:"#2563EB",title:"#1D4ED8"}};
      var cfg=colors[t.type]||colors.info;
      return React.createElement("div",{key:t.id,style:{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 16px",background:cfg.bg,border:"1px solid "+cfg.border,borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,.1)",minWidth:280,maxWidth:380,direction:"rtl",fontFamily:"inherit"}},
        React.createElement("i",{className:"ti "+cfg.icon,style:{fontSize:18,color:cfg.ic,flexShrink:0,marginTop:1}}),
        React.createElement("div",{style:{flex:1}},
          t.title&&React.createElement("div",{style:{fontSize:12,fontWeight:700,color:cfg.title,marginBottom:2}}),
          React.createElement("div",{style:{fontSize:12,color:"#374151",lineHeight:1.5}},t.msg)
        ),
        React.createElement("button",{onClick:function(){remove(t.id);},style:{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0}},
          React.createElement("i",{className:"ti ti-x",style:{fontSize:13}})
        )
      );
    })
  );
}

  const monthsFromDates=(start,end,status)=>{
    if(!start||!end)return{};
    const ms={};
    const s=new Date(start), e=new Date(end);
    let d=new Date(s.getFullYear(),s.getMonth(),1);
    const eom=new Date(e.getFullYear(),e.getMonth(),1);
    while(d<=eom){ms[d.getMonth()+1]=status||"مخطط";d.setMonth(d.getMonth()+1);}
    return ms;
  };
  const statusFromMonths=months=>{
    const v=Object.values(months);
    if(!v.length)return"مخطط";
    if(v.every(x=>x==="مكتمل"))return"مكتمل";
    if(v.some(x=>x==="قيد التنفيذ"))return"قيد التنفيذ";
    if(v.some(x=>x==="مراجعة"))return"مراجعة";
    return"مخطط";
  };
  const progressFromMonths=months=>{

  };

          actor:actor,actorId:actorId,
          engagementId:"",engagementTitle:e.title,targetTab:"engagements",
          timestamp:new Date().toISOString(),readBy:[],
          assignedTo:uid,assignedToName:u.name,
        },...prev].slice(0,100);});
        setGTrail(function(prev){var arr=(prev[engId]||[]);return Object.assign({},prev,{[engId]:[...arr,{id:Date.now()+Math.random(),at:new Date().toISOString(),by:actor,role:"مدير البرنامج",rc:"#C8A84B",cat:"فريق المراجعة",icon:"👤",action:'أزال "'+u.name+'" من المهمة'}]});});
      }
    },
    addUser:function(u){setUsers(function(prev){return prev.concat([Object.assign({assignments:[]},u)]);});},
    removeUser:function(uid){setUsers(function(u){return u.filter(function(x){return x.id!==uid;});});},
  };

  // ── NOTIF API ──
  const myId=currentUser?currentUser.id:"";
  // لا تُظهر التنبيهات التي أنشأها المستخدم نفسه
  const othersNotifs=notifications.filter(function(n){return n.actorId!==myId;});
  const visibleNotifs=isManager
    ?othersNotifs
    :othersNotifs.filter(function(n){
      // تنبيهات التعيين المخصصة لهذا المستخدم تحديداً
      if(n.assignedTo&&n.assignedTo===myId) return true;
      // تنبيهات المهام المسموح بها
      return!n.engagementId||(authAPI.canAccessEng&&authAPI.canAccessEng(n.engagementId));
    });
  // حالة القراءة مفصولة لكل مستخدم
  const isRead=function(n){return (n.readBy||[]).indexOf(myId)>=0;};
  const myUnread=visibleNotifs.filter(function(n){return!isRead(n);}).length;
  const notifAPI={
    notifications:visibleNotifs,
    unreadCount:myUnread,
    isRead:isRead,
    markRead:function(id){
      setNotifications(function(prev){
        return prev.map(function(n){
          if(n.id!==id)return n;
          var rb=n.readBy||[];
          return rb.indexOf(myId)>=0?n:Object.assign({},n,{readBy:rb.concat([myId])});
        });
      });
    },
    markAllRead:function(){
      setNotifications(function(prev){
        return prev.map(function(n){
          var rb=n.readBy||[];
          return rb.indexOf(myId)>=0?n:Object.assign({},n,{readBy:rb.concat([myId])});
        });
      });
    },
    navigate:function(n){
      // تحديد كمقروء
      setNotifications(function(prev){
        return prev.map(function(x){
          if(x.id!==n.id)return x;
          var rb=x.readBy||[];
          return rb.indexOf(myId)>=0?x:Object.assign({},x,{readBy:rb.concat([myId])});
        });
      });
      // الانتقال للصفحة
      var targetTab=n.targetTab||"engagements";
      setTab(targetTab);
      // إذا كانت مهمة محددة، انتقل إليها مع التبويب الفرعي المناسب
      if(n.engagementId){
        setNavTarget({tab:targetTab,engId:n.engagementId,engSubTab:n.engSubTab||"overview"});
      }
    },
  };

  // ── LOGIN GATE ──
  if(!currentUser){return React.createElement(LoginScreen,{onLogin:authAPI.login,users:users});}

  // قائمة التنقل المفلترة حسب الصلاحيات
  const managerOnlyPages=["universe","settings"];
  const visibleNav=isManager?NAV:NAV.filter(function(n){return managerOnlyPages.indexOf(n.id)<0;});
  const visibleGroups=GROUPS.map(function(g){
    return Object.assign({},g,{ids:g.ids.filter(function(id){return isManager||managerOnlyPages.indexOf(id)<0;})});
  }).filter(function(g){return g.ids.length>0;});
  const cur=visibleNav.find(function(n){return n.id===tab;})||visibleNav[0];

  return(
    <NotifCtx.Provider value={notifAPI}>
    <AuthCtx.Provider value={authAPI}>
    <FindingsCtx.Provider value={findingsAPI}>
    <EngCtx.Provider value={engAPI}>
    <WpCtx.Provider value={wpAPI}>
    <div style={{display:"flex",height:"100vh",background:"#EEF1F8",direction:"rtl",overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:228,background:NAVY,display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
        <div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:10,background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <i className="ti ti-shield-check" style={{fontSize:20,color:NAVY}}/>
            </div>
            <div>
              <div style={{color:"white",fontWeight:700,fontSize:16}}>AuditHub</div>
              <div style={{color:GOLD,fontSize:10,marginTop:1}}>نظام إدارة المراجعة الداخلية</div>
              {saveStatus&&(
                <div style={{fontSize:9,color:saveStatus==="saved"?"#10B981":"#F59E0B",marginTop:2,display:"flex",alignItems:"center",gap:3}}>
                  <i className={"ti "+(saveStatus==="saved"?"ti-check":"ti-loader")} style={{fontSize:9}}/>
                  {saveStatus==="saved"?"تم الحفظ":"جاري الحفظ..."}
                </div>
              )}
            </div>
          </div>
          {/* User info */}
          <div style={{marginTop:12,padding:"10px 12px",background:"rgba(255,255,255,0.06)",borderRadius:10,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:30,height:30,borderRadius:8,background:currentUser.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"white",flexShrink:0}}>{currentUser.initials}</div>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{fontSize:12,fontWeight:600,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{currentUser.name}</div>
              <div style={{fontSize:10,color:isManager?"#C8A84B":"rgba(255,255,255,0.4)"}}>{isManager?"مدير البرنامج":"فريق المراجعة"}</div>
            </div>
            <button onClick={function(){authAPI.logout();}} title="تسجيل الخروج"
              style={{background:"rgba(239,68,68,0.2)",border:"none",borderRadius:6,cursor:"pointer",color:"#FCA5A5",padding:"4px 6px"}}>
              <i className="ti ti-logout" style={{fontSize:13}}/>
            </button>
          </div>
        </div>
        <div style={{padding:"6px 0",flex:1}}>
          {visibleGroups.map(function(g){return(
            <div key={g.sep}>
              <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.28)",padding:"10px 16px 4px",letterSpacing:"0.06em"}}>{g.sep}</div>
              {g.ids.map(function(id){
                const item=visibleNav.find(function(n){return n.id===id;});
                if(!item)return null;
                const active=tab===id;
                return(
                  <button key={id} onClick={function(){setTab(id);}} className="nbtn" style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 16px",border:"none",cursor:"pointer",textAlign:"right",background:active?"rgba(200,168,75,0.14)":"transparent",borderRight:"3px solid "+(active?GOLD:"transparent"),color:active?GOLD:"rgba(255,255,255,0.62)",fontSize:13,fontWeight:active?700:400,transition:"all 0.15s"}}>
                    <i className={"ti "+item.icon} style={{fontSize:18,flexShrink:0}}/>
                    <span style={{flex:1}}>{item.label}</span>
                    {id==="notifications"&&notifAPI.unreadCount>0&&(
                      <span style={{background:"#EF4444",color:"white",borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 6px",minWidth:18,textAlign:"center"}}>{notifAPI.unreadCount}</span>
                    )}
                  </button>
                );
              })}
            </div>
          );})}
        </div>
        <div style={{padding:"14px 16px",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:GOLD+"35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:GOLD,flexShrink:0}}>م</div>
          <div><div style={{color:"white",fontSize:13,fontWeight:600}}>محمد</div><div style={{color:"rgba(255,255,255,0.38)",fontSize:11}}>مدير المراجعة الداخلية</div></div>
        </div>
      </div>
      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <div style={{background:"white",padding:"12px 24px",borderBottom:"1px solid #E5E7EB",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <h1 style={{margin:0,fontSize:18,fontWeight:700,color:NAVY}}>{cur&&cur.label}</h1>
          </div>
          <button style={{width:34,height:34,borderRadius:8,background:"#F3F4F6",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <i className="ti ti-bell" style={{fontSize:17,color:"#374151"}}/>
          </button>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"20px 24px"}}>
          {PAGES[tab]}
        </div>
      </div>
    </div>
    </WpCtx.Provider>
    </EngCtx.Provider>
    </FindingsCtx.Provider>
    </AuthCtx.Provider>
    </NotifCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
